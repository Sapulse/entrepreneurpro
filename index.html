function ClientModal({open, onClose, client, contracts, onSave, onDelete, onNavigate, onTransformToContract}) {
  const [tab, setTab] = React.useState('infos');
  const [editing, setEditing] = React.useState(false);
  const [form, setForm] = React.useState({});
  const [confirmDelete, setConfirmDelete] = React.useState(false);
  const addToast = useToast();

  React.useEffect(() => {
    if(open && client) {
      setForm({...client});
      setEditing(false);
      setTab('infos');
    }
  }, [open, client]);

  const linkedContracts = React.useMemo(() => {
    if(!client) return [];
    return contracts.filter(c => c.clientId===client.id || normalize(c.client)===normalize(client.entreprise));
  }, [client, contracts]);

  const timeline = React.useMemo(() => {
    const events = [];
    if(client?.dateEntree) events.push({date:client.dateEntree, label:'Entrée CRM', type:'crm'});
    linkedContracts.forEach(c => {
      if(c.dateDebut) events.push({date:c.dateDebut, label:`Contrat: ${c.prestation}`, type:'contract', id:c.id});
    });
    return events.sort((a,b) => new Date(b.date)-new Date(a.date));
  }, [client, linkedContracts]);

  const caGenere = linkedContracts.filter(c=>c.statut!=='Annulé').reduce((s,c)=>s+(Number(c.montant)||0),0);

  const handleSave = () => {
    onSave({...form, potentiel:Number(form.potentiel)||0});
    setEditing(false);
    addToast('Client mis à jour','success');
  };

  const tabs = [{id:'infos',label:'Infos'},{id:'contrats',label:`Contrats (${linkedContracts.length})`},{id:'chrono',label:'Chronologie'}];

  return (
    <Modal open={open} onClose={onClose} title={client?.entreprise||'Client'} size="md">
      <Tabs tabs={tabs} active={tab} onChange={setTab}/>
      {tab==='infos' && (
        <div className="space-y-4">
          {!editing ? (
            <>
              <div className="grid grid-cols-2 gap-4 text-sm">
                <div><span className="text-gray-500">Entreprise:</span> <span className="font-medium">{form.entreprise}</span></div>
                <div><span className="text-gray-500">Contact:</span> <span className="font-medium">{form.prenom ? `${form.prenom} ${form.nom}` : form.nom}</span></div>
                <div><span className="text-gray-500">Email:</span> {form.email ? <a href={`mailto:${form.email}`} className="text-blue-600 hover:underline font-medium">{form.email}</a> : <span className="text-gray-400">—</span>}</div>
                <div><span className="text-gray-500">Tél:</span> <span className="font-medium">{form.telephone||'—'}</span></div>
                <div><span className="text-gray-500">Source:</span> <StatusBadge status={form.source}/></div>
                <div className="flex items-center gap-2"><span className="text-gray-500">Étape:</span>
                  <select className="text-xs border border-gray-200 rounded-lg px-2 py-1 bg-white" value={form.etape||'Contact'} onChange={e=>{const updated={...form,etape:e.target.value};setForm(updated);onSave({...updated,potentiel:Number(updated.potentiel)||0});}}>
                    {CRM_STAGES.map(s=><option key={s}>{s}</option>)}
                  </select>
                </div>
                <div><span className="text-gray-500">Potentiel:</span> <span className="font-semibold text-blue-700">{fmt(form.potentiel)}</span></div>
                <div><span className="text-gray-500">CA généré:</span> <span className="font-semibold text-green-700">{fmt(caGenere)}</span></div>
                {form.adresse && <div className="col-span-2"><span className="text-gray-500">Adresse:</span> <span className="font-medium">{form.adresse}</span></div>}
                {form.siret && <div><span className="text-gray-500">SIRET:</span> <span className="font-medium font-mono text-sm">{form.siret}</span></div>}
                {form.recommandePar && <div><span className="text-gray-500">Recommandé par:</span> <span className="font-medium">{form.recommandePar}</span></div>}
              </div>
              {form.notes && <div className="text-sm text-gray-600 bg-gray-50 rounded-lg p-3">{form.notes}</div>}
              <div className="flex justify-between pt-2 flex-wrap gap-2">
                <Btn variant="danger" size="sm" onClick={()=>setConfirmDelete(true)}>Supprimer</Btn>
                <div className="flex gap-2">
                  {(form.etape !== 'Client' && (form.potentiel||0) > 0) && (
                    <Btn variant="outline" size="sm" onClick={()=>{onTransformToContract && onTransformToContract(form);onClose();}}>🚀 Transformer en contrat</Btn>
                  )}
                  <Btn variant="outline" size="sm" onClick={()=>setEditing(true)}>Modifier</Btn>
                </div>
              </div>
            </>
          ) : (
            <div className="space-y-3">
              <div className="grid grid-cols-2 gap-3">
                <div><label className="block text-xs font-medium text-gray-600 mb-1">Entreprise</label><input className={inputCls} value={form.entreprise||''} onChange={e=>setForm(f=>({...f,entreprise:e.target.value}))}/></div>
                <div><label className="block text-xs font-medium text-gray-600 mb-1">Nom</label><input className={inputCls} value={form.nom||''} onChange={e=>setForm(f=>({...f,nom:e.target.value}))}/></div>
                <div><label className="block text-xs font-medium text-gray-600 mb-1">Prénom</label><input className={inputCls} value={form.prenom||''} onChange={e=>setForm(f=>({...f,prenom:e.target.value}))}/></div>
                <div><label className="block text-xs font-medium text-gray-600 mb-1">Email</label><input className={inputCls} type="email" value={form.email||''} onChange={e=>setForm(f=>({...f,email:e.target.value}))}/></div>
                <div><label className="block text-xs font-medium text-gray-600 mb-1">Téléphone</label><input className={inputCls} value={form.telephone||''} onChange={e=>setForm(f=>({...f,telephone:e.target.value}))}/></div>
                <div>
                  <label className="block text-xs font-medium text-gray-600 mb-1">Source</label>
                  <select className={selectCls} value={form.source||'Autre'} onChange={e=>setForm(f=>({...f,source:e.target.value}))}>
                    {SOURCES.map(s=><option key={s}>{s}</option>)}
                  </select>
                </div>
                {form.source==='Recommandation' && (
                  <div><label className="block text-xs font-medium text-gray-600 mb-1">Recommandé par</label><input className={inputCls} value={form.recommandePar||''} onChange={e=>setForm(f=>({...f,recommandePar:e.target.value}))}/></div>
                )}
                <div><label className="block text-xs font-medium text-gray-600 mb-1">Étape</label><select className={selectCls} value={form.etape||'Contact'} onChange={e=>setForm(f=>({...f,etape:e.target.value}))}>{CRM_STAGES.map(s=><option key={s}>{s}</option>)}</select></div>
                <div><label className="block text-xs font-medium text-gray-600 mb-1">Potentiel (€)</label><input className={inputCls} type="number" value={form.potentiel||''} onChange={e=>setForm(f=>({...f,potentiel:e.target.value}))}/></div>
                <div className="col-span-2"><label className="block text-xs font-medium text-gray-600 mb-1">Adresse</label><input className={inputCls} value={form.adresse||''} onChange={e=>setForm(f=>({...f,adresse:e.target.value}))} placeholder="Adresse physique (optionnel)"/></div>
                <div><label className="block text-xs font-medium text-gray-600 mb-1">SIRET</label><input className={inputCls} value={form.siret||''} onChange={e=>setForm(f=>({...f,siret:e.target.value}))} placeholder="N° SIRET (optionnel)"/></div>
              </div>
              <div><label className="block text-xs font-medium text-gray-600 mb-1">Notes</label><textarea className={textareaCls} rows={3} value={form.notes||''} onChange={e=>setForm(f=>({...f,notes:e.target.value}))}/></div>
              <div className="flex gap-2 justify-end">
                <Btn variant="secondary" size="sm" onClick={()=>setEditing(false)}>Annuler</Btn>
                <Btn variant="primary" size="sm" onClick={handleSave}>Enregistrer</Btn>
              </div>
            </div>
          )}
        </div>
      )}
      {tab==='contrats' && (
        <div className="space-y-3">
          {linkedContracts.length===0 ? <EmptyState message="Aucun contrat lié" icon="📄"/> : (
            linkedContracts.map(c => {
              const ps = calcPaymentStatus(c.montant, c.payments);
              return (
                <div key={c.id} onClick={()=>{onClose();onNavigate('contracts',{id:c.id,tab:'infos'});}}
                  className="flex items-center justify-between p-3 bg-gray-50 rounded-xl border border-gray-100 cursor-pointer hover:bg-gray-100 transition-colors">
                  <div>
                    <div className="text-sm font-medium text-gray-800">{c.prestation}</div>
                    <div className="text-xs text-gray-500 mt-0.5">{fmt(c.montant)} · {c.dateSignature ? formatDate(c.dateSignature) : '—'}</div>
                  </div>
                  <div className="flex gap-1.5 items-center"><StatusBadge status={c.statut}/><StatusBadge status={ps}/><span className="text-blue-400 text-xs ml-1">→</span></div>
                </div>
              );
            })
          )}
          <Btn size="sm" variant="outline" onClick={()=>{onClose();onNavigate('contracts',{clientId:client.id,client:client.entreprise,montant:client.potentiel});}}>
            + Créer un contrat
          </Btn>
        </div>
      )}
      {tab==='chrono' && (
        <div className="space-y-2">
          {timeline.length===0 ? <EmptyState message="Aucun événement" icon="📅"/> : (
            timeline.map((ev, i) => (
              <div key={i} className="flex items-center gap-3 p-3 bg-gray-50 rounded-xl border border-gray-100">
                <div className={`w-2 h-2 rounded-full flex-shrink-0 ${ev.type==='crm'?'bg-blue-400':'bg-green-400'}`}/>
                <div className="flex-1">
                  <div className="text-sm font-medium text-gray-800">{ev.label}</div>
                  <div className="text-xs text-gray-500">{formatDate(ev.date)}</div>
                </div>
              </div>
            ))
          )}
        </div>
      )}
      <ConfirmModal open={confirmDelete} onClose={()=>setConfirmDelete(false)} onConfirm={()=>{onDelete(client.id);onClose();}} title="Supprimer le client" message="Cette action est irréversible."/>
    </Modal>
  );
}

function CRMModule({data, setData, onNavigate}) {
  const addToast = useToast();
  const [view, setView] = React.useState('liste');
  const [search, setSearch] = React.useState('');
  const [selectedClient, setSelectedClient] = React.useState(null);
  const [modalOpen, setModalOpen] = React.useState(false);
  const [newClientModal, setNewClientModal] = React.useState(false);
  const [newForm, setNewForm] = React.useState({entreprise:'',nom:'',prenom:'',email:'',telephone:'',source:'Autre',etape:'Contact',potentiel:'',notes:'',dateEntree:todayStr(),adresse:'',siret:'',recommandePar:''});

  const filtered = React.useMemo(() => {
    let list = [...(data.clients||[])].sort((a,b)=>new Date(b.dateEntree||0)-new Date(a.dateEntree||0));
    if(!search) return list;
    const q = normalize(search);
    return list.filter(c => normalize(c.entreprise).includes(q)||normalize(c.nom).includes(q)||normalize(c.prenom||'').includes(q)||normalize(c.email||'').includes(q));
  }, [data.clients, search]);

  const getCA = (cl) => {
    return data.contracts.filter(c=>(c.clientId===cl.id||normalize(c.client)===normalize(cl.entreprise))&&c.statut!=='Annulé').reduce((s,c)=>s+(Number(c.montant)||0),0);
  };

  const openClient = (cl) => { setSelectedClient(cl); setModalOpen(true); };

  const handleSave = (updated) => {
    setData(d => ({...d, clients:d.clients.map(c=>c.id===updated.id?updated:c)}));
  };

  const handleDelete = (id) => {
    setData(d => ({...d, clients:d.clients.filter(c=>c.id!==id)}));
    addToast('Client supprimé','success');
  };

  const handleCreate = () => {
    if(!newForm.entreprise.trim()||!newForm.nom.trim()) { addToast('Entreprise et nom requis','error'); return; }
    const nc = {...newForm, id:genId(), potentiel:Number(newForm.potentiel)||0, dateEntree:newForm.dateEntree||todayStr()};
    setData(d => ({...d, clients:[...(d.clients||[]), nc]}));
    setNewClientModal(false);
    setNewForm({entreprise:'',nom:'',prenom:'',email:'',telephone:'',source:'Autre',etape:'Contact',potentiel:'',notes:'',dateEntree:todayStr(),adresse:'',siret:'',recommandePar:''});
    addToast('Client créé','success');
  };

  const pipelineStages = CRM_STAGES.filter(s=>s!=='Client');

  return (
    <div className="space-y-4">
      <div className="flex items-end justify-between">
        <h1 className="text-2xl font-bold text-gray-800">CRM</h1>
        <div className="flex gap-2">
          <div className="flex bg-gray-100 rounded-lg p-1">
            <button onClick={()=>setView('liste')} className={`px-3 py-1 text-xs font-medium rounded ${view==='liste'?'bg-white shadow text-gray-800':'text-gray-500'}`}>Liste</button>

function TaskModal({open, onClose, task, onSave, onDelete}) {
  const [form, setForm] = React.useState({});
  const [confirmDelete, setConfirmDelete] = React.useState(false);
  const addToast = useToast();

  React.useEffect(() => {
    if(open) {
      if(task) setForm({...task});
      else setForm({id:null,titre:'',client:'',assignedTo:'Micka',statut:'À faire',priorite:'Moyenne',echeance:'',notes:''});
    }
  }, [open, task]);

  const handleSave = () => {
    if(!form.titre.trim()) { addToast('Titre requis','error'); return; }
    onSave(form);
    onClose();
  };

  return (
    <Modal open={open} onClose={onClose} title={form.id?'Modifier la tâche':'Nouvelle tâche'} size="sm">
      <div className="space-y-3">
        <div><label className="block text-xs font-medium text-gray-600 mb-1">Titre *</label><input className={inputCls} value={form.titre||''} onChange={e=>setForm(f=>({...f,titre:e.target.value}))} placeholder="Description de la tâche"/></div>
        <div><label className="block text-xs font-medium text-gray-600 mb-1">Client</label><input className={inputCls} value={form.client||''} onChange={e=>setForm(f=>({...f,client:e.target.value}))} placeholder="Nom du client"/></div>
        <div className="grid grid-cols-2 gap-3">
          <div><label className="block text-xs font-medium text-gray-600 mb-1">Assigné à</label><select className={selectCls} value={form.assignedTo||'Micka'} onChange={e=>setForm(f=>({...f,assignedTo:e.target.value}))}>{ASSIGNEES.map(a=><option key={a}>{a}</option>)}</select></div>
          <div><label className="block text-xs font-medium text-gray-600 mb-1">Statut</label><select className={selectCls} value={form.statut||'À faire'} onChange={e=>setForm(f=>({...f,statut:e.target.value}))}>{TASK_STATUSES.map(s=><option key={s}>{s}</option>)}</select></div>
          <div><label className="block text-xs font-medium text-gray-600 mb-1">Priorité</label><select className={selectCls} value={form.priorite||'Moyenne'} onChange={e=>setForm(f=>({...f,priorite:e.target.value}))}>{TASK_PRIORITIES.map(p=><option key={p}>{p}</option>)}</select></div>
          <div><label className="block text-xs font-medium text-gray-600 mb-1">Échéance</label><input className={inputCls} type="date" value={form.echeance||''} onChange={e=>setForm(f=>({...f,echeance:e.target.value}))}/></div>
        </div>
        <div><label className="block text-xs font-medium text-gray-600 mb-1">Notes</label><textarea className={textareaCls} rows={3} value={form.notes||''} onChange={e=>setForm(f=>({...f,notes:e.target.value}))}/></div>
        <div className="flex justify-between pt-2">
          {form.id && <Btn variant="danger" size="sm" onClick={()=>setConfirmDelete(true)}>Supprimer</Btn>}
          <div className="flex gap-2 ml-auto">
            <Btn variant="secondary" onClick={onClose}>Annuler</Btn>
            <Btn variant="primary" onClick={handleSave}>Enregistrer</Btn>
          </div>
        </div>
      </div>
      <ConfirmModal open={confirmDelete} onClose={()=>setConfirmDelete(false)} onConfirm={()=>{onDelete(form.id);onClose();}} title="Supprimer la tâche" message="Confirmer la suppression ?"/>
    </Modal>
  );
}

function TaskCard({task, onMove, onEdit, onDelete}) {
  const isOverdue = task.echeance && task.statut !== 'Terminé' && new Date(task.echeance+'T23:59:59') < new Date();
  const statusOrder = ['À faire','En cours','Terminé'];
  const idx = statusOrder.indexOf(task.statut);
  const canLeft = idx > 0;
  const canRight = idx < statusOrder.length-1;

  return (
    <div className="bg-white rounded-xl p-3 shadow-sm border border-gray-100 space-y-2">
      <div className="text-sm font-medium text-gray-800 leading-snug">{task.titre}</div>
      {task.client && <div className="text-xs text-gray-400">{task.client}</div>}
      <div className="flex flex-wrap gap-1">
        <StatusBadge status={task.assignedTo}/>
        <StatusBadge status={task.priorite}/>
      </div>
      {task.echeance && (
        <div className={`text-xs font-medium ${isOverdue?'text-red-600':'text-gray-500'}`}>
          {isOverdue?'⚠ ':''}{formatDate(task.echeance)}
        </div>
      )}
      <div className="flex items-center justify-between pt-1 border-t border-gray-50">
        <div className="flex gap-1">
          {canLeft && <button onClick={()=>onMove(task,'left')} className="text-gray-300 hover:text-gray-600 text-sm px-1">←</button>}
          {canRight && <button onClick={()=>onMove(task,'right')} className="text-gray-300 hover:text-gray-600 text-sm px-1">→</button>}
        </div>
        <div className="flex gap-1">
          <button onClick={()=>onEdit(task)} className="text-gray-300 hover:text-blue-500 text-xs px-1">✏</button>
          <button onClick={()=>onDelete(task.id)} className="text-gray-300 hover:text-red-500 text-sm px-1">&times;</button>
        </div>
      </div>
    </div>
  );
}

function TasksModule({data, setData}) {
  const addToast = useToast();
  const [modalOpen, setModalOpen] = React.useState(false);
  const [selectedTask, setSelectedTask] = React.useState(null);
  const [confirmDelete, setConfirmDelete] = React.useState(null);

  const statusOrder = ['À faire','En cours','Terminé'];

  const moveTask = (task, dir) => {
    const idx = statusOrder.indexOf(task.statut);
    const newIdx = dir==='right' ? idx+1 : idx-1;
    if(newIdx<0||newIdx>=statusOrder.length) return;
    setData(d => ({...d, tasks:d.tasks.map(t=>t.id===task.id?{...t,statut:statusOrder[newIdx]}:t)}));
  };

  const handleSave = (form) => {
    if(form.id) {
      setData(d => ({...d, tasks:d.tasks.map(t=>t.id===form.id?form:t)}));
      addToast('Tâche mise à jour','success');
    } else {
      setData(d => ({...d, tasks:[...d.tasks, {...form, id:genId()}]}));
      addToast('Tâche créée','success');
    }
  };

  const handleDelete = (id) => {
    setData(d => ({...d, tasks:d.tasks.filter(t=>t.id!==id)}));
    addToast('Tâche supprimée','success');
  };

  const colColors = {'À faire':'bg-slate-50 border-slate-200','En cours':'bg-blue-50 border-blue-200','Terminé':'bg-green-50 border-green-200'};

  return (
    <div className="space-y-4">
      <div className="flex items-end justify-between">
        <h1 className="text-2xl font-bold text-gray-800">Tâches</h1>
        <Btn variant="primary" onClick={()=>{setSelectedTask(null);setModalOpen(true);}}>+ Nouvelle tâche</Btn>
      </div>

      <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
        {statusOrder.map(status => {
          const tasks = data.tasks.filter(t=>t.statut===status);
          return (
            <div key={status} className={`border rounded-2xl p-3 ${colColors[status]}`}>
              <div className="flex items-center justify-between mb-3 px-1">
                <span className="text-sm font-semibold text-gray-700">{status}</span>
                <span className="text-xs bg-white px-1.5 py-0.5 rounded-full shadow-sm text-gray-500">{tasks.length}</span>
              </div>
              <div className="space-y-2">
                {tasks.length===0 && <div className="text-center text-xs text-gray-300 py-6">Vide</div>}
                {tasks.map(t => (
                  <TaskCard key={t.id} task={t}
                    onMove={moveTask}
                    onEdit={(t)=>{setSelectedTask(t);setModalOpen(true);}}
                    onDelete={(id)=>setConfirmDelete(id)}
                  />
                ))}
              </div>
            </div>
          );
        })}
      </div>

      <TaskModal
        open={modalOpen}
        onClose={()=>{setModalOpen(false);setSelectedTask(null);}}
        task={selectedTask}
        onSave={handleSave}
        onDelete={handleDelete}
      />
      <ConfirmModal open={!!confirmDelete} onClose={()=>setConfirmDelete(null)} onConfirm={()=>{handleDelete(confirmDelete);setConfirmDelete(null);}} title="Supprimer la tâche" message="Confirmer la suppression ?"/>
    </div>
  );
}

function TxModal({open, onClose, tx, onSave, onDelete}) {
  const [form, setForm] = React.useState({});
  const [confirmDelete, setConfirmDelete] = React.useState(false);
  const addToast = useToast();

  React.useEffect(() => {
    if(open) {
      if(tx) setForm({...tx, montant:Math.abs(Number(tx.montant||0)), imputéÀ:tx.imputéÀ||'Commun'});
      else setForm({id:null,label:'',montant:'',type:'Achat',date:todayStr(),auteur:'Micka',statut:'Validé',imputéÀ:'Commun'});
    }
  }, [open, tx]);

  const handleSave = () => {
    if(!form.label.trim()||!form.montant) { addToast('Label et montant requis','error'); return; }
    const signedMontant = (['Achat','Sortie'].includes(form.type)) ? -Math.abs(Number(form.montant)) : Math.abs(Number(form.montant));
    onSave({...form, montant:signedMontant, imputéÀ:form.imputéÀ||'Commun'});
    onClose();
  };

  return (
    <Modal open={open} onClose={onClose} title={form.id?'Modifier la transaction':'Nouvelle transaction'} size="sm">
      <div className="space-y-3">
        <div><label className="block text-xs font-medium text-gray-600 mb-1">Label *</label><input className={inputCls} value={form.label||''} onChange={e=>setForm(f=>({...f,label:e.target.value}))} placeholder="Description"/></div>
        <div className="grid grid-cols-2 gap-3">
          <div><label className="block text-xs font-medium text-gray-600 mb-1">Montant (€) *</label><input className={inputCls} type="number" step="0.01" value={form.montant||''} onChange={e=>setForm(f=>({...f,montant:e.target.value}))} placeholder="0" min="0"/></div>
          <div><label className="block text-xs font-medium text-gray-600 mb-1">Type</label><select className={selectCls} value={form.type||'Achat'} onChange={e=>setForm(f=>({...f,type:e.target.value}))}>{TX_TYPES.map(t=><option key={t}>{t}</option>)}</select></div>
          <div><label className="block text-xs font-medium text-gray-600 mb-1">Date</label><input className={inputCls} type="date" value={form.date||todayStr()} onChange={e=>setForm(f=>({...f,date:e.target.value}))}/></div>
          <div><label className="block text-xs font-medium text-gray-600 mb-1">Auteur</label><select className={selectCls} value={form.auteur||'Micka'} onChange={e=>setForm(f=>({...f,auteur:e.target.value}))}>{[...ASSIGNEES,'Système'].map(a=><option key={a}>{a}</option>)}</select></div>
          <div><label className="block text-xs font-medium text-gray-600 mb-1">Imputé à</label><select className={selectCls} value={form.imputéÀ||'Commun'} onChange={e=>setForm(f=>({...f,imputéÀ:e.target.value}))}>{IMPUTEES.map(a=><option key={a}>{a}</option>)}</select></div>
          <div><label className="block text-xs font-medium text-gray-600 mb-1">Statut</label><select className={selectCls} value={form.statut||'Validé'} onChange={e=>setForm(f=>({...f,statut:e.target.value}))}>{['Validé','Annulé'].map(s=><option key={s}>{s}</option>)}</select></div>
        </div>
        <div className="flex justify-between pt-2">
          {form.id && <Btn variant="danger" size="sm" onClick={()=>setConfirmDelete(true)}>Supprimer</Btn>}
          <div className="flex gap-2 ml-auto">
            <Btn variant="secondary" onClick={onClose}>Annuler</Btn>
            <Btn variant="primary" onClick={handleSave}>Enregistrer</Btn>
          </div>
        </div>
      </div>
      <ConfirmModal open={confirmDelete} onClose={()=>setConfirmDelete(false)} onConfirm={()=>{onDelete(form.id);onClose();}} title="Supprimer la transaction" message="Confirmer la suppression ?"/>
    </Modal>
  );
}

function SubModal({open, onClose, sub, onSave, onDelete}) {
  const [form, setForm] = React.useState({});
  const [confirmDelete, setConfirmDelete] = React.useState(false);
  const addToast = useToast();

  React.useEffect(() => {
    if(open) {
      if(sub) setForm({...sub, paidBy:sub.paidBy||'Système', imputéÀ:sub.imputéÀ||'Commun'});
      else setForm({id:null,name:'',amount:'',day:1,category:'Logiciels',active:true,paidBy:'Système',imputéÀ:'Commun'});
    }
  }, [open, sub]);

  const handleSave = () => {
    if(!form.name.trim()||!form.amount) { addToast('Nom et montant requis','error'); return; }
    onSave({...form, amount:Number(form.amount), day:Number(form.day)||1, imputéÀ:form.imputéÀ||'Commun'});
    onClose();
  };

  return (
    <Modal open={open} onClose={onClose} title={form.id?'Modifier l\'abonnement':'Nouvel abonnement'} size="sm">
      <div className="space-y-3">
        <div><label className="block text-xs font-medium text-gray-600 mb-1">Nom *</label><input className={inputCls} value={form.name||''} onChange={e=>setForm(f=>({...f,name:e.target.value}))} placeholder="Nom du service"/></div>
        <div className="grid grid-cols-2 gap-3">
          <div><label className="block text-xs font-medium text-gray-600 mb-1">Montant (€/mois) *</label><input className={inputCls} type="number" step="0.01" value={form.amount||''} onChange={e=>setForm(f=>({...f,amount:e.target.value}))} placeholder="0"/></div>
          <div><label className="block text-xs font-medium text-gray-600 mb-1">Jour du mois (1-31)</label><input className={inputCls} type="number" value={form.day||1} min={1} max={31} onChange={e=>setForm(f=>({...f,day:e.target.value}))}/></div>
          <div><label className="block text-xs font-medium text-gray-600 mb-1">Catégorie</label><select className={selectCls} value={form.category||'Logiciels'} onChange={e=>setForm(f=>({...f,category:e.target.value}))}>{EXPENSE_CATEGORIES.map(c=><option key={c}>{c}</option>)}</select></div>
          <div><label className="block text-xs font-medium text-gray-600 mb-1">Payé par</label><select className={selectCls} value={form.paidBy||'Système'} onChange={e=>setForm(f=>({...f,paidBy:e.target.value}))}>{[...ASSIGNEES,'Système'].map(a=><option key={a}>{a}</option>)}</select></div>
          <div><label className="block text-xs font-medium text-gray-600 mb-1">Imputé à</label><select className={selectCls} value={form.imputéÀ||'Commun'} onChange={e=>setForm(f=>({...f,imputéÀ:e.target.value}))}>{IMPUTEES.map(a=><option key={a}>{a}</option>)}</select></div>
        </div>
        <div className="flex items-center gap-2">
          <input type="checkbox" id="subactive" checked={!!form.active} onChange={e=>setForm(f=>({...f,active:e.target.checked}))} className="rounded"/>
          <label htmlFor="subactive" className="text-xs text-gray-600">Actif</label>
        </div>
        <div className="flex justify-between pt-2">
          {form.id && <Btn variant="danger" size="sm" onClick={()=>setConfirmDelete(true)}>Supprimer</Btn>}
          <div className="flex gap-2 ml-auto">
            <Btn variant="secondary" onClick={onClose}>Annuler</Btn>
            <Btn variant="primary" onClick={handleSave}>Enregistrer</Btn>
          </div>
        </div>
      </div>
      <ConfirmModal open={confirmDelete} onClose={()=>setConfirmDelete(false)} onConfirm={()=>{onDelete(form.id);onClose();}} title="Supprimer l'abonnement" message="Confirmer ?"/>
    </Modal>
  );
}

function BankModule({data, setData, deepLink, clearDeepLink}) {
  const addToast = useToast();
  const [editBalance, setEditBalance] = React.useState(false);
  const [tempBalance, setTempBalance] = React.useState('');
  const [expenseModal, setExpenseModal] = React.useState(false);
  const [txModal, setTxModal] = React.useState(false);
  const [subModal, setSubModal] = React.useState(false);
  const [selectedExpense, setSelectedExpense] = React.useState(null);
  const [selectedTx, setSelectedTx] = React.useState(null);
  const [selectedSub, setSelectedSub] = React.useState(null);
  const [periodeId, setPeriodeId] = React.useState('tout');
  const [dateDebut, setDateDebut] = React.useState('');
  const [dateFin, setDateFin] = React.useState('');
  const [catFilter, setCatFilter] = React.useState('Toutes');
  const [payeurFilter, setPayeurFilter] = React.useState('Tous');

  React.useEffect(() => {
    if(deepLink) {
      if(deepLink.type==='bankTx') {
        const tx = deepLink.id ? data.bank.transactions.find(t=>t.id===deepLink.id) : null;
        setSelectedTx(tx||null);
        setTxModal(true);
      } else if(deepLink.type==='expense') {
        const exp = deepLink.id ? data.expenses.find(e=>e.id===deepLink.id) : null;
        setSelectedExpense(exp||null);
        setExpenseModal(true);
      }
      clearDeepLink();
    }
  }, [deepLink]);

  const solde = React.useMemo(() => {
    const validTx = (data.bank.transactions||[]).filter(t=>t.statut!=='Annulé');
    return (data.bank.initialBalance||0) + validTx.reduce((s,t)=>s+(Number(t.montant)||0),0);
  }, [data.bank]);

  const saveBalance = () => {
    setData(d => ({...d, bank:{...d.bank, initialBalance:Number(tempBalance)||0}}));
    setEditBalance(false);
    addToast('Solde initial mis à jour','success');
  };

  const saveExpense = (form) => {
    if(form.id) {
      setData(d => ({...d, expenses:d.expenses.map(e=>e.id===form.id?form:e)}));
      addToast('Dépense mise à jour','success');
    } else {
      setData(d => ({...d, expenses:[...d.expenses, {...form,id:genId()}]}));
      addToast('Dépense ajoutée','success');
    }
  };

  const deleteExpense = (id) => {
    setData(d => ({...d, expenses:d.expenses.filter(e=>e.id!==id)}));
    addToast('Dépense supprimée','success');
  };

  const saveTx = (form) => {
    if(form.id) {
      setData(d => ({...d, bank:{...d.bank, transactions:d.bank.transactions.map(t=>t.id===form.id?form:t)}}));
      addToast('Transaction mise à jour','success');
    } else {
      setData(d => ({...d, bank:{...d.bank, transactions:[...d.bank.transactions, {...form,id:genId()}]}}));
      addToast('Transaction ajoutée','success');
    }
  };

  const deleteTx = (id) => {
    setData(d => ({...d, bank:{...d.bank, transactions:d.bank.transactions.filter(t=>t.id!==id)}}));
    addToast('Transaction supprimée','success');
  };

  const saveSub = (form) => {
    if(form.id) {
      setData(d => ({...d, bank:{...d.bank, subscriptions:d.bank.subscriptions.map(s=>s.id===form.id?form:s)}}));
    } else {
      setData(d => ({...d, bank:{...d.bank, subscriptions:[...d.bank.subscriptions, {...form,id:genId()}]}}));
    }
    addToast('Abonnement enregistré','success');
  };

  const deleteSub = (id) => {
    setData(d => ({...d, bank:{...d.bank, subscriptions:d.bank.subscriptions.filter(s=>s.id!==id)}}));
  };

  const toggleSubActive = (id) => {
    setData(d => ({...d, bank:{...d.bank, subscriptions:d.bank.subscriptions.map(s=>s.id===id?{...s,active:!s.active}:s)}}));
  };

  const generateSubscriptionTx = () => {
    const now = new Date();
    const year = now.getFullYear();
    const month = now.getMonth();
    const monthKey = currentMonthKey();
    const activeSubs = (data.bank.subscriptions||[]).filter(s=>s.active);
    const existingTx = data.bank.transactions||[];
    let added = 0;

    const newTxs = [];
    activeSubs.forEach(sub => {
      const alreadyExists = existingTx.some(t => {
        if(t.statut==='Annulé') return false;
        if(normalize(t.label)!==normalize(sub.name)) return false;
        const txDate = t.date ? t.date.substring(0,7) : '';
        return txDate === monthKey;
      });
      if(!alreadyExists) {
        const lastDay = new Date(year, month+1, 0).getDate();
        const day = Math.min(Number(sub.day)||1, lastDay);
        const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
        newTxs.push({id:genId(), label:sub.name, montant:-Math.abs(sub.amount), type:'Achat', date:dateStr, auteur:sub.paidBy||'Système', statut:'Validé', imputéÀ:sub.imputéÀ||'Commun'});
        added++;
      }
    });

    if(added > 0) {
      setData(d => ({...d, bank:{...d.bank, transactions:[...d.bank.transactions, ...newTxs]}}));
      addToast(`${added} transaction(s) générée(s)`, 'success');
    } else {
      addToast('Toutes les transactions du mois existent déjà', 'info');
    }
  };

  const periodeRange = React.useMemo(() => buildPeriodeRange(periodeId, dateDebut, dateFin), [periodeId, dateDebut, dateFin]);
  const sortedTx = React.useMemo(() => {
    let list = [...(data.bank.transactions||[])].sort((a,b)=>new Date(b.date)-new Date(a.date));
    if(periodeId !== 'tout') list = list.filter(t => inPeriode(t.date, periodeRange));
    return list;
  }, [data.bank.transactions, periodeRange, periodeId]);
  const sortedExpenses = React.useMemo(() => {
    let list = [...(data.expenses||[])].sort((a,b)=>new Date(b.date)-new Date(a.date));
    if(periodeId !== 'tout') list = list.filter(e => inPeriode(e.date, periodeRange));
    if(catFilter !== 'Toutes') list = list.filter(e => (e.categorie||'Autre') === catFilter);
    if(payeurFilter !== 'Tous') list = list.filter(e => e.payePar === payeurFilter);
    return list;
  }, [data.expenses, periodeRange, periodeId, catFilter, payeurFilter]);

  // Expense totals for KPIs
  const expenseKPIs = React.useMemo(() => {
    const total = sortedExpenses.reduce((s,e)=>s+(Number(e.montant)||0),0);
    const byMicka = sortedExpenses.filter(e=>e.payePar==='Micka').reduce((s,e)=>s+(Number(e.montant)||0),0);
    const byCesar = sortedExpenses.filter(e=>e.payePar==='César').reduce((s,e)=>s+(Number(e.montant)||0),0);
    return {total, byMicka, byCesar};
  }, [sortedExpenses]);

  return (
    <div className="space-y-6">
      <h1 className="text-2xl font-bold text-gray-800">Banque & Frais</h1>

      {/* Period filter */}
      <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-4 space-y-3">
        <div className="flex items-center gap-2 flex-wrap">
          <span className="text-xs font-semibold text-gray-500">Période :</span>
          <PeriodeFilter periodeId={periodeId} setPeriodeId={setPeriodeId} dateDebut={dateDebut} setDateDebut={setDateDebut} dateFin={dateFin} setDateFin={setDateFin}/>
        </div>
        <div className="flex gap-3 flex-wrap">
          <KPICard label="Dépenses perso" value={fmt(expenseKPIs.total)} color="red" icon="💸"/>
          <KPICard label="Micka" value={fmt(expenseKPIs.byMicka)} color="indigo" icon="👤"/>
          <KPICard label="César" value={fmt(expenseKPIs.byCesar)} color="green" icon="👤"/>
        </div>
      </div>

      {/* Solde */}
      <div className="bg-gradient-to-br from-indigo-50 to-indigo-100 rounded-2xl p-5">
        <div className="text-xs font-medium text-indigo-600 mb-1">Solde carte</div>
        <div className="text-3xl font-bold text-indigo-800 mb-2">{fmt(solde)}</div>
        <div className="flex items-center gap-3">
          {!editBalance ? (
            <><span className="text-xs text-indigo-500">Solde initial: {fmt(data.bank.initialBalance)}</span>
            <button onClick={()=>{setTempBalance(data.bank.initialBalance);setEditBalance(true);}} className="text-xs text-indigo-400 hover:text-indigo-600 underline">Modifier</button></>
          ) : (
            <div className="flex items-center gap-2">
              <input className="border border-indigo-300 rounded px-2 py-1 text-sm w-32 bg-white" type="number" step="0.01" value={tempBalance} onChange={e=>setTempBalance(e.target.value)}/>
              <Btn size="sm" variant="primary" onClick={saveBalance}>OK</Btn>
              <Btn size="sm" variant="ghost" onClick={()=>setEditBalance(false)}>Annuler</Btn>
            </div>
          )}
        </div>
      </div>

      {/* Avances perso */}
      <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-5">
        <SectionHeader title="Avances perso (Dépenses)" action={<Btn size="sm" variant="primary" onClick={()=>{setSelectedExpense(null);setExpenseModal(true);}}>+ Ajouter</Btn>}/>
        <div className="flex gap-3 mb-4 flex-wrap">
          <div>
            <label className="block text-xs font-medium text-gray-600 mb-1">Catégorie</label>
            <select className={`${selectCls} w-32`} value={catFilter} onChange={e=>setCatFilter(e.target.value)}>
              <option value="Toutes">Toutes</option>
              {EXPENSE_CATEGORIES.map(c=><option key={c}>{c}</option>)}
            </select>
          </div>
          <div>
            <label className="block text-xs font-medium text-gray-600 mb-1">Payé par</label>
            <select className={`${selectCls} w-28`} value={payeurFilter} onChange={e=>setPayeurFilter(e.target.value)}>
              {['Tous','Micka','César'].map(a=><option key={a}>{a}</option>)}
            </select>
          </div>
        </div>
        {sortedExpenses.length===0 ? <EmptyState message="Aucune dépense" icon="💸"/> : (<>
          <div className="hidden md:block overflow-x-auto">
            <table className="w-full text-sm">
              <thead className="bg-gray-50">
                <tr>{['Titre','Montant','Catégorie','Payé par','Date','Refact.',''].map(h=><th key={h} className="text-left text-xs font-semibold text-gray-500 px-3 py-2">{h}</th>)}</tr>
              </thead>
              <tbody>
                {sortedExpenses.map(e=>(
                  <tr key={e.id} className="border-t border-gray-50 hover:bg-gray-50">
                    <td className="px-3 py-2 font-medium">{e.titre}</td>
                    <td className="px-3 py-2 text-red-600 font-semibold">{fmt(e.montant)}</td>
                    <td className="px-3 py-2 text-gray-500">{e.categorie}</td>
                    <td className="px-3 py-2"><StatusBadge status={e.payePar}/></td>
                    <td className="px-3 py-2 text-gray-500 text-xs">{formatDate(e.date)}</td>
                    <td className="px-3 py-2 text-xs">{e.refacturable?'✓':''}</td>
                    <td className="px-3 py-2"><button onClick={()=>{setSelectedExpense(e);setExpenseModal(true);}} className="text-blue-400 hover:text-blue-600 text-xs">Éditer</button></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          <div className="md:hidden space-y-2 mt-2">
            {sortedExpenses.map(e=>(
              <div key={e.id} onClick={()=>{setSelectedExpense(e);setExpenseModal(true);}} className="flex items-center justify-between p-3 bg-gray-50 rounded-xl border border-gray-100 cursor-pointer">
                <div>
                  <div className="text-sm font-medium">{e.titre}</div>
                  <div className="text-xs text-gray-500">{e.categorie} · {formatDate(e.date)}</div>
                </div>
                <div className="flex items-center gap-2">
                  <StatusBadge status={e.payePar}/>
                  <span className="text-sm font-bold text-red-600">{fmt(e.montant)}</span>
                </div>
              </div>
            ))}
          </div>
        </>)}
      </div>

      {/* Relevé carte */}
      <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-5">
        <SectionHeader title="Relevé carte (Transactions)" action={<Btn size="sm" variant="primary" onClick={()=>{setSelectedTx(null);setTxModal(true);}}>+ Ajouter</Btn>}/>
        {sortedTx.length===0 ? <EmptyState message="Aucune transaction" icon="🏦"/> : (<>
          <div className="hidden md:block overflow-x-auto">
            <table className="w-full text-sm">
              <thead className="bg-gray-50">
                <tr>{['Label','Montant','Type','Imputé à','Date','Statut',''].map(h=><th key={h} className="text-left text-xs font-semibold text-gray-500 px-3 py-2">{h}</th>)}</tr>
              </thead>
              <tbody>
                {sortedTx.map(t=>(
                  <tr key={t.id} className="border-t border-gray-50 hover:bg-gray-50">
                    <td className="px-3 py-2 font-medium">{t.label}</td>
                    <td className={`px-3 py-2 font-semibold ${Number(t.montant)>=0?'text-green-600':'text-red-600'}`}>{fmt(Math.abs(t.montant))}</td>
                    <td className="px-3 py-2 text-gray-500">{t.type}</td>
                    <td className="px-3 py-2"><StatusBadge status={t.imputéÀ||'Commun'}/></td>
                    <td className="px-3 py-2 text-gray-500 text-xs">{formatDate(t.date)}</td>
                    <td className="px-3 py-2"><StatusBadge status={t.statut}/></td>
                    <td className="px-3 py-2"><button onClick={()=>{setSelectedTx(t);setTxModal(true);}} className="text-blue-400 hover:text-blue-600 text-xs">Éditer</button></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          <div className="md:hidden space-y-2 mt-2">
            {sortedTx.map(t=>(
              <div key={t.id} onClick={()=>{setSelectedTx(t);setTxModal(true);}} className="flex items-center justify-between p-3 bg-gray-50 rounded-xl border border-gray-100 cursor-pointer">
                <div>
                  <div className="text-sm font-medium">{t.label}</div>
                  <div className="text-xs text-gray-500">{t.type} · {t.imputéÀ||'Commun'} · {formatDate(t.date)}</div>
                </div>
                <div className="flex items-center gap-2">
                  <StatusBadge status={t.statut}/>
                  <span className={`text-sm font-bold ${Number(t.montant)>=0?'text-green-600':'text-red-600'}`}>{fmt(Math.abs(t.montant))}</span>
                </div>
              </div>
            ))}
          </div>
        </>)}
      </div>

      {/* Abonnements */}
      <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-5">
        <SectionHeader title="Abonnements" action={
          <div className="flex gap-2">
            <Btn size="sm" variant="success" onClick={generateSubscriptionTx}>Générer ce mois</Btn>
            <Btn size="sm" variant="primary" onClick={()=>{setSelectedSub(null);setSubModal(true);}}>+ Ajouter</Btn>
          </div>
        }/>
        {(data.bank.subscriptions||[]).length===0 ? <EmptyState message="Aucun abonnement" icon="🔄"/> : (
          <div className="space-y-2">
            {(data.bank.subscriptions||[]).map(s=>(
              <div key={s.id} className="flex items-center justify-between p-3 bg-gray-50 rounded-xl border border-gray-100">
                <div className="flex items-center gap-3">
                  <div className={`w-2 h-2 rounded-full ${s.active?'bg-green-400':'bg-gray-300'}`}/>
                  <div>
                    <div className="text-sm font-medium text-gray-800">{s.name}</div>
                    <div className="text-xs text-gray-500">{s.category} · Jour {s.day} · Payé par {s.paidBy||'Système'} · Imputé à {s.imputéÀ||'Commun'}</div>
                  </div>
                </div>
                <div className="flex items-center gap-3">
                  <span className="text-sm font-semibold text-red-600">{fmt(s.amount)}/mois</span>
                  <button onClick={()=>toggleSubActive(s.id)} className={`text-xs px-2 py-0.5 rounded-full font-medium ${s.active?'bg-green-100 text-green-700':'bg-gray-100 text-gray-500'}`}>
                    {s.active?'Actif':'Inactif'}
                  </button>
                  <button onClick={()=>{setSelectedSub(s);setSubModal(true);}} className="text-blue-400 hover:text-blue-600 text-xs">Éditer</button>
                </div>
              </div>
            ))}
          </div>
        )}
      </div>

      <ExpenseModal open={expenseModal} onClose={()=>{setExpenseModal(false);setSelectedExpense(null);}} expense={selectedExpense} onSave={saveExpense} onDelete={deleteExpense}/>
      <TxModal open={txModal} onClose={()=>{setTxModal(false);setSelectedTx(null);}} tx={selectedTx} onSave={saveTx} onDelete={deleteTx}/>
      <SubModal open={subModal} onClose={()=>{setSubModal(false);setSelectedSub(null);}} sub={selectedSub} onSave={saveSub} onDelete={deleteSub}/>
    </div>
  );
}

  const [dateDebut, setDateDebut] = React.useState('');
  const [dateFin, setDateFin] = React.useState('');
  const [typeFilter, setTypeFilter] = React.useState('Tous');
  const [sourceFilter, setSourceFilter] = React.useState('Toutes');
  const [auteurFilter, setAuteurFilter] = React.useState('Tous');
  const [search, setSearch] = React.useState('');

  const periodeRange = React.useMemo(() => buildPeriodeRange(periodeId, dateDebut, dateFin), [periodeId, dateDebut, dateFin]);
  const allEntries = React.useMemo(() => buildLedgerEntries(data), [data]);

  const filtered = React.useMemo(() => allEntries.filter(e => {
    if(!inPeriode(e.date, periodeRange)) return false;
    if(typeFilter==='Entrée' && e.montant<=0) return false;
    if(typeFilter==='Sortie' && e.montant>=0) return false;
    if(sourceFilter!=='Toutes' && e.source!==sourceFilter) return false;
    if(auteurFilter!=='Tous' && e.auteur!==auteurFilter) return false;
    if(search) {
      const q = normalize(search);
      if(!normalize(e.label).includes(q)&&!normalize(e.category).includes(q)&&!normalize(e.payNote||'').includes(q)&&!normalize(e.auteur||'').includes(q)) return false;
    }
    return true;
  }), [allEntries, periodeRange, typeFilter, sourceFilter, auteurFilter, search]);

  const kpis = React.useMemo(() => {
    const entrees = filtered.filter(e=>e.montant>0).reduce((s,e)=>s+e.montant,0);
    const sorties = filtered.filter(e=>e.montant<0).reduce((s,e)=>s+Math.abs(e.montant),0);
    return {entrees, sorties, balance:entrees-sorties,
      avancesMicka: filtered.filter(e=>e.type==='expense'&&e.auteur==='Micka').reduce((s,e)=>s+Math.abs(e.montant),0),
      avancesCesar: filtered.filter(e=>e.type==='expense'&&e.auteur==='César').reduce((s,e)=>s+Math.abs(e.montant),0)};
  }, [filtered]);

  const sourceBadge = {bank:'bg-indigo-100 text-indigo-700', apport:'bg-teal-100 text-teal-700', expense:'bg-amber-100 text-amber-700', contract:'bg-green-100 text-green-700'};
  const sourceLabels = {bank:'Banque', apport:'Apport', expense:'Avances', contract:'Contrat'};

  const handleRowClick = (e) => {
    if(e.type==='bank') onNavigate('bank',{type:'bankTx',id:e.sourceId});
    else if(e.type==='expense') onNavigate('bank',{type:'expense',id:e.sourceId});
    else if(e.type==='contract') onNavigate('contracts',{id:e.contractId,tab:'paiements'});
  };

  const handleExportCSV = () => {
    const rows = [['Date','Label','Source','Auteur','Montant','Catégorie']];
    filtered.forEach(e=>rows.push([e.date||'',e.label||'',e.source||'',e.auteur||'',e.montant,e.category||'']));
    exportCSV(rows, `grand_livre_${todayStr()}.csv`);
  };

  return (
    <div className="space-y-4">
      <div className="flex items-center justify-between">
        <h1 className="text-2xl font-bold text-gray-800">Grand Livre Unifié</h1>
        <Btn variant="outline" size="sm" onClick={handleExportCSV}>⬇️ CSV</Btn>
      </div>

      <div className="grid grid-cols-2 md:grid-cols-5 gap-3">
        <KPICard label="Entrées" value={fmt(kpis.entrees)} color="green"/>
        <KPICard label="Sorties" value={fmt(kpis.sorties)} color="red"/>
        <KPICard label="Balance" value={fmt(kpis.balance)} color={kpis.balance>=0?'blue':'red'}/>
        <KPICard label="Avances Micka" value={fmt(kpis.avancesMicka)} color="indigo"/>
        <KPICard label="Avances César" value={fmt(kpis.avancesCesar)} color="green"/>
      </div>

      <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-4 space-y-3">
        <div className="flex items-center gap-2 flex-wrap">
          <span className="text-xs font-semibold text-gray-500">Période :</span>
          <PeriodeFilter periodeId={periodeId} setPeriodeId={setPeriodeId} dateDebut={dateDebut} setDateDebut={setDateDebut} dateFin={dateFin} setDateFin={setDateFin}/>
        </div>
        <div className="flex flex-wrap gap-3">
          <div>
            <label className="block text-xs font-medium text-gray-600 mb-1">Type</label>
            <select className={`${selectCls} w-28`} value={typeFilter} onChange={e=>setTypeFilter(e.target.value)}>
              {['Tous','Entrée','Sortie'].map(t=><option key={t}>{t}</option>)}
            </select>
          </div>
          <div>
            <label className="block text-xs font-medium text-gray-600 mb-1">Source</label>
            <select className={`${selectCls} w-32`} value={sourceFilter} onChange={e=>setSourceFilter(e.target.value)}>
              {['Toutes','Banque','Apport','Contrats','Avances'].map(s=><option key={s}>{s}</option>)}
            </select>
          </div>
          <div>
            <label className="block text-xs font-medium text-gray-600 mb-1">Auteur</label>
            <select className={`${selectCls} w-28`} value={auteurFilter} onChange={e=>setAuteurFilter(e.target.value)}>
              {['Tous','Micka','César'].map(a=><option key={a}>{a}</option>)}
            </select>
          </div>
          <div>
            <label className="block text-xs font-medium text-gray-600 mb-1">Rechercher</label>
            <input className={`${inputCls} w-48`} value={search} onChange={e=>setSearch(e.target.value)} placeholder="Label, catégorie, auteur..."/>
          </div>
        </div>
      </div>

      {filtered.length===0 ? <EmptyState message="Aucune entrée pour cette période" icon="📒"/> : (<>
        <div className="hidden md:block bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
          <table className="w-full text-sm">
            <thead className="bg-gray-50 border-b border-gray-100">
              <tr>{['Date','Label','Source','Auteur','Montant'].map(h=><th key={h} className="text-left text-xs font-semibold text-gray-500 px-4 py-3">{h}</th>)}</tr>
            </thead>
            <tbody>
              {filtered.map(e=>(
                <tr key={e.id} onClick={()=>handleRowClick(e)} className="border-b border-gray-50 hover:bg-gray-50 cursor-pointer transition-colors">
                  <td className="px-4 py-3 text-gray-500 text-xs">{formatDate(e.date)}</td>
                  <td className="px-4 py-3 text-gray-800 max-w-[300px] truncate">
                    {e.label}
                    {e.category && <span className="text-xs text-gray-400 ml-1">({e.category})</span>}
                    {e.payNote && <span className="text-xs text-blue-500 ml-1">· {e.payNote}</span>}
                  </td>
                  <td className="px-4 py-3"><span className={`inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium ${sourceBadge[e.type]||'bg-gray-100 text-gray-600'}`}>{sourceLabels[e.type]||e.source}</span></td>
                  <td className="px-4 py-3">{e.auteur && <StatusBadge status={e.auteur}/>}</td>
                  <td className={`px-4 py-3 font-bold text-right ${e.montant>=0?'text-green-600':'text-red-600'}`}>{e.montant>=0?'+':''}{fmt(e.montant)}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
        <div className="md:hidden space-y-2">
          {filtered.map(e=>(
            <div key={e.id} onClick={()=>handleRowClick(e)} className="bg-white rounded-xl p-3 shadow-sm border border-gray-100 cursor-pointer flex items-center justify-between">
              <div className="flex-1 min-w-0">
                <div className="text-sm font-medium text-gray-800 truncate">{e.label}</div>
                <div className="flex items-center gap-2 mt-1 flex-wrap">
                  <span className="text-xs text-gray-400">{formatDate(e.date)}</span>
                  <span className={`inline-flex items-center px-1.5 py-0.5 rounded-full text-xs font-medium ${sourceBadge[e.type]||'bg-gray-100'}`}>{sourceLabels[e.type]}</span>
                </div>
              </div>
              <div className={`font-bold text-base ml-3 ${e.montant>=0?'text-green-600':'text-red-600'}`}>{e.montant>=0?'+':''}{fmt(Math.abs(e.montant))}</div>
            </div>
          ))}
        </div>
      </>)}
    </div>
  );
}

function DriveModule({data, setData}) {
  const addToast = useToast();
  const [tab, setTab] = React.useState('liens');
  const [editMode, setEditMode] = React.useState(false);
  const [newName, setNewName] = React.useState('');
  const [newUrl, setNewUrl] = React.useState('');
  const [configForm, setConfigForm] = React.useState({});

  React.useEffect(() => {
    setConfigForm({
      mickaCAAnnuel: data.config?.objectives?.mickaCAAnnuel||0,
      cesarCAAnnuel: data.config?.objectives?.cesarCAAnnuel||0,
      seuilMicka: data.config?.autoEntrepreneurMicka?.seuil||77700,
      tauxMicka: data.config?.autoEntrepreneurMicka?.tauxURSSAF||22,
      seuilCesar: data.config?.autoEntrepreneurCesar?.seuil||77700,
      tauxCesar: data.config?.autoEntrepreneurCesar?.tauxURSSAF||22,
      assujeTVA: data.config?.autoEntrepreneur?.assujeTVA||false,
    });
  }, [data.config]);

  const links = data.config?.driveLinks || {};

  const addLink = () => {
    if(!newName.trim()||!newUrl.trim()) { addToast('Nom et URL requis','error'); return; }
    setData(d => ({...d, config:{...d.config, driveLinks:{...(d.config?.driveLinks||{}), [newName.trim()]:newUrl.trim()}}}));
    setNewName('');
    setNewUrl('');
    addToast('Lien ajouté','success');
  };

  const removeLink = (name) => {
    setData(d => {
      const dl = {...(d.config?.driveLinks||{})};
      delete dl[name];
      return {...d, config:{...d.config, driveLinks:dl}};
    });
    addToast('Lien supprimé','success');
  };

  const saveConfig = () => {
    setData(d=>({...d, config:{...d.config,
      objectives:{mickaCAAnnuel:Number(configForm.mickaCAAnnuel)||0, cesarCAAnnuel:Number(configForm.cesarCAAnnuel)||0},
      autoEntrepreneur:{seuil:Number(configForm.seuilMicka)||77700, tauxURSSAF:Number(configForm.tauxMicka)||22, assujeTVA:!!configForm.assujeTVA},
      autoEntrepreneurMicka:{seuil:Number(configForm.seuilMicka)||77700, tauxURSSAF:Number(configForm.tauxMicka)||22},
      autoEntrepreneurCesar:{seuil:Number(configForm.seuilCesar)||77700, tauxURSSAF:Number(configForm.tauxCesar)||22},
    }}));
    addToast('Configuration enregistrée','success');
  };

  const linkIcons = {'Google Drive':'📁','Notion':'📝','Calendly':'📅','Linear':'📋'};

  const tabs = [{id:'liens',label:'Liens & Drive'},{id:'config',label:'⚙️ Configuration'}];

  return (

        </div>
        <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4">
          {Object.entries(links).map(([name, url]) => (
            <div key={name} className="bg-white rounded-2xl shadow-sm border border-gray-100 p-5 flex items-start justify-between group">
              <a href={url} target="_blank" rel="noopener noreferrer" className="flex items-center gap-3 flex-1 min-w-0 hover:text-blue-600 transition-colors">
                <span className="text-2xl">{linkIcons[name]||'🔗'}</span>
                <div className="min-w-0">
                  <div className="font-semibold text-gray-800 text-sm">{name}</div>
                  <div className="text-xs text-gray-400 truncate mt-0.5">{url}</div>
                </div>
              </a>
              {editMode && (
                <button onClick={()=>removeLink(name)} className="text-gray-200 hover:text-red-500 text-xl leading-none ml-2 flex-shrink-0">&times;</button>
              )}
            </div>
          ))}
          {editMode && (
            <div className="bg-gray-50 rounded-2xl border-2 border-dashed border-gray-200 p-5 space-y-3">
              <div className="text-xs font-semibold text-gray-500 mb-2">Ajouter un lien</div>
              <div><label className="block text-xs font-medium text-gray-600 mb-1">Nom</label><input className={inputCls} value={newName} onChange={e=>setNewName(e.target.value)} placeholder="Google Drive"/></div>
              <div><label className="block text-xs font-medium text-gray-600 mb-1">URL</label><input className={inputCls} value={newUrl} onChange={e=>setNewUrl(e.target.value)} placeholder="https://..."/></div>
              <Btn size="sm" variant="primary" onClick={addLink}>Ajouter</Btn>
            </div>
          )}
        </div>
        {Object.keys(links).length===0 && !editMode && <EmptyState message="Aucun lien configuré" icon="🔗"/>}
      </>)}

      {tab==='config' && (
        <div className="space-y-6">
          <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-5">
            <h2 className="text-base font-semibold text-gray-800 mb-4">🎯 Objectifs CA annuels</h2>
            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
              <div>
                <label className="block text-xs font-medium text-gray-600 mb-1">Objectif CA Micka (€/an)</label>
                <input className={inputCls} type="number" value={configForm.mickaCAAnnuel||''} onChange={e=>setConfigForm(f=>({...f,mickaCAAnnuel:e.target.value}))} placeholder="0"/>
              </div>

                <input className={inputCls} type="number" value={configForm.cesarCAAnnuel||''} onChange={e=>setConfigForm(f=>({...f,cesarCAAnnuel:e.target.value}))} placeholder="0"/>
              </div>
            </div>
          </div>
          <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-5">
            <h2 className="text-base font-semibold text-gray-800 mb-4">⚡ Auto-entrepreneur par associé</h2>

                <div key={name} className={`border border-${color}-100 rounded-xl p-4 space-y-3`}>

                  </div>
                  <div>
                    <label className="block text-xs font-medium text-gray-600 mb-1">Taux URSSAF (%)</label>
                    <input className={inputCls} type="number" step="0.1" value={configForm[tauxKey]||''} onChange={e=>setConfigForm(f=>({...f,[tauxKey]:e.target.value}))} placeholder="22"/>

// TRÉSORERIE MODULE
// ============================================================
function TresorerieModule({data}) {
  const [periodeId, setPeriodeId] = React.useState('tout');
  const [dateDebut, setDateDebut] = React.useState('');
  const [dateFin, setDateFin] = React.useState('');

  const stats = React.useMemo(() => {
    const range = buildPeriodeRange(periodeId, dateDebut, dateFin);
    const entries = buildLedgerEntries(data);
    const filteredEntries = entries.filter(e => inPeriode(e.date, range));

    const mickaPay = filteredEntries.filter(e=>e.type==='contract'&&e.assignedTo==='Micka').reduce((s,e)=>s+e.montant,0);
    const cesarPay = filteredEntries.filter(e=>e.type==='contract'&&e.assignedTo==='César').reduce((s,e)=>s+e.montant,0);
    const mickaApports = filteredEntries.filter(e=>e.type==='apport'&&e.imputéÀ==='Micka').reduce((s,e)=>s+e.montant,0);
    const cesarApports = filteredEntries.filter(e=>e.type==='apport'&&e.imputéÀ==='César').reduce((s,e)=>s+e.montant,0);
    const mickaAdv = filteredEntries.filter(e=>e.type==='expense'&&e.auteur==='Micka').reduce((s,e)=>s+Math.abs(e.montant),0);
    const cesarAdv = filteredEntries.filter(e=>e.type==='expense'&&e.auteur==='César').reduce((s,e)=>s+Math.abs(e.montant),0);
    const mickaBank = filteredEntries.filter(e=>e.type==='bank'&&e.imputéÀ==='Micka').reduce((s,e)=>s+e.montant,0);
    const cesarBank = filteredEntries.filter(e=>e.type==='bank'&&e.imputéÀ==='César').reduce((s,e)=>s+e.montant,0);
    // Formule correcte : CA - avances perso - apports investis + mouvements banque signés
    const netMicka = mickaPay - mickaAdv - mickaApports + mickaBank;
    const netCesar = cesarPay - cesarAdv - cesarApports + cesarBank;
    const ecart = Math.abs(netMicka - netCesar);
    const debiteur = netMicka > netCesar ? 'Micka' : netCesar > netMicka ? 'César' : null;
    const crediteur = netMicka > netCesar ? 'César' : netCesar > netMicka ? 'Micka' : null;
    const montantDu = ecart / 2;

    const nonAnnule = data.contracts.filter(c => c.statut !== 'Annulé');
    const resteAEncaisserList = nonAnnule.map(c => {
      const totalPaid = (c.payments||[]).reduce((s,p)=>s+(Number(p.montant)||0),0);
      const resteC = (Number(c.montant)||0) - totalPaid;
      return {...c, totalPaid, resteC};
    }).filter(c => c.resteC > 0);
    const resteMicka = resteAEncaisserList.filter(c=>c.assignedTo==='Micka'||c.assignedTo==='Les deux').reduce((s,c)=>s+c.resteC*(c.assignedTo==='Les deux'?0.5:1),0);
    const resteCesar = resteAEncaisserList.filter(c=>c.assignedTo==='César'||c.assignedTo==='Les deux').reduce((s,c)=>s+c.resteC*(c.assignedTo==='Les deux'?0.5:1),0);
    const netMickaProj = netMicka + resteMicka;
    const netCesarProj = netCesar + resteCesar;
    const ecartProj = Math.abs(netMickaProj - netCesarProj);
    const debiteurProj = netMickaProj > netCesarProj ? 'Micka' : netCesarProj > netMickaProj ? 'César' : null;
    const crediteurProj = netMickaProj > netCesarProj ? 'César' : netCesarProj > netMickaProj ? 'Micka' : null;

    // Monthly history (apports = soustraction)
    const monthlyMap = {};
    filteredEntries.forEach(e => {
      if(!e.date) return;
      const mk = e.date.substring(0,7);
      if(!monthlyMap[mk]) monthlyMap[mk] = {micka:0, cesar:0};
      if(e.type==='contract') {
        if(e.assignedTo==='Micka') monthlyMap[mk].micka += e.montant;
        if(e.assignedTo==='César') monthlyMap[mk].cesar += e.montant;
      } else if(e.type==='apport') {
        // Apports = investissement, soustrait du solde
        if(e.imputéÀ==='Micka') monthlyMap[mk].micka -= e.montant;
        if(e.imputéÀ==='César') monthlyMap[mk].cesar -= e.montant;
      } else if(e.type==='expense') {
        if(e.auteur==='Micka') monthlyMap[mk].micka -= Math.abs(e.montant);
        if(e.auteur==='César') monthlyMap[mk].cesar -= Math.abs(e.montant);
      } else if(e.type==='bank') {
        if(e.imputéÀ==='Micka') monthlyMap[mk].micka += e.montant;
        if(e.imputéÀ==='César') monthlyMap[mk].cesar += e.montant;
      }
    });
    const monthlyHistory = Object.entries(monthlyMap).sort(([a],[b])=>a.localeCompare(b)).map(([mk,v])=>({mk, ...v}));
    const mouvements = filteredEntries.map(e => ({...e})).sort((a,b)=>new Date(b.date)-new Date(a.date));

    return {netMicka, netCesar, ecart, debiteur, crediteur, montantDu, debiteurProj, crediteurProj, ecartProj,
      netMickaProj, netCesarProj, resteMicka, resteCesar, monthlyHistory, mouvements,
      mickaPay, cesarPay, mickaApports, cesarApports, mickaAdv, cesarAdv};
  }, [data, periodeId, dateDebut, dateFin]);

  return (
    <div className="space-y-6">
      <div className="flex items-center justify-between flex-wrap gap-3">
        <div>
          <h1 className="text-2xl font-bold text-gray-800">Trésorerie Duo</h1>
          <p className="text-xs text-gray-400 mt-0.5">Solde réel de chaque associé après CA, dépenses &amp; apports</p>
        </div>
      </div>

      <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-4">
        <div className="flex items-center gap-2 flex-wrap">
          <span className="text-xs font-semibold text-gray-500">Période :</span>
          <PeriodeFilter periodeId={periodeId} setPeriodeId={setPeriodeId} dateDebut={dateDebut} setDateDebut={setDateDebut} dateFin={dateFin} setDateFin={setDateFin}/>
        </div>
      </div>

      {/* Bloc 1: Soldes par associé */}
      <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
        {[{name:'Micka',net:stats.netMicka,proj:stats.netMickaProj,reste:stats.resteMicka,pay:stats.mickaPay,apports:stats.mickaApports,adv:stats.mickaAdv,color:'indigo'},
          {name:'César',net:stats.netCesar,proj:stats.netCesarProj,reste:stats.resteCesar,pay:stats.cesarPay,apports:stats.cesarApports,adv:stats.cesarAdv,color:'emerald'}].map(({name,net,proj,reste,pay,apports,adv,color})=>(
          <div key={name} className={`rounded-2xl shadow-sm border p-5 ${color==='indigo'?'bg-indigo-50 border-indigo-100':'bg-emerald-50 border-emerald-100'}`}>
            <div className={`text-sm font-bold text-${color}-700 mb-4`}>{name}</div>
            <div className="space-y-2 mb-4 text-xs text-gray-600">
              <div className="flex justify-between"><span>CA encaissé attribué</span><span className="font-semibold text-green-700">+{fmt(pay)}</span></div>
              {apports > 0 && <div className="flex justify-between"><span>Apports investis</span><span className="font-semibold text-orange-500">-{fmt(apports)}</span></div>}
              {adv > 0 && <div className="flex justify-between"><span>Dépenses perso</span><span className="font-semibold text-red-600">-{fmt(adv)}</span></div>}
            </div>
            <div className="grid grid-cols-3 gap-2">
              <div className={`rounded-xl p-3 bg-${color}-100 text-center`}>
                <div className={`text-xs text-${color}-600 mb-1`}>Réel</div>
                <div className={`text-lg font-bold text-${color}-800`}>{fmt(net)}</div>

        </div>
        {stats.crediteur && stats.ecart > 50 && (
          <div className="mt-4 bg-amber-50 border border-amber-200 rounded-xl px-4 py-3">
            <div className="text-xs font-semibold text-amber-600 mb-2">Rééquilibrage — attribution contrats</div>

            </div>
            <div className="grid grid-cols-2 gap-2 text-center">

              </div>
              <div>
                <div className="text-xs text-gray-400">Écart projeté</div>
                <div className="text-sm font-bold text-gray-500">{fmt(stats.ecartProj)}</div>
              </div>
            </div>
          </div>
        )}
      </div>

      {/* Bloc 4: Historique mensuel */}
      {stats.monthlyHistory.length > 0 && (
        <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-5">
          <h2 className="text-base font-semibold text-gray-800 mb-4">📅 Historique mensuel</h2>
          <div className="overflow-x-auto">
            <table className="w-full text-sm">
              <thead className="bg-gray-50 border-b border-gray-100">
                <tr>
                  <th className="text-left text-xs font-semibold text-gray-500 px-4 py-3">Mois</th>
                  <th className="text-right text-xs font-semibold text-indigo-600 px-4 py-3">Micka</th>
                  <th className="text-right text-xs font-semibold text-emerald-600 px-4 py-3">César</th>
                  <th className="text-right text-xs font-semibold text-gray-500 px-4 py-3">Total</th>
                </tr>
              </thead>
              <tbody>
                {stats.monthlyHistory.map(({mk, micka, cesar}) => {
                  const [y,m] = mk.split('-');
                  const label = ['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'][+m-1] + ' ' + y;
                  return (
                    <tr key={mk} className="border-b border-gray-50 hover:bg-gray-50">
                      <td className="px-4 py-3 text-gray-600">{label}</td>
                      <td className={`px-4 py-3 text-right font-semibold ${micka>=0?'text-indigo-700':'text-red-500'}`}>{micka>=0?'+':''}{fmt(micka)}</td>
                      <td className={`px-4 py-3 text-right font-semibold ${cesar>=0?'text-emerald-700':'text-red-500'}`}>{cesar>=0?'+':''}{fmt(cesar)}</td>
                      <td className={`px-4 py-3 text-right font-bold ${(micka+cesar)>=0?'text-gray-800':'text-red-600'}`}>{fmt(micka+cesar)}</td>
                    </tr>

                })}

          </div>

      )}

      {/* Bloc 5: Tableau des mouvements */}
      <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-5">
        <h2 className="text-base font-semibold text-gray-800 mb-4">📋 Mouvements impactant la trésorerie</h2>
        {stats.mouvements.filter(e=>e.type!=='bank'||(e.imputéÀ==='Micka'||e.imputéÀ==='César')).length === 0
          ? <EmptyState message="Aucun mouvement sur la période" icon="📋"/>
          : (
          <div className="overflow-x-auto">
            <table className="w-full text-sm">
              <thead className="bg-gray-50 border-b border-gray-100">
                <tr>
                  <th className="text-left text-xs font-semibold text-gray-500 px-3 py-2">Date</th>
                  <th className="text-left text-xs font-semibold text-gray-500 px-3 py-2">Label</th>
                  <th className="text-left text-xs font-semibold text-gray-500 px-3 py-2">Associé</th>
                  <th className="text-right text-xs font-semibold text-gray-500 px-3 py-2">Montant</th>
                </tr>
              </thead>
              <tbody>
                {stats.mouvements.filter(e => {
                  if(e.type==='bank' && e.imputéÀ==='Commun') return false;
                  return true;
                }).slice(0,50).map(e => {
                  const who = e.assignedTo || e.imputéÀ || e.auteur || '—';
                  const amount = e.type==='expense' ? -Math.abs(e.montant) : e.montant;
                  return (
                    <tr key={e.id} className="border-b border-gray-50">

              </tbody>
            </table>
          </div>
        )}
      </div>
    </div>
  );
}
