  };

  const generateSubscriptionTx = () => {
    const now = new Date();
    const year = now.getFullYear();
    const month = now.getMonth();
    const monthKey = currentMonthKey();
    const activeSubs = (data.bank.subscriptions||[]).filter(s=>s.active);
    const existingTx = data.bank.transactions||[];
    let added = 0;

    const newTxs = [];
    activeSubs.forEach(sub => {
      const alreadyExists = existingTx.some(t => {
        if(t.statut==='Annulé') return false;
        if(normalize(t.label)!==normalize(sub.name)) return false;
        const txDate = t.date ? t.date.substring(0,7) : '';
        return txDate === monthKey;
      });
      if(!alreadyExists) {
        const lastDay = new Date(year, month+1, 0).getDate();
        const day = Math.min(Number(sub.day)||1, lastDay);
        const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
        newTxs.push({id:genId(), label:sub.name, montant:-Math.abs(sub.amount), type:'Achat', date:dateStr, auteur:sub.paidBy||'Système', statut:'Validé', imputéÀ:sub.imputéÀ||'Commun'});
        added++;
      }
    });

    if(added > 0) {
      setData(d => ({...d, bank:{...d.bank, transactions:[...d.bank.transactions, ...newTxs]}}));
      addToast(`${added} transaction(s) générée(s)`, 'success');
    } else {
      addToast('Toutes les transactions du mois existent déjà', 'info');
    }
  };

  const sortedTx = [...(data.bank.transactions||[])].sort((a,b)=>new Date(b.date)-new Date(a.date));
  const sortedExpenses = [...(data.expenses||[])].sort((a,b)=>new Date(b.date)-new Date(a.date));

  return (
    <div className="space-y-6">
      <h1 className="text-2xl font-bold text-gray-800">Banque & Frais</h1>

      {/* Solde */}
      <div className="bg-gradient-to-br from-indigo-50 to-indigo-100 rounded-2xl p-5">
        <div className="text-xs font-medium text-indigo-600 mb-1">Solde carte</div>
        <div className="text-3xl font-bold text-indigo-800 mb-2">{fmt(solde)}</div>
        <div className="flex items-center gap-3">
          {!editBalance ? (
            <><span className="text-xs text-indigo-500">Solde initial: {fmt(data.bank.initialBalance)}</span>
            <button onClick={()=>{setTempBalance(data.bank.initialBalance);setEditBalance(true);}} className="text-xs text-indigo-400 hover:text-indigo-600 underline">Modifier</button></>
          ) : (
            <div className="flex items-center gap-2">
              <input className="border border-indigo-300 rounded px-2 py-1 text-sm w-32 bg-white" type="number" step="0.01" value={tempBalance} onChange={e=>setTempBalance(e.target.value)}/>
              <Btn size="sm" variant="primary" onClick={saveBalance}>OK</Btn>
              <Btn size="sm" variant="ghost" onClick={()=>setEditBalance(false)}>Annuler</Btn>
            </div>
          )}
        </div>
      </div>

      {/* Avances perso */}
      <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-5">
        <SectionHeader title="Avances perso (Dépenses)" action={<Btn size="sm" variant="primary" onClick={()=>{setSelectedExpense(null);setExpenseModal(true);}}>+ Ajouter</Btn>}/>
        {sortedExpenses.length===0 ? <EmptyState message="Aucune dépense" icon="💸"/> : (<>
          <div className="hidden md:block overflow-x-auto">
            <table className="w-full text-sm">
              <thead className="bg-gray-50">
                <tr>{['Titre','Montant','Catégorie','Payé par','Date','Refact.',''].map(h=><th key={h} className="text-left text-xs font-semibold text-gray-500 px-3 py-2">{h}</th>)}</tr>
              </thead>
              <tbody>
                {sortedExpenses.map(e=>(
                  <tr key={e.id} className="border-t border-gray-50 hover:bg-gray-50">
                    <td className="px-3 py-2 font-medium">{e.titre}</td>
                    <td className="px-3 py-2 text-red-600 font-semibold">{fmt(e.montant)}</td>
                    <td className="px-3 py-2 text-gray-500">{e.categorie}</td>
                    <td className="px-3 py-2"><StatusBadge status={e.payePar}/></td>
                    <td className="px-3 py-2 text-gray-500 text-xs">{formatDate(e.date)}</td>
                    <td className="px-3 py-2 text-xs">{e.refacturable?'✓':''}</td>
                    <td className="px-3 py-2"><button onClick={()=>{setSelectedExpense(e);setExpenseModal(true);}} className="text-blue-400 hover:text-blue-600 text-xs">Éditer</button></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          <div className="md:hidden space-y-2 mt-2">
            {sortedExpenses.map(e=>(
              <div key={e.id} onClick={()=>{setSelectedExpense(e);setExpenseModal(true);}} className="flex items-center justify-between p-3 bg-gray-50 rounded-xl border border-gray-100 cursor-pointer">
                <div>
                  <div className="text-sm font-medium">{e.titre}</div>
                  <div className="text-xs text-gray-500">{e.categorie} · {formatDate(e.date)}</div>
                </div>
                <div className="flex items-center gap-2">
                  <StatusBadge status={e.payePar}/>
                  <span className="text-sm font-bold text-red-600">{fmt(e.montant)}</span>
                </div>
              </div>
            ))}
          </div>
        </>)}
      </div>

      {/* Relevé carte */}
      <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-5">
        <SectionHeader title="Relevé carte (Transactions)" action={<Btn size="sm" variant="primary" onClick={()=>{setSelectedTx(null);setTxModal(true);}}>+ Ajouter</Btn>}/>
        {sortedTx.length===0 ? <EmptyState message="Aucune transaction" icon="🏦"/> : (<>
          <div className="hidden md:block overflow-x-auto">
            <table className="w-full text-sm">
              <thead className="bg-gray-50">
                <tr>{['Label','Montant','Type','Imputé à','Date','Statut',''].map(h=><th key={h} className="text-left text-xs font-semibold text-gray-500 px-3 py-2">{h}</th>)}</tr>
              </thead>
              <tbody>
                {sortedTx.map(t=>(
                  <tr key={t.id} className="border-t border-gray-50 hover:bg-gray-50">
                    <td className="px-3 py-2 font-medium">{t.label}</td>
                    <td className={`px-3 py-2 font-semibold ${Number(t.montant)>=0?'text-green-600':'text-red-600'}`}>{fmt(Math.abs(t.montant))}</td>
                    <td className="px-3 py-2 text-gray-500">{t.type}</td>
                    <td className="px-3 py-2"><StatusBadge status={t.imputéÀ||'Commun'}/></td>
                    <td className="px-3 py-2 text-gray-500 text-xs">{formatDate(t.date)}</td>
                    <td className="px-3 py-2"><StatusBadge status={t.statut}/></td>
                    <td className="px-3 py-2"><button onClick={()=>{setSelectedTx(t);setTxModal(true);}} className="text-blue-400 hover:text-blue-600 text-xs">Éditer</button></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          <div className="md:hidden space-y-2 mt-2">
            {sortedTx.map(t=>(
              <div key={t.id} onClick={()=>{setSelectedTx(t);setTxModal(true);}} className="flex items-center justify-between p-3 bg-gray-50 rounded-xl border border-gray-100 cursor-pointer">
                <div>
                  <div className="text-sm font-medium">{t.label}</div>
                  <div className="text-xs text-gray-500">{t.type} · {t.imputéÀ||'Commun'} · {formatDate(t.date)}</div>
                </div>
                <div className="flex items-center gap-2">
                  <StatusBadge status={t.statut}/>
                  <span className={`text-sm font-bold ${Number(t.montant)>=0?'text-green-600':'text-red-600'}`}>{fmt(Math.abs(t.montant))}</span>
                </div>
              </div>
            ))}
          </div>
        </>)}
      </div>

      {/* Abonnements */}
      <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-5">
        <SectionHeader title="Abonnements" action={
          <div className="flex gap-2">
            <Btn size="sm" variant="success" onClick={generateSubscriptionTx}>Générer ce mois</Btn>
            <Btn size="sm" variant="primary" onClick={()=>{setSelectedSub(null);setSubModal(true);}}>+ Ajouter</Btn>
          </div>
        }/>
        {(data.bank.subscriptions||[]).length===0 ? <EmptyState message="Aucun abonnement" icon="🔄"/> : (
          <div className="space-y-2">
            {(data.bank.subscriptions||[]).map(s=>(
              <div key={s.id} className="flex items-center justify-between p-3 bg-gray-50 rounded-xl border border-gray-100">
                <div className="flex items-center gap-3">
                  <div className={`w-2 h-2 rounded-full ${s.active?'bg-green-400':'bg-gray-300'}`}/>
                  <div>
                    <div className="text-sm font-medium text-gray-800">{s.name}</div>
                    <div className="text-xs text-gray-500">{s.category} · Jour {s.day} · Payé par {s.paidBy||'Système'} · Imputé à {s.imputéÀ||'Commun'}</div>
                  </div>
                </div>
                <div className="flex items-center gap-3">
                  <span className="text-sm font-semibold text-red-600">{fmt(s.amount)}/mois</span>
                  <button onClick={()=>toggleSubActive(s.id)} className={`text-xs px-2 py-0.5 rounded-full font-medium ${s.active?'bg-green-100 text-green-700':'bg-gray-100 text-gray-500'}`}>
                    {s.active?'Actif':'Inactif'}
                  </button>
                  <button onClick={()=>{setSelectedSub(s);setSubModal(true);}} className="text-blue-400 hover:text-blue-600 text-xs">Éditer</button>
                </div>
              </div>
            ))}
          </div>
        )}
      </div>

      <ExpenseModal open={expenseModal} onClose={()=>{setExpenseModal(false);setSelectedExpense(null);}} expense={selectedExpense} onSave={saveExpense} onDelete={deleteExpense}/>
      <TxModal open={txModal} onClose={()=>{setTxModal(false);setSelectedTx(null);}} tx={selectedTx} onSave={saveTx} onDelete={deleteTx}/>
      <SubModal open={subModal} onClose={()=>{setSubModal(false);setSelectedSub(null);}} sub={selectedSub} onSave={saveSub} onDelete={deleteSub}/>
    </div>
  );
}

// LEDGER MODULE (Grand Livre Unifié)
// ============================================================
function LedgerModule({data, onNavigate}) {
  const [periodeMode, setPeriodeMode] = React.useState('Mois');
  const [moisFilter, setMoisFilter] = React.useState(new Date().getMonth() + 1);
  const [anneeFilter, setAnneeFilter] = React.useState(new Date().getFullYear());
  const [typeFilter, setTypeFilter] = React.useState('Tous');
  const [sourceFilter, setSourceFilter] = React.useState('Toutes');
  const [auteurFilter, setAuteurFilter] = React.useState('Tous');
  const [search, setSearch] = React.useState('');
  const MOIS_LABELS = ['Jan','Fév','Mar','Avr','Mai','Juin','Juil','Août','Sep','Oct','Nov','Déc'];
  const ANNEES = [new Date().getFullYear()-1, new Date().getFullYear(), new Date().getFullYear()+1];

  const allEntries = React.useMemo(() => buildLedgerEntries(data), [data]);

  const filtered = React.useMemo(() => {
    const now = new Date();
    return allEntries.filter(e => {
      // Période
      if(periodeMode==='Mois') {
        if(!e.date) return false;
        const d = new Date(e.date+'T00:00:00');
        if(d.getMonth()+1 !== moisFilter || d.getFullYear() !== anneeFilter) return false;
      } else if(periodeMode==='30 jours') {
        if(!e.date) return false;
        const diff = (now-new Date(e.date+'T00:00:00'))/(1000*60*60*24);
        if(diff>30) return false;
      }
      // Type
      if(typeFilter==='Entrée' && e.montant<=0) return false;
      if(typeFilter==='Sortie' && e.montant>=0) return false;
      // Source
      if(sourceFilter!=='Toutes' && e.source!==sourceFilter) return false;
      // Auteur
      if(auteurFilter!=='Tous' && e.auteur!==auteurFilter) return false;
      // Search
      if(search) {
        const q = normalize(search);
        if(!normalize(e.label).includes(q)&&!normalize(e.category).includes(q)&&!normalize(e.payNote||'').includes(q)&&!normalize(e.auteur||'').includes(q)) return false;
      }
      return true;
    });
  }, [allEntries, periodeMode, moisFilter, anneeFilter, typeFilter, sourceFilter, auteurFilter, search]);

  const kpis = React.useMemo(() => {
    const entrees = filtered.filter(e=>e.montant>0).reduce((s,e)=>s+e.montant,0);
    const sorties = filtered.filter(e=>e.montant<0).reduce((s,e)=>s+Math.abs(e.montant),0);
    const balance = entrees - sorties;
    const avancesMicka = filtered.filter(e=>e.type==='expense'&&e.auteur==='Micka').reduce((s,e)=>s+Math.abs(e.montant),0);
    const avancesCesar = filtered.filter(e=>e.type==='expense'&&e.auteur==='César').reduce((s,e)=>s+Math.abs(e.montant),0);
    return {entrees, sorties, balance, avancesMicka, avancesCesar};
  }, [filtered]);

  const sourceBadge = {bank:'bg-indigo-100 text-indigo-700', apport:'bg-teal-100 text-teal-700', expense:'bg-amber-100 text-amber-700', contract:'bg-green-100 text-green-700'};
  const sourceLabels = {bank:'Banque', apport:'Apport', expense:'Avances', contract:'Contrat'};

  const handleRowClick = (e) => {
    if(e.type==='bank') onNavigate('bank',{type:'bankTx',id:e.sourceId});
    else if(e.type==='expense') onNavigate('bank',{type:'expense',id:e.sourceId});
    else if(e.type==='contract') onNavigate('contracts',{id:e.contractId,tab:'paiements'});
  };

  const handleExportCSVLedger = () => {
    const rows = [['Date','Label','Source','Auteur','Montant','Catégorie']];
    filtered.forEach(e=>{
      rows.push([e.date||'',e.label||'',e.source||'',e.auteur||'',e.montant,e.category||'']);
    });
    exportCSV(rows, `grand_livre_${todayStr()}.csv`);
  };

  return (
    <div className="space-y-4">
      <div className="flex items-center justify-between">
        <h1 className="text-2xl font-bold text-gray-800">Grand Livre Unifié</h1>
        <Btn variant="outline" size="sm" onClick={handleExportCSVLedger}>⬇️ CSV</Btn>
      </div>

      {/* KPIs */}
      <div className="grid grid-cols-2 md:grid-cols-5 gap-3">
        <KPICard label="Entrées" value={fmt(kpis.entrees)} color="green"/>
        <KPICard label="Sorties" value={fmt(kpis.sorties)} color="red"/>
        <KPICard label="Balance" value={fmt(kpis.balance)} color={kpis.balance>=0?'blue':'red'}/>
        <KPICard label="Avances Micka" value={fmt(kpis.avancesMicka)} color="indigo"/>
        <KPICard label="Avances César" value={fmt(kpis.avancesCesar)} color="green"/>
      </div>

      {/* Filters */}
      <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-4">
        <div className="flex flex-wrap gap-3">
          <div>
            <label className="block text-xs font-medium text-gray-600 mb-1">Mode</label>
            <select className={`${selectCls} w-32`} value={periodeMode} onChange={e=>setPeriodeMode(e.target.value)}>
              {['Mois','30 jours','Toute durée'].map(p=><option key={p}>{p}</option>)}
            </select>
          </div>
          {periodeMode==='Mois' && (<>
            <div>
              <label className="block text-xs font-medium text-gray-600 mb-1">Mois</label>
              <select className={`${selectCls} w-24`} value={moisFilter} onChange={e=>setMoisFilter(Number(e.target.value))}>
                {MOIS_LABELS.map((m,i)=><option key={i+1} value={i+1}>{m}</option>)}
              </select>
            </div>
            <div>
              <label className="block text-xs font-medium text-gray-600 mb-1">Année</label>
              <select className={`${selectCls} w-24`} value={anneeFilter} onChange={e=>setAnneeFilter(Number(e.target.value))}>
                {ANNEES.map(a=><option key={a} value={a}>{a}</option>)}
              </select>
            </div>
          </>)}
          <div>
            <label className="block text-xs font-medium text-gray-600 mb-1">Type</label>
            <select className={`${selectCls} w-28`} value={typeFilter} onChange={e=>setTypeFilter(e.target.value)}>
              {['Tous','Entrée','Sortie'].map(t=><option key={t}>{t}</option>)}
            </select>
          </div>
          <div>
            <label className="block text-xs font-medium text-gray-600 mb-1">Source</label>
            <select className={`${selectCls} w-32`} value={sourceFilter} onChange={e=>setSourceFilter(e.target.value)}>
              {['Toutes','Banque','Apport','Contrats','Avances'].map(s=><option key={s}>{s}</option>)}
            </select>
          </div>
          <div>
            <label className="block text-xs font-medium text-gray-600 mb-1">Auteur</label>
            <select className={`${selectCls} w-28`} value={auteurFilter} onChange={e=>setAuteurFilter(e.target.value)}>
              {['Tous','Micka','César'].map(a=><option key={a}>{a}</option>)}
            </select>
          </div>
          <div>
            <label className="block text-xs font-medium text-gray-600 mb-1">Rechercher</label>
            <input className={`${inputCls} w-48`} value={search} onChange={e=>setSearch(e.target.value)} placeholder="Label, catégorie..."/>
          </div>
        </div>
      </div>

      {filtered.length===0 ? <EmptyState message="Aucune entrée" icon="📒"/> : (<>
        {/* Desktop */}
        <div className="hidden md:block bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
          <table className="w-full text-sm">
            <thead className="bg-gray-50 border-b border-gray-100">
              <tr>{['Date','Label','Source','Auteur','Montant'].map(h=><th key={h} className="text-left text-xs font-semibold text-gray-500 px-4 py-3">{h}</th>)}</tr>
            </thead>
            <tbody>
              {filtered.map(e=>(
                <tr key={e.id} onClick={()=>handleRowClick(e)} className="border-b border-gray-50 hover:bg-gray-50 cursor-pointer transition-colors">
                  <td className="px-4 py-3 text-gray-500 text-xs">{formatDate(e.date)}</td>
                  <td className="px-4 py-3 text-gray-800 max-w-[300px] truncate">
                    {e.label}
                    {e.category && <span className="text-xs text-gray-400 ml-1">({e.category})</span>}
                    {e.payNote && <span className="text-xs text-blue-500 ml-1">· {e.payNote}</span>}
                  </td>
                  <td className="px-4 py-3">
                    <span className={`inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium ${sourceBadge[e.type]||'bg-gray-100 text-gray-600'}`}>{sourceLabels[e.type]||e.source}</span>
                  </td>
                  <td className="px-4 py-3">
                    {e.auteur && <StatusBadge status={e.auteur}/>}
                  </td>
                  <td className={`px-4 py-3 font-bold text-right ${e.montant>=0?'text-green-600':'text-red-600'}`}>
                    {e.montant>=0?'+':''}{fmt(e.montant)}
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>

        {/* Mobile */}
        <div className="md:hidden space-y-2">
          {filtered.map(e=>(
            <div key={e.id} onClick={()=>handleRowClick(e)} className="bg-white rounded-xl p-3 shadow-sm border border-gray-100 cursor-pointer flex items-center justify-between">
              <div className="flex-1 min-w-0">
                <div className="text-sm font-medium text-gray-800 truncate">{e.label}</div>
                <div className="flex items-center gap-2 mt-1 flex-wrap">
                  <span className="text-xs text-gray-400">{formatDate(e.date)}</span>
                  <span className={`inline-flex items-center px-1.5 py-0.5 rounded-full text-xs font-medium ${sourceBadge[e.type]||'bg-gray-100'}`}>{sourceLabels[e.type]}</span>
                </div>
              </div>
              <div className={`font-bold text-base ml-3 ${e.montant>=0?'text-green-600':'text-red-600'}`}>
                {e.montant>=0?'+':''}{fmt(Math.abs(e.montant))}
              </div>
            </div>
          ))}
        </div>
      </>)}
    </div>
  );
}

// DRIVE & LIENS MODULE
// ============================================================
function DriveModule({data, setData}) {
  const addToast = useToast();
  const [tab, setTab] = React.useState('liens');
  const [editMode, setEditMode] = React.useState(false);
  const [newName, setNewName] = React.useState('');
  const [newUrl, setNewUrl] = React.useState('');
  const [configForm, setConfigForm] = React.useState({});

  React.useEffect(() => {
    setConfigForm({
      mickaCAAnnuel: data.config?.objectives?.mickaCAAnnuel||0,
      cesarCAAnnuel: data.config?.objectives?.cesarCAAnnuel||0,
      seuil: data.config?.autoEntrepreneur?.seuil||77700,
      tauxURSSAF: data.config?.autoEntrepreneur?.tauxURSSAF||22,
      assujeTVA: data.config?.autoEntrepreneur?.assujeTVA||false,
    });
  }, [data.config]);

  const links = data.config?.driveLinks || {};

  const addLink = () => {
    if(!newName.trim()||!newUrl.trim()) { addToast('Nom et URL requis','error'); return; }
    setData(d => ({...d, config:{...d.config, driveLinks:{...(d.config?.driveLinks||{}), [newName.trim()]:newUrl.trim()}}}));
    setNewName('');
    setNewUrl('');
    addToast('Lien ajouté','success');
  };

  const removeLink = (name) => {
    setData(d => {
      const dl = {...(d.config?.driveLinks||{})};
      delete dl[name];
      return {...d, config:{...d.config, driveLinks:dl}};
    });
    addToast('Lien supprimé','success');
  };

  const saveConfig = () => {
    setData(d=>({...d, config:{...d.config,
      objectives:{mickaCAAnnuel:Number(configForm.mickaCAAnnuel)||0, cesarCAAnnuel:Number(configForm.cesarCAAnnuel)||0},
      autoEntrepreneur:{seuil:Number(configForm.seuil)||77700, tauxURSSAF:Number(configForm.tauxURSSAF)||22, assujeTVA:!!configForm.assujeTVA}
    }}));
    addToast('Configuration enregistrée','success');
  };

  const linkIcons = {'Google Drive':'📁','Notion':'📝','Calendly':'📅','Linear':'📋'};

  const tabs = [{id:'liens',label:'Liens & Drive'},{id:'config',label:'⚙️ Configuration'}];

  return (
    <div className="space-y-4">
      <h1 className="text-2xl font-bold text-gray-800">Drive & Liens</h1>
      <Tabs tabs={tabs} active={tab} onChange={setTab}/>

      {tab==='liens' && (<>
        <div className="flex justify-end">
          <Btn variant={editMode?'secondary':'outline'} onClick={()=>setEditMode(v=>!v)}>{editMode?'Terminer':'Modifier'}</Btn>
        </div>
        <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4">
          {Object.entries(links).map(([name, url]) => (
            <div key={name} className="bg-white rounded-2xl shadow-sm border border-gray-100 p-5 flex items-start justify-between group">
              <a href={url} target="_blank" rel="noopener noreferrer" className="flex items-center gap-3 flex-1 min-w-0 hover:text-blue-600 transition-colors">
                <span className="text-2xl">{linkIcons[name]||'🔗'}</span>
                <div className="min-w-0">
                  <div className="font-semibold text-gray-800 text-sm">{name}</div>
                  <div className="text-xs text-gray-400 truncate mt-0.5">{url}</div>

      {tab==='config' && (
        <div className="space-y-6">
          <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-5">
            <h2 className="text-base font-semibold text-gray-800 mb-4">🎯 Objectifs CA annuels</h2>

              </div>
            </div>
          </div>
          <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-5">
            <h2 className="text-base font-semibold text-gray-800 mb-4">⚡ Auto-entrepreneur</h2>
            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
              <div>
                <label className="block text-xs font-medium text-gray-600 mb-1">Seuil auto-entrepreneur (€)</label>
                <input className={inputCls} type="number" value={configForm.seuil||''} onChange={e=>setConfigForm(f=>({...f,seuil:e.target.value}))} placeholder="77700"/>
              </div>
              <div>
                <label className="block text-xs font-medium text-gray-600 mb-1">Taux URSSAF (%)</label>
                <input className={inputCls} type="number" step="0.1" value={configForm.tauxURSSAF||''} onChange={e=>setConfigForm(f=>({...f,tauxURSSAF:e.target.value}))} placeholder="22"/>

const CHART_COLORS = ['#6366f1','#10b981','#f59e0b','#ef4444','#8b5cf6','#06b6d4','#ec4899','#84cc16','#f97316','#14b8a6'];
const MONTH_SHORT = ['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];

function ChartBlock({title, icon, children}) {
  return (
    <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-5">
      <h3 className="text-sm font-semibold text-gray-700 mb-4">{icon} {title}</h3>
      {children}
    </div>
  );
}

function ChartCanvas({type, data, options}) {
  const canvasRef = React.useRef(null);
  const chartRef = React.useRef(null);
  const depKey = JSON.stringify({type, labels: data.labels, vals: (data.datasets||[]).map(d=>d.data)});

  React.useEffect(() => {
    const canvas = canvasRef.current;
    if(!canvas || !window.Chart) return;
    if(chartRef.current) { chartRef.current.destroy(); chartRef.current = null; }
    chartRef.current = new window.Chart(canvas, {
      type,
      data,
      options: {
        responsive: true,
        maintainAspectRatio: true,
        plugins: {
          legend: {display: true, labels:{boxWidth:12,font:{size:11}}},
          tooltip: {callbacks:{label: ctx => ' ' + fmt(ctx.raw || 0)}}
        },
        ...( options || {})
      }
    });
    return () => { if(chartRef.current) { chartRef.current.destroy(); chartRef.current = null; } };
  }, [depKey]);

  return <canvas ref={canvasRef}/>;
}

function AnalyticsModule({data}) {
  const now = new Date();
  const [filterYear, setFilterYear] = React.useState(now.getFullYear());

  const entries = React.useMemo(() => buildLedgerEntries(data), [data]);

  const allYears = React.useMemo(() => {
    const years = new Set();
    entries.forEach(e => { if(e.date) years.add(+e.date.substring(0,4)); });
    (data.expenses||[]).forEach(e => { if(e.date) years.add(+e.date.substring(0,4)); });
    if(years.size === 0) years.add(now.getFullYear());
    return [...years].sort();
  }, [entries, data.expenses]);

  // 1. CA mensuel par année (toutes les années)
  const caMonthlyByYear = React.useMemo(() => {
    const map = {};
    entries.filter(e=>e.type==='contract').forEach(e => {
      const y = +e.date.substring(0,4);
      const m = +e.date.substring(5,7) - 1;
      if(!map[y]) map[y] = Array(12).fill(0);
      map[y][m] += e.montant;
    });
    return map;
  }, [entries]);

  // 2. CA annuel total
  const caAnnuel = React.useMemo(() => {
    const map = {};
    entries.filter(e=>e.type==='contract').forEach(e => {
      const y = +e.date.substring(0,4);
      map[y] = (map[y]||0) + e.montant;
    });
    return map;
  }, [entries]);

  // 3. CA cumulé pour filterYear
  const caCumule = React.useMemo(() => {
    const monthly = Array(12).fill(0);
    entries.filter(e=>e.type==='contract' && +e.date.substring(0,4)===filterYear).forEach(e => {
      monthly[+e.date.substring(5,7)-1] += e.montant;
    });
    let cum = 0;
    return monthly.map(v => { cum += v; return cum; });
  }, [entries, filterYear]);

  // 4. Dépenses par catégorie (filterYear)
  const depensesCategorie = React.useMemo(() => {
    const map = {};
    (data.expenses||[]).filter(e => +e.date.substring(0,4)===filterYear).forEach(e => {
      const cat = e.categorie||'Autre';
      map[cat] = (map[cat]||0) + Math.abs(Number(e.montant)||0);
    });
    return map;
  }, [data.expenses, filterYear]);

  // 5. Dépenses mensuelles (filterYear)
  const depensesMensuelles = React.useMemo(() => {
    const monthly = Array(12).fill(0);
    (data.expenses||[]).filter(e => +e.date.substring(0,4)===filterYear).forEach(e => {
      monthly[+e.date.substring(5,7)-1] += Math.abs(Number(e.montant)||0);
    });
    return monthly;
  }, [data.expenses, filterYear]);

  // 6. CA par client (filterYear)
  const caClient = React.useMemo(() => {
    const map = {};
    (data.contracts||[]).filter(c=>c.statut!=='Annulé').forEach(c => {
      (c.payments||[]).filter(p=>+p.date.substring(0,4)===filterYear).forEach(p => {
        map[c.client] = (map[c.client]||0) + Math.abs(Number(p.montant)||0);
      });
    });
    return map;
  }, [data.contracts, filterYear]);

  // 7. Encaissements par associé (filterYear)
  const caAssocie = React.useMemo(() => {
    const map = {Micka:0, César:0};
    entries.filter(e=>e.type==='contract' && +e.date.substring(0,4)===filterYear).forEach(e => {
      if(map[e.assignedTo] !== undefined) map[e.assignedTo] += e.montant;
    });
    return map;
  }, [entries, filterYear]);

  // 8. CA par date de signature (filterYear) - basé sur contrat.montant + dateSignature
  const caSignatureMonthly = React.useMemo(() => {
    const monthly = Array(12).fill(0);
    (data.contracts||[]).filter(c=>c.statut!=='Annulé'&&c.dateSignature&&+c.dateSignature.substring(0,4)===filterYear).forEach(c => {
      monthly[+c.dateSignature.substring(5,7)-1] += Number(c.montant)||0;
    });
    return monthly;
  }, [data.contracts, filterYear]);

  // 9. CA par type de paiement (filterYear) - basé sur contrat.montant
  const caByPaymentType = React.useMemo(() => {
    const map = {};
    (data.contracts||[]).filter(c=>c.statut!=='Annulé'&&c.dateSignature&&+c.dateSignature.substring(0,4)===filterYear).forEach(c => {
      const t = c.typePaiement||'Virement';
      map[t] = (map[t]||0) + (Number(c.montant)||0);
    });
    return map;
  }, [data.contracts, filterYear]);

  // Build chart data objects
  const caMonthlyChartData = {
    labels: MONTH_SHORT,
    datasets: allYears.map((y,i) => ({
      label: String(y),
      data: caMonthlyByYear[y] || Array(12).fill(0),
      backgroundColor: CHART_COLORS[i % CHART_COLORS.length] + 'aa',
      borderColor: CHART_COLORS[i % CHART_COLORS.length],
      borderWidth: 1,
    }))
  };

  const caAnnuelChartData = {
    labels: allYears.map(String),
    datasets: [{
      label: 'CA Total',
      data: allYears.map(y => caAnnuel[y]||0),
      backgroundColor: allYears.map((_,i) => CHART_COLORS[i%CHART_COLORS.length]+'aa'),
      borderColor: allYears.map((_,i) => CHART_COLORS[i%CHART_COLORS.length]),
      borderWidth: 1,
    }]
  };

  const caCumuleChartData = {
    labels: MONTH_SHORT,
    datasets: [{
      label: `CA cumulé ${filterYear}`,
      data: caCumule,
      fill: true,
      backgroundColor: '#6366f118',
      borderColor: '#6366f1',
      tension: 0.4,
      pointBackgroundColor: '#6366f1',
      pointRadius: 4,
    }]
  };

  const depCatLabels = Object.keys(depensesCategorie).sort((a,b)=>depensesCategorie[b]-depensesCategorie[a]);
  const depCatChartData = {
    labels: depCatLabels,
    datasets: [{
      data: depCatLabels.map(k => depensesCategorie[k]),
      backgroundColor: CHART_COLORS.slice(0, depCatLabels.length),
      borderWidth: 1,
    }]
  };

  const depMensuellesChartData = {
    labels: MONTH_SHORT,
    datasets: [{
      label: 'Dépenses',
      data: depensesMensuelles,
      backgroundColor: '#ef444488',
      borderColor: '#ef4444',
      borderWidth: 1,
    }]
  };

  const clientLabels = Object.keys(caClient).sort((a,b)=>caClient[b]-caClient[a]);
  const caClientChartData = {
    labels: clientLabels,
    datasets: [{
      label: 'CA',
      data: clientLabels.map(k=>caClient[k]),
      backgroundColor: CHART_COLORS.slice(0, clientLabels.length).map(c=>c+'bb'),
      borderColor: CHART_COLORS.slice(0, clientLabels.length),
      borderWidth: 1,
    }]
  };

  const associeChartData = {
    labels: ['Micka', 'César'],
    datasets: [{
      label: 'Encaissements',
      data: [caAssocie.Micka, caAssocie.César],
      backgroundColor: ['#6366f1aa','#10b981aa'],
      borderColor: ['#6366f1','#10b981'],
      borderWidth: 1,
    }]
  };

  const caSignatureChartData = {
    labels: MONTH_SHORT,
    datasets: [{
      label: `CA signé ${filterYear}`,
      data: caSignatureMonthly,
      backgroundColor: '#8b5cf6aa',
      borderColor: '#8b5cf6',
      borderWidth: 1,
    }]
  };

  const payTypeLabels = Object.keys(caByPaymentType).sort((a,b)=>caByPaymentType[b]-caByPaymentType[a]);
  const caByPaymentTypeChartData = {
    labels: payTypeLabels,
    datasets: [{
      data: payTypeLabels.map(k=>caByPaymentType[k]),
      backgroundColor: CHART_COLORS.slice(0, payTypeLabels.length),
      borderWidth: 1,
    }]
  };

  const noLegend = {plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>' '+fmt(ctx.raw||0)}}}};
  const withLegendRight = {plugins:{legend:{display:true,position:'right',labels:{boxWidth:12,font:{size:11}}},tooltip:{callbacks:{label:ctx=>' '+fmt(ctx.raw||0)}}}};

  // KPI summary
  const totalCA = allYears.reduce((s,y)=>s+(caAnnuel[y]||0), 0);
  const totalDep = (data.expenses||[]).filter(e=>+e.date.substring(0,4)===filterYear).reduce((s,e)=>s+Math.abs(Number(e.montant)||0),0);
  const totalCAYear = caAnnuel[filterYear]||0;

  return (
    <div className="space-y-6">
      <div className="flex items-center gap-3 flex-wrap">
        <h1 className="text-2xl font-bold text-gray-800">Analytics / Pilotage</h1>
        <span className="text-xs text-gray-400 bg-gray-100 px-2 py-1 rounded-full">{APP_VERSION}</span>
      </div>

      {/* Filters */}
      <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-4 flex flex-wrap gap-4 items-end">
        <div>
          <label className="block text-xs font-medium text-gray-600 mb-1">Année de référence</label>
          <select className={`${selectCls} w-28`} value={filterYear} onChange={e=>setFilterYear(Number(e.target.value))}>
            {allYears.map(y=><option key={y} value={y}>{y}</option>)}
          </select>
        </div>
        <div className="flex gap-3">
          <KPICard label={`CA ${filterYear}`} value={fmt(totalCAYear)} color="green" icon="💰"/>
          <KPICard label={`Dépenses ${filterYear}`} value={fmt(totalDep)} color="red" icon="💸"/>
          <KPICard label="CA global" value={fmt(totalCA)} color="blue" icon="📊"/>
        </div>
      </div>

      {/* Charts grid */}
      <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">

        {/* 1. CA mensuel par année - pleine largeur */}
        <div className="lg:col-span-2">
          <ChartBlock title="CA mensuel par année (comparaison)" icon="📈">
            <ChartCanvas type="bar" data={caMonthlyChartData}/>
          </ChartBlock>
        </div>

        {/* 2. CA annuel comparatif */}
        <ChartBlock title="CA annuel comparatif" icon="📊">
          <ChartCanvas type="bar" data={caAnnuelChartData} options={noLegend}/>
        </ChartBlock>

        {/* 3. CA cumulé */}
        <ChartBlock title={`CA cumulé ${filterYear}`} icon="📉">
          <ChartCanvas type="line" data={caCumuleChartData} options={noLegend}/>
        </ChartBlock>

        {/* 4. Dépenses par catégorie */}
        <ChartBlock title={`Dépenses par catégorie ${filterYear}`} icon="💸">
          {depCatLabels.length === 0
            ? <EmptyState message="Aucune dépense cette année" icon="💸"/>
            : <ChartCanvas type="doughnut" data={depCatChartData} options={withLegendRight}/>
          }
        </ChartBlock>

        {/* 5. Dépenses mensuelles */}
        <ChartBlock title={`Dépenses mensuelles ${filterYear}`} icon="📅">
          <ChartCanvas type="bar" data={depMensuellesChartData} options={noLegend}/>
        </ChartBlock>

        {/* 6. CA par client */}
        <ChartBlock title={`CA par client ${filterYear}`} icon="🏢">
          {clientLabels.length === 0
            ? <EmptyState message="Aucun encaissement cette année" icon="🏢"/>
            : <ChartCanvas type="bar" data={caClientChartData} options={{...noLegend, indexAxis:'y'}}/>
          }
        </ChartBlock>

        {/* 7. Encaissements par associé */}
        <ChartBlock title={`Encaissements par associé ${filterYear}`} icon="👥">
          <ChartCanvas type="bar" data={associeChartData} options={noLegend}/>
        </ChartBlock>

        {/* 8. CA par date de signature */}
        <ChartBlock title={`CA par date de signature ${filterYear}`} icon="✍️">
          <ChartCanvas type="bar" data={caSignatureChartData} options={noLegend}/>
        </ChartBlock>

        {/* 9. CA par type de paiement */}
        <ChartBlock title={`CA par type de paiement ${filterYear}`} icon="💳">
          {payTypeLabels.length === 0
            ? <EmptyState message="Aucun contrat signé cette année" icon="💳"/>
            : <ChartCanvas type="doughnut" data={caByPaymentTypeChartData} options={withLegendRight}/>
          }
        </ChartBlock>

      </div>
    </div>
  );
}

function App() {
  const [data, setData] = React.useState(loadData);
  const [activeModule, setActiveModule] = React.useState('dashboard');
  const [sidebarOpen, setSidebarOpen] = React.useState(false);
  const [contractDeepLink, setContractDeepLink] = React.useState(null);
  const [bankDeepLink, setBankDeepLink] = React.useState(null);
  const [synced, setSynced] = React.useState(false);
  const [syncStatus, setSyncStatus] = React.useState('loading'); // 'loading' | 'ok' | 'error'
  const [showSearch, setShowSearch] = React.useState(false);
  const [showAlerts, setShowAlerts] = React.useState(false);
  const isRemoteUpdate = React.useRef(false);
  const addToast = useToast();

  const alerts = React.useMemo(() => buildAlerts(data), [data]);

  // Keyboard shortcuts
  React.useEffect(() => {
    const handler = (e) => {
      if((e.metaKey||e.ctrlKey)&&e.key==='k') { e.preventDefault(); setShowSearch(v=>!v); }
      if(e.key==='Escape') { setShowSearch(false); setShowAlerts(false); }
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, []);

  // On mount: fetch from Supabase + subscribe realtime
  React.useEffect(() => {
    let channel;
    (async () => {
      try {
        const { data: rows, error } = await sb.from('app_data').select('data').eq('id', 1).single();
        if (!error && rows && rows.data) {
          const remote = securizeData(rows.data);
          isRemoteUpdate.current = true;
          setData(remote);
          try { localStorage.setItem(LS_KEY, JSON.stringify(remote)); } catch(e) {}
        } else {
          // Première connexion : pousser les données locales sur Supabase
          const local = loadData();
          await sb.from('app_data').upsert({id:1, data:local, updated_at:new Date().toISOString()});
        }
        setSyncStatus('ok');
      } catch(e) {
        console.error('Supabase load error:', e);
        setSyncStatus('error');
      }
      setSynced(true);
    })();

    // Realtime
    channel = sb.channel('app_data_realtime')
      .on('postgres_changes', {event:'UPDATE', schema:'public', table:'app_data'}, (payload) => {
        if(!payload.new?.data) return;
        const incoming = securizeData(payload.new.data);
        isRemoteUpdate.current = true;
        setData(incoming);
        try { localStorage.setItem(LS_KEY, JSON.stringify(incoming)); } catch(e) {}
        addToast('Synchronisé ☁️', 'info');
      })
      .subscribe();

    return () => { if(channel) sb.removeChannel(channel); };
  }, []);

  // Sauvegarde Supabase à chaque changement (sauf mises à jour reçues du realtime)
  React.useEffect(() => {
    if(!synced) return;
    if(isRemoteUpdate.current) { isRemoteUpdate.current = false; return; }
    saveData(data);
  }, [data, synced]);

  const onNavigate = (module, deepLinkData) => {
    setActiveModule(module);
    if(module==='contracts') setContractDeepLink(deepLinkData||null);
    if(module==='bank') setBankDeepLink(deepLinkData||null);
    setSidebarOpen(false);
  };

  const handleImport = (file) => {
    doImport(file,
      (imported) => { setData(imported); addToast('Import réussi','success'); },
      (err) => addToast(err,'error')
    );
  };

  const renderModule = () => {
    const wrap = (component) => <ErrorBoundary key={activeModule}>{component}</ErrorBoundary>;
    switch(activeModule) {
      case 'dashboard': return wrap(<Dashboard data={data} onNavigate={onNavigate}/>);
      case 'analytics': return wrap(<AnalyticsModule data={data}/>);
      case 'quotes': return wrap(<QuotesModule data={data} setData={setData} onNavigate={onNavigate}/>);
      case 'invoices': return wrap(<InvoicesModule data={data} setData={setData}/>);
      case 'contracts': return wrap(<ContractsModule data={data} setData={setData} deepLink={contractDeepLink} clearDeepLink={()=>setContractDeepLink(null)}/>);
      case 'crm': return wrap(<CRMModule data={data} setData={setData} onNavigate={onNavigate}/>);
      case 'tasks': return wrap(<TasksModule data={data} setData={setData}/>);
      case 'bank': return wrap(<BankModule data={data} setData={setData} deepLink={bankDeepLink} clearDeepLink={()=>setBankDeepLink(null)}/>);
      case 'ledger': return wrap(<LedgerModule data={data} onNavigate={onNavigate}/>);
      case 'resources': return wrap(<DriveModule data={data} setData={setData}/>);
      default: return wrap(<Dashboard data={data} onNavigate={onNavigate}/>);
    }
  };

  if(!synced) {
    return (
      <div className="min-h-screen bg-gray-50 flex items-center justify-center">
        <div className="text-center">
          <div className="text-4xl mb-4 animate-pulse">☁️</div>
          <div className="text-sm text-gray-500">Connexion à Supabase...</div>
        </div>
      </div>
    );
  }

  return (
    <div className="min-h-screen bg-gray-50">
      <Sidebar
        active={activeModule}
        onChange={setActiveModule}
        onExport={()=>doExport(data)}
        onImport={handleImport}
        version={APP_VERSION}
        sidebarOpen={sidebarOpen}
        setSidebarOpen={setSidebarOpen}
        syncStatus={syncStatus}
      />
      {/* Mobile top bar */}
      <div className="md:hidden fixed top-0 left-0 right-0 z-20 bg-white border-b border-gray-100 px-4 py-3 flex items-center gap-3 shadow-sm">
        <button onClick={()=>setSidebarOpen(true)} className="text-gray-600 hover:text-gray-800 text-xl">☰</button>
        <div className="font-semibold text-gray-800 text-sm">EntrepreneurPRO</div>
        <div className="ml-auto flex items-center gap-2">
          <button onClick={()=>setShowSearch(v=>!v)} className="text-gray-400 hover:text-gray-700 text-base px-1">🔍</button>
          <button onClick={()=>setShowAlerts(v=>!v)} className="relative text-gray-400 hover:text-gray-700 text-base px-1">
            🔔{alerts.length>0&&<span className="absolute -top-1 -right-1 bg-red-500 text-white text-xs rounded-full w-4 h-4 flex items-center justify-center font-bold">{alerts.length}</span>}
          </button>
        </div>
      </div>
      {/* Desktop alert bell (in main area top right) */}
      <div className="hidden md:flex fixed top-3 right-4 z-30 items-center gap-2">
        <button onClick={()=>setShowSearch(v=>!v)} className="text-gray-400 hover:text-gray-700 text-sm bg-white border border-gray-200 px-3 py-1.5 rounded-lg shadow-sm flex items-center gap-1.5">
          🔍 <span className="text-xs text-gray-500">Cmd+K</span>
        </button>
        <button onClick={()=>setShowAlerts(v=>!v)} className="relative text-gray-400 hover:text-gray-700 bg-white border border-gray-200 px-3 py-1.5 rounded-lg shadow-sm text-sm">
          🔔{alerts.length>0&&<span className="absolute -top-1 -right-1 bg-red-500 text-white text-xs rounded-full w-4 h-4 flex items-center justify-center font-bold">{alerts.length}</span>}
        </button>
      </div>
      {/* Main content */}
      <main className="md:ml-60 pt-0 md:pt-0">
        <div className="pt-14 md:pt-0 min-h-screen">
          <div className="max-w-6xl mx-auto px-4 py-6">
            {renderModule()}
          </div>
        </div>
      </main>
      {showSearch && <GlobalSearch data={data} onNavigate={(mod, dl)=>{onNavigate(mod, dl);}} onClose={()=>setShowSearch(false)}/>}
      {showAlerts && <AlertCenter alerts={alerts} onNavigate={onNavigate} onClose={()=>setShowAlerts(false)}/>}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(
  <ToastProvider>
    <App/>
  </ToastProvider>
);
</script>
</body>
</html>
