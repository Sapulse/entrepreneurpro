// CSV Export utility
function exportCSV(rows, filename) {
  const csv = rows.map(r => r.map(c => `"${String(c||'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download=filename; a.click();
  URL.revokeObjectURL(url);
}

// Build alerts from data
function buildAlerts(data) {
  const alerts = [];
  data.contracts.filter(c=>c.statut==='En cours'&&c.dateFin).forEach(c => {
    const days = daysUntil(c.dateFin);
    if(days !== null && days <= 7) {
      const urgency = days <= 0 ? 'danger' : 'warning';
      const label = days <= 0 ? 'dépassée !' : days === 0 ? "aujourd'hui" : `dans ${days}j`;
      alerts.push({id:'exp_'+c.id, type:urgency, icon:'📄', msg:`${c.client} – ${c.prestation} : échéance ${label}`, module:'contracts', deepLink:{id:c.id}});
    }
  });
  data.contracts.filter(c=>c.statut!=='Annulé').forEach(c => {
    const paid = (c.payments||[]).reduce((s,p)=>s+(Number(p.montant)||0),0);
    const reste = (Number(c.montant)||0) - paid;
    if(reste > 0 && c.dateFin && daysUntil(c.dateFin) !== null && daysUntil(c.dateFin) < -7) {
      alerts.push({id:'unpaid_'+c.id, type:'warning', icon:'💰', msg:`Impayé: ${fmt(reste)} – ${c.client}`, module:'contracts', deepLink:{id:c.id, tab:'paiements'}});
    }
  });
  const caAnnuel = data.contracts.filter(c=>c.statut!=='Annulé').reduce((s,c)=>s+(Number(c.montant)||0),0);
  const seuil = data.config?.autoEntrepreneur?.seuil || AUTO_ENTREPRENEUR_SEUIL;
  const ratio = seuil > 0 ? caAnnuel/seuil : 0;
  if(ratio >= 1) alerts.push({id:'seuil_100', type:'danger', icon:'🚨', msg:`Seuil auto-entrepreneur DÉPASSÉ ! ${fmt(caAnnuel)} / ${fmt(seuil)}`, module:'dashboard'});
  else if(ratio >= 0.9) alerts.push({id:'seuil_90', type:'warning', icon:'⚡', msg:`CA à ${Math.round(ratio*100)}% du seuil auto-entrepreneur`, module:'dashboard'});
  else if(ratio >= 0.8) alerts.push({id:'seuil_80', type:'info', icon:'📊', msg:`CA à ${Math.round(ratio*100)}% du seuil auto-entrepreneur`, module:'dashboard'});
  (data.quotes||[]).filter(q=>q.statut==='Envoyé'&&q.dateExpiration&&daysUntil(q.dateExpiration)<=3&&daysUntil(q.dateExpiration)>=0).forEach(q => {
    alerts.push({id:'qexp_'+q.id, type:'warning', icon:'📋', msg:`Devis expirant bientôt: ${q.client} (${fmt(q.montant)})`, module:'quotes'});
  });
  return alerts;
}

// Compute period date range
function getPeriodeRange(periode) {
  const now = new Date();
  const y = now.getFullYear(); const m = now.getMonth();
  if(periode==='mois') return {start:new Date(y,m,1), end:new Date(y,m+1,0,23,59,59)};
  if(periode==='mois_prec') return {start:new Date(y,m-1,1), end:new Date(y,m,0,23,59,59)};
  if(periode==='trimestre') { const q=Math.floor(m/3); return {start:new Date(y,q*3,1), end:new Date(y,q*3+3,0,23,59,59)}; }
  if(periode==='annee') return {start:new Date(y,0,1), end:new Date(y,11,31,23,59,59)};
  return null;
}
function inPeriode(dateStr, range) {
  if(!range||!dateStr) return true;
  const d = new Date(dateStr+'T00:00:00');
  return d >= range.start && d <= range.end;
}

  });
  (data.expenses||[]).forEach(e => {
    entries.push({id:'exp_'+e.id, sourceId:e.id, type:'expense', date:e.date, label:e.titre||'', montant:-Math.abs(Number(e.montant)||0), auteur:e.payePar||'', source:'Avances', category:e.categorie||''});
  });
  (data.contracts||[]).forEach(c => {
    if(c.statut==='Annulé') return;
    (c.payments||[]).forEach(p => {
      entries.push({id:'pay_'+p.id, sourceId:p.id, type:'contract', date:p.date, label:`${c.client} – ${c.prestation}`, montant:Math.abs(Number(p.montant)||0), auteur:p.auteur||'', source:'Contrats', category:'', contractId:c.id, assignedTo:c.assignedTo, payNote:p.note||''});
    });
  });
  return entries.sort((a,b)=>new Date(b.date)-new Date(a.date));
}

function securizeData(d) {
  if(!d) d = {};
  if(!Array.isArray(d.contracts)) d.contracts = [];
  if(!Array.isArray(d.clients)) d.clients = [];
  if(!Array.isArray(d.tasks)) d.tasks = [];
  if(!Array.isArray(d.expenses)) d.expenses = [];
  if(!Array.isArray(d.quotes)) d.quotes = [];
  if(!Array.isArray(d.invoices)) d.invoices = [];
  if(!d.bank) d.bank = {initialBalance:0, transactions:[], subscriptions:[]};
  if(typeof d.bank.initialBalance !== 'number') d.bank.initialBalance = 0;
  if(!Array.isArray(d.bank.transactions)) d.bank.transactions = [];
  if(!Array.isArray(d.bank.subscriptions)) d.bank.subscriptions = [];
  if(!d.config) d.config = {driveLinks:{}};
  if(!d.config.driveLinks) d.config.driveLinks = {};
  if(!d.config.objectives) d.config.objectives = {mickaCAAnnuel:0, cesarCAAnnuel:0};
  if(!d.config.autoEntrepreneur) d.config.autoEntrepreneur = {seuil:77700, tauxURSSAF:22, assujeTVA:false};
  d.contracts.forEach(c => {
    if(!Array.isArray(c.payments)) c.payments = [];
    if(!Array.isArray(c.actions)) c.actions = [];
  });
  if((d.schemaVersion||0) < 3) d.schemaVersion = 3;
  return d;
}

function loadData() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if(!raw) return securizeData(JSON.parse(JSON.stringify(INITIAL_DATA)));
    const parsed = JSON.parse(raw);
    return securizeData(parsed);
  } catch(e) {
    return securizeData(JSON.parse(JSON.stringify(INITIAL_DATA)));
  }
}

function doImport(file, onSuccess, onError) {
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const parsed = JSON.parse(e.target.result);
      const required = ['contracts','clients','tasks','expenses','bank'];
      for(const k of required) {
        if(!(k in parsed)) { onError('Fichier invalide: clé manquante ' + k); return; }
      }
      delete parsed.passwords;
      parsed.schemaVersion = 3;
      onSuccess(securizeData(parsed));
    } catch(err) {
      onError('Erreur de parsing JSON: ' + err.message);
    }
  };
  reader.readAsText(file);
}

const ToastContext = React.createContext(null);

function ToastProvider({children}) {
  const [toasts, setToasts] = React.useState([]);
  const addToast = React.useCallback((msg, type='info') => {
    const id = genId();
    setToasts(prev => [...prev, {id, msg, type}]);
    setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 3000);
  }, []);
  const colors = {success:'bg-green-500', error:'bg-red-500', info:'bg-blue-500'};
  return (
    <ToastContext.Provider value={addToast}>
      {children}
      <div className="fixed bottom-4 right-4 z-[100] flex flex-col gap-2 pointer-events-none">
        {toasts.map(t => (
          <div key={t.id} className={`anim px-4 py-3 rounded-lg text-white text-sm shadow-lg ${colors[t.type]||colors.info} pointer-events-auto`}>
            {t.msg}
          </div>
        ))}
      </div>
    </ToastContext.Provider>
  );
}

function useToast() { return React.useContext(ToastContext); }

// ============================================================
// MODAL
// ============================================================
function Modal({open, onClose, title, children, size='md'}) {
  React.useEffect(() => {
    if(!open) return;
    const prev = document.body.style.overflow;
    document.body.style.overflow = 'hidden';
    const handler = (e) => { if(e.key==='Escape') onClose(); };
    document.addEventListener('keydown', handler);
    return () => { document.body.style.overflow = prev; document.removeEventListener('keydown', handler); };
  }, [open, onClose]);

  if(!open) return null;
  const sizes = {sm:'max-w-md', md:'max-w-2xl', lg:'max-w-4xl', xl:'max-w-6xl'};
  return (
    <div className="fixed inset-0 z-50 flex items-start justify-center p-4 pt-10 overflow-y-auto">
      <div className="fixed inset-0 bg-black/40 backdrop-blur-sm" onClick={onClose}/>
      <div className={`relative bg-white rounded-2xl shadow-2xl w-full ${sizes[size]||sizes.md} anim my-auto`}>
        <div className="flex items-center justify-between px-6 py-4 border-b">
          <h2 className="text-lg font-semibold text-gray-800">{title}</h2>
          <button onClick={onClose} className="text-gray-400 hover:text-gray-600 text-2xl leading-none">&times;</button>
        </div>
        <div className="px-6 py-5">{children}</div>
      </div>
    </div>
  );
}

function ConfirmModal({open, onClose, onConfirm, title, message}) {
  return (
    <Modal open={open} onClose={onClose} title={title||'Confirmation'} size="sm">
      <p className="text-gray-600 mb-6">{message||'Êtes-vous sûr ?'}</p>
      <div className="flex gap-3 justify-end">
        <Btn variant="secondary" onClick={onClose}>Annuler</Btn>
        <Btn variant="danger" onClick={() => { onConfirm(); onClose(); }}>Confirmer</Btn>
      </div>
    </Modal>
  );
}

      <label className="block text-xs font-medium text-gray-600 mb-1">{label}{required&&<span className="text-red-500 ml-0.5">*</span>}</label>
      {children}

}

function Btn({variant='primary', size='md', children, ...props}) {
  const variants = {
    primary: 'bg-blue-600 hover:bg-blue-700 text-white',

}

function KPICard({label, value, sub, color='blue', icon}) {

// ============================================================
// ERROR BOUNDARY
// ============================================================
class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = {err:null}; }
  static getDerivedStateFromError(err) { return {err}; }
  render() {
    if(this.state.err) return (
      <div className="p-8 text-center bg-white rounded-2xl shadow-sm border border-red-100">
        <div className="text-4xl mb-3">⚠️</div>
        <h2 className="text-base font-bold text-red-700 mb-2">Erreur dans ce module</h2>
        <p className="text-xs text-gray-500 mb-4 font-mono">{this.state.err?.message}</p>
        <button onClick={()=>this.setState({err:null})} className="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm hover:bg-blue-700">Réessayer</button>
      </div>
    );
    return this.props.children;
  }
}

// ============================================================
// PAGINATION
// ============================================================
function Pagination({total, page, perPage, onChange}) {
  const pages = Math.ceil(total/perPage);
  if(pages<=1) return null;
  const start = Math.max(1, Math.min(page-2, pages-4));
  return (
    <div className="flex items-center justify-between pt-3 border-t border-gray-100 mt-2">
      <span className="text-xs text-gray-400">{total} éléments · page {page}/{pages}</span>
      <div className="flex gap-1">
        <button disabled={page===1} onClick={()=>onChange(1)} className="px-2 py-1 text-xs border border-gray-200 rounded hover:bg-gray-50 disabled:opacity-30">«</button>
        <button disabled={page===1} onClick={()=>onChange(page-1)} className="px-2 py-1 text-xs border border-gray-200 rounded hover:bg-gray-50 disabled:opacity-30">‹</button>
        {Array.from({length:Math.min(5,pages)},(_,i)=>start+i).filter(p=>p<=pages).map(p=>(
          <button key={p} onClick={()=>onChange(p)} className={`px-2 py-1 text-xs border rounded ${p===page?'bg-blue-600 text-white border-blue-600':'border-gray-200 hover:bg-gray-50'}`}>{p}</button>
        ))}
        <button disabled={page===pages} onClick={()=>onChange(page+1)} className="px-2 py-1 text-xs border border-gray-200 rounded hover:bg-gray-50 disabled:opacity-30">›</button>
        <button disabled={page===pages} onClick={()=>onChange(pages)} className="px-2 py-1 text-xs border border-gray-200 rounded hover:bg-gray-50 disabled:opacity-30">»</button>
      </div>
    </div>
  );
}

// ============================================================
// RECHERCHE GLOBALE (Cmd+K)
// ============================================================
function GlobalSearch({data, onNavigate, onClose}) {
  const [q, setQ] = React.useState('');
  const inputRef = React.useRef(null);
  React.useEffect(() => { inputRef.current?.focus(); }, []);

  const results = React.useMemo(() => {
    if(!q.trim()||q.length<2) return [];
    const nq = normalize(q);
    const res = [];
    (data.contracts||[]).filter(c=>normalize(c.client).includes(nq)||normalize(c.prestation).includes(nq)).slice(0,4).forEach(c=>res.push({type:'Contrat',icon:'📄',label:c.client,sub:c.prestation,val:fmt(c.montant),action:()=>onNavigate('contracts',{id:c.id})}));
    (data.clients||[]).filter(c=>normalize(c.entreprise).includes(nq)||normalize(c.nom).includes(nq)).slice(0,4).forEach(c=>res.push({type:'Client',icon:'👤',label:c.entreprise,sub:c.nom,val:c.etape,action:()=>onNavigate('crm',{id:c.id})}));
    (data.tasks||[]).filter(t=>normalize(t.titre).includes(nq)||normalize(t.client||'').includes(nq)).slice(0,3).forEach(t=>res.push({type:'Tâche',icon:'✅',label:t.titre,sub:t.client,val:t.statut,action:()=>onNavigate('tasks')}));
    (data.bank?.transactions||[]).filter(t=>normalize(t.label).includes(nq)).slice(0,3).forEach(t=>res.push({type:'Transaction',icon:'🏦',label:t.label,sub:formatDate(t.date),val:fmt(t.montant),action:()=>onNavigate('bank',{type:'bankTx',id:t.id})}));
    (data.quotes||[]).filter(q2=>normalize(q2.client).includes(nq)||normalize(q2.prestation||'').includes(nq)).slice(0,3).forEach(q2=>res.push({type:'Devis',icon:'📋',label:q2.client,sub:q2.prestation,val:fmt(q2.montant),action:()=>onNavigate('quotes')}));
    return res;
  }, [q, data]);

  return (
    <div className="fixed inset-0 z-[200] flex items-start justify-center pt-20 px-4" onClick={onClose}>
      <div className="w-full max-w-xl bg-white rounded-2xl shadow-2xl border border-gray-200 overflow-hidden" onClick={e=>e.stopPropagation()}>
        <div className="flex items-center gap-3 px-4 py-3 border-b border-gray-100">
          <span className="text-gray-400 text-lg">🔍</span>
          <input ref={inputRef} className="flex-1 text-sm outline-none placeholder-gray-400" placeholder="Rechercher contrats, clients, tâches..." value={q} onChange={e=>setQ(e.target.value)} onKeyDown={e=>e.key==='Escape'&&onClose()}/>
          <kbd className="text-xs text-gray-400 bg-gray-100 px-1.5 py-0.5 rounded">Esc</kbd>
        </div>
        {q.length>=2 && (
          <div className="max-h-80 overflow-y-auto">
            {results.length===0 ? <div className="px-4 py-8 text-center text-sm text-gray-400">Aucun résultat pour "{q}"</div> : results.map((r,i)=>(
              <button key={i} onClick={()=>{r.action();onClose();}} className="w-full flex items-center gap-3 px-4 py-3 hover:bg-gray-50 transition-colors text-left border-b border-gray-50 last:border-0">
                <span className="text-base">{r.icon}</span>
                <div className="flex-1 min-w-0">
                  <div className="text-sm font-medium text-gray-800 truncate">{r.label}</div>
                  <div className="text-xs text-gray-400 truncate">{r.type} · {r.sub}</div>
                </div>
                <span className="text-xs text-gray-500 font-medium shrink-0">{r.val}</span>
              </button>
            ))}
          </div>
        )}
        {q.length<2 && (
          <div className="px-4 py-6 text-center text-xs text-gray-400">Tapez au moins 2 caractères...</div>
        )}
      </div>
    </div>
  );
}

function AlertCenter({alerts, onNavigate, onClose}) {
  const danger = alerts.filter(a=>a.type==='danger');
  const warning = alerts.filter(a=>a.type==='warning');
  const info = alerts.filter(a=>a.type==='info');
  const typeColor = {danger:'bg-red-50 border-red-200 text-red-800', warning:'bg-amber-50 border-amber-200 text-amber-800', info:'bg-blue-50 border-blue-200 text-blue-800'};
  return (
    <div className="fixed inset-0 z-[150]" onClick={onClose}>
      <div className="absolute right-4 top-14 w-80 bg-white rounded-2xl shadow-xl border border-gray-200 overflow-hidden" onClick={e=>e.stopPropagation()}>
        <div className="px-4 py-3 border-b border-gray-100 flex justify-between items-center">
          <span className="text-sm font-semibold text-gray-800">🔔 Alertes ({alerts.length})</span>
          <button onClick={onClose} className="text-gray-400 hover:text-gray-600 text-lg leading-none">×</button>

        <div className="max-h-96 overflow-y-auto">
          {alerts.length===0 ? <div className="px-4 py-8 text-center text-sm text-gray-400">✅ Aucune alerte</div> : alerts.map(a=>(
            <button key={a.id} onClick={()=>{if(a.module)onNavigate(a.module,a.deepLink||null);onClose();}} className={`w-full text-left flex items-start gap-3 px-4 py-3 border-b border-gray-50 last:border-0 hover:bg-gray-50 ${a.module?'cursor-pointer':'cursor-default'}`}>
              <span className="text-base shrink-0 mt-0.5">{a.icon}</span>
              <div className="flex-1 min-w-0">
                <div className={`text-xs px-2 py-0.5 rounded-full inline-block mb-1 font-medium ${typeColor[a.type]||'bg-gray-100 text-gray-600'}`}>{a.type==='danger'?'Urgent':a.type==='warning'?'Attention':'Info'}</div>
                <div className="text-xs text-gray-700 leading-tight">{a.msg}</div>
              </div>

          ))}

      </div>

  );
}

// ============================================================
// DASHBOARD MODULE
// ============================================================
function Dashboard({data, onNavigate}) {
  const [periode, setPeriode] = React.useState('tout');
  const addToast = useToast();

  const stats = React.useMemo(() => {
    const range = getPeriodeRange(periode);
    const entries = buildLedgerEntries(data);
    const filteredEntries = entries.filter(e => inPeriode(e.date, range));

    const totalEntrees = filteredEntries.filter(e=>e.montant>0).reduce((s,e)=>s+e.montant, 0);
    const totalSorties = filteredEntries.filter(e=>e.montant<0).reduce((s,e)=>s+Math.abs(e.montant), 0);
    const balance = totalEntrees - totalSorties;

    const nonAnnule = data.contracts.filter(c => c.statut !== 'Annulé');
    const caSigne = nonAnnule.filter(c=>inPeriode(c.dateDebut, range)).reduce((s,c) => s + (Number(c.montant)||0), 0);
    const caEncaisse = filteredEntries.filter(e=>e.type==='contract').reduce((s,e)=>s+e.montant, 0);
    const reste = nonAnnule.reduce((s,c)=>s+(Number(c.montant)||0),0) - data.contracts.filter(c=>c.statut!=='Annulé').reduce((s,c)=>s+(c.payments||[]).reduce((ps,p)=>ps+(Number(p.montant)||0),0),0);
    const potentiel = data.clients.reduce((s,cl) => s + (Number(cl.potentiel)||0), 0);

    const mickaPay = filteredEntries.filter(e=>e.type==='contract'&&e.assignedTo==='Micka').reduce((s,e)=>s+e.montant,0);
    const cesarPay = filteredEntries.filter(e=>e.type==='contract'&&e.assignedTo==='César').reduce((s,e)=>s+e.montant,0);
    const mickaApports = filteredEntries.filter(e=>e.type==='apport'&&e.imputéÀ==='Micka').reduce((s,e)=>s+e.montant,0);
    const cesarApports = filteredEntries.filter(e=>e.type==='apport'&&e.imputéÀ==='César').reduce((s,e)=>s+e.montant,0);
    const mickaAdv = filteredEntries.filter(e=>e.type==='expense'&&e.auteur==='Micka').reduce((s,e)=>s+Math.abs(e.montant),0);
    const cesarAdv = filteredEntries.filter(e=>e.type==='expense'&&e.auteur==='César').reduce((s,e)=>s+Math.abs(e.montant),0);
    const mickaBank = filteredEntries.filter(e=>e.type==='bank'&&e.imputéÀ==='Micka').reduce((s,e)=>s+Math.abs(e.montant),0);
    const cesarBank = filteredEntries.filter(e=>e.type==='bank'&&e.imputéÀ==='César').reduce((s,e)=>s+Math.abs(e.montant),0);
    const netMicka = mickaPay + mickaApports - mickaAdv - mickaBank;
    const netCesar = cesarPay + cesarApports - cesarAdv - cesarBank;
    const ecart = Math.abs(netMicka - netCesar);
    const recommended = ecart > 50 ? (netMicka > netCesar ? 'César' : 'Micka') : null;

    const urgent = data.contracts
      .filter(c => c.statut === 'En cours' && c.dateFin)
      .sort((a,b) => new Date(a.dateFin) - new Date(b.dateFin))
      .slice(0,3);

    const resteAEncaisserList = data.contracts
      .filter(c => c.statut !== 'Annulé')
      .map(c => {
        const totalPaid = (c.payments||[]).reduce((s,p)=>s+(Number(p.montant)||0),0);
        const resteC = (Number(c.montant)||0) - totalPaid;
        return {...c, totalPaid, resteC};
      })
      .filter(c => c.resteC > 0)
      .sort((a,b) => {
        if(a.dateFin && b.dateFin) return new Date(a.dateFin)-new Date(b.dateFin);
        if(a.dateFin) return -1; if(b.dateFin) return 1; return 0;
      });

    // URSSAF / seuil AE
    const caAnnuelTotal = data.contracts.filter(c=>c.statut!=='Annulé').reduce((s,c)=>s+(Number(c.montant)||0),0);
    const seuil = data.config?.autoEntrepreneur?.seuil || AUTO_ENTREPRENEUR_SEUIL;
    const seuilRatio = seuil > 0 ? Math.min(1, caAnnuelTotal/seuil) : 0;
    const urssafEstimate = caAnnuelTotal * (data.config?.autoEntrepreneur?.tauxURSSAF||22) / 100;

    // Objectives
    const objMicka = Number(data.config?.objectives?.mickaCAAnnuel)||0;
    const objCesar = Number(data.config?.objectives?.cesarCAAnnuel)||0;
    const mickaCaAnnuel = buildLedgerEntries(data).filter(e=>e.type==='contract'&&e.assignedTo==='Micka').reduce((s,e)=>s+e.montant,0);
    const cesarCaAnnuel = buildLedgerEntries(data).filter(e=>e.type==='contract'&&e.assignedTo==='César').reduce((s,e)=>s+e.montant,0);

    return {caSigne, caEncaisse, reste, potentiel, netMicka, netCesar, ecart, recommended, urgent, totalEntrees, totalSorties, balance, resteAEncaisserList, caAnnuelTotal, seuil, seuilRatio, urssafEstimate, objMicka, objCesar, mickaCaAnnuel, cesarCaAnnuel};
  }, [data, periode]);

  const seuilColor = stats.seuilRatio >= 1 ? 'bg-red-500' : stats.seuilRatio >= 0.9 ? 'bg-amber-500' : stats.seuilRatio >= 0.8 ? 'bg-yellow-400' : 'bg-green-500';

  return (
    <div className="space-y-6">
      <div className="flex flex-wrap items-center gap-3 mb-2">
        <h1 className="text-2xl font-bold text-gray-800">Tableau de bord</h1>
        <span className="text-xs text-gray-400 bg-gray-100 px-2 py-1 rounded-full">{APP_VERSION}</span>
        <div className="ml-auto flex gap-1 flex-wrap">
          {PERIODS.map(p => (
            <button key={p.id} onClick={()=>setPeriode(p.id)}
              className={`px-3 py-1 text-xs rounded-lg font-medium transition-colors ${periode===p.id?'bg-blue-600 text-white':'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}>
              {p.label}
            </button>
          ))}
        </div>
      </div>

      {/* KPI Row */}
      <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
        <KPICard label="CA Signé (période)" value={fmt(stats.caSigne)} icon="📄" color="blue"/>
        <KPICard label="CA Encaissé (période)" value={fmt(stats.caEncaisse)} icon="💰" color="green"/>
        <KPICard label="Reste à encaisser" value={fmt(stats.reste)} icon="⏳" color="amber"/>
        <KPICard label="Potentiel Prospects" value={fmt(stats.potentiel)} icon="🎯" color="purple"/>
      </div>

      {/* Seuil auto-entrepreneur + URSSAF */}
      <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-5">
        <div className="flex items-center justify-between mb-3">
          <h2 className="text-base font-semibold text-gray-800">🏛️ Seuil Auto-Entrepreneur</h2>
          <span className={`text-xs font-bold px-2 py-1 rounded-full ${stats.seuilRatio>=1?'bg-red-100 text-red-700':stats.seuilRatio>=0.8?'bg-amber-100 text-amber-700':'bg-green-100 text-green-700'}`}>
            {Math.round(stats.seuilRatio*100)}%
          </span>
        </div>
        <div className="w-full bg-gray-100 rounded-full h-3 mb-2">
          <div className={`h-3 rounded-full transition-all ${seuilColor}`} style={{width:`${Math.min(100,Math.round(stats.seuilRatio*100))}%`}}/>
        </div>
        <div className="flex justify-between text-xs text-gray-500 mb-3">
          <span>{fmt(stats.caAnnuelTotal)} CA annuel</span>
          <span>Seuil: {fmt(stats.seuil)}</span>
        </div>
        {stats.seuilRatio >= 1 && <div className="bg-red-50 border border-red-200 rounded-lg px-3 py-2 text-xs text-red-700 font-medium mb-2">🚨 Seuil auto-entrepreneur DÉPASSÉ !</div>}
        {stats.seuilRatio >= 0.9 && stats.seuilRatio < 1 && <div className="bg-amber-50 border border-amber-200 rounded-lg px-3 py-2 text-xs text-amber-700 font-medium mb-2">⚡ Attention: 90% du seuil atteint</div>}
        <div className="text-xs text-gray-500">URSSAF estimé: <span className="font-semibold text-gray-700">{fmt(stats.urssafEstimate)}</span></div>
      </div>

      {/* Objectifs CA */}
      {(stats.objMicka > 0 || stats.objCesar > 0) && (
        <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-5">
          <h2 className="text-base font-semibold text-gray-800 mb-4">🎯 Objectifs CA Annuels</h2>
          <div className="space-y-4">
            {stats.objMicka > 0 && (() => {
              const ratio = Math.min(1, stats.mickaCaAnnuel/stats.objMicka);
              return (
                <div>
                  <div className="flex justify-between mb-1"><span className="text-sm font-medium text-indigo-700">Micka</span><span className="text-sm text-gray-600">{fmt(stats.mickaCaAnnuel)} / {fmt(stats.objMicka)}</span></div>
                  <div className="w-full bg-gray-100 rounded-full h-2"><div className="h-2 rounded-full bg-indigo-500 transition-all" style={{width:`${Math.round(ratio*100)}%`}}/></div>
                  <div className="text-xs text-gray-400 mt-1">{Math.round(ratio*100)}% de l'objectif</div>

            </div>
            <div className="w-full bg-gray-100 rounded-full h-2">
              <div className={`h-2 rounded-full transition-all ${stats.netMicka >= 0 ? 'bg-indigo-500' : 'bg-indigo-300'}`} style={{width:`${wMicka}%`}}/>
            </div>
          </div>
          <div>
            <div className="flex justify-between items-center mb-1">
              <span className="text-sm font-medium text-emerald-700">César</span>
              <span className={`text-sm font-bold ${stats.netCesar >= 0 ? 'text-emerald-700' : 'text-red-500'}`}>{fmt(stats.netCesar)}</span>
            </div>
            <div className="w-full bg-gray-100 rounded-full h-2">
              <div className={`h-2 rounded-full transition-all ${stats.netCesar >= 0 ? 'bg-emerald-500' : 'bg-emerald-300'}`} style={{width:`${wCesar}%`}}/>

          </div>
          </>);
          })()}
          <div className="flex items-center justify-between pt-2 border-t border-gray-100">
            <span className="text-xs text-gray-500">Écart duo: {fmt(stats.ecart)}</span>
            {stats.recommended && (

                      <td className="py-2.5 pr-3 text-gray-600">{fmt(c.montant)}</td>
                      <td className="py-2.5 pr-3 text-green-600 font-medium">{fmt(c.totalPaid)}</td>
                      <td className="py-2.5 pr-3 font-bold text-amber-600">{fmt(c.resteC)}</td>

      {/* Dossiers urgents */}
      <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-5">
        <h2 className="text-base font-semibold text-gray-800 mb-4">🔥 Dossiers urgents</h2>
        {stats.urgent.length === 0 ? <EmptyState message="Aucun dossier urgent" icon="✅"/> : (
          <div className="space-y-3">
            {stats.urgent.map(c => {
              const ps = calcPaymentStatus(c.montant, c.payments);
              return (
                <div key={c.id} onClick={() => onNavigate('contracts', {id:c.id, tab:'paiements'})}
                  className="flex items-center justify-between p-3 rounded-xl border border-gray-100 hover:bg-gray-50 cursor-pointer transition-colors">

                    <div className="text-sm font-medium text-gray-800">{c.client}</div>

                    <StatusBadge status={ps}/>

        )}
      </div>
    </div>
  );
}

function QuoteModal({open, onClose, quote, clients, onSave, onDelete, onConvert}) {
  const [form, setForm] = React.useState({});
  const [confirmDelete, setConfirmDelete] = React.useState(false);
  const addToast = useToast();

  React.useEffect(() => {
    if(open) {
      if(quote) setForm({...quote});
      else setForm({id:null, clientId:'', client:'', prestation:'', montant:'', assignedTo:'Micka', statut:'Brouillon', dateCreation:todayStr(), dateExpiration:'', typePaiement:'Virement', notes:''});
    }
  }, [open, quote]);

  const setF = (k,v) => setForm(f=>({...f,[k]:v}));

  const handleClientSelect = (e) => {
    const cl = clients.find(c=>c.id===e.target.value);
    if(cl) setF('client', cl.entreprise); else setF('client','');

  };

  const handleSave = () => {
    if(!form.client.trim()) { addToast('Client requis','error'); return; }

  return (
    <Modal open={open} onClose={onClose} title={form.id?`Devis – ${form.client}`:'Nouveau devis'} size="lg">

        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label className="block text-xs font-medium text-gray-600 mb-1">Client *</label>

              <option value="">— Sélectionner —</option>
              {clients.map(c=><option key={c.id} value={c.id}>{c.entreprise} – {c.nom}</option>)}

          </div>
          <div>
            <label className="block text-xs font-medium text-gray-600 mb-1">Prestation *</label>
            <input className={inputCls} value={form.prestation||''} onChange={e=>setF('prestation',e.target.value)} placeholder="Description"/>

          </div>
          <div>
            <label className="block text-xs font-medium text-gray-600 mb-1">Attribué à</label>
            <select className={selectCls} value={form.assignedTo||'Micka'} onChange={e=>setF('assignedTo',e.target.value)}>{ASSIGNEES.map(a=><option key={a}>{a}</option>)}</select>

          <div>
            <label className="block text-xs font-medium text-gray-600 mb-1">Date d'expiration</label>
            <input className={inputCls} type="date" value={form.dateExpiration||''} onChange={e=>setF('dateExpiration',e.target.value)}/>
          </div>
        </div>
        <div>

function QuotesModule({data, setData, onNavigate}) {
  const [modalOpen, setModalOpen] = React.useState(false);
  const [selected, setSelected] = React.useState(null);
  const [search, setSearch] = React.useState('');
  const [statusFilter, setStatusFilter] = React.useState('Tous');
  const [page, setPage] = React.useState(1);
  const PER_PAGE = 20;
  const addToast = useToast();

  const filtered = React.useMemo(() => {
    return (data.quotes||[]).filter(q=>{
      if(statusFilter!=='Tous' && q.statut!==statusFilter) return false;
      if(search && !normalize(q.client).includes(normalize(search)) && !normalize(q.prestation||'').includes(normalize(search))) return false;
      return true;
    }).sort((a,b)=>new Date(b.dateCreation||0)-new Date(a.dateCreation||0));
  }, [data.quotes, search, statusFilter]);

  const paginated = filtered.slice((page-1)*PER_PAGE, page*PER_PAGE);

  const handleSave = (form) => {
    if(form.id) {
      setData(d=>({...d, quotes:d.quotes.map(q=>q.id===form.id?form:q)}));
      addToast('Devis mis à jour','success');
    } else {
      setData(d=>({...d, quotes:[...d.quotes, {...form, id:genId()}]}));
      addToast('Devis créé','success');
    }
  };

  const handleDelete = (id) => {
    setData(d=>({...d, quotes:d.quotes.filter(q=>q.id!==id)}));
    addToast('Devis supprimé','success');
  };

  const handleConvert = (quote) => {
    const newContract = {
      id: genId(), clientId: quote.clientId||'', client: quote.client, prestation: quote.prestation||'',
      montant: quote.montant, assignedTo: quote.assignedTo||'Micka', statut: 'En cours',
      dateSignature: todayStr(), dateDebut: todayStr(), dateFin: '', typePaiement: quote.typePaiement||'Virement',
      montantOPCO: '', statutOPCO: 'En attente', notes: quote.notes||'', payments: [], actions: []
    };
    setData(d=>({
      ...d,
      contracts: [...d.contracts, newContract],
      quotes: d.quotes.map(q=>q.id===quote.id ? {...q, statut:'Accepté'} : q)
    }));
    addToast('Devis converti en contrat !','success');
    onNavigate('contracts', {id: newContract.id});
  };

  const txTotal = (data.quotes||[]).filter(q=>q.statut!=='Refusé'&&q.statut!=='Expiré').reduce((s,q)=>s+(Number(q.montant)||0),0);
  const txAccepte = (data.quotes||[]).filter(q=>q.statut==='Accepté').reduce((s,q)=>s+(Number(q.montant)||0),0);
  const txEnvoye = (data.quotes||[]).filter(q=>q.statut==='Envoyé').length;
  const tauxConv = (data.quotes||[]).length > 0 ? Math.round((data.quotes||[]).filter(q=>q.statut==='Accepté').length / Math.max((data.quotes||[]).filter(q=>q.statut!=='Brouillon').length,1) * 100) : 0;

  return (
    <div className="space-y-6">
      <div className="flex items-center justify-between">
        <h1 className="text-2xl font-bold text-gray-800">Devis</h1>
        <Btn variant="primary" onClick={()=>{setSelected(null);setModalOpen(true);}}>+ Nouveau devis</Btn>
      </div>
      <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
        <KPICard label="Pipeline devis" value={fmt(txTotal)} color="blue" icon="📋"/>
        <KPICard label="Acceptés" value={fmt(txAccepte)} color="green" icon="✅"/>
        <KPICard label="En attente" value={`${txEnvoye} devis`} color="amber" icon="⏳"/>
        <KPICard label="Taux conversion" value={`${isNaN(tauxConv)?0:tauxConv}%`} color="purple" icon="🎯"/>
      </div>
      <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-4 flex flex-wrap gap-3 items-center">
        <div className="flex gap-2 flex-wrap">
          {['Tous',...QUOTE_STATUSES].map(s=>(
            <button key={s} onClick={()=>{setStatusFilter(s);setPage(1);}} className={`px-3 py-1.5 rounded-full text-xs font-medium transition-colors ${statusFilter===s?'bg-blue-600 text-white':'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}>{s}</button>
          ))}
        </div>
        <input className={`${inputCls} w-52 ml-auto`} placeholder="Rechercher..." value={search} onChange={e=>{setSearch(e.target.value);setPage(1);}}/>
      </div>
      {filtered.length===0 ? <EmptyState message="Aucun devis" icon="📋"/> : (
        <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
          <div className="hidden md:block overflow-x-auto">
            <table className="w-full text-sm">
              <thead className="bg-gray-50 border-b border-gray-100">
                <tr>{['Client','Prestation','Montant','Attribué','Statut','Créé','Expiration',''].map(h=><th key={h} className="text-left text-xs font-semibold text-gray-500 px-4 py-3">{h}</th>)}</tr>
              </thead>
              <tbody>
                {paginated.map(q=>(
                  <tr key={q.id} onClick={()=>{setSelected(q);setModalOpen(true);}} className="border-b border-gray-50 hover:bg-gray-50 cursor-pointer">
                    <td className="px-4 py-3 font-medium text-gray-800">{q.client}</td>
                    <td className="px-4 py-3 text-gray-600 max-w-[180px] truncate">{q.prestation}</td>
                    <td className="px-4 py-3 font-semibold">{fmt(q.montant)}</td>
                    <td className="px-4 py-3"><StatusBadge status={q.assignedTo}/></td>
                    <td className="px-4 py-3"><StatusBadge status={q.statut}/></td>
                    <td className="px-4 py-3 text-xs text-gray-500">{formatDate(q.dateCreation)}</td>
                    <td className="px-4 py-3 text-xs text-gray-500">{q.dateExpiration?formatDate(q.dateExpiration):'—'}</td>
                    <td className="px-4 py-3"><button className="text-blue-500 text-xs font-medium">Ouvrir →</button></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          <div className="md:hidden space-y-3 p-4">
            {paginated.map(q=>(
              <div key={q.id} onClick={()=>{setSelected(q);setModalOpen(true);}} className="flex items-center justify-between p-3 bg-gray-50 rounded-xl cursor-pointer">
                <div><div className="text-sm font-medium">{q.client}</div><div className="text-xs text-gray-400">{q.prestation} · {formatDate(q.dateCreation)}</div></div>
                <div className="flex items-center gap-2"><StatusBadge status={q.statut}/><span className="text-sm font-bold text-blue-700">{fmt(q.montant)}</span></div>
              </div>
            ))}
          </div>
          <div className="px-4 pb-3"><Pagination total={filtered.length} page={page} perPage={PER_PAGE} onChange={setPage}/></div>
        </div>
      )}
      <QuoteModal open={modalOpen} onClose={()=>{setModalOpen(false);setSelected(null);}} quote={selected} clients={data.clients} onSave={handleSave} onDelete={handleDelete} onConvert={handleConvert}/>
    </div>
  );
}

function InvoicesModule({data, setData}) {

  const genNumber = () => {
    const year = new Date().getFullYear();
    const existing = (data.invoices||[]).filter(i=>i.number&&i.number.startsWith(String(year)));
    const max = existing.reduce((m,i)=>{const n=parseInt(i.number.split('-')[1]||0);return n>m?n:m;},0);
    return `${year}-${String(max+1).padStart(3,'0')}`;
  };

  const filtered = React.useMemo(()=>(data.invoices||[]).filter(i=>{
    if(statusFilter!=='Tous'&&i.statut!==statusFilter) return false;

    return true;
  }).sort((a,b)=>new Date(b.dateEmission||0)-new Date(a.dateEmission||0)), [data.invoices, statusFilter, search]);

  const totalRetard = (data.invoices||[]).filter(i=>i.statut==='En retard').reduce((s,i)=>s+(Number(i.montant)||0),0);

function QuickClientCreate({onCreated, clients}) {
  const [form, setForm] = React.useState({entreprise:'', nom:''});
  const [duplicate, setDuplicate] = React.useState(null);
  const addToast = useToast();

  const handleCreate = (force=false) => {
    if(!form.entreprise.trim() || !form.nom.trim()) { addToast('Entreprise et nom requis','error'); return; }
    if(!force) {
      const dup = clients.find(c => normalize(c.entreprise)===normalize(form.entreprise));
      if(dup) { setDuplicate(dup); return; }
    }
    const nc = {id:genId(), entreprise:form.entreprise.trim(), nom:form.nom.trim(), email:'', telephone:'', source:'Autre', etape:'Contact', potentiel:0, notes:'', dateEntree:todayStr()};
    onCreated(nc);
    setForm({entreprise:'', nom:''});
    setDuplicate(null);
  };

  return (
    <div className="bg-blue-50 border border-blue-200 rounded-xl p-4 mt-2 space-y-3">
      <div className="text-xs font-semibold text-blue-700 mb-2">Créer un nouveau client</div>
      <div className="grid grid-cols-2 gap-3">
        <div>
          <label className="block text-xs font-medium text-gray-600 mb-1">Entreprise *</label>
          <input className={inputCls} value={form.entreprise} onChange={e=>setForm(f=>({...f,entreprise:e.target.value}))} placeholder="Nom entreprise"/>
        </div>
        <div>
          <label className="block text-xs font-medium text-gray-600 mb-1">Nom contact *</label>
          <input className={inputCls} value={form.nom} onChange={e=>setForm(f=>({...f,nom:e.target.value}))} placeholder="Prénom Nom"/>
        </div>
      </div>
      {duplicate && (
        <div className="bg-amber-50 border border-amber-200 rounded-lg p-3">
          <div className="text-xs text-amber-700 font-medium mb-2">⚠️ Client existant: {duplicate.entreprise} ({duplicate.nom})</div>
          <div className="flex gap-2">
            <Btn size="sm" variant="outline" onClick={() => { onCreated(duplicate, true); setDuplicate(null); }}>Utiliser l'existant</Btn>
            <Btn size="sm" variant="secondary" onClick={() => handleCreate(true)}>Créer quand même</Btn>
          </div>
        </div>
      )}
      {!duplicate && <Btn size="sm" variant="primary" onClick={() => handleCreate()}>Créer</Btn>}
    </div>
  );
}

function ContractsModule({data, setData, deepLink, clearDeepLink}) {
  const addToast = useToast();
  const [statusFilter, setStatusFilter] = React.useState('Tous');
  const [search, setSearch] = React.useState('');
  const [selectedContract, setSelectedContract] = React.useState(null);
  const [modalOpen, setModalOpen] = React.useState(false);
  const [modalTab, setModalTab] = React.useState('infos');
  const [sortKey, setSortKey] = React.useState('dateSignature');
  const [sortDir, setSortDir] = React.useState('desc');

  React.useEffect(() => {
    if(deepLink) {
      if(deepLink.id) {
        const c = data.contracts.find(x => x.id===deepLink.id);
        if(c) { setSelectedContract(c); setModalTab(deepLink.tab||'infos'); setModalOpen(true); }
      } else if(deepLink.clientId || deepLink.client) {
        setSelectedContract({clientId:deepLink.clientId||'', client:deepLink.client||''});
        setModalTab('infos');
        setModalOpen(true);
      }
      clearDeepLink();
    }
  }, [deepLink]);

  const handleSort = (key) => {
    if(sortKey===key) setSortDir(d=>d==='asc'?'desc':'asc');
    else { setSortKey(key); setSortDir('desc'); }
  };

  const handleExportCSV = () => {
    const rows = [['Client','Prestation','Montant','Attribué','Statut','Type Paiement','Date Signature','Encaissé','Reste']];
    (data.contracts||[]).forEach(c=>{
      const paid=(c.payments||[]).reduce((s,p)=>s+(Number(p.montant)||0),0);
      rows.push([c.client,c.prestation,c.montant,c.assignedTo,c.statut,c.typePaiement||'',c.dateSignature||'',paid,(Number(c.montant)||0)-paid]);
    });
    exportCSV(rows, `contrats_${todayStr()}.csv`);
    addToast('Export CSV téléchargé','success');
  };

  const filtered = React.useMemo(() => {
    return data.contracts.filter(c => {
      if(statusFilter !== 'Tous' && c.statut !== statusFilter) return false;
      if(search) {
        const q = normalize(search);
        if(!normalize(c.client).includes(q) && !normalize(c.prestation).includes(q)) return false;
      }
      return true;
    }).sort((a,b)=>{
      const mult = sortDir==='asc'?1:-1;
      if(sortKey==='montant') return mult*(Number(a.montant||0)-Number(b.montant||0));
      if(sortKey==='client') return mult*a.client.localeCompare(b.client);
      if(sortKey==='dateSignature') return mult*(new Date(a.dateSignature||a.dateDebut||0)-new Date(b.dateSignature||b.dateDebut||0));
      return 0;
    });
  }, [data.contracts, statusFilter, search, sortKey, sortDir]);

  const totals = React.useMemo(() => {
    const nonAnnule = filtered.filter(c => c.statut !== 'Annulé');
    const signe = nonAnnule.reduce((s,c)=>s+(Number(c.montant)||0),0);
    const encaisse = nonAnnule.reduce((s,c)=>s+(c.payments||[]).reduce((ps,p)=>ps+(Number(p.montant)||0),0),0);
    return {signe, encaisse, reste:signe-encaisse};
  }, [filtered]);

  const openContract = (c) => { setSelectedContract(c); setModalTab('infos'); setModalOpen(true); };
  const openNew = () => { setSelectedContract(null); setModalTab('infos'); setModalOpen(true); };

  const handleSave = (form) => {
    const {_newClient, ...cData} = form;
    let newClients = [...data.clients];
    if(_newClient && !newClients.find(c=>c.id===_newClient.id)) {
      newClients = [...newClients, _newClient];
    }
    let newContracts;
    if(cData.id) {
      newContracts = data.contracts.map(c => c.id===cData.id ? {...cData, montant:Number(cData.montant)||0} : c);
      addToast('Contrat mis à jour','success');
    } else {
      newContracts = [...data.contracts, {...cData, id:genId(), montant:Number(cData.montant)||0}];
      addToast('Contrat créé','success');
    }
    setData(d => ({...d, contracts:newContracts, clients:newClients}));
  };

  const handleDelete = (id) => {
    setData(d => ({...d, contracts:d.contracts.filter(c=>c.id!==id)}));
    addToast('Contrat supprimé','success');
  };

  const currentContract = modalOpen ? (selectedContract?.id ? data.contracts.find(c=>c.id===selectedContract.id)||selectedContract : selectedContract) : null;

  return (
    <div className="space-y-4">
      <div className="flex items-center justify-between">
        <h1 className="text-2xl font-bold text-gray-800">Contrats</h1>
        <div className="flex gap-2">
          <Btn variant="outline" size="sm" onClick={handleExportCSV}>⬇️ CSV</Btn>
          <Btn variant="primary" onClick={openNew}>+ Nouveau contrat</Btn>
        </div>
      </div>

      {/* Filters */}
      <div className="flex flex-wrap gap-3 items-center">
        <div className="flex gap-1 flex-wrap">
          {['Tous', ...CONTRACT_STATUSES].map(s => (
            <button key={s} onClick={()=>setStatusFilter(s)}
              className={`px-3 py-1.5 rounded-full text-xs font-medium transition-colors ${statusFilter===s ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}>
              {s}
            </button>
          ))}
        </div>
        <input className={`${inputCls} max-w-xs`} value={search} onChange={e=>setSearch(e.target.value)} placeholder="Rechercher client, prestation..."/>
      </div>

      {/* Totals */}
      <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
        <KPICard label="Total signé" value={fmt(totals.signe)} color="blue"/>
        <KPICard label="Encaissé" value={fmt(totals.encaisse)} color="green"/>
        <KPICard label="Reste" value={fmt(totals.reste)} color="amber"/>
      </div>

      {/* Table / Cards */}
      {filtered.length === 0 ? <EmptyState message="Aucun contrat trouvé" icon="📄"/> : (<>
        {/* Desktop Table */}
        <div className="hidden md:block bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
          <table className="w-full text-sm">
            <thead className="bg-gray-50 border-b border-gray-100">
              <tr>
                {[{label:'Client',key:'client'},{label:'Prestation',key:null},{label:'Montant',key:'montant'},{label:'Attribué',key:null},{label:'Statut',key:null},{label:'Paiement',key:null},{label:'Type paie.',key:null},{label:'Signature',key:'dateSignature'},{label:'',key:null}].map(h=>(
                  <th key={h.label} onClick={h.key?()=>handleSort(h.key):undefined} className={`text-left text-xs font-semibold text-gray-500 px-4 py-3 ${h.key?'cursor-pointer hover:text-gray-800 select-none':''}`}>
                    {h.label}{h.key&&sortKey===h.key?(sortDir==='asc'?' ↑':' ↓'):''}
                  </th>
                ))}
              </tr>
            </thead>
            <tbody>
              {filtered.map(c => {
                const ps = calcPaymentStatus(c.montant, c.payments);
                const totalPaid = (c.payments||[]).reduce((s,p)=>s+(Number(p.montant)||0),0);
                const isSurpaye = totalPaid > (Number(c.montant)||0) && (Number(c.montant)||0) > 0;
                const isOPCO = c.typePaiement==='OPCO'||c.typePaiement==='Virement + OPCO';
                return (
                  <tr key={c.id} onClick={()=>openContract(c)} className="border-b border-gray-50 hover:bg-gray-50 cursor-pointer transition-colors">
                    <td className="px-4 py-3 font-medium text-gray-800">{c.client}</td>
                    <td className="px-4 py-3 text-gray-600 max-w-[180px] truncate">{c.prestation}</td>
                    <td className="px-4 py-3 font-semibold">{fmt(c.montant)}</td>
                    <td className="px-4 py-3"><StatusBadge status={c.assignedTo}/></td>
                    <td className="px-4 py-3"><StatusBadge status={c.statut}/></td>
                    <td className="px-4 py-3"><StatusBadge status={isSurpaye ? 'Surpayé' : ps}/></td>
                    <td className="px-4 py-3">
                      {c.typePaiement && <StatusBadge status={c.typePaiement}/>}
                      {isOPCO && c.statutOPCO && <span className="ml-1"><StatusBadge status={c.statutOPCO}/></span>}
                    </td>
                    <td className="px-4 py-3 text-xs text-gray-500">{c.dateSignature ? formatDate(c.dateSignature) : '—'}</td>
                    <td className="px-4 py-3"><button className="text-blue-500 hover:text-blue-700 text-xs font-medium">Ouvrir →</button></td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>

        {/* Mobile Cards */}
        <div className="md:hidden space-y-3">
          {filtered.map(c => {
            const ps = calcPaymentStatus(c.montant, c.payments);
            const isOPCO = c.typePaiement==='OPCO'||c.typePaiement==='Virement + OPCO';
            return (
              <div key={c.id} onClick={()=>openContract(c)} className="bg-white rounded-xl p-4 shadow-sm border border-gray-100 cursor-pointer">
                <div className="flex justify-between items-start mb-2">
                  <div>
                    <div className="font-semibold text-gray-800">{c.client}</div>
                    <div className="text-xs text-gray-500 mt-0.5">{c.prestation}</div>
                    {c.dateSignature && <div className="text-xs text-gray-400 mt-0.5">Signé le {formatDate(c.dateSignature)}</div>}
                  </div>
                  <div className="text-base font-bold text-blue-700">{fmt(c.montant)}</div>
                </div>
                <div className="flex flex-wrap gap-1.5">
                  <StatusBadge status={c.assignedTo}/>
                  <StatusBadge status={c.statut}/>
                  <StatusBadge status={ps}/>
                  {c.typePaiement && <StatusBadge status={c.typePaiement}/>}
                  {isOPCO && c.statutOPCO && <StatusBadge status={c.statutOPCO}/>}
                  <ExpiryBadge dateFin={c.dateFin} statut={c.statut}/>
                </div>
              </div>
            );
          })}
        </div>
      </>)}

      <ContractModal
        open={modalOpen}
        onClose={()=>{setModalOpen(false);setSelectedContract(null);}}
        contract={currentContract?.id ? currentContract : null}
        clients={data.clients}
        onSave={handleSave}
        onDelete={handleDelete}
        defaultTab={modalTab}
      />
    </div>
  );
}

function ClientModal({open, onClose, client, contracts, onSave, onDelete, onNavigate}) {
  const [tab, setTab] = React.useState('infos');
  const [editing, setEditing] = React.useState(false);
  const [form, setForm] = React.useState({});
  const [confirmDelete, setConfirmDelete] = React.useState(false);
  const addToast = useToast();

  React.useEffect(() => {
    if(open && client) {
      setForm({...client});
      setEditing(false);
      setTab('infos');
    }
  }, [open, client]);

  const linkedContracts = React.useMemo(() => {
    if(!client) return [];
    return contracts.filter(c => c.clientId===client.id || normalize(c.client)===normalize(client.entreprise));
  }, [client, contracts]);

  const timeline = React.useMemo(() => {
    const events = [];
    if(client?.dateEntree) events.push({date:client.dateEntree, label:'Entrée CRM', type:'crm'});
    linkedContracts.forEach(c => {
      if(c.dateDebut) events.push({date:c.dateDebut, label:`Contrat: ${c.prestation}`, type:'contract', id:c.id});
    });
    return events.sort((a,b) => new Date(b.date)-new Date(a.date));
  }, [client, linkedContracts]);

  const caGenere = linkedContracts.filter(c=>c.statut!=='Annulé').reduce((s,c)=>s+(Number(c.montant)||0),0);

  const handleSave = () => {
    onSave({...form, potentiel:Number(form.potentiel)||0});
    setEditing(false);
    addToast('Client mis à jour','success');
  };

  const tabs = [{id:'infos',label:'Infos'},{id:'contrats',label:`Contrats (${linkedContracts.length})`},{id:'chrono',label:'Chronologie'}];

  return (
    <Modal open={open} onClose={onClose} title={client?.entreprise||'Client'} size="md">
      <Tabs tabs={tabs} active={tab} onChange={setTab}/>
      {tab==='infos' && (
        <div className="space-y-4">
          {!editing ? (
            <>
              <div className="grid grid-cols-2 gap-4 text-sm">
                <div><span className="text-gray-500">Entreprise:</span> <span className="font-medium">{form.entreprise}</span></div>
                <div><span className="text-gray-500">Contact:</span> <span className="font-medium">{form.nom}</span></div>
                <div><span className="text-gray-500">Email:</span> <span className="font-medium">{form.email||'—'}</span></div>
                <div><span className="text-gray-500">Tél:</span> <span className="font-medium">{form.telephone||'—'}</span></div>
                <div><span className="text-gray-500">Source:</span> <StatusBadge status={form.source}/></div>
                <div><span className="text-gray-500">Étape:</span> <StatusBadge status={form.etape}/></div>
                <div><span className="text-gray-500">Potentiel:</span> <span className="font-semibold text-blue-700">{fmt(form.potentiel)}</span></div>
                <div><span className="text-gray-500">CA généré:</span> <span className="font-semibold text-green-700">{fmt(caGenere)}</span></div>
              </div>
              {form.notes && <div className="text-sm text-gray-600 bg-gray-50 rounded-lg p-3">{form.notes}</div>}
              <div className="flex justify-between pt-2">
                <Btn variant="danger" size="sm" onClick={()=>setConfirmDelete(true)}>Supprimer</Btn>
                <Btn variant="outline" size="sm" onClick={()=>setEditing(true)}>Modifier</Btn>
              </div>
            </>
          ) : (
            <div className="space-y-3">
              <div className="grid grid-cols-2 gap-3">
                <div><label className="block text-xs font-medium text-gray-600 mb-1">Entreprise</label><input className={inputCls} value={form.entreprise||''} onChange={e=>setForm(f=>({...f,entreprise:e.target.value}))}/></div>
                <div><label className="block text-xs font-medium text-gray-600 mb-1">Nom contact</label><input className={inputCls} value={form.nom||''} onChange={e=>setForm(f=>({...f,nom:e.target.value}))}/></div>
                <div><label className="block text-xs font-medium text-gray-600 mb-1">Email</label><input className={inputCls} type="email" value={form.email||''} onChange={e=>setForm(f=>({...f,email:e.target.value}))}/></div>
                <div><label className="block text-xs font-medium text-gray-600 mb-1">Téléphone</label><input className={inputCls} value={form.telephone||''} onChange={e=>setForm(f=>({...f,telephone:e.target.value}))}/></div>
                <div><label className="block text-xs font-medium text-gray-600 mb-1">Source</label><select className={selectCls} value={form.source||'Autre'} onChange={e=>setForm(f=>({...f,source:e.target.value}))}>{SOURCES.map(s=><option key={s}>{s}</option>)}</select></div>
                <div><label className="block text-xs font-medium text-gray-600 mb-1">Étape</label><select className={selectCls} value={form.etape||'Contact'} onChange={e=>setForm(f=>({...f,etape:e.target.value}))}>{CRM_STAGES.map(s=><option key={s}>{s}</option>)}</select></div>
                <div><label className="block text-xs font-medium text-gray-600 mb-1">Potentiel (€)</label><input className={inputCls} type="number" value={form.potentiel||''} onChange={e=>setForm(f=>({...f,potentiel:e.target.value}))}/></div>
              </div>
              <div><label className="block text-xs font-medium text-gray-600 mb-1">Notes</label><textarea className={textareaCls} rows={3} value={form.notes||''} onChange={e=>setForm(f=>({...f,notes:e.target.value}))}/></div>
              <div className="flex gap-2 justify-end">
                <Btn variant="secondary" size="sm" onClick={()=>setEditing(false)}>Annuler</Btn>
                <Btn variant="primary" size="sm" onClick={handleSave}>Enregistrer</Btn>
              </div>
            </div>
          )}
        </div>
      )}
      {tab==='contrats' && (
        <div className="space-y-3">
          {linkedContracts.length===0 ? <EmptyState message="Aucun contrat lié" icon="📄"/> : (
            linkedContracts.map(c => {
              const ps = calcPaymentStatus(c.montant, c.payments);
              return (
                <div key={c.id} className="flex items-center justify-between p-3 bg-gray-50 rounded-xl border border-gray-100">
                  <div>
                    <div className="text-sm font-medium text-gray-800">{c.prestation}</div>
                    <div className="text-xs text-gray-500 mt-0.5">{fmt(c.montant)}</div>
                  </div>
                  <div className="flex gap-1.5"><StatusBadge status={c.statut}/><StatusBadge status={ps}/></div>
                </div>
              );
            })
          )}
          <Btn size="sm" variant="outline" onClick={()=>{onClose();onNavigate('contracts',{clientId:client.id,client:client.entreprise});}}>
            + Créer un contrat
          </Btn>
        </div>
      )}
      {tab==='chrono' && (
        <div className="space-y-2">
          {timeline.length===0 ? <EmptyState message="Aucun événement" icon="📅"/> : (
            timeline.map((ev, i) => (
              <div key={i} className="flex items-center gap-3 p-3 bg-gray-50 rounded-xl border border-gray-100">
                <div className={`w-2 h-2 rounded-full flex-shrink-0 ${ev.type==='crm'?'bg-blue-400':'bg-green-400'}`}/>
                <div className="flex-1">
                  <div className="text-sm font-medium text-gray-800">{ev.label}</div>
                  <div className="text-xs text-gray-500">{formatDate(ev.date)}</div>
                </div>
              </div>
            ))
          )}
        </div>
      )}
      <ConfirmModal open={confirmDelete} onClose={()=>setConfirmDelete(false)} onConfirm={()=>{onDelete(client.id);onClose();}} title="Supprimer le client" message="Cette action est irréversible."/>
    </Modal>
  );
}

function CRMModule({data, setData, onNavigate}) {
  const addToast = useToast();
  const [view, setView] = React.useState('liste');
  const [search, setSearch] = React.useState('');
  const [selectedClient, setSelectedClient] = React.useState(null);
  const [modalOpen, setModalOpen] = React.useState(false);
  const [newClientModal, setNewClientModal] = React.useState(false);
  const [newForm, setNewForm] = React.useState({entreprise:'',nom:'',email:'',telephone:'',source:'Autre',etape:'Contact',potentiel:'',notes:'',dateEntree:todayStr()});

  const filtered = React.useMemo(() => {
    if(!search) return data.clients;
    const q = normalize(search);
    return data.clients.filter(c => normalize(c.entreprise).includes(q)||normalize(c.nom).includes(q));
  }, [data.clients, search]);

  const getCA = (cl) => {
    return data.contracts.filter(c=>(c.clientId===cl.id||normalize(c.client)===normalize(cl.entreprise))&&c.statut!=='Annulé').reduce((s,c)=>s+(Number(c.montant)||0),0);
  };

  const openClient = (cl) => { setSelectedClient(cl); setModalOpen(true); };

  const handleSave = (updated) => {
    setData(d => ({...d, clients:d.clients.map(c=>c.id===updated.id?updated:c)}));
  };

  const handleDelete = (id) => {
    setData(d => ({...d, clients:d.clients.filter(c=>c.id!==id)}));
    addToast('Client supprimé','success');
  };

  const handleCreate = () => {
    if(!newForm.entreprise.trim()||!newForm.nom.trim()) { addToast('Entreprise et nom requis','error'); return; }
    const nc = {...newForm, id:genId(), potentiel:Number(newForm.potentiel)||0, dateEntree:newForm.dateEntree||todayStr()};
    setData(d => ({...d, clients:[...d.clients, nc]}));
    setNewClientModal(false);
    setNewForm({entreprise:'',nom:'',email:'',telephone:'',source:'Autre',etape:'Contact',potentiel:'',notes:'',dateEntree:todayStr()});
    addToast('Client créé','success');
  };

  const pipelineStages = CRM_STAGES.filter(s=>s!=='Client');

  return (
    <div className="space-y-4">
      <div className="flex items-center justify-between">
        <h1 className="text-2xl font-bold text-gray-800">CRM</h1>
        <div className="flex gap-2">
          <div className="flex bg-gray-100 rounded-lg p-1">
            <button onClick={()=>setView('liste')} className={`px-3 py-1 text-xs font-medium rounded ${view==='liste'?'bg-white shadow text-gray-800':'text-gray-500'}`}>Liste</button>
            <button onClick={()=>setView('pipeline')} className={`px-3 py-1 text-xs font-medium rounded ${view==='pipeline'?'bg-white shadow text-gray-800':'text-gray-500'}`}>Pipeline</button>
          </div>
          <Btn variant="primary" onClick={()=>setNewClientModal(true)}>+ Nouveau client</Btn>
        </div>
      </div>

      {view==='liste' && (<>
        <input className={`${inputCls} max-w-sm`} value={search} onChange={e=>setSearch(e.target.value)} placeholder="Rechercher entreprise, nom..."/>
        {filtered.length===0 ? <EmptyState message="Aucun client trouvé" icon="👥"/> : (<>
          {/* Desktop */}
          <div className="hidden md:block bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
            <table className="w-full text-sm">
              <thead className="bg-gray-50 border-b border-gray-100">
                <tr>{['Entreprise','Nom','Source','Étape','Potentiel','CA généré','Entrée',''].map(h=>(
                  <th key={h} className="text-left text-xs font-semibold text-gray-500 px-4 py-3">{h}</th>
                ))}</tr>
              </thead>
              <tbody>
                {filtered.map(cl => (
                  <tr key={cl.id} onClick={()=>openClient(cl)} className="border-b border-gray-50 hover:bg-gray-50 cursor-pointer transition-colors">
                    <td className="px-4 py-3 font-medium text-gray-800">{cl.entreprise}</td>
                    <td className="px-4 py-3 text-gray-600">{cl.nom}</td>
                    <td className="px-4 py-3"><StatusBadge status={cl.source}/></td>
                    <td className="px-4 py-3"><StatusBadge status={cl.etape}/></td>
                    <td className="px-4 py-3 font-semibold">{fmt(cl.potentiel)}</td>
                    <td className="px-4 py-3 text-green-700 font-semibold">{fmt(getCA(cl))}</td>
                    <td className="px-4 py-3 text-gray-500 text-xs">{formatDate(cl.dateEntree)}</td>
                    <td className="px-4 py-3"><button className="text-blue-500 hover:text-blue-700 text-xs">Voir →</button></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          {/* Mobile */}
          <div className="md:hidden space-y-3">
            {filtered.map(cl => (
              <div key={cl.id} onClick={()=>openClient(cl)} className="bg-white rounded-xl p-4 shadow-sm border border-gray-100 cursor-pointer">
                <div className="flex justify-between mb-2">
                  <div>
                    <div className="font-semibold text-gray-800">{cl.entreprise}</div>
                    <div className="text-xs text-gray-500">{cl.nom}</div>
                  </div>
                  <div className="text-sm font-bold text-blue-700">{fmt(cl.potentiel)}</div>
                </div>
                <div className="flex gap-1.5 flex-wrap">
                  <StatusBadge status={cl.source}/><StatusBadge status={cl.etape}/>
                </div>
              </div>
            ))}
          </div>
        </>)}
      </>)}

      {view==='pipeline' && (
        <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
          {pipelineStages.map(stage => {
            const stageClients = data.clients.filter(c=>c.etape===stage);
            return (
              <div key={stage} className="bg-gray-50 rounded-2xl p-3">
                <div className="flex items-center justify-between mb-3">
                  <span className="text-xs font-semibold text-gray-600">{stage}</span>
                  <span className="text-xs bg-white px-1.5 py-0.5 rounded-full text-gray-500 shadow-sm">{stageClients.length}</span>
                </div>
                <div className="space-y-2">
                  {stageClients.map(cl => (
                    <div key={cl.id} onClick={()=>openClient(cl)} className="bg-white rounded-xl p-3 shadow-sm cursor-pointer hover:shadow-md transition-shadow border border-gray-100">
                      <div className="text-sm font-semibold text-gray-800 truncate">{cl.entreprise}</div>
                      <div className="text-xs text-gray-500 truncate mt-0.5">{cl.nom}</div>
                      <div className="text-xs font-semibold text-blue-700 mt-1">{fmt(cl.potentiel)}</div>
                    </div>
                  ))}
                  {stageClients.length===0 && <div className="text-center text-xs text-gray-300 py-4">Vide</div>}
                </div>
              </div>
            );
          })}
        </div>
      )}

      <ClientModal
        open={modalOpen}
        onClose={()=>{setModalOpen(false);setSelectedClient(null);}}
        client={selectedClient}
        contracts={data.contracts}
        onSave={handleSave}
        onDelete={handleDelete}
        onNavigate={onNavigate}
      />

      {/* New Client Modal */}
      <Modal open={newClientModal} onClose={()=>setNewClientModal(false)} title="Nouveau client" size="md">
        <div className="space-y-4">
          <div className="grid grid-cols-2 gap-3">
            <div><label className="block text-xs font-medium text-gray-600 mb-1">Entreprise *</label><input className={inputCls} value={newForm.entreprise} onChange={e=>setNewForm(f=>({...f,entreprise:e.target.value}))}/></div>
            <div><label className="block text-xs font-medium text-gray-600 mb-1">Nom contact *</label><input className={inputCls} value={newForm.nom} onChange={e=>setNewForm(f=>({...f,nom:e.target.value}))}/></div>
            <div><label className="block text-xs font-medium text-gray-600 mb-1">Email</label><input className={inputCls} type="email" value={newForm.email} onChange={e=>setNewForm(f=>({...f,email:e.target.value}))}/></div>
            <div><label className="block text-xs font-medium text-gray-600 mb-1">Téléphone</label><input className={inputCls} value={newForm.telephone} onChange={e=>setNewForm(f=>({...f,telephone:e.target.value}))}/></div>
            <div><label className="block text-xs font-medium text-gray-600 mb-1">Source</label><select className={selectCls} value={newForm.source} onChange={e=>setNewForm(f=>({...f,source:e.target.value}))}>{SOURCES.map(s=><option key={s}>{s}</option>)}</select></div>

function TaskCard({task, onMove, onEdit, onDelete}) {
  const isOverdue = task.echeance && task.statut !== 'Terminé' && new Date(task.echeance+'T23:59:59') < new Date();
  const statusOrder = ['À faire','En cours','Terminé'];
  const idx = statusOrder.indexOf(task.statut);
  const canLeft = idx > 0;
  const canRight = idx < statusOrder.length-1;

  return (
    <div className="bg-white rounded-xl p-3 shadow-sm border border-gray-100 space-y-2">
      <div className="text-sm font-medium text-gray-800 leading-snug">{task.titre}</div>
      {task.client && <div className="text-xs text-gray-400">{task.client}</div>}
      <div className="flex flex-wrap gap-1">
        <StatusBadge status={task.assignedTo}/>
        <StatusBadge status={task.priorite}/>
      </div>
      {task.echeance && (
        <div className={`text-xs font-medium ${isOverdue?'text-red-600':'text-gray-500'}`}>
          {isOverdue?'⚠ ':''}{formatDate(task.echeance)}
        </div>
      )}
      <div className="flex items-center justify-between pt-1 border-t border-gray-50">
        <div className="flex gap-1">
          {canLeft && <button onClick={()=>onMove(task,'left')} className="text-gray-300 hover:text-gray-600 text-sm px-1">←</button>}
          {canRight && <button onClick={()=>onMove(task,'right')} className="text-gray-300 hover:text-gray-600 text-sm px-1">→</button>}
        </div>
        <div className="flex gap-1">
          <button onClick={()=>onEdit(task)} className="text-gray-300 hover:text-blue-500 text-xs px-1">✏</button>
          <button onClick={()=>onDelete(task.id)} className="text-gray-300 hover:text-red-500 text-sm px-1">&times;</button>
        </div>
      </div>
    </div>
  );
}

function TasksModule({data, setData}) {
  const addToast = useToast();
  const [modalOpen, setModalOpen] = React.useState(false);
  const [selectedTask, setSelectedTask] = React.useState(null);
  const [confirmDelete, setConfirmDelete] = React.useState(null);

  const statusOrder = ['À faire','En cours','Terminé'];

  const moveTask = (task, dir) => {
    const idx = statusOrder.indexOf(task.statut);
    const newIdx = dir==='right' ? idx+1 : idx-1;
    if(newIdx<0||newIdx>=statusOrder.length) return;
    setData(d => ({...d, tasks:d.tasks.map(t=>t.id===task.id?{...t,statut:statusOrder[newIdx]}:t)}));
  };

  const handleSave = (form) => {
    if(form.id) {
      setData(d => ({...d, tasks:d.tasks.map(t=>t.id===form.id?form:t)}));
      addToast('Tâche mise à jour','success');
    } else {
      setData(d => ({...d, tasks:[...d.tasks, {...form, id:genId()}]}));
      addToast('Tâche créée','success');
    }
  };

  const handleDelete = (id) => {
    setData(d => ({...d, tasks:d.tasks.filter(t=>t.id!==id)}));
    addToast('Tâche supprimée','success');
  };

  const colColors = {'À faire':'bg-slate-50 border-slate-200','En cours':'bg-blue-50 border-blue-200','Terminé':'bg-green-50 border-green-200'};

  return (
    <div className="space-y-4">
      <div className="flex items-center justify-between">
        <h1 className="text-2xl font-bold text-gray-800">Tâches</h1>
        <Btn variant="primary" onClick={()=>{setSelectedTask(null);setModalOpen(true);}}>+ Nouvelle tâche</Btn>
      </div>

      <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
        {statusOrder.map(status => {
          const tasks = data.tasks.filter(t=>t.statut===status);
          return (
            <div key={status} className={`border rounded-2xl p-3 ${colColors[status]}`}>
              <div className="flex items-center justify-between mb-3 px-1">
                <span className="text-sm font-semibold text-gray-700">{status}</span>
                <span className="text-xs bg-white px-1.5 py-0.5 rounded-full shadow-sm text-gray-500">{tasks.length}</span>
              </div>
              <div className="space-y-2">
                {tasks.length===0 && <div className="text-center text-xs text-gray-300 py-6">Vide</div>}
                {tasks.map(t => (
                  <TaskCard key={t.id} task={t}
                    onMove={moveTask}
                    onEdit={(t)=>{setSelectedTask(t);setModalOpen(true);}}
                    onDelete={(id)=>setConfirmDelete(id)}
                  />
                ))}
              </div>
            </div>
          );
        })}
      </div>

      <TaskModal
        open={modalOpen}
        onClose={()=>{setModalOpen(false);setSelectedTask(null);}}
        task={selectedTask}
        onSave={handleSave}
        onDelete={handleDelete}
      />
      <ConfirmModal open={!!confirmDelete} onClose={()=>setConfirmDelete(null)} onConfirm={()=>{handleDelete(confirmDelete);setConfirmDelete(null);}} title="Supprimer la tâche" message="Confirmer la suppression ?"/>
    </div>
  );
}
