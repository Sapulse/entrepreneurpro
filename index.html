// ============================================================
// TOAST SYSTEM
// ============================================================
const ToastContext = React.createContext(null);

function ToastProvider({children}) {
  const [toasts, setToasts] = React.useState([]);
  const addToast = React.useCallback((msg, type='info') => {
    const id = genId();
    setToasts(prev => [...prev, {id, msg, type}]);
    setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 3000);
  }, []);
  const colors = {success:'bg-green-500', error:'bg-red-500', info:'bg-blue-500'};
  return (
    <ToastContext.Provider value={addToast}>
      {children}
      <div className="fixed bottom-4 right-4 z-[100] flex flex-col gap-2 pointer-events-none">
        {toasts.map(t => (
          <div key={t.id} className={`anim px-4 py-3 rounded-lg text-white text-sm shadow-lg ${colors[t.type]||colors.info} pointer-events-auto`}>
            {t.msg}
          </div>
        ))}
      </div>
    </ToastContext.Provider>
  );
}

function useToast() { return React.useContext(ToastContext); }

// ============================================================
// MODAL
// ============================================================
function Modal({open, onClose, title, children, size='md'}) {
  React.useEffect(() => {
    if(!open) return;
    const prev = document.body.style.overflow;
    document.body.style.overflow = 'hidden';
    const handler = (e) => { if(e.key==='Escape') onClose(); };
    document.addEventListener('keydown', handler);
    return () => { document.body.style.overflow = prev; document.removeEventListener('keydown', handler); };
  }, [open, onClose]);

  if(!open) return null;
  const sizes = {sm:'max-w-md', md:'max-w-2xl', lg:'max-w-4xl', xl:'max-w-6xl'};
  return (
    <div className="fixed inset-0 z-50 flex items-start justify-center p-4 pt-10 overflow-y-auto">
      <div className="fixed inset-0 bg-black/40 backdrop-blur-sm" onClick={onClose}/>
      <div className={`relative bg-white rounded-2xl shadow-2xl w-full ${sizes[size]||sizes.md} anim my-auto`}>
        <div className="flex items-center justify-between px-6 py-4 border-b">
          <h2 className="text-lg font-semibold text-gray-800">{title}</h2>
          <button onClick={onClose} className="text-gray-400 hover:text-gray-600 text-2xl leading-none">&times;</button>
        </div>
        <div className="px-6 py-5">{children}</div>
      </div>
    </div>
  );
}

function ConfirmModal({open, onClose, onConfirm, title, message}) {
  return (
    <Modal open={open} onClose={onClose} title={title||'Confirmation'} size="sm">
      <p className="text-gray-600 mb-6">{message||'Êtes-vous sûr ?'}</p>
      <div className="flex gap-3 justify-end">
        <Btn variant="secondary" onClick={onClose}>Annuler</Btn>
        <Btn variant="danger" onClick={() => { onConfirm(); onClose(); }}>Confirmer</Btn>
      </div>
    </Modal>
  );
}

// ============================================================
// UI COMPONENTS
// ============================================================
function StatusBadge({status}) {
  const cls = BADGE_COLORS[status] || 'bg-gray-100 text-gray-700';
  return <span className={`inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium ${cls}`}>{status}</span>;
}

function ExpiryBadge({dateFin, statut}) {
  if(statut==='Terminé') return <span className="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-700">✓ Terminé</span>;
  if(statut==='Annulé') return <span className="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-red-100 text-red-700">Annulé</span>;
  if(!dateFin) return null;
  const days = daysUntil(dateFin);
  if(days === null) return null;
  if(days < 0) return <span className="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-bold bg-red-100 text-red-700">Expiré</span>;
  if(days <= 7) return <span className="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-bold bg-red-100 text-red-700">J-{days}</span>;
  if(days <= 30) return <span className="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-amber-100 text-amber-700">J-{days}</span>;
  return <span className="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-gray-100 text-gray-600">J-{days}</span>;
}

function Tabs({tabs, active, onChange}) {
  return (
    <div className="flex border-b border-gray-200 mb-5">
      {tabs.map(t => (
        <button key={t.id} onClick={() => onChange(t.id)}
          className={`px-4 py-2 text-sm font-medium border-b-2 transition-colors -mb-px ${active===t.id ? 'border-blue-500 text-blue-600' : 'border-transparent text-gray-500 hover:text-gray-700'}`}>
          {t.label}
        </button>
      ))}
    </div>
  );
}

const inputCls = "w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent";
const selectCls = "w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent bg-white";
const textareaCls = "w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent resize-none";

function Input({label, required, ...props}) {
  if(label) return <FormField label={label} required={required}><input className={inputCls} {...props}/></FormField>;
  return <input className={inputCls} {...props}/>;
}
function Select({label, required, children, ...props}) {
  if(label) return <FormField label={label} required={required}><select className={selectCls} {...props}>{children}</select></FormField>;
  return <select className={selectCls} {...props}>{children}</select>;
}
function Textarea({label, required, rows=3, ...props}) {
  if(label) return <FormField label={label} required={required}><textarea className={textareaCls} rows={rows} {...props}/></FormField>;
  return <textarea className={textareaCls} rows={rows} {...props}/>;
}
function FormField({label, required, children}) {
  return (
    <div>
      <label className="block text-xs font-medium text-gray-600 mb-1">{label}{required&&<span className="text-red-500 ml-0.5">*</span>}</label>
      {children}
    </div>
  );
}

function Btn({variant='primary', size='md', children, ...props}) {
  const variants = {
    primary: 'bg-blue-600 hover:bg-blue-700 text-white',
    secondary: 'bg-gray-100 hover:bg-gray-200 text-gray-700',
    danger: 'bg-red-500 hover:bg-red-600 text-white',
    success: 'bg-green-500 hover:bg-green-600 text-white',
    ghost: 'hover:bg-gray-100 text-gray-600',
    outline: 'border border-gray-300 hover:bg-gray-50 text-gray-700',
  };
  const sizes = {sm:'px-2.5 py-1.5 text-xs', md:'px-4 py-2 text-sm', lg:'px-5 py-2.5 text-base'};
  return (
    <button className={`inline-flex items-center gap-1.5 rounded-lg font-medium transition-colors ${variants[variant]||variants.primary} ${sizes[size]||sizes.md} disabled:opacity-50 disabled:cursor-not-allowed`} {...props}>
      {children}
    </button>
  );
}

function KPICard({label, value, sub, color='blue', icon}) {
  const colors = {blue:'from-blue-50 to-blue-100 text-blue-700', green:'from-green-50 to-green-100 text-green-700', amber:'from-amber-50 to-amber-100 text-amber-700', red:'from-red-50 to-red-100 text-red-700', indigo:'from-indigo-50 to-indigo-100 text-indigo-700', purple:'from-purple-50 to-purple-100 text-purple-700', gray:'from-gray-50 to-gray-100 text-gray-700'};
  return (
    <div className={`bg-gradient-to-br ${colors[color]||colors.blue} rounded-xl p-5`}>
      {icon && <div className="text-2xl mb-1.5">{icon}</div>}
      <div className="text-xs font-medium opacity-70 mb-1.5 leading-snug">{label}</div>
      <div className="text-2xl font-bold leading-tight">{value}</div>
      {sub && <div className="text-xs opacity-60 mt-1.5 leading-snug">{sub}</div>}
    </div>
  );
}

function EmptyState({message, icon='📭'}) {
  return (
    <div className="flex flex-col items-center justify-center py-16 text-gray-400">
      <div className="text-4xl mb-3">{icon}</div>
      <div className="text-sm">{message}</div>
    </div>
  );
}

function SectionHeader({title, action}) {
  return (
    <div className="flex items-center justify-between mb-4">
      <h3 className="text-base font-semibold text-gray-800">{title}</h3>
      {action}

}

// ============================================================
// ERROR BOUNDARY
// ============================================================
class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = {err:null}; }
  static getDerivedStateFromError(err) { return {err}; }
  render() {
    if(this.state.err) return (
      <div className="p-8 text-center bg-white rounded-2xl shadow-sm border border-red-100">
        <div className="text-4xl mb-3">⚠️</div>
        <h2 className="text-base font-bold text-red-700 mb-2">Erreur dans ce module</h2>
        <p className="text-xs text-gray-500 mb-4 font-mono">{this.state.err?.message}</p>
        <button onClick={()=>this.setState({err:null})} className="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm hover:bg-blue-700">Réessayer</button>
      </div>
    );
    return this.props.children;
  }
}

// ============================================================
// PAGINATION
// ============================================================
function Pagination({total, page, perPage, onChange}) {
  const pages = Math.ceil(total/perPage);
  if(pages<=1) return null;
  const start = Math.max(1, Math.min(page-2, pages-4));
  return (
    <div className="flex items-center justify-between pt-3 border-t border-gray-100 mt-2">
      <span className="text-xs text-gray-400">{total} éléments · page {page}/{pages}</span>
      <div className="flex gap-1">
        <button disabled={page===1} onClick={()=>onChange(1)} className="px-2 py-1 text-xs border border-gray-200 rounded hover:bg-gray-50 disabled:opacity-30">«</button>
        <button disabled={page===1} onClick={()=>onChange(page-1)} className="px-2 py-1 text-xs border border-gray-200 rounded hover:bg-gray-50 disabled:opacity-30">‹</button>
        {Array.from({length:Math.min(5,pages)},(_,i)=>start+i).filter(p=>p<=pages).map(p=>(
          <button key={p} onClick={()=>onChange(p)} className={`px-2 py-1 text-xs border rounded ${p===page?'bg-blue-600 text-white border-blue-600':'border-gray-200 hover:bg-gray-50'}`}>{p}</button>
        ))}
        <button disabled={page===pages} onClick={()=>onChange(page+1)} className="px-2 py-1 text-xs border border-gray-200 rounded hover:bg-gray-50 disabled:opacity-30">›</button>
        <button disabled={page===pages} onClick={()=>onChange(pages)} className="px-2 py-1 text-xs border border-gray-200 rounded hover:bg-gray-50 disabled:opacity-30">»</button>
      </div>
    </div>
  );
}

// ============================================================
// RECHERCHE GLOBALE (Cmd+K)
// ============================================================
function GlobalSearch({data, onNavigate, onClose}) {
  const [q, setQ] = React.useState('');
  const inputRef = React.useRef(null);
  React.useEffect(() => { inputRef.current?.focus(); }, []);

  const results = React.useMemo(() => {
    if(!q.trim()||q.length<2) return [];
    const nq = normalize(q);
    const res = [];
    (data.contracts||[]).filter(c=>normalize(c.client).includes(nq)||normalize(c.prestation).includes(nq)).slice(0,4).forEach(c=>res.push({type:'Contrat',icon:'📄',label:c.client,sub:c.prestation,val:fmt(c.montant),action:()=>onNavigate('contracts',{id:c.id})}));
    (data.clients||[]).filter(c=>normalize(c.entreprise).includes(nq)||normalize(c.nom).includes(nq)).slice(0,4).forEach(c=>res.push({type:'Client',icon:'👤',label:c.entreprise,sub:c.nom,val:c.etape,action:()=>onNavigate('crm',{id:c.id})}));
    (data.tasks||[]).filter(t=>normalize(t.titre).includes(nq)||normalize(t.client||'').includes(nq)).slice(0,3).forEach(t=>res.push({type:'Tâche',icon:'✅',label:t.titre,sub:t.client,val:t.statut,action:()=>onNavigate('tasks')}));
    (data.bank?.transactions||[]).filter(t=>normalize(t.label).includes(nq)).slice(0,3).forEach(t=>res.push({type:'Transaction',icon:'🏦',label:t.label,sub:formatDate(t.date),val:fmt(t.montant),action:()=>onNavigate('bank',{type:'bankTx',id:t.id})}));
    (data.quotes||[]).filter(q2=>normalize(q2.client).includes(nq)||normalize(q2.prestation||'').includes(nq)).slice(0,3).forEach(q2=>res.push({type:'Devis',icon:'📋',label:q2.client,sub:q2.prestation,val:fmt(q2.montant),action:()=>onNavigate('quotes')}));
    return res;
  }, [q, data]);

  return (
    <div className="fixed inset-0 z-[200] flex items-start justify-center pt-20 px-4" onClick={onClose}>
      <div className="w-full max-w-xl bg-white rounded-2xl shadow-2xl border border-gray-200 overflow-hidden" onClick={e=>e.stopPropagation()}>
        <div className="flex items-center gap-3 px-4 py-3 border-b border-gray-100">
          <span className="text-gray-400 text-lg">🔍</span>
          <input ref={inputRef} className="flex-1 text-sm outline-none placeholder-gray-400" placeholder="Rechercher contrats, clients, tâches..." value={q} onChange={e=>setQ(e.target.value)} onKeyDown={e=>e.key==='Escape'&&onClose()}/>
          <kbd className="text-xs text-gray-400 bg-gray-100 px-1.5 py-0.5 rounded">Esc</kbd>
        </div>
        {q.length>=2 && (
          <div className="max-h-80 overflow-y-auto">
            {results.length===0 ? <div className="px-4 py-8 text-center text-sm text-gray-400">Aucun résultat pour "{q}"</div> : results.map((r,i)=>(
              <button key={i} onClick={()=>{r.action();onClose();}} className="w-full flex items-center gap-3 px-4 py-3 hover:bg-gray-50 transition-colors text-left border-b border-gray-50 last:border-0">
                <span className="text-base">{r.icon}</span>
                <div className="flex-1 min-w-0">
                  <div className="text-sm font-medium text-gray-800 truncate">{r.label}</div>
                  <div className="text-xs text-gray-400 truncate">{r.type} · {r.sub}</div>
                </div>
                <span className="text-xs text-gray-500 font-medium shrink-0">{r.val}</span>
              </button>
            ))}
          </div>
        )}
        {q.length<2 && (
          <div className="px-4 py-6 text-center text-xs text-gray-400">Tapez au moins 2 caractères...</div>
        )}
      </div>
    </div>
  );
}

// ============================================================
// CENTRE D'ALERTES
// ============================================================
function AlertCenter({alerts, onNavigate, onClose}) {
  const danger = alerts.filter(a=>a.type==='danger');
  const warning = alerts.filter(a=>a.type==='warning');
  const info = alerts.filter(a=>a.type==='info');
  const typeColor = {danger:'bg-red-50 border-red-200 text-red-800', warning:'bg-amber-50 border-amber-200 text-amber-800', info:'bg-blue-50 border-blue-200 text-blue-800'};
  return (
    <div className="fixed inset-0 z-[150]" onClick={onClose}>
      <div className="absolute right-4 top-14 w-80 bg-white rounded-2xl shadow-xl border border-gray-200 overflow-hidden" onClick={e=>e.stopPropagation()}>
        <div className="px-4 py-3 border-b border-gray-100 flex justify-between items-center">
          <span className="text-sm font-semibold text-gray-800">🔔 Alertes ({alerts.length})</span>
          <button onClick={onClose} className="text-gray-400 hover:text-gray-600 text-lg leading-none">×</button>
        </div>
        <div className="max-h-96 overflow-y-auto">
          {alerts.length===0 ? <div className="px-4 py-8 text-center text-sm text-gray-400">✅ Aucune alerte</div> : alerts.map(a=>(
            <button key={a.id} onClick={()=>{if(a.module)onNavigate(a.module,a.deepLink||null);onClose();}} className={`w-full text-left flex items-start gap-3 px-4 py-3 border-b border-gray-50 last:border-0 hover:bg-gray-50 ${a.module?'cursor-pointer':'cursor-default'}`}>
              <span className="text-base shrink-0 mt-0.5">{a.icon}</span>
              <div className="flex-1 min-w-0">
                <div className={`text-xs px-2 py-0.5 rounded-full inline-block mb-1 font-medium ${typeColor[a.type]||'bg-gray-100 text-gray-600'}`}>{a.type==='danger'?'Urgent':a.type==='warning'?'Attention':'Info'}</div>
                <div className="text-xs text-gray-700 leading-tight">{a.msg}</div>
              </div>
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

// ============================================================
// PERIODE FILTER COMPONENT
// ============================================================
const YEARS_RANGE = (() => {
  const now = new Date().getFullYear();
  return [now-1, now, now+1, now+2].map(y => ({id:`y${y}`, label:String(y)}));
})();

function PeriodeFilter({periodeId, setPeriodeId, dateDebut, setDateDebut, dateFin, setDateFin}) {
  const [showYears, setShowYears] = React.useState(false);
  const isYear = periodeId && periodeId.startsWith('y');
  const yearLabel = isYear ? periodeId.slice(1) : null;
  return (
    <div className="flex flex-wrap items-center gap-2">
      <div className="flex gap-1 flex-wrap">
        {PERIOD_SHORTCUTS.filter(s=>s.id!=='annee').map(s => (
          <button key={s.id} onClick={() => { setPeriodeId(s.id); setShowYears(false); }}
            className={`px-3 py-1 text-xs rounded-lg font-medium transition-colors ${periodeId===s.id?'bg-blue-600 text-white':'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}>
            {s.label}
          </button>
        ))}
        {/* Year selector */}
        <div className="relative">
          <button onClick={()=>setShowYears(v=>!v)}
            className={`px-3 py-1 text-xs rounded-lg font-medium transition-colors ${isYear?'bg-blue-600 text-white':'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}>
            {isYear ? yearLabel : 'Année ▾'}
          </button>
          {showYears && (
            <div className="absolute top-full left-0 mt-1 bg-white border border-gray-200 rounded-xl shadow-lg z-20 p-1 min-w-[80px]">
              {YEARS_RANGE.map(y => (
                <button key={y.id} onClick={()=>{setPeriodeId(y.id);setShowYears(false);}}
                  className={`block w-full text-left px-3 py-1.5 text-xs rounded-lg hover:bg-blue-50 ${periodeId===y.id?'text-blue-700 font-semibold':'text-gray-700'}`}>
                  {y.label}
                </button>
              ))}
            </div>
          )}
        </div>
      </div>
      {periodeId==='custom' && (
        <div className="flex items-center gap-2 flex-wrap">
          <input type="date" value={dateDebut} onChange={e=>setDateDebut(e.target.value)} className="border border-gray-300 rounded-lg px-2 py-1 text-xs focus:outline-none focus:ring-1 focus:ring-blue-500"/>
          <span className="text-xs text-gray-400">→</span>
          <input type="date" value={dateFin} onChange={e=>setDateFin(e.target.value)} className="border border-gray-300 rounded-lg px-2 py-1 text-xs focus:outline-none focus:ring-1 focus:ring-blue-500"/>
        </div>
      )}
    </div>
  );
}

// ============================================================
// DRAGGABLE WIDGET WRAPPER
// ============================================================
function DraggableWidget({id, label, customizing, onDragStart, onDrop, hidden, onToggle, children}) {
  const [over, setOver] = React.useState(false);
  if(!customizing && hidden) return null;
  return (
    <div
      draggable={customizing}
      onDragStart={customizing ? () => onDragStart(id) : undefined}
      onDragOver={customizing ? (e) => { e.preventDefault(); setOver(true); } : undefined}
      onDragLeave={customizing ? () => setOver(false) : undefined}
      onDrop={customizing ? (e) => { e.preventDefault(); setOver(false); onDrop(id); } : undefined}
      className={`transition-all ${over&&customizing?'ring-2 ring-blue-400 ring-offset-2 rounded-2xl':''} ${hidden&&customizing?'opacity-40':''}`}
    >
      {customizing && (
        <div className="flex items-center justify-between bg-blue-50 border border-blue-200 border-b-0 rounded-t-xl px-3 py-1.5">
          <span className="text-xs text-blue-600 font-medium select-none cursor-grab">⠿ {label}</span>
          <button onClick={() => onToggle(id)} className={`text-xs px-2 py-0.5 rounded font-medium transition-colors ${hidden?'bg-gray-200 text-gray-500 hover:bg-gray-300':'bg-blue-100 text-blue-700 hover:bg-blue-200'}`}>
            {hidden ? '👁 Afficher' : '🙈 Masquer'}
          </button>
        </div>
      )}
      {!hidden && children}
    </div>
  );
}

// ============================================================
// DASHBOARD MODULE
// ============================================================
function Dashboard({data, onNavigate}) {
  const [periodeId, setPeriodeId] = React.useState('tout');
  const [dateDebut, setDateDebut] = React.useState('');
  const [dateFin, setDateFin] = React.useState('');
  const [customizing, setCustomizing] = React.useState(false);
  const [widgetOrder, setWidgetOrder] = React.useState(() => {
    const p = loadUIPrefs();
    return p.dashWidgetOrder || DASHBOARD_WIDGETS.map(w=>w.id);
  });
  const [hiddenWidgets, setHiddenWidgets] = React.useState(() => {
    const p = loadUIPrefs();
    return new Set(p.dashHiddenWidgets||[]);
  });
  const dragItem = React.useRef(null);

  const saveWidgetPrefs = (order, hidden) => {
    saveUIPrefs({...loadUIPrefs(), dashWidgetOrder:order, dashHiddenWidgets:[...hidden]});
  };
  const handleDragStart = (id) => { dragItem.current = id; };
  const handleDrop = (id) => {
    if(!dragItem.current || dragItem.current === id) return;
    const o = [...widgetOrder];
    const from = o.indexOf(dragItem.current); const to = o.indexOf(id);
    if(from<0||to<0) return;
    o.splice(from,1); o.splice(to,0,dragItem.current);
    setWidgetOrder(o); saveWidgetPrefs(o, hiddenWidgets); dragItem.current = null;
  };
  const toggleWidget = (id) => {
    const nh = new Set(hiddenWidgets);
    if(nh.has(id)) nh.delete(id); else nh.add(id);
    setHiddenWidgets(nh); saveWidgetPrefs(widgetOrder, nh);
  };

  const stats = React.useMemo(() => {
    const range = buildPeriodeRange(periodeId, dateDebut, dateFin);
    const entries = buildLedgerEntries(data);
    const filteredEntries = entries.filter(e => inPeriode(e.date, range));

    const totalEntrees = filteredEntries.filter(e=>e.montant>0).reduce((s,e)=>s+e.montant, 0);
    const totalSorties = filteredEntries.filter(e=>e.montant<0).reduce((s,e)=>s+Math.abs(e.montant), 0);
    const balance = totalEntrees - totalSorties;

    const nonAnnule = data.contracts.filter(c => c.statut !== 'Annulé');
    const caSigne = nonAnnule.filter(c=>inPeriode(c.dateDebut, range)).reduce((s,c) => s + (Number(c.montant)||0), 0);
    const caEncaisse = filteredEntries.filter(e=>e.type==='contract').reduce((s,e)=>s+e.montant, 0);
    const potentiel = data.clients.reduce((s,cl) => s + (Number(cl.potentiel)||0), 0);

    const mickaPay = filteredEntries.filter(e=>e.type==='contract'&&e.assignedTo==='Micka').reduce((s,e)=>s+e.montant,0);
    const cesarPay = filteredEntries.filter(e=>e.type==='contract'&&e.assignedTo==='César').reduce((s,e)=>s+e.montant,0);
    // Apports = argent investi par la personne → DÉDUIT de son solde (équilibre la balance)
    const mickaApports = filteredEntries.filter(e=>e.type==='apport'&&e.imputéÀ==='Micka').reduce((s,e)=>s+e.montant,0);
    const cesarApports = filteredEntries.filter(e=>e.type==='apport'&&e.imputéÀ==='César').reduce((s,e)=>s+e.montant,0);
    // Avances perso (dépenses)
    const mickaAdv = filteredEntries.filter(e=>e.type==='expense'&&e.auteur==='Micka').reduce((s,e)=>s+Math.abs(e.montant),0);
    const cesarAdv = filteredEntries.filter(e=>e.type==='expense'&&e.auteur==='César').reduce((s,e)=>s+Math.abs(e.montant),0);
    // Transactions banque signées (Achat<0, Sortie<0, Entrée>0). Commun excluded via imputéÀ filter.
    const mickaBank = filteredEntries.filter(e=>e.type==='bank'&&e.imputéÀ==='Micka').reduce((s,e)=>s+e.montant,0);
    const cesarBank = filteredEntries.filter(e=>e.type==='bank'&&e.imputéÀ==='César').reduce((s,e)=>s+e.montant,0);
    // Net = CA encaissé - avances perso - apports investis + mouvements banque perso
    const netMicka = mickaPay - mickaAdv - mickaApports + mickaBank;
    const netCesar = cesarPay - cesarAdv - cesarApports + cesarBank;
    const ecart = Math.abs(netMicka - netCesar);
    // Qui doit à qui : la personne avec le net le plus élevé a reçu plus que sa part → elle est débitrice
    const debiteur = netMicka > netCesar ? 'Micka' : netCesar > netMicka ? 'César' : null;
    const crediteur = netMicka > netCesar ? 'César' : netCesar > netMicka ? 'Micka' : null;
    const montantDu = ecart / 2; // chacun devrait avoir la moitié du total duo

    const urgent = data.contracts.filter(c => c.statut === 'En cours' && c.dateFin)
      .sort((a,b) => new Date(a.dateFin) - new Date(b.dateFin)).slice(0,3);

    const resteAEncaisserList = nonAnnule.map(c => {
      const totalPaid = (c.payments||[]).reduce((s,p)=>s+(Number(p.montant)||0),0);
      const resteC = (Number(c.montant)||0) - totalPaid;
      return {...c, totalPaid, resteC};
    }).filter(c => c.resteC > 0).sort((a,b) => {
      if(a.dateFin && b.dateFin) return new Date(a.dateFin)-new Date(b.dateFin);
      if(a.dateFin) return -1; if(b.dateFin) return 1; return 0;
    });
    const resteTotal = resteAEncaisserList.reduce((s,c)=>s+c.resteC, 0);
    const resteMicka = resteAEncaisserList.filter(c=>c.assignedTo==='Micka').reduce((s,c)=>s+c.resteC,0);
    const resteCesar = resteAEncaisserList.filter(c=>c.assignedTo==='César').reduce((s,c)=>s+c.resteC,0);

    // Trésorerie réelle (flux période) vs projetée (réelle + reste à encaisser)
    const tresoReelle = balance;
    const tresoProjetee = tresoReelle + resteTotal;
    const netMickaProj = netMicka + resteMicka;
    const netCesarProj = netCesar + resteCesar;

    // Seuil AE par associé (toujours annuel, pas filtré par période)
    const curY = new Date().getFullYear();
    const annRange = {start:new Date(curY,0,1), end:new Date(curY,11,31,23,59,59)};
    const mickaCaAnnuel = entries.filter(e=>e.type==='contract'&&e.assignedTo==='Micka'&&inPeriode(e.date,annRange)).reduce((s,e)=>s+e.montant,0);
    const cesarCaAnnuel = entries.filter(e=>e.type==='contract'&&e.assignedTo==='César'&&inPeriode(e.date,annRange)).reduce((s,e)=>s+e.montant,0);
    const seuilMicka = data.config?.autoEntrepreneurMicka?.seuil || data.config?.autoEntrepreneur?.seuil || AUTO_ENTREPRENEUR_SEUIL;
    const seuilCesar = data.config?.autoEntrepreneurCesar?.seuil || data.config?.autoEntrepreneur?.seuil || AUTO_ENTREPRENEUR_SEUIL;
    const tauxMicka = (data.config?.autoEntrepreneurMicka?.tauxURSSAF || data.config?.autoEntrepreneur?.tauxURSSAF || 22) / 100;
    const tauxCesar = (data.config?.autoEntrepreneurCesar?.tauxURSSAF || data.config?.autoEntrepreneur?.tauxURSSAF || 22) / 100;

    // Objectives
    const objMicka = Number(data.config?.objectives?.mickaCAAnnuel)||0;
    const objCesar = Number(data.config?.objectives?.cesarCAAnnuel)||0;

    return {caSigne, caEncaisse, resteTotal, potentiel, netMicka, netCesar, ecart, debiteur, crediteur, montantDu, urgent, totalEntrees, totalSorties, balance, resteAEncaisserList, mickaCaAnnuel, cesarCaAnnuel, seuilMicka, seuilCesar, tauxMicka, tauxCesar, objMicka, objCesar, tresoReelle, tresoProjetee, resteMicka, resteCesar, netMickaProj, netCesarProj,
      mickaPay, cesarPay, mickaApports, cesarApports, mickaAdv, cesarAdv};
  }, [data, periodeId, dateDebut, dateFin]);

  // Ordered visible widget list
  const allWidgetIds = DASHBOARD_WIDGETS.map(w=>w.id);
  const orderedWidgets = [...widgetOrder.filter(id=>allWidgetIds.includes(id)), ...allWidgetIds.filter(id=>!widgetOrder.includes(id))];

  const wProps = (id) => ({id, customizing, hidden:hiddenWidgets.has(id), label:DASHBOARD_WIDGETS.find(w=>w.id===id)?.label||id, onDragStart:handleDragStart, onDrop:handleDrop, onToggle:toggleWidget});

  const renderWidget = (id) => {
    switch(id) {
      case 'kpis': return (
        <DraggableWidget key={id} {...wProps(id)}>
          <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
            <KPICard label="CA Signé (période)" value={fmt(stats.caSigne)} icon="📄" color="blue"/>
            <KPICard label="CA Encaissé (période)" value={fmt(stats.caEncaisse)} icon="💰" color="green"/>
            <KPICard label="Reste à encaisser" value={fmt(stats.resteTotal)} icon="⏳" color="amber"/>
            <KPICard label="Potentiel Prospects" value={fmt(stats.potentiel)} icon="🎯" color="purple"/>
          </div>
        </DraggableWidget>
      );
      case 'seuil_ae': return (
        <DraggableWidget key={id} {...wProps(id)}>
          <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-5">
            <h2 className="text-base font-semibold text-gray-800 mb-4">🏛️ Seuil Auto-Entrepreneur {new Date().getFullYear()}</h2>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
              {[{name:'Micka', ca:stats.mickaCaAnnuel, seuil:stats.seuilMicka, taux:stats.tauxMicka, color:'indigo'}, {name:'César', ca:stats.cesarCaAnnuel, seuil:stats.seuilCesar, taux:stats.tauxCesar, color:'emerald'}].map(({name, ca, seuil, taux, color}) => {
                const ratio = seuil > 0 ? Math.min(1, ca/seuil) : 0;
                const barCls = ratio>=1?'bg-red-500':ratio>=0.9?'bg-amber-500':ratio>=0.8?'bg-yellow-400':'bg-green-500';
                const badgeCls = ratio>=1?'bg-red-100 text-red-700':ratio>=0.8?'bg-amber-100 text-amber-700':'bg-green-100 text-green-700';
                return (
                  <div key={name}>
                    <div className="flex items-center justify-between mb-2">
                      <span className={`text-sm font-semibold text-${color}-700`}>{name}</span>
                      <span className={`text-xs font-bold px-2 py-0.5 rounded-full ${badgeCls}`}>{Math.round(ratio*100)}%</span>
                    </div>
                    <div className="w-full bg-gray-100 rounded-full h-2.5 mb-2">
                      <div className={`h-2.5 rounded-full transition-all ${barCls}`} style={{width:`${Math.round(ratio*100)}%`}}/>
                    </div>
                    <div className="flex justify-between text-xs text-gray-500 mb-1">
                      <span>{fmt(ca)}</span><span>/ {fmt(seuil)}</span>
                    </div>
                    <div className="text-xs text-gray-400">URSSAF estimé : <span className="font-semibold text-gray-600">{fmt(ca * taux)}</span></div>
                    {ratio >= 1 && <div className="mt-2 text-xs text-red-600 font-medium bg-red-50 px-2 py-1 rounded">🚨 Seuil dépassé !</div>}
                    {ratio >= 0.9 && ratio < 1 && <div className="mt-2 text-xs text-amber-600 font-medium bg-amber-50 px-2 py-1 rounded">⚡ 90% du seuil atteint</div>}
                  </div>
                );
              })}
            </div>
          </div>
        </DraggableWidget>
      );
      case 'objectives': return (stats.objMicka > 0 || stats.objCesar > 0) ? (
        <DraggableWidget key={id} {...wProps(id)}>
          <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-5">
            <h2 className="text-base font-semibold text-gray-800 mb-4">🎯 Objectifs CA Annuels</h2>
            <div className="space-y-4">
              {[[stats.objMicka, stats.mickaCaAnnuel, 'Micka', 'indigo'], [stats.objCesar, stats.cesarCaAnnuel, 'César', 'emerald']].filter(([obj])=>obj>0).map(([obj, ca, name, color]) => {
                const ratio = Math.min(1, ca/obj);
                return (<div key={name}>
                  <div className="flex justify-between mb-1"><span className={`text-sm font-medium text-${color}-700`}>{name}</span><span className="text-sm text-gray-600">{fmt(ca)} / {fmt(obj)}</span></div>
                  <div className="w-full bg-gray-100 rounded-full h-2"><div className={`h-2 rounded-full bg-${color}-500 transition-all`} style={{width:`${Math.round(ratio*100)}%`}}/></div>
                  <div className="text-xs text-gray-400 mt-1">{Math.round(ratio*100)}% de l'objectif</div>
                </div>);
              })}
            </div>
          </div>
        </DraggableWidget>
      ) : null;
      case 'flux': return (
        <DraggableWidget key={id} {...wProps(id)}>
          <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-5">
            <h2 className="text-base font-semibold text-gray-800 mb-4">📊 Flux financiers</h2>
            <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
              <KPICard label="Entrées" value={fmt(stats.totalEntrees)} color="green" icon="⬆️"/>
              <KPICard label="Sorties" value={fmt(stats.totalSorties)} color="red" icon="⬇️"/>
              <KPICard label="Balance nette" value={fmt(stats.balance)} color={stats.balance>=0?'blue':'red'} icon="⚖️"/>
            </div>
          </div>
        </DraggableWidget>
      );
      case 'tresorerie': return (
        <DraggableWidget key={id} {...wProps(id)}>
          <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-5">
            <h2 className="text-base font-semibold text-gray-800 mb-4">💵 Trésorerie réelle / projetée</h2>
            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
              <div className="bg-blue-50 rounded-xl p-4">
                <div className="text-xs font-medium text-blue-600 mb-1">Réelle (flux encaissés)</div>
                <div className="text-2xl font-bold text-blue-700">{fmt(stats.tresoReelle)}</div>
                <div className="text-xs text-blue-400 mt-1">Basée sur les mouvements réels</div>
              </div>
              <div className="bg-emerald-50 rounded-xl p-4">
                <div className="text-xs font-medium text-emerald-600 mb-1">Projetée (+ reste à encaisser)</div>
                <div className="text-2xl font-bold text-emerald-700">{fmt(stats.tresoProjetee)}</div>
                <div className="text-xs text-emerald-400 mt-1">+ {fmt(stats.resteTotal)} attendus</div>
              </div>
            </div>
          </div>
        </DraggableWidget>
      );
      case 'duo': return (
        <DraggableWidget key={id} {...wProps(id)}>
          <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-5">
            <h2 className="text-base font-semibold text-gray-800 mb-1">💳 Balance Duo</h2>
            <p className="text-xs text-gray-400 mb-4">CA encaissé – dépenses perso – apports investis</p>

            {/* Cartes par associé */}
            <div className="grid grid-cols-2 gap-3 mb-4">
              {[{name:'Micka', net:stats.netMicka, proj:stats.netMickaProj, reste:stats.resteMicka,
                 pay:stats.mickaPay, adv:stats.mickaAdv, apports:stats.mickaApports, color:'indigo'},
                {name:'César', net:stats.netCesar, proj:stats.netCesarProj, reste:stats.resteCesar,
                 pay:stats.cesarPay, adv:stats.cesarAdv, apports:stats.cesarApports, color:'emerald'}
              ].map(({name, net, proj, reste, pay, adv, apports, color}) => (
                <div key={name} className={`rounded-xl p-3 border ${color==='indigo'?'bg-indigo-50 border-indigo-100':'bg-emerald-50 border-emerald-100'}`}>
                  <div className={`text-sm font-bold text-${color}-700 mb-2`}>{name}</div>
                  <div className="space-y-1 text-xs text-gray-500 mb-3">
                    <div className="flex justify-between"><span>CA encaissé</span><span className="font-semibold text-green-700">+{fmt(pay)}</span></div>
                    {adv > 0 && <div className="flex justify-between"><span>Dép. perso</span><span className="font-semibold text-red-500">-{fmt(adv)}</span></div>}
                    {apports > 0 && <div className="flex justify-between"><span>Apports</span><span className="font-semibold text-orange-500">-{fmt(apports)}</span></div>}
                  </div>
                  <div className="border-t border-gray-200 pt-2">
                    <div className="flex justify-between items-center">
                      <span className="text-xs text-gray-500">Solde réel</span>
                      <span className={`text-base font-bold ${net>=0?`text-${color}-700`:'text-red-500'}`}>{fmt(net)}</span>
                    </div>
                    {reste > 0 && <div className="flex justify-between items-center mt-1">
                      <span className="text-xs text-amber-500">+ à encaisser</span>
                      <span className="text-xs font-semibold text-amber-600">+{fmt(reste)}</span>
                    </div>}
                    {reste > 0 && <div className="flex justify-between items-center">
                      <span className="text-xs text-emerald-500">Projeté</span>
                      <span className="text-xs font-semibold text-emerald-700">{fmt(proj)}</span>
                    </div>}
                  </div>
                </div>
              ))}
            </div>

            {/* Barre visuelle d'équilibre */}
            {(() => {
              const total = Math.abs(stats.netMicka) + Math.abs(stats.netCesar);
              const wM = total > 0 ? Math.round(Math.abs(stats.netMicka)/total*100) : 50;
              const wC = 100 - wM;
              return (
                <div className="mb-4">
                  <div className="flex rounded-full overflow-hidden h-3 mb-1">
                    <div className="bg-indigo-500 transition-all h-3" style={{width:`${wM}%`}}/>
                    <div className="bg-emerald-500 transition-all h-3" style={{width:`${wC}%`}}/>
                  </div>
                  <div className="flex justify-between text-xs text-gray-400">
                    <span>Micka {wM}%</span><span>César {wC}%</span>
                  </div>
                </div>
              );
            })()}

            {/* Résultat : qui doit quoi */}
            <div className={`rounded-xl p-3 text-center ${stats.ecart < 50 ? 'bg-green-50 border border-green-200' : 'bg-amber-50 border border-amber-200'}`}>
              {stats.ecart < 50 ? (
                <div>
                  <div className="text-lg font-bold text-green-700">✅ Balance équilibrée</div>
                  <div className="text-xs text-green-600 mt-0.5">Écart inférieur à 50 €</div>
                </div>
              ) : (
                <div>
                  <div className="text-xs text-amber-600 mb-2 font-medium">Attribuer les prochains contrats à</div>
                  <div className="flex justify-center mb-3">
                    <span className={`px-3 py-1 rounded-full font-bold text-sm ${stats.crediteur==='Micka'?'bg-indigo-100 text-indigo-700':'bg-emerald-100 text-emerald-700'}`}>{stats.crediteur}</span>
                  </div>
                  <div className="grid grid-cols-2 gap-2 text-center">
                    <div>
                      <div className="text-xs text-gray-400">Écart réel</div>
                      <div className="text-sm font-bold text-amber-700">{fmt(stats.ecart)}</div>
                    </div>
                    <div>
                      <div className="text-xs text-gray-400">Écart projeté</div>
                      <div className="text-sm font-bold text-gray-500">{fmt(Math.abs(stats.netMickaProj - stats.netCesarProj))}</div>
                    </div>
                  </div>
                </div>
              )}
            </div>
          </div>
        </DraggableWidget>
      );
      case 'reste': return (
        <DraggableWidget key={id} {...wProps(id)}>
          <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-5">
            <h2 className="text-base font-semibold text-gray-800 mb-4">💼 Reste à encaisser</h2>
            {stats.resteAEncaisserList.length === 0 ? <EmptyState message="Tout est encaissé" icon="✅"/> : (
              <div className="overflow-x-auto">
                <table className="w-full text-sm">
                  <thead>
                    <tr className="text-left text-xs font-semibold text-gray-400 border-b border-gray-100">
                      <th className="pb-2 pr-3">Client</th><th className="pb-2 pr-3">Total</th><th className="pb-2 pr-3">Encaissé</th><th className="pb-2 pr-3">Reste</th><th className="pb-2">Échéance</th>
                    </tr>
                  </thead>
                  <tbody>
                    {stats.resteAEncaisserList.map(c => {
                      const days = daysUntil(c.dateFin);
                      const urg = days !== null && days <= 7;
                      return (
                        <tr key={c.id} onClick={()=>onNavigate('contracts',{id:c.id,tab:'paiements'})} className="border-b border-gray-50 hover:bg-gray-50 cursor-pointer transition-colors">
                          <td className="py-2.5 pr-3"><div className="font-medium text-gray-800">{c.client}</div><div className="text-xs text-gray-400 truncate max-w-[140px]">{c.prestation}</div></td>
                          <td className="py-2.5 pr-3 text-gray-600">{fmt(c.montant)}</td>
                          <td className="py-2.5 pr-3 text-green-600 font-medium">{fmt(c.totalPaid)}</td>
                          <td className="py-2.5 pr-3 font-bold text-amber-600">{fmt(c.resteC)}</td>
                          <td className="py-2.5">{c.dateFin ? <span className={`text-xs font-medium px-2 py-0.5 rounded-full ${urg?'bg-red-100 text-red-700':'bg-gray-100 text-gray-500'}`}>{urg?`⚡ J-${days}`:formatDate(c.dateFin)}</span> : <span className="text-xs text-gray-300">—</span>}</td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            )}
          </div>
        </DraggableWidget>
      );
      case 'urgents': return (
        <DraggableWidget key={id} {...wProps(id)}>
          <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-5">
            <h2 className="text-base font-semibold text-gray-800 mb-4">🔥 Dossiers urgents</h2>
            {stats.urgent.length === 0 ? <EmptyState message="Aucun dossier urgent" icon="✅"/> : (
              <div className="space-y-3">
                {stats.urgent.map(c => {
                  const ps = calcPaymentStatus(c.montant, c.payments);
                  return (
                    <div key={c.id} onClick={() => onNavigate('contracts', {id:c.id, tab:'paiements'})}
                      className="flex items-center justify-between p-3 rounded-xl border border-gray-100 hover:bg-gray-50 cursor-pointer transition-colors">
                      <div>
                        <div className="text-sm font-medium text-gray-800">{c.client}</div>
                        <div className="text-xs text-gray-500 mt-0.5">{c.prestation}</div>
                      </div>
                      <div className="flex items-center gap-2">
                        <ExpiryBadge dateFin={c.dateFin} statut={c.statut}/>
                        <StatusBadge status={ps}/>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        </DraggableWidget>
      );
      default: return null;
    }
  };

  return (
    <div className="space-y-6">
      <div className="flex flex-wrap items-center gap-3 mb-2">
        <h1 className="text-2xl font-bold text-gray-800">Tableau de bord</h1>
        <span className="text-xs text-gray-400 bg-gray-100 px-2 py-1 rounded-full">{APP_VERSION}</span>
        <div className="ml-auto flex items-center gap-2 flex-wrap">
          <PeriodeFilter periodeId={periodeId} setPeriodeId={setPeriodeId} dateDebut={dateDebut} setDateDebut={setDateDebut} dateFin={dateFin} setDateFin={setDateFin}/>
          <button onClick={()=>setCustomizing(v=>!v)} className={`px-3 py-1 text-xs rounded-lg font-medium transition-colors ${customizing?'bg-blue-100 text-blue-700':'bg-gray-100 text-gray-500 hover:bg-gray-200'}`}>
            {customizing ? '✓ Terminer' : '⚙️ Personnaliser'}
          </button>
        </div>
      </div>
      {orderedWidgets.map(id => renderWidget(id)).filter(Boolean)}
    </div>
  );
}

function QuoteModal({open, onClose, quote, clients, onSave, onDelete, onConvert}) {
  const [form, setForm] = React.useState({});
  const [confirmDelete, setConfirmDelete] = React.useState(false);
  const addToast = useToast();

  React.useEffect(() => {
    if(open) {
      if(quote) setForm({...quote});
      else setForm({id:null, clientId:'', client:'', prestation:'', montant:'', assignedTo:'Micka', statut:'Brouillon', dateCreation:todayStr(), dateExpiration:'', typePaiement:'Virement', notes:''});
    }
  }, [open, quote]);

function QuotesModule({data, setData, onNavigate}) {
  const [modalOpen, setModalOpen] = React.useState(false);
  const [selected, setSelected] = React.useState(null);
  const [search, setSearch] = React.useState('');
  const [statusFilter, setStatusFilter] = React.useState('Tous');
  const [page, setPage] = React.useState(1);
  const PER_PAGE = 20;
  const addToast = useToast();

  const filtered = React.useMemo(() => {
    return (data.quotes||[]).filter(q=>{
      if(statusFilter!=='Tous' && q.statut!==statusFilter) return false;
      if(search && !normalize(q.client).includes(normalize(search)) && !normalize(q.prestation||'').includes(normalize(search))) return false;
      return true;
    }).sort((a,b)=>new Date(b.dateCreation||0)-new Date(a.dateCreation||0));
  }, [data.quotes, search, statusFilter]);

  const paginated = filtered.slice((page-1)*PER_PAGE, page*PER_PAGE);

  const handleSave = (form) => {
    if(form.id) {
      setData(d=>({...d, quotes:d.quotes.map(q=>q.id===form.id?form:q)}));
      addToast('Devis mis à jour','success');
    } else {
      setData(d=>({...d, quotes:[...d.quotes, {...form, id:genId()}]}));
      addToast('Devis créé','success');
    }
  };

  const handleDelete = (id) => {
    setData(d=>({...d, quotes:d.quotes.filter(q=>q.id!==id)}));
    addToast('Devis supprimé','success');
  };

  const handleConvert = (quote) => {
    const newContract = {
      id: genId(), clientId: quote.clientId||'', client: quote.client, prestation: quote.prestation||'',
      montant: quote.montant, assignedTo: quote.assignedTo||'Micka', statut: 'En cours',
      dateSignature: todayStr(), dateDebut: todayStr(), dateFin: '', typePaiement: quote.typePaiement||'Virement',
      montantOPCO: '', statutOPCO: 'En attente', notes: quote.notes||'', payments: [], actions: []
    };
    setData(d=>({
      ...d,
      contracts: [...d.contracts, newContract],
      quotes: d.quotes.map(q=>q.id===quote.id ? {...q, statut:'Accepté'} : q)
    }));
    addToast('Devis converti en contrat !','success');
    onNavigate('contracts', {id: newContract.id});
  };

  const txTotal = (data.quotes||[]).filter(q=>q.statut!=='Refusé'&&q.statut!=='Expiré').reduce((s,q)=>s+(Number(q.montant)||0),0);
  const txAccepte = (data.quotes||[]).filter(q=>q.statut==='Accepté').reduce((s,q)=>s+(Number(q.montant)||0),0);
  const txEnvoye = (data.quotes||[]).filter(q=>q.statut==='Envoyé').length;
  const tauxConv = (data.quotes||[]).length > 0 ? Math.round((data.quotes||[]).filter(q=>q.statut==='Accepté').length / Math.max((data.quotes||[]).filter(q=>q.statut!=='Brouillon').length,1) * 100) : 0;

  return (
    <div className="space-y-6">
      <div className="flex items-end justify-between">
        <h1 className="text-2xl font-bold text-gray-800">Devis</h1>
        <Btn variant="primary" onClick={()=>{setSelected(null);setModalOpen(true);}}>+ Nouveau devis</Btn>
      </div>
      <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
        <KPICard label="Pipeline devis" value={fmt(txTotal)} color="blue" icon="📋"/>
        <KPICard label="Acceptés" value={fmt(txAccepte)} color="green" icon="✅"/>
        <KPICard label="En attente" value={`${txEnvoye} devis`} color="amber" icon="⏳"/>
        <KPICard label="Taux conversion" value={`${isNaN(tauxConv)?0:tauxConv}%`} color="purple" icon="🎯"/>
      </div>
      <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-4 flex flex-wrap gap-3 items-center">
        <div className="flex gap-2 flex-wrap">
          {['Tous',...QUOTE_STATUSES].map(s=>(
            <button key={s} onClick={()=>{setStatusFilter(s);setPage(1);}} className={`px-3 py-1.5 rounded-full text-xs font-medium transition-colors ${statusFilter===s?'bg-blue-600 text-white':'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}>{s}</button>
          ))}
        </div>
        <input className={`${inputCls} w-52 ml-auto`} placeholder="Rechercher..." value={search} onChange={e=>{setSearch(e.target.value);setPage(1);}}/>
      </div>
      {filtered.length===0 ? <EmptyState message="Aucun devis" icon="📋"/> : (
        <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
          <div className="hidden md:block overflow-x-auto">
            <table className="w-full text-sm">
              <thead className="bg-gray-50 border-b border-gray-100">
                <tr>{['Client','Prestation','Montant','Attribué','Statut','Créé','Expiration',''].map(h=><th key={h} className="text-left text-xs font-semibold text-gray-500 px-4 py-3">{h}</th>)}</tr>
              </thead>
              <tbody>
                {paginated.map(q=>(
                  <tr key={q.id} onClick={()=>{setSelected(q);setModalOpen(true);}} className="border-b border-gray-50 hover:bg-gray-50 cursor-pointer">
                    <td className="px-4 py-3 font-medium text-gray-800">{q.client}</td>
                    <td className="px-4 py-3 text-gray-600 max-w-[180px] truncate">{q.prestation}</td>
                    <td className="px-4 py-3 font-semibold">{fmt(q.montant)}</td>
                    <td className="px-4 py-3"><StatusBadge status={q.assignedTo}/></td>
                    <td className="px-4 py-3"><StatusBadge status={q.statut}/></td>
                    <td className="px-4 py-3 text-xs text-gray-500">{formatDate(q.dateCreation)}</td>
                    <td className="px-4 py-3 text-xs text-gray-500">{q.dateExpiration?formatDate(q.dateExpiration):'—'}</td>
                    <td className="px-4 py-3"><button className="text-blue-500 text-xs font-medium">Ouvrir →</button></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          <div className="md:hidden space-y-3 p-4">
            {paginated.map(q=>(
              <div key={q.id} onClick={()=>{setSelected(q);setModalOpen(true);}} className="flex items-center justify-between p-3 bg-gray-50 rounded-xl cursor-pointer">
                <div><div className="text-sm font-medium">{q.client}</div><div className="text-xs text-gray-400">{q.prestation} · {formatDate(q.dateCreation)}</div></div>
                <div className="flex items-center gap-2"><StatusBadge status={q.statut}/><span className="text-sm font-bold text-blue-700">{fmt(q.montant)}</span></div>
              </div>
            ))}
          </div>
          <div className="px-4 pb-3"><Pagination total={filtered.length} page={page} perPage={PER_PAGE} onChange={setPage}/></div>
        </div>
      )}
      <QuoteModal open={modalOpen} onClose={()=>{setModalOpen(false);setSelected(null);}} quote={selected} clients={data.clients} onSave={handleSave} onDelete={handleDelete} onConvert={handleConvert}/>
    </div>
  );
}

function InvoicesModule({data, setData}) {
  const [modalOpen, setModalOpen] = React.useState(false);
  const [selected, setSelected] = React.useState(null);
  const [statusFilter, setStatusFilter] = React.useState('Tous');
  const [search, setSearch] = React.useState('');
  const [page, setPage] = React.useState(1);
  const PER_PAGE = 20;
  const addToast = useToast();

  const genNumber = () => {
    const year = new Date().getFullYear();
    const existing = (data.invoices||[]).filter(i=>i.number&&i.number.startsWith(String(year)));
    const max = existing.reduce((m,i)=>{const n=parseInt(i.number.split('-')[1]||0);return n>m?n:m;},0);
    return `${year}-${String(max+1).padStart(3,'0')}`;
  };

  const filtered = React.useMemo(()=>(data.invoices||[]).filter(i=>{
    if(statusFilter!=='Tous'&&i.statut!==statusFilter) return false;
    if(search&&!normalize(i.client).includes(normalize(search))&&!normalize(i.number||'').includes(normalize(search))) return false;
    return true;
  }).sort((a,b)=>new Date(b.dateEmission||0)-new Date(a.dateEmission||0)), [data.invoices, statusFilter, search]);

  const paginated = filtered.slice((page-1)*PER_PAGE, page*PER_PAGE);

  const handleSave = (form) => {
    if(form.id) {
      setData(d=>({...d, invoices:d.invoices.map(i=>i.id===form.id?form:i)}));
      addToast('Facture mise à jour','success');
    } else {
      const num = genNumber();
      setData(d=>({...d, invoices:[...d.invoices, {...form, id:genId(), number:num}]}));
      addToast(`Facture ${num} créée`,'success');

  const handleDelete = (id) => {

  const totalEmis = (data.invoices||[]).reduce((s,i)=>s+(Number(i.montant)||0),0);

  const totalRetard = (data.invoices||[]).filter(i=>i.statut==='En retard').reduce((s,i)=>s+(Number(i.montant)||0),0);

  const statusBtnCls = (s) => `px-3 py-1.5 rounded-full text-xs font-medium transition-colors ${statusFilter===s?'bg-blue-600 text-white':'bg-gray-100 text-gray-600 hover:bg-gray-200'}`;

  return (
    <div className="space-y-6">
      <div className="flex items-end justify-between">

        <KPICard label="Payées" value={fmt(totalPaye)} color="green" icon="✅"/>
        <KPICard label="En attente" value={fmt(totalEnAttente)} color="amber" icon="⏳"/>
        <KPICard label="En retard" value={fmt(totalRetard)} color="red" icon="🚨"/>

        <input className={`${inputCls} w-48 ml-auto`} placeholder="Rechercher..." value={search} onChange={e=>{setSearch(e.target.value);setPage(1);}}/>

                    <td className="px-4 py-3 font-mono text-xs font-semibold text-blue-700">{inv.number}</td>

function QuickClientCreate({onCreated, clients}) {
  const [form, setForm] = React.useState({entreprise:'', nom:''});
  const [duplicate, setDuplicate] = React.useState(null);
  const addToast = useToast();

  const handleCreate = (force=false) => {
    if(!form.entreprise.trim() || !form.nom.trim()) { addToast('Entreprise et nom requis','error'); return; }
    if(!force) {
      const dup = clients.find(c => normalize(c.entreprise)===normalize(form.entreprise));
      if(dup) { setDuplicate(dup); return; }
    }
    const nc = {id:genId(), entreprise:form.entreprise.trim(), nom:form.nom.trim(), email:'', telephone:'', source:'Autre', etape:'Contact', potentiel:0, notes:'', dateEntree:todayStr()};
    onCreated(nc);
    setForm({entreprise:'', nom:''});
    setDuplicate(null);
  };

  return (
    <div className="bg-blue-50 border border-blue-200 rounded-xl p-4 mt-2 space-y-3">
      <div className="text-xs font-semibold text-blue-700 mb-2">Créer un nouveau client</div>
      <div className="grid grid-cols-2 gap-3">
        <div>
          <label className="block text-xs font-medium text-gray-600 mb-1">Entreprise *</label>
          <input className={inputCls} value={form.entreprise} onChange={e=>setForm(f=>({...f,entreprise:e.target.value}))} placeholder="Nom entreprise"/>
        </div>
        <div>
          <label className="block text-xs font-medium text-gray-600 mb-1">Nom contact *</label>
          <input className={inputCls} value={form.nom} onChange={e=>setForm(f=>({...f,nom:e.target.value}))} placeholder="Prénom Nom"/>
        </div>
      </div>
      {duplicate && (
        <div className="bg-amber-50 border border-amber-200 rounded-lg p-3">
          <div className="text-xs text-amber-700 font-medium mb-2">⚠️ Client existant: {duplicate.entreprise} ({duplicate.nom})</div>
          <div className="flex gap-2">
            <Btn size="sm" variant="outline" onClick={() => { onCreated(duplicate, true); setDuplicate(null); }}>Utiliser l'existant</Btn>
            <Btn size="sm" variant="secondary" onClick={() => handleCreate(true)}>Créer quand même</Btn>
          </div>
        </div>
      )}
      {!duplicate && <Btn size="sm" variant="primary" onClick={() => handleCreate()}>Créer</Btn>}
    </div>
  );
}

function ContractModal({open, onClose, contract, clients, onSave, onDelete, defaultTab='infos'}) {
  const [tab, setTab] = React.useState(defaultTab);
  const [form, setForm] = React.useState({});
  const [localClients, setLocalClients] = React.useState(clients);
  const [showQuickClient, setShowQuickClient] = React.useState(false);
  const [showAddPayment, setShowAddPayment] = React.useState(false);
  const [showAddAction, setShowAddAction] = React.useState(false);
  const [payForm, setPayForm] = React.useState({date:todayStr(),montant:'',auteur:'Client',note:''});
  const [actForm, setActForm] = React.useState({date:todayStr(),type:'Note',titre:'',auteur:'Micka',notes:''});
  const [confirmDelete, setConfirmDelete] = React.useState(false);
  const addToast = useToast();

  React.useEffect(() => { setLocalClients(clients); }, [clients]);

  React.useEffect(() => {
    if(open) {
      setTab(defaultTab||'infos');
      setShowQuickClient(false);
      setShowAddPayment(false);
      setShowAddAction(false);
      if(contract?.id) {
        // Contrat existant : charger toutes ses données
        setForm({...contract, payments:[...(contract.payments||[])], actions:[...(contract.actions||[])]});
      } else {
        // Nouveau contrat (éventuellement pré-rempli depuis le CRM)
        const prefill = contract || {};
        setForm({id:null, clientId:prefill.clientId||'', client:prefill.client||'', prestation:'', montant:prefill.montant||'', assignedTo:'Micka', statut:'En cours', dateSignature:todayStr(), dateDebut:todayStr(), dateFin:'', typePaiement:'Virement', montantOPCO:'', statutOPCO:'En attente', notes:'', payments:[], actions:[]});
      }
      setPayForm({date:todayStr(),montant:'',auteur:'Client',note:'',payAssignedTo:'Micka'});
      setActForm({date:todayStr(),type:'Note',titre:'',auteur:'Micka',notes:''});

  const setF = (k, v) => setForm(f => ({...f, [k]:v}));

  const handleClientSelect = (e) => {

  const addPayment = () => {

    setForm(f => ({...f, payments:[...(f.payments||[]), p]}));

    const a = {...actForm, id:genId()};

function ContractsModule({data, setData, deepLink, clearDeepLink}) {
  const addToast = useToast();
  const [statusFilter, setStatusFilter] = React.useState('Tous');
  const [paymentStatusFilter, setPaymentStatusFilter] = React.useState('Tous');
  const [assigneeFilter, setAssigneeFilter] = React.useState('Tous');
  const [paymentTypeFilter, setPaymentTypeFilter] = React.useState('Tous');
  const [search, setSearch] = React.useState('');
  const [periodeId, setPeriodeId] = React.useState('tout');
  const [dateDebut, setDateDebut] = React.useState('');
  const [dateFin, setDateFin] = React.useState('');
  const [filtersOpen, setFiltersOpen] = React.useState(false);
  const [selectedContract, setSelectedContract] = React.useState(null);
  const [modalOpen, setModalOpen] = React.useState(false);
  const [modalTab, setModalTab] = React.useState('infos');
  const [sortKey, setSortKey] = React.useState('dateSignature');
  const [sortDir, setSortDir] = React.useState('desc');

  React.useEffect(() => {
    if(deepLink) {
      if(deepLink.id) {
        const c = data.contracts.find(x => x.id===deepLink.id);
        if(c) { setSelectedContract(c); setModalTab(deepLink.tab||'infos'); setModalOpen(true); }
      } else if(deepLink.clientId || deepLink.client) {
        setSelectedContract({clientId:deepLink.clientId||'', client:deepLink.client||'', montant:deepLink.montant||''});
        setModalTab('infos');
        setModalOpen(true);
      }
      clearDeepLink();
    }
  }, [deepLink]);

  const handleSort = (key) => {
    if(sortKey===key) setSortDir(d=>d==='asc'?'desc':'asc');
    else { setSortKey(key); setSortDir('desc'); }
  };

  const handleExportCSV = () => {
    const rows = [['Client','Prestation','Montant','Attribué','Statut','Type Paiement','Date Signature','Encaissé','Reste']];
    (data.contracts||[]).forEach(c=>{
      const paid=(c.payments||[]).reduce((s,p)=>s+(Number(p.montant)||0),0);
      rows.push([c.client,c.prestation,c.montant,c.assignedTo,c.statut,c.typePaiement||'',c.dateSignature||'',paid,(Number(c.montant)||0)-paid]);
    });
    exportCSV(rows, `contrats_${todayStr()}.csv`);
    addToast('Export CSV téléchargé','success');
  };

  const periodeRange = React.useMemo(() => buildPeriodeRange(periodeId, dateDebut, dateFin), [periodeId, dateDebut, dateFin]);

  const filtered = React.useMemo(() => {
    return data.contracts.filter(c => {
      if(statusFilter !== 'Tous' && c.statut !== statusFilter) return false;
      if(periodeId !== 'tout' && !inPeriode(c.dateSignature||c.dateDebut||'', periodeRange)) return false;
      if(assigneeFilter !== 'Tous' && c.assignedTo !== assigneeFilter) return false;
      if(paymentTypeFilter !== 'Tous' && (c.typePaiement||'') !== paymentTypeFilter) return false;
      if(paymentStatusFilter !== 'Tous') {
        const ps = calcPaymentStatus(Number(c.montant)||0, c.payments);
        if(ps !== paymentStatusFilter) return false;
      }
      if(search) {
        const q = normalize(search);
        if(!normalize(c.client).includes(q) && !normalize(c.prestation).includes(q)) return false;
      }
      return true;
    }).sort((a,b)=>{
      const mult = sortDir==='asc'?1:-1;
      if(sortKey==='montant') return mult*(Number(a.montant||0)-Number(b.montant||0));
      if(sortKey==='client') return mult*a.client.localeCompare(b.client);
      if(sortKey==='dateSignature') return mult*(new Date(a.dateSignature||a.dateDebut||0)-new Date(b.dateSignature||b.dateDebut||0));
      if(sortKey==='dateDebut') return mult*(new Date(a.dateDebut||0)-new Date(b.dateDebut||0));
      if(sortKey==='dateFin') return mult*(new Date(a.dateFin||0)-new Date(b.dateFin||0));
      return 0;
    });
  }, [data.contracts, statusFilter, search, sortKey, sortDir, periodeId, periodeRange, paymentStatusFilter, assigneeFilter, paymentTypeFilter]);

  const totals = React.useMemo(() => {
    const nonAnnule = filtered.filter(c => c.statut !== 'Annulé');
    const signe = nonAnnule.reduce((s,c)=>s+(Number(c.montant)||0),0);
    const encaisse = nonAnnule.reduce((s,c)=>s+(c.payments||[]).reduce((ps,p)=>ps+(Number(p.montant)||0),0),0);
    return {signe, encaisse, reste:signe-encaisse};
  }, [filtered]);

  const openContract = (c) => { setSelectedContract(c); setModalTab('infos'); setModalOpen(true); };
  const openNew = () => { setSelectedContract(null); setModalTab('infos'); setModalOpen(true); };

  const handleSave = (form) => {
    const {_newClient, ...cData} = form;
    let newClients = [...data.clients];
    if(_newClient && !newClients.find(c=>c.id===_newClient.id)) {
      newClients = [...newClients, _newClient];
    }
    let newContracts;
    if(cData.id) {
      newContracts = data.contracts.map(c => c.id===cData.id ? {...cData, montant:Number(cData.montant)||0} : c);
      addToast('Contrat mis à jour','success');
    } else {
      newContracts = [...data.contracts, {...cData, id:genId(), montant:Number(cData.montant)||0}];
      addToast('Contrat créé','success');
    }
    setData(d => ({...d, contracts:newContracts, clients:newClients}));
  };

  const handleDelete = (id) => {
    setData(d => ({...d, contracts:d.contracts.filter(c=>c.id!==id)}));
    addToast('Contrat supprimé','success');
  };

  const currentContract = modalOpen ? (selectedContract?.id ? data.contracts.find(c=>c.id===selectedContract.id)||selectedContract : selectedContract) : null;

  return (
    <div className="space-y-4">
      <div className="flex items-end justify-between">
        <h1 className="text-2xl font-bold text-gray-800">Contrats</h1>
        <div className="flex gap-2">
          <Btn variant="outline" size="sm" onClick={handleExportCSV}>⬇️ CSV</Btn>
          <Btn variant="primary" onClick={openNew}>+ Nouveau contrat</Btn>
        </div>
      </div>

      {/* Filters */}
      {(() => {
        const activeFilters = [
          statusFilter!=='Tous' && {label:'Statut: '+statusFilter, reset:()=>setStatusFilter('Tous')},
          paymentStatusFilter!=='Tous' && {label:'Paiement: '+paymentStatusFilter, reset:()=>setPaymentStatusFilter('Tous')},
          assigneeFilter!=='Tous' && {label:'Attribution: '+assigneeFilter, reset:()=>setAssigneeFilter('Tous')},
          paymentTypeFilter!=='Tous' && {label:'Type: '+paymentTypeFilter, reset:()=>setPaymentTypeFilter('Tous')},
          periodeId!=='tout' && {label:'Période: '+(PERIOD_SHORTCUTS.find(s=>s.id===periodeId)?.label||periodeId), reset:()=>{setPeriodeId('tout');setDateDebut('');setDateFin('');}},
        ].filter(Boolean);
        const hasFilters = activeFilters.length > 0 || !!search;
        const resetAll = () => { setStatusFilter('Tous');setPaymentStatusFilter('Tous');setAssigneeFilter('Tous');setPaymentTypeFilter('Tous');setSearch('');setPeriodeId('tout');setDateDebut('');setDateFin(''); };
        return (
          <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-4 space-y-3">
            {/* Barre de contrôle toujours visible */}
            <div className="flex flex-wrap items-center gap-2">
              <button onClick={()=>setFiltersOpen(v=>!v)}
                className={`flex items-center gap-1.5 px-3 py-1.5 rounded-xl text-xs font-semibold transition-colors ${filtersOpen ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}>
                🔧 Filtres {activeFilters.length>0 && <span className={`px-1.5 py-0.5 rounded-full text-xs font-bold ${filtersOpen?'bg-white text-blue-600':'bg-blue-600 text-white'}`}>{activeFilters.length}</span>}
                <span className="ml-1">{filtersOpen?'▲':'▼'}</span>
              </button>
              <input className={`${inputCls} w-56`} value={search} onChange={e=>setSearch(e.target.value)} placeholder="Rechercher client, prestation..."/>
              {hasFilters && (
                <button onClick={resetAll} className="px-3 py-1.5 text-xs font-medium text-red-600 bg-red-50 hover:bg-red-100 rounded-xl transition-colors">✕ Reset</button>
              )}
              {/* Chips des filtres actifs (panneau fermé) */}
              {!filtersOpen && activeFilters.map((f,i) => (
                <span key={i} className="inline-flex items-center gap-1 px-2.5 py-1 bg-blue-50 text-blue-700 rounded-full text-xs font-medium">
                  {f.label}
                  <button onClick={f.reset} className="ml-0.5 text-blue-400 hover:text-blue-700 font-bold leading-none">×</button>
                </span>
              ))}
            </div>
            {/* Panneau de filtres (collapsible) */}
            {filtersOpen && (<>
              <div className="pt-1 border-t border-gray-50 space-y-3">
                <div className="flex flex-wrap gap-3 items-center">
                  <span className="text-xs font-semibold text-gray-500 w-24 shrink-0">Période :</span>
                  <PeriodeFilter periodeId={periodeId} setPeriodeId={setPeriodeId} dateDebut={dateDebut} setDateDebut={setDateDebut} dateFin={dateFin} setDateFin={setDateFin}/>
                </div>
                <div className="flex flex-wrap gap-3 items-center">
                  <span className="text-xs font-semibold text-gray-500 w-24 shrink-0">Statut :</span>
                  <div className="flex gap-1 flex-wrap">
                    {['Tous', ...CONTRACT_STATUSES].map(s => (
                      <button key={s} onClick={()=>setStatusFilter(s)}
                        className={`px-3 py-1.5 rounded-full text-xs font-medium transition-colors ${statusFilter===s ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}>{s}</button>
                    ))}
                  </div>
                </div>
                <div className="flex flex-wrap gap-3 items-center">
                  <span className="text-xs font-semibold text-gray-500 w-24 shrink-0">Paiement :</span>
                  <div className="flex gap-1 flex-wrap">
                    {['Tous','Non payé','Partiel','Payé'].map(s => (
                      <button key={s} onClick={()=>setPaymentStatusFilter(s)}
                        className={`px-3 py-1.5 rounded-full text-xs font-medium transition-colors ${paymentStatusFilter===s ? 'bg-emerald-600 text-white' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}>{s}</button>
                    ))}
                  </div>
                </div>
                <div className="flex flex-wrap gap-3 items-center">
                  <span className="text-xs font-semibold text-gray-500 w-24 shrink-0">Attribution :</span>
                  <div className="flex gap-1 flex-wrap">
                    {['Tous',...ASSIGNEES_AVEC_DEUX].map(s => (
                      <button key={s} onClick={()=>setAssigneeFilter(s)}
                        className={`px-3 py-1.5 rounded-full text-xs font-medium transition-colors ${assigneeFilter===s ? 'bg-indigo-600 text-white' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}>{s}</button>
                    ))}
                  </div>
                </div>
                <div className="flex flex-wrap gap-3 items-center">
                  <span className="text-xs font-semibold text-gray-500 w-24 shrink-0">Type paie. :</span>
                  <div className="flex gap-1 flex-wrap">
                    {['Tous',...PAYMENT_TYPES].map(s => (
                      <button key={s} onClick={()=>setPaymentTypeFilter(s)}
                        className={`px-3 py-1.5 rounded-full text-xs font-medium transition-colors ${paymentTypeFilter===s ? 'bg-violet-600 text-white' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}>{s}</button>
                    ))}
                  </div>
                </div>
              </div>
            </>)}
          </div>
        );
      })()}

      {/* Totals */}
      <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
        <KPICard label="Total signé" value={fmt(totals.signe)} color="blue"/>
        <KPICard label="Encaissé" value={fmt(totals.encaisse)} color="green"/>
        <KPICard label="Reste" value={fmt(totals.reste)} color="amber"/>
      </div>

      {/* Table / Cards */}
      {filtered.length === 0 ? <EmptyState message="Aucun contrat trouvé" icon="📄"/> : (<>
        {/* Desktop Table */}
        <div className="hidden md:block bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
          <table className="w-full text-sm">
            <thead className="bg-gray-50 border-b border-gray-100">
              <tr>
                {[{label:'Client',key:'client',cls:''},{label:'Prestation',key:null,cls:''},{label:'Montant',key:'montant',cls:''},{label:'Attribué',key:null,cls:''},{label:'Statut',key:null,cls:''},{label:'Paiement',key:null,cls:''},{label:'Type paie.',key:null,cls:''},{label:'Signature',key:'dateSignature',cls:''},{label:'Début',key:'dateDebut',cls:'hidden xl:table-cell'},{label:'Fin',key:'dateFin',cls:'hidden xl:table-cell'},{label:'',key:null,cls:''}].map(h=>(
                  <th key={h.label} onClick={h.key?()=>handleSort(h.key):undefined} className={`text-left text-xs font-semibold text-gray-500 px-4 py-3 ${h.key?'cursor-pointer hover:text-gray-800 select-none':''} ${h.cls}`}>
                    {h.label}{h.key&&sortKey===h.key?(sortDir==='asc'?' ↑':' ↓'):''}
                  </th>
                ))}
              </tr>
            </thead>
            <tbody>
              {filtered.map(c => {
                const ps = calcPaymentStatus(c.montant, c.payments);
                const totalPaid = (c.payments||[]).reduce((s,p)=>s+(Number(p.montant)||0),0);
                const isSurpaye = totalPaid > (Number(c.montant)||0) && (Number(c.montant)||0) > 0;
                const isOPCO = c.typePaiement==='OPCO'||c.typePaiement==='Virement + OPCO';
                return (
                  <tr key={c.id} onClick={()=>openContract(c)} className="border-b border-gray-50 hover:bg-gray-50 cursor-pointer transition-colors">
                    <td className="px-4 py-3 font-medium text-gray-800">{c.client}</td>
                    <td className="px-4 py-3 text-gray-600 max-w-[180px] truncate">{c.prestation}</td>
                    <td className="px-4 py-3 font-semibold">{fmt(c.montant)}</td>
                    <td className="px-4 py-3"><StatusBadge status={c.assignedTo}/></td>
                    <td className="px-4 py-3"><StatusBadge status={c.statut}/></td>
                    <td className="px-4 py-3"><StatusBadge status={isSurpaye ? 'Surpayé' : ps}/></td>
                    <td className="px-4 py-3">
                      {c.typePaiement && <StatusBadge status={c.typePaiement}/>}
                      {isOPCO && c.statutOPCO && <span className="ml-1"><StatusBadge status={c.statutOPCO}/></span>}
                    </td>
                    <td className="px-4 py-3 text-xs text-gray-500">{c.dateSignature ? formatDate(c.dateSignature) : '—'}</td>
                    <td className="px-4 py-3 text-xs text-gray-500 hidden xl:table-cell">{c.dateDebut ? formatDate(c.dateDebut) : '—'}</td>
                    <td className="px-4 py-3 text-xs text-gray-500 hidden xl:table-cell">{c.dateFin ? formatDate(c.dateFin) : '—'}</td>
                    <td className="px-4 py-3"><button className="text-blue-500 hover:text-blue-700 text-xs font-medium">Ouvrir →</button></td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>

        {/* Mobile Cards */}
        <div className="md:hidden space-y-3">
          {filtered.map(c => {
            const ps = calcPaymentStatus(c.montant, c.payments);
            const isOPCO = c.typePaiement==='OPCO'||c.typePaiement==='Virement + OPCO';
            return (
              <div key={c.id} onClick={()=>openContract(c)} className="bg-white rounded-xl p-4 shadow-sm border border-gray-100 cursor-pointer">
                <div className="flex justify-between items-start mb-2">
                  <div>
                    <div className="font-semibold text-gray-800">{c.client}</div>
                    <div className="text-xs text-gray-500 mt-0.5">{c.prestation}</div>
                    {c.dateSignature && <div className="text-xs text-gray-400 mt-0.5">Signé le {formatDate(c.dateSignature)}</div>}
                    {(c.dateDebut||c.dateFin) && <div className="text-xs text-gray-400 mt-0.5">{c.dateDebut?formatDate(c.dateDebut):''}{c.dateDebut&&c.dateFin?' → ':''}{c.dateFin?formatDate(c.dateFin):''}</div>}
                  </div>
                  <div className="text-base font-bold text-blue-700">{fmt(c.montant)}</div>
                </div>
                <div className="flex flex-wrap gap-1.5">
                  <StatusBadge status={c.assignedTo}/>
                  <StatusBadge status={c.statut}/>
                  <StatusBadge status={ps}/>
                  {c.typePaiement && <StatusBadge status={c.typePaiement}/>}
                  {isOPCO && c.statutOPCO && <StatusBadge status={c.statutOPCO}/>}
                  <ExpiryBadge dateFin={c.dateFin} statut={c.statut}/>
                </div>
              </div>
            );
          })}
        </div>
      </>)}

      <ContractModal
        open={modalOpen}
        onClose={()=>{setModalOpen(false);setSelectedContract(null);}}
        contract={currentContract}
        clients={data.clients}
        onSave={handleSave}
        onDelete={handleDelete}
        defaultTab={modalTab}
      />
    </div>
  );
}
