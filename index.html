function buildLedgerEntries(data) {
  const entries = [];
  (data.bank.transactions||[]).filter(t=>t.statut!=='Annulé').forEach(t => {
    entries.push({id:'bank_'+t.id, sourceId:t.id, type:'bank', date:t.date, label:t.label||'', montant:Number(t.montant)||0, auteur:t.auteur||'', source:'Banque', category:''});
  });
  (data.expenses||[]).forEach(e => {
    entries.push({id:'exp_'+e.id, sourceId:e.id, type:'expense', date:e.date, label:e.titre||'', montant:-Math.abs(Number(e.montant)||0), auteur:e.payePar||'', source:'Avances', category:e.categorie||''});
  });
  (data.contracts||[]).forEach(c => {
    if(c.statut==='Annulé') return;
    (c.payments||[]).forEach(p => {
      entries.push({id:'pay_'+p.id, sourceId:p.id, type:'contract', date:p.date, label:`${c.client} – ${c.prestation}`, montant:Math.abs(Number(p.montant)||0), auteur:p.auteur||'', source:'Contrats', category:'', contractId:c.id, assignedTo:c.assignedTo, payNote:p.note||''});
    });
  });
  return entries.sort((a,b)=>new Date(b.date)-new Date(a.date));
}

function securizeData(d) {
  if(!d) d = {};
  if(!Array.isArray(d.contracts)) d.contracts = [];
  if(!Array.isArray(d.clients)) d.clients = [];
  if(!Array.isArray(d.tasks)) d.tasks = [];
  if(!Array.isArray(d.expenses)) d.expenses = [];
  if(!d.bank) d.bank = {initialBalance:0, transactions:[], subscriptions:[]};
  if(typeof d.bank.initialBalance !== 'number') d.bank.initialBalance = 0;
  if(!Array.isArray(d.bank.transactions)) d.bank.transactions = [];
  if(!Array.isArray(d.bank.subscriptions)) d.bank.subscriptions = [];
  if(!d.config) d.config = {driveLinks:{}};
  if(!d.config.driveLinks) d.config.driveLinks = {};
  d.contracts.forEach(c => {
    if(!Array.isArray(c.payments)) c.payments = [];
    if(!Array.isArray(c.actions)) c.actions = [];
  });
  return d;
}

function loadData() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if(!raw) return securizeData(JSON.parse(JSON.stringify(INITIAL_DATA)));
    const parsed = JSON.parse(raw);
    return securizeData(parsed);
  } catch(e) {
    return securizeData(JSON.parse(JSON.stringify(INITIAL_DATA)));

}

function doExport(data) {
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `entrepreneurpro_export_${todayStr()}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function doImport(file, onSuccess, onError) {
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const parsed = JSON.parse(e.target.result);
      const required = ['contracts','clients','tasks','expenses','bank'];
      for(const k of required) {
        if(!(k in parsed)) { onError('Fichier invalide: clé manquante ' + k); return; }
      }
      delete parsed.passwords;
      parsed.schemaVersion = 2;
      onSuccess(securizeData(parsed));
    } catch(err) {
      onError('Erreur de parsing JSON: ' + err.message);
    }
  };
  reader.readAsText(file);
}

const ToastContext = React.createContext(null);

function ToastProvider({children}) {
  const [toasts, setToasts] = React.useState([]);
  const addToast = React.useCallback((msg, type='info') => {
    const id = genId();
    setToasts(prev => [...prev, {id, msg, type}]);
    setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 3000);
  }, []);
  const colors = {success:'bg-green-500', error:'bg-red-500', info:'bg-blue-500'};
  return (
    <ToastContext.Provider value={addToast}>
      {children}
      <div className="fixed bottom-4 right-4 z-[100] flex flex-col gap-2 pointer-events-none">
        {toasts.map(t => (
          <div key={t.id} className={`anim px-4 py-3 rounded-lg text-white text-sm shadow-lg ${colors[t.type]||colors.info} pointer-events-auto`}>
            {t.msg}
          </div>
        ))}
      </div>
    </ToastContext.Provider>
  );
}

function useToast() { return React.useContext(ToastContext); }

function Modal({open, onClose, title, children, size='md'}) {
  React.useEffect(() => {
    if(!open) return;
    const prev = document.body.style.overflow;
    document.body.style.overflow = 'hidden';
    const handler = (e) => { if(e.key==='Escape') onClose(); };
    document.addEventListener('keydown', handler);
    return () => { document.body.style.overflow = prev; document.removeEventListener('keydown', handler); };
  }, [open, onClose]);

  if(!open) return null;
  const sizes = {sm:'max-w-md', md:'max-w-2xl', lg:'max-w-4xl', xl:'max-w-6xl'};
  return (
    <div className="fixed inset-0 z-50 flex items-start justify-center p-4 pt-10 overflow-y-auto">
      <div className="fixed inset-0 bg-black/40 backdrop-blur-sm" onClick={onClose}/>
      <div className={`relative bg-white rounded-2xl shadow-2xl w-full ${sizes[size]||sizes.md} anim my-auto`}>
        <div className="flex items-center justify-between px-6 py-4 border-b">
          <h2 className="text-lg font-semibold text-gray-800">{title}</h2>
          <button onClick={onClose} className="text-gray-400 hover:text-gray-600 text-2xl leading-none">&times;</button>
        </div>
        <div className="px-6 py-5">{children}</div>
      </div>
    </div>
  );
}

function ConfirmModal({open, onClose, onConfirm, title, message}) {
  return (
    <Modal open={open} onClose={onClose} title={title||'Confirmation'} size="sm">
      <p className="text-gray-600 mb-6">{message||'Êtes-vous sûr ?'}</p>
      <div className="flex gap-3 justify-end">
        <Btn variant="secondary" onClick={onClose}>Annuler</Btn>
        <Btn variant="danger" onClick={() => { onConfirm(); onClose(); }}>Confirmer</Btn>
      </div>
    </Modal>
  );
}

function ExpiryBadge({dateFin, statut}) {
  if(statut==='Terminé') return <span className="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-700">✓ Terminé</span>;
  if(statut==='Annulé') return <span className="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-red-100 text-red-700">Annulé</span>;
  if(!dateFin) return null;
  const days = daysUntil(dateFin);
  if(days === null) return null;
  if(days < 0) return <span className="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-bold bg-red-100 text-red-700">Expiré</span>;
  if(days <= 7) return <span className="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-bold bg-red-100 text-red-700">J-{days}</span>;
  if(days <= 30) return <span className="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-amber-100 text-amber-700">J-{days}</span>;
  return <span className="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-gray-100 text-gray-600">J-{days}</span>;
}

function Dashboard({data, onNavigate}) {
  const stats = React.useMemo(() => {
    const entries = buildLedgerEntries(data);
    const totalEntrees = entries.filter(e=>e.montant>0).reduce((s,e)=>s+e.montant, 0);
    const totalSorties = entries.filter(e=>e.montant<0).reduce((s,e)=>s+Math.abs(e.montant), 0);
    const balance = totalEntrees - totalSorties;

    const nonAnnule = data.contracts.filter(c => c.statut !== 'Annulé');
    const caSigne = nonAnnule.reduce((s,c) => s + (Number(c.montant)||0), 0);
    const caEncaisse = entries.filter(e=>e.type==='contract').reduce((s,e)=>s+e.montant, 0);
    const reste = caSigne - caEncaisse;
    const potentiel = data.clients.reduce((s,cl) => s + (Number(cl.potentiel)||0), 0);

    const mickaPay = entries.filter(e=>e.type==='contract'&&e.assignedTo==='Micka').reduce((s,e)=>s+e.montant,0);
    const cesarPay = entries.filter(e=>e.type==='contract'&&e.assignedTo==='César').reduce((s,e)=>s+e.montant,0);
    const mickaAdv = entries.filter(e=>e.type==='expense'&&e.auteur==='Micka').reduce((s,e)=>s+Math.abs(e.montant),0);
    const cesarAdv = entries.filter(e=>e.type==='expense'&&e.auteur==='César').reduce((s,e)=>s+Math.abs(e.montant),0);
    const netMicka = mickaPay - mickaAdv;
    const netCesar = cesarPay - cesarAdv;
    const ecart = Math.abs(netMicka - netCesar);
    const recommended = ecart > 50 ? (netMicka > netCesar ? 'César' : 'Micka') : null;

    const urgent = data.contracts
      .filter(c => c.statut === 'En cours' && c.dateFin)
      .sort((a,b) => new Date(a.dateFin) - new Date(b.dateFin))
      .slice(0,3);

    const resteAEncaisserList = data.contracts
      .filter(c => c.statut !== 'Annulé')
      .map(c => {
        const totalPaid = (c.payments||[]).reduce((s,p)=>s+(Number(p.montant)||0),0);
        const resteC = (Number(c.montant)||0) - totalPaid;
        return {...c, totalPaid, resteC};
      })
      .filter(c => c.resteC > 0)
      .sort((a,b) => {
        if(a.dateFin && b.dateFin) return new Date(a.dateFin)-new Date(b.dateFin);
        if(a.dateFin) return -1;
        if(b.dateFin) return 1;
        return 0;
      });

    return {caSigne, caEncaisse, reste, potentiel, netMicka, netCesar, ecart, recommended, urgent, totalEntrees, totalSorties, balance, resteAEncaisserList};
  }, [data]);

  return (
    <div className="space-y-6">
      <div className="flex items-center gap-3 mb-2">
        <h1 className="text-2xl font-bold text-gray-800">Tableau de bord</h1>
        <span className="text-xs text-gray-400 bg-gray-100 px-2 py-1 rounded-full">{APP_VERSION}</span>
      </div>

      {/* KPI Row */}
      <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
        <KPICard label="CA Signé" value={fmt(stats.caSigne)} icon="📄" color="blue"/>
        <KPICard label="CA Encaissé" value={fmt(stats.caEncaisse)} icon="💰" color="green"/>
        <KPICard label="Reste à encaisser" value={fmt(stats.reste)} icon="⏳" color="amber"/>
        <KPICard label="Potentiel Prospects" value={fmt(stats.potentiel)} icon="🎯" color="purple"/>
      </div>

      {/* Flux financiers (ledger) */}
      <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-5">
        <h2 className="text-base font-semibold text-gray-800 mb-4">📊 Flux financiers (toutes sources)</h2>
        <div className="grid grid-cols-3 gap-4">
          <KPICard label="Entrées totales" value={fmt(stats.totalEntrees)} color="green" icon="⬆️"/>
          <KPICard label="Sorties totales" value={fmt(stats.totalSorties)} color="red" icon="⬇️"/>
          <KPICard label="Balance nette" value={fmt(stats.balance)} color={stats.balance>=0?'blue':'red'} icon="⚖️"/>
        </div>
      </div>

      {/* Trésorerie Duo */}
      <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-5">
        <h2 className="text-base font-semibold text-gray-800 mb-4">💳 Trésorerie Duo</h2>
        <div className="space-y-4">
          {(() => {
            const maxNet = Math.max(Math.abs(stats.netMicka), Math.abs(stats.netCesar));
            const wMicka = maxNet > 0 ? Math.min(100, Math.round(Math.abs(stats.netMicka)/maxNet*100)) : 0;
            const wCesar = maxNet > 0 ? Math.min(100, Math.round(Math.abs(stats.netCesar)/maxNet*100)) : 0;
            return (<>
          {/* Micka */}
          <div>
            <div className="flex justify-between items-center mb-1">
              <span className="text-sm font-medium text-indigo-700">Micka</span>
              <span className={`text-sm font-bold ${stats.netMicka >= 0 ? 'text-indigo-700' : 'text-red-500'}`}>{fmt(stats.netMicka)}</span>
            </div>
            <div className="w-full bg-gray-100 rounded-full h-2">
              <div className={`h-2 rounded-full transition-all ${stats.netMicka >= 0 ? 'bg-indigo-500' : 'bg-indigo-300'}`} style={{width:`${wMicka}%`}}/>
            </div>
          </div>
          {/* César */}
          <div>
            <div className="flex justify-between items-center mb-1">
              <span className="text-sm font-medium text-emerald-700">César</span>
              <span className={`text-sm font-bold ${stats.netCesar >= 0 ? 'text-emerald-700' : 'text-red-500'}`}>{fmt(stats.netCesar)}</span>
            </div>
            <div className="w-full bg-gray-100 rounded-full h-2">
              <div className={`h-2 rounded-full transition-all ${stats.netCesar >= 0 ? 'bg-emerald-500' : 'bg-emerald-300'}`} style={{width:`${wCesar}%`}}/>
            </div>
          </div>
          </>);
          })()}
          <div className="flex items-center justify-between pt-2 border-t border-gray-100">
            <span className="text-xs text-gray-500">Écart duo: {fmt(stats.ecart)}</span>
            {stats.recommended && (
              <span className="text-xs bg-amber-50 text-amber-700 px-2 py-1 rounded-full font-medium">
                Prochain encaissement recommandé pour {stats.recommended}
              </span>
            )}
          </div>
        </div>
      </div>

      {/* Reste à encaisser */}
      <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-5">
        <h2 className="text-base font-semibold text-gray-800 mb-4">💼 Reste à encaisser</h2>
        {stats.resteAEncaisserList.length === 0 ? <EmptyState message="Tout est encaissé" icon="✅"/> : (
          <div className="overflow-x-auto">
            <table className="w-full text-sm">
              <thead>
                <tr className="text-left text-xs font-semibold text-gray-400 border-b border-gray-100">
                  <th className="pb-2 pr-3">Client</th>
                  <th className="pb-2 pr-3">Total</th>
                  <th className="pb-2 pr-3">Encaissé</th>
                  <th className="pb-2 pr-3">Reste</th>
                  <th className="pb-2">Échéance</th>
                </tr>
              </thead>
              <tbody>
                {stats.resteAEncaisserList.map(c => {
                  const days = daysUntil(c.dateFin);
                  const urgent = days !== null && days <= 7;
                  return (
                    <tr key={c.id} onClick={()=>onNavigate('contracts',{id:c.id,tab:'paiements'})} className="border-b border-gray-50 hover:bg-gray-50 cursor-pointer transition-colors">
                      <td className="py-2.5 pr-3">
                        <div className="font-medium text-gray-800">{c.client}</div>
                        <div className="text-xs text-gray-400 truncate max-w-[140px]">{c.prestation}</div>
                      </td>
                      <td className="py-2.5 pr-3 text-gray-600">{fmt(c.montant)}</td>
                      <td className="py-2.5 pr-3 text-green-600 font-medium">{fmt(c.totalPaid)}</td>
                      <td className="py-2.5 pr-3 font-bold text-amber-600">{fmt(c.resteC)}</td>
                      <td className="py-2.5">
                        {c.dateFin ? (
                          <span className={`text-xs font-medium px-2 py-0.5 rounded-full ${urgent ? 'bg-red-100 text-red-700' : 'bg-gray-100 text-gray-500'}`}>
                            {urgent ? `⚡ J-${days}` : formatDate(c.dateFin)}
                          </span>
                        ) : <span className="text-xs text-gray-300">—</span>}
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        )}
      </div>

      {/* Dossiers urgents */}
      <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-5">
        <h2 className="text-base font-semibold text-gray-800 mb-4">🔥 Dossiers urgents</h2>
        {stats.urgent.length === 0 ? <EmptyState message="Aucun dossier urgent" icon="✅"/> : (
          <div className="space-y-3">
            {stats.urgent.map(c => {
              const ps = calcPaymentStatus(c.montant, c.payments);
              return (
                <div key={c.id} onClick={() => onNavigate('contracts', {id:c.id, tab:'paiements'})}
                  className="flex items-center justify-between p-3 rounded-xl border border-gray-100 hover:bg-gray-50 cursor-pointer transition-colors">
                  <div>
                    <div className="text-sm font-medium text-gray-800">{c.client}</div>
                    <div className="text-xs text-gray-500 mt-0.5">{c.prestation}</div>
                  </div>
                  <div className="flex items-center gap-2">
                    <ExpiryBadge dateFin={c.dateFin} statut={c.statut}/>
                    <StatusBadge status={ps}/>
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}

function QuickClientCreate({onCreated, clients}) {
  const [form, setForm] = React.useState({entreprise:'', nom:''});
  const [duplicate, setDuplicate] = React.useState(null);
  const addToast = useToast();

  const handleCreate = (force=false) => {
    if(!form.entreprise.trim() || !form.nom.trim()) { addToast('Entreprise et nom requis','error'); return; }
    if(!force) {
      const dup = clients.find(c => normalize(c.entreprise)===normalize(form.entreprise));
      if(dup) { setDuplicate(dup); return; }
    }
    const nc = {id:genId(), entreprise:form.entreprise.trim(), nom:form.nom.trim(), email:'', telephone:'', source:'Autre', etape:'Contact', potentiel:0, notes:'', dateEntree:todayStr()};
    onCreated(nc);
    setForm({entreprise:'', nom:''});
    setDuplicate(null);
  };

  return (
    <div className="bg-blue-50 border border-blue-200 rounded-xl p-4 mt-2 space-y-3">
      <div className="text-xs font-semibold text-blue-700 mb-2">Créer un nouveau client</div>
      <div className="grid grid-cols-2 gap-3">
        <div>
          <label className="block text-xs font-medium text-gray-600 mb-1">Entreprise *</label>
          <input className={inputCls} value={form.entreprise} onChange={e=>setForm(f=>({...f,entreprise:e.target.value}))} placeholder="Nom entreprise"/>
        </div>
        <div>
          <label className="block text-xs font-medium text-gray-600 mb-1">Nom contact *</label>
          <input className={inputCls} value={form.nom} onChange={e=>setForm(f=>({...f,nom:e.target.value}))} placeholder="Prénom Nom"/>
        </div>
      </div>
      {duplicate && (
        <div className="bg-amber-50 border border-amber-200 rounded-lg p-3">
          <div className="text-xs text-amber-700 font-medium mb-2">⚠️ Client existant: {duplicate.entreprise} ({duplicate.nom})</div>
          <div className="flex gap-2">
            <Btn size="sm" variant="outline" onClick={() => { onCreated(duplicate, true); setDuplicate(null); }}>Utiliser l'existant</Btn>
            <Btn size="sm" variant="secondary" onClick={() => handleCreate(true)}>Créer quand même</Btn>
          </div>
        </div>
      )}
      {!duplicate && <Btn size="sm" variant="primary" onClick={() => handleCreate()}>Créer</Btn>}
    </div>
  );
}

function ContractModal({open, onClose, contract, clients, onSave, onDelete, defaultTab='infos'}) {
  const [tab, setTab] = React.useState(defaultTab);
  const [form, setForm] = React.useState({});
  const [localClients, setLocalClients] = React.useState(clients);
  const [showQuickClient, setShowQuickClient] = React.useState(false);
  const [showAddPayment, setShowAddPayment] = React.useState(false);
  const [showAddAction, setShowAddAction] = React.useState(false);
  const [payForm, setPayForm] = React.useState({date:todayStr(),montant:'',auteur:'Client',note:''});
  const [actForm, setActForm] = React.useState({date:todayStr(),type:'Note',titre:'',auteur:'Micka',notes:''});
  const [confirmDelete, setConfirmDelete] = React.useState(false);
  const addToast = useToast();

  React.useEffect(() => { setLocalClients(clients); }, [clients]);

  React.useEffect(() => {
    if(open) {
      setTab(defaultTab||'infos');
      setShowQuickClient(false);
      setShowAddPayment(false);
      setShowAddAction(false);
      if(contract) {
        setForm({...contract, payments:[...(contract.payments||[])], actions:[...(contract.actions||[])]});
      } else {
        setForm({id:null, clientId:'', client:'', prestation:'', montant:'', assignedTo:'Micka', statut:'En cours', dateDebut:todayStr(), dateFin:'', notes:'', payments:[], actions:[]});
      }
      setPayForm({date:todayStr(),montant:'',auteur:'Client',note:''});
      setActForm({date:todayStr(),type:'Note',titre:'',auteur:'Micka',notes:''});
    }
  }, [open, contract, defaultTab]);

  const setF = (k, v) => setForm(f => ({...f, [k]:v}));

  const handleClientSelect = (e) => {
    const cid = e.target.value;
    const cl = localClients.find(c => c.id===cid);
    if(cl) setForm(f => ({...f, clientId:cl.id, client:cl.entreprise}));
    else setForm(f => ({...f, clientId:'', client:''}));
  };

  const handleQuickClientCreated = (nc, existing=false) => {
    if(!existing) {
      setLocalClients(prev => prev.find(c=>c.id===nc.id) ? prev : [...prev, nc]);
      setForm(f => ({...f, clientId:nc.id, client:nc.entreprise, _newClient:nc}));
      addToast('Client créé & sélectionné', 'success');
    } else {
      setForm(f => ({...f, clientId:nc.id, client:nc.entreprise}));
    }
    setShowQuickClient(false);
  };

  const handleSave = () => {
    if(!form.client.trim()) { addToast('Client requis','error'); return; }
    if(!form.prestation.trim()) { addToast('Prestation requise','error'); return; }
    onSave(form);
    onClose();
  };

  const addPayment = () => {
    if(!payForm.montant || isNaN(Number(payForm.montant))) { addToast('Montant invalide','error'); return; }
    const p = {...payForm, id:genId(), montant:Number(payForm.montant)};
    setForm(f => ({...f, payments:[...(f.payments||[]), p]}));
    setShowAddPayment(false);
    setPayForm({date:todayStr(),montant:'',auteur:'Client',note:''});
    addToast('Paiement ajouté','success');
  };

  const deletePayment = (pid) => setForm(f => ({...f, payments:(f.payments||[]).filter(p=>p.id!==pid)}));

  const addAction = () => {
    if(!actForm.titre.trim()) { addToast('Titre requis','error'); return; }
    const a = {...actForm, id:genId()};
    setForm(f => ({...f, actions:[...(f.actions||[]), a]}));
    setShowAddAction(false);
    setActForm({date:todayStr(),type:'Note',titre:'',auteur:'Micka',notes:''});
    addToast('Action ajoutée','success');
  };

  const deleteAction = (aid) => setForm(f => ({...f, actions:(f.actions||[]).filter(a=>a.id!==aid)}));

  const paidTotal = (form.payments||[]).reduce((s,p)=>s+(Number(p.montant)||0),0);
  const montantNum = Number(form.montant)||0;
  const ps = calcPaymentStatus(montantNum, form.payments||[]);
  const sortedPayments = [...(form.payments||[])].sort((a,b)=>new Date(b.date)-new Date(a.date));
  const sortedActions = [...(form.actions||[])].sort((a,b)=>new Date(b.date)-new Date(a.date));

  const tabs = [
    {id:'infos', label:'Infos'},
    {id:'paiements', label:`Paiements (${(form.payments||[]).length})`},
    {id:'suivi', label:`Suivi (${(form.actions||[]).length})`}
  ];

  return (
    <Modal open={open} onClose={onClose} title={form.id ? `Contrat – ${form.client}` : 'Nouveau contrat'} size="lg">
      <Tabs tabs={tabs} active={tab} onChange={setTab}/>
      {tab==='infos' && (
        <div className="space-y-4">
          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <label className="block text-xs font-medium text-gray-600 mb-1">Client *</label>
              <div className="flex gap-2">
                <select className={selectCls} value={form.clientId||''} onChange={handleClientSelect}>
                  <option value="">— Sélectionner —</option>
                  {localClients.map(c => <option key={c.id} value={c.id}>{c.entreprise} – {c.nom}</option>)}
                </select>
                <Btn size="sm" variant="outline" onClick={() => setShowQuickClient(v=>!v)}>+</Btn>
              </div>
              {showQuickClient && <QuickClientCreate clients={localClients} onCreated={handleQuickClientCreated}/>}
            </div>
            <div>
              <label className="block text-xs font-medium text-gray-600 mb-1">Prestation *</label>
              <input className={inputCls} value={form.prestation||''} onChange={e=>setF('prestation',e.target.value)} placeholder="Description de la mission"/>
            </div>
            <div>
              <label className="block text-xs font-medium text-gray-600 mb-1">Montant (€)</label>
              <input className={inputCls} type="number" step="0.01" value={form.montant||''} onChange={e=>setF('montant',e.target.value)} placeholder="0"/>
            </div>
            <div>
              <label className="block text-xs font-medium text-gray-600 mb-1">Attribué à</label>
              <select className={selectCls} value={form.assignedTo||'Micka'} onChange={e=>setF('assignedTo',e.target.value)}>
                {ASSIGNEES.map(a=><option key={a}>{a}</option>)}
              </select>
            </div>
            <div>
              <label className="block text-xs font-medium text-gray-600 mb-1">Statut</label>
              <select className={selectCls} value={form.statut||'En cours'} onChange={e=>setF('statut',e.target.value)}>
                {CONTRACT_STATUSES.map(s=><option key={s}>{s}</option>)}
              </select>
            </div>
            <div>
              <label className="block text-xs font-medium text-gray-600 mb-1">Date début</label>
              <input className={inputCls} type="date" value={form.dateDebut||''} onChange={e=>setF('dateDebut',e.target.value)}/>
            </div>
            <div>
              <label className="block text-xs font-medium text-gray-600 mb-1">Date fin</label>
              <input className={inputCls} type="date" value={form.dateFin||''} onChange={e=>setF('dateFin',e.target.value)}/>
            </div>
          </div>
          <div>
            <label className="block text-xs font-medium text-gray-600 mb-1">Notes</label>
            <textarea className={textareaCls} rows={3} value={form.notes||''} onChange={e=>setF('notes',e.target.value)}/>
          </div>
          <div className="flex justify-between pt-2 border-t">
            {form.id && <Btn variant="danger" onClick={()=>setConfirmDelete(true)}>Supprimer</Btn>}
            <div className="flex gap-2 ml-auto">
              <Btn variant="secondary" onClick={onClose}>Annuler</Btn>
              <Btn variant="primary" onClick={handleSave}>Enregistrer</Btn>
            </div>
          </div>
        </div>
      )}
      {tab==='paiements' && (
        <div className="space-y-4">
          <div className="grid grid-cols-3 gap-3">
            <KPICard label="Montant total" value={fmt(montantNum)} color="blue"/>
            <KPICard label="Encaissé" value={fmt(paidTotal)} color="green"/>
            <KPICard label="Reste" value={fmt(Math.max(0,montantNum-paidTotal))} color="amber"/>
          </div>
          {paidTotal > montantNum && montantNum > 0 && (
            <div className="flex items-start gap-2 bg-red-50 border border-red-200 rounded-xl px-4 py-3">
              <span className="text-red-500 text-lg leading-none mt-0.5">⚠️</span>
              <div>
                <div className="text-sm font-semibold text-red-700">Sur-encaissement détecté</div>
                <div className="text-xs text-red-600 mt-0.5">Les paiements ({fmt(paidTotal)}) dépassent le montant du contrat ({fmt(montantNum)}) de <span className="font-bold">+{fmt(paidTotal - montantNum)}</span>. Vérifiez les saisies.</div>
              </div>
            </div>
          )}
          <div className="flex items-center gap-3">
            <StatusBadge status={paidTotal > montantNum && montantNum > 0 ? 'Surpayé' : ps}/>
            <Btn size="sm" variant="outline" onClick={()=>setShowAddPayment(v=>!v)}>+ Ajouter paiement</Btn>
          </div>
          {showAddPayment && (
            <div className="bg-gray-50 rounded-xl p-4 space-y-3 border border-gray-200">
              <div className="grid grid-cols-2 gap-3">
                <div><label className="block text-xs font-medium text-gray-600 mb-1">Date</label><input className={inputCls} type="date" value={payForm.date} onChange={e=>setPayForm(f=>({...f,date:e.target.value}))}/></div>
                <div><label className="block text-xs font-medium text-gray-600 mb-1">Montant (€) *</label><input className={inputCls} type="number" step="0.01" value={payForm.montant} onChange={e=>setPayForm(f=>({...f,montant:e.target.value}))} placeholder="0"/></div>
                <div><label className="block text-xs font-medium text-gray-600 mb-1">Auteur</label><select className={selectCls} value={payForm.auteur} onChange={e=>setPayForm(f=>({...f,auteur:e.target.value}))}>{PAYMENT_AUTHORS.map(a=><option key={a}>{a}</option>)}</select></div>
                <div><label className="block text-xs font-medium text-gray-600 mb-1">Note</label><input className={inputCls} value={payForm.note} onChange={e=>setPayForm(f=>({...f,note:e.target.value}))} placeholder="Acompte, solde..."/></div>
              </div>
              <div className="flex gap-2">
                <Btn size="sm" variant="primary" onClick={addPayment}>Ajouter</Btn>
                <Btn size="sm" variant="ghost" onClick={()=>setShowAddPayment(false)}>Annuler</Btn>
              </div>
            </div>
          )}
          {sortedPayments.length===0 ? <EmptyState message="Aucun paiement enregistré" icon="💳"/> : (
            <div className="space-y-2">
              {sortedPayments.map(p => (
                <div key={p.id} className="flex items-center justify-between p-3 bg-gray-50 rounded-xl border border-gray-100">
                  <div>
                    <span className="text-sm font-semibold text-green-700">{fmt(p.montant)}</span>
                    <span className="text-xs text-gray-500 ml-2">{formatDate(p.date)}</span>
                    {p.note && <span className="text-xs text-gray-500 ml-2">– {p.note}</span>}
                  </div>
                  <div className="flex items-center gap-2">
                    <StatusBadge status={p.auteur}/>
                    <button onClick={()=>deletePayment(p.id)} className="text-gray-300 hover:text-red-500 text-lg leading-none">&times;</button>
                  </div>
                </div>
              ))}
            </div>
          )}
          <div className="flex justify-end pt-2 border-t gap-2">
            <Btn variant="secondary" onClick={onClose}>Annuler</Btn>
            <Btn variant="primary" onClick={handleSave}>Enregistrer</Btn>
          </div>
        </div>
      )}
      {tab==='suivi' && (
        <div className="space-y-4">
          <div className="flex gap-2">
            <Btn size="sm" variant="outline" onClick={()=>setShowAddAction(v=>!v)}>+ Ajouter action</Btn>
          </div>
          {showAddAction && (
            <div className="bg-gray-50 rounded-xl p-4 space-y-3 border border-gray-200">
              <div className="grid grid-cols-2 gap-3">
                <div><label className="block text-xs font-medium text-gray-600 mb-1">Date</label><input className={inputCls} type="date" value={actForm.date} onChange={e=>setActForm(f=>({...f,date:e.target.value}))}/></div>
                <div><label className="block text-xs font-medium text-gray-600 mb-1">Type</label><select className={selectCls} value={actForm.type} onChange={e=>setActForm(f=>({...f,type:e.target.value}))}>{ACTION_TYPES.map(t=><option key={t}>{t}</option>)}</select></div>
                <div><label className="block text-xs font-medium text-gray-600 mb-1">Titre *</label><input className={inputCls} value={actForm.titre} onChange={e=>setActForm(f=>({...f,titre:e.target.value}))} placeholder="Objet de l'action"/></div>
                <div><label className="block text-xs font-medium text-gray-600 mb-1">Auteur</label><select className={selectCls} value={actForm.auteur} onChange={e=>setActForm(f=>({...f,auteur:e.target.value}))}>{ASSIGNEES.map(a=><option key={a}>{a}</option>)}</select></div>
                <div className="col-span-2"><label className="block text-xs font-medium text-gray-600 mb-1">Notes</label><textarea className={textareaCls} rows={2} value={actForm.notes} onChange={e=>setActForm(f=>({...f,notes:e.target.value}))}/></div>
              </div>
              <div className="flex gap-2">
                <Btn size="sm" variant="primary" onClick={addAction}>Ajouter</Btn>
                <Btn size="sm" variant="ghost" onClick={()=>setShowAddAction(false)}>Annuler</Btn>
              </div>
            </div>
          )}
          {sortedActions.length===0 ? <EmptyState message="Aucune action enregistrée" icon="📋"/> : (
            <div className="space-y-2">
              {sortedActions.map(a => (
                <div key={a.id} className="flex items-start justify-between p-3 bg-gray-50 rounded-xl border border-gray-100">
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center gap-2 flex-wrap mb-1">
                      <StatusBadge status={a.type}/>
                      <span className="text-sm font-medium text-gray-800">{a.titre}</span>
                    </div>
                    <div className="text-xs text-gray-500">{formatDate(a.date)} · {a.auteur}</div>
                    {a.notes && <div className="text-xs text-gray-500 mt-0.5">{a.notes}</div>}
                  </div>
                  <button onClick={()=>deleteAction(a.id)} className="text-gray-300 hover:text-red-500 text-lg leading-none ml-2">&times;</button>
                </div>
              ))}
            </div>
          )}
          <div className="flex justify-end pt-2 border-t gap-2">
            <Btn variant="secondary" onClick={onClose}>Annuler</Btn>
            <Btn variant="primary" onClick={handleSave}>Enregistrer</Btn>
          </div>
        </div>
      )}
      <ConfirmModal open={confirmDelete} onClose={()=>setConfirmDelete(false)} onConfirm={()=>{onDelete(form.id);onClose();}} title="Supprimer le contrat" message="Cette action est irréversible. Confirmer la suppression ?"/>
    </Modal>
  );
}

  const [selectedContract, setSelectedContract] = React.useState(null);
  const [modalOpen, setModalOpen] = React.useState(false);
  const [modalTab, setModalTab] = React.useState('infos');

  React.useEffect(() => {
    if(deepLink) {
      if(deepLink.id) {
        const c = data.contracts.find(x => x.id===deepLink.id);
        if(c) { setSelectedContract(c); setModalTab(deepLink.tab||'infos'); setModalOpen(true); }
      } else if(deepLink.clientId || deepLink.client) {
        setSelectedContract({clientId:deepLink.clientId||'', client:deepLink.client||''});
        setModalTab('infos');
        setModalOpen(true);
      }
      clearDeepLink();
    }
  }, [deepLink]);

  const filtered = React.useMemo(() => {
    return data.contracts.filter(c => {
      if(statusFilter !== 'Tous' && c.statut !== statusFilter) return false;
      if(search) {
        const q = normalize(search);
        if(!normalize(c.client).includes(q) && !normalize(c.prestation).includes(q)) return false;
      }
      return true;
    });
  }, [data.contracts, statusFilter, search]);

  const totals = React.useMemo(() => {
    const nonAnnule = filtered.filter(c => c.statut !== 'Annulé');
    const signe = nonAnnule.reduce((s,c)=>s+(Number(c.montant)||0),0);
    const encaisse = nonAnnule.reduce((s,c)=>s+(c.payments||[]).reduce((ps,p)=>ps+(Number(p.montant)||0),0),0);
    return {signe, encaisse, reste:signe-encaisse};
  }, [filtered]);

  const openContract = (c) => { setSelectedContract(c); setModalTab('infos'); setModalOpen(true); };
  const openNew = () => { setSelectedContract(null); setModalTab('infos'); setModalOpen(true); };

  const handleSave = (form) => {
    const {_newClient, ...cData} = form;
    let newClients = [...data.clients];
    if(_newClient && !newClients.find(c=>c.id===_newClient.id)) {
      newClients = [...newClients, _newClient];
    }
    let newContracts;
    if(cData.id) {
      newContracts = data.contracts.map(c => c.id===cData.id ? {...cData, montant:Number(cData.montant)||0} : c);
      addToast('Contrat mis à jour','success');
    } else {
      newContracts = [...data.contracts, {...cData, id:genId(), montant:Number(cData.montant)||0}];
      addToast('Contrat créé','success');
    }
    setData(d => ({...d, contracts:newContracts, clients:newClients}));
  };

  const handleDelete = (id) => {
    setData(d => ({...d, contracts:d.contracts.filter(c=>c.id!==id)}));
    addToast('Contrat supprimé','success');
  };

  const currentContract = modalOpen ? (selectedContract?.id ? data.contracts.find(c=>c.id===selectedContract.id)||selectedContract : selectedContract) : null;

  return (
    <div className="space-y-4">
      <div className="flex items-center justify-between">
        <h1 className="text-2xl font-bold text-gray-800">Contrats</h1>
        <Btn variant="primary" onClick={openNew}>+ Nouveau contrat</Btn>
      </div>

      {/* Filters */}
      <div className="flex flex-wrap gap-3 items-center">
        <div className="flex gap-1 flex-wrap">
          {['Tous', ...CONTRACT_STATUSES].map(s => (
            <button key={s} onClick={()=>setStatusFilter(s)}
              className={`px-3 py-1.5 rounded-full text-xs font-medium transition-colors ${statusFilter===s ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}>
              {s}
            </button>
          ))}
        </div>
        <input className={`${inputCls} max-w-xs`} value={search} onChange={e=>setSearch(e.target.value)} placeholder="Rechercher client, prestation..."/>
      </div>

      {/* Totals */}
      <div className="grid grid-cols-3 gap-4">
        <KPICard label="Total signé" value={fmt(totals.signe)} color="blue"/>
        <KPICard label="Encaissé" value={fmt(totals.encaisse)} color="green"/>
        <KPICard label="Reste" value={fmt(totals.reste)} color="amber"/>
      </div>

      {/* Table / Cards */}
      {filtered.length === 0 ? <EmptyState message="Aucun contrat trouvé" icon="📄"/> : (<>
        {/* Desktop Table */}
        <div className="hidden md:block bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
          <table className="w-full text-sm">
            <thead className="bg-gray-50 border-b border-gray-100">
              <tr>{['Client','Prestation','Montant','Attribué','Statut','Paiement','Échéance',''].map(h=>(
                <th key={h} className="text-left text-xs font-semibold text-gray-500 px-4 py-3">{h}</th>
              ))}</tr>
            </thead>
            <tbody>
              {filtered.map(c => {
                const ps = calcPaymentStatus(c.montant, c.payments);
                const totalPaid = (c.payments||[]).reduce((s,p)=>s+(Number(p.montant)||0),0);
                const isSurpaye = totalPaid > (Number(c.montant)||0) && (Number(c.montant)||0) > 0;
                return (
                  <tr key={c.id} onClick={()=>openContract(c)} className="border-b border-gray-50 hover:bg-gray-50 cursor-pointer transition-colors">
                    <td className="px-4 py-3 font-medium text-gray-800">{c.client}</td>
                    <td className="px-4 py-3 text-gray-600 max-w-[200px] truncate">{c.prestation}</td>
                    <td className="px-4 py-3 font-semibold">{fmt(c.montant)}</td>
                    <td className="px-4 py-3"><StatusBadge status={c.assignedTo}/></td>
                    <td className="px-4 py-3"><StatusBadge status={c.statut}/></td>
                    <td className="px-4 py-3"><StatusBadge status={isSurpaye ? 'Surpayé' : ps}/></td>
                    <td className="px-4 py-3"><ExpiryBadge dateFin={c.dateFin} statut={c.statut}/></td>
                    <td className="px-4 py-3"><button className="text-blue-500 hover:text-blue-700 text-xs font-medium">Ouvrir →</button></td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>

        {/* Mobile Cards */}
        <div className="md:hidden space-y-3">
          {filtered.map(c => {
            const ps = calcPaymentStatus(c.montant, c.payments);
            return (
              <div key={c.id} onClick={()=>openContract(c)} className="bg-white rounded-xl p-4 shadow-sm border border-gray-100 cursor-pointer">
                <div className="flex justify-between items-start mb-2">
                  <div>
                    <div className="font-semibold text-gray-800">{c.client}</div>
                    <div className="text-xs text-gray-500 mt-0.5">{c.prestation}</div>
                  </div>
                  <div className="text-base font-bold text-blue-700">{fmt(c.montant)}</div>
                </div>
                <div className="flex flex-wrap gap-1.5">
                  <StatusBadge status={c.assignedTo}/>
                  <StatusBadge status={c.statut}/>
                  <StatusBadge status={ps}/>
                  <ExpiryBadge dateFin={c.dateFin} statut={c.statut}/>
                </div>
              </div>
            );
          })}
        </div>
      </>)}

      <ContractModal
        open={modalOpen}
        onClose={()=>{setModalOpen(false);setSelectedContract(null);}}
        contract={currentContract?.id ? currentContract : null}
        clients={data.clients}
        onSave={handleSave}
        onDelete={handleDelete}
        defaultTab={modalTab}
      />
    </div>
  );
}

function ClientModal({open, onClose, client, contracts, onSave, onDelete, onNavigate}) {
  const [tab, setTab] = React.useState('infos');
  const [editing, setEditing] = React.useState(false);
  const [form, setForm] = React.useState({});
  const [confirmDelete, setConfirmDelete] = React.useState(false);
  const addToast = useToast();

  React.useEffect(() => {
    if(open && client) {
      setForm({...client});
      setEditing(false);
      setTab('infos');
    }
  }, [open, client]);

  const linkedContracts = React.useMemo(() => {
    if(!client) return [];
    return contracts.filter(c => c.clientId===client.id || normalize(c.client)===normalize(client.entreprise));
  }, [client, contracts]);

  const timeline = React.useMemo(() => {
    const events = [];
    if(client?.dateEntree) events.push({date:client.dateEntree, label:'Entrée CRM', type:'crm'});
    linkedContracts.forEach(c => {
      if(c.dateDebut) events.push({date:c.dateDebut, label:`Contrat: ${c.prestation}`, type:'contract', id:c.id});
    });
    return events.sort((a,b) => new Date(b.date)-new Date(a.date));
  }, [client, linkedContracts]);

  const caGenere = linkedContracts.filter(c=>c.statut!=='Annulé').reduce((s,c)=>s+(Number(c.montant)||0),0);

  const handleSave = () => {
    onSave({...form, potentiel:Number(form.potentiel)||0});
    setEditing(false);
    addToast('Client mis à jour','success');
  };

  const tabs = [{id:'infos',label:'Infos'},{id:'contrats',label:`Contrats (${linkedContracts.length})`},{id:'chrono',label:'Chronologie'}];

  return (
    <Modal open={open} onClose={onClose} title={client?.entreprise||'Client'} size="md">
      <Tabs tabs={tabs} active={tab} onChange={setTab}/>
      {tab==='infos' && (
        <div className="space-y-4">
          {!editing ? (
            <>
              <div className="grid grid-cols-2 gap-4 text-sm">
                <div><span className="text-gray-500">Entreprise:</span> <span className="font-medium">{form.entreprise}</span></div>
                <div><span className="text-gray-500">Contact:</span> <span className="font-medium">{form.nom}</span></div>
                <div><span className="text-gray-500">Email:</span> <span className="font-medium">{form.email||'—'}</span></div>
                <div><span className="text-gray-500">Tél:</span> <span className="font-medium">{form.telephone||'—'}</span></div>
                <div><span className="text-gray-500">Source:</span> <StatusBadge status={form.source}/></div>
                <div><span className="text-gray-500">Étape:</span> <StatusBadge status={form.etape}/></div>
                <div><span className="text-gray-500">Potentiel:</span> <span className="font-semibold text-blue-700">{fmt(form.potentiel)}</span></div>
                <div><span className="text-gray-500">CA généré:</span> <span className="font-semibold text-green-700">{fmt(caGenere)}</span></div>
              </div>
              {form.notes && <div className="text-sm text-gray-600 bg-gray-50 rounded-lg p-3">{form.notes}</div>}
              <div className="flex justify-between pt-2">
                <Btn variant="danger" size="sm" onClick={()=>setConfirmDelete(true)}>Supprimer</Btn>
                <Btn variant="outline" size="sm" onClick={()=>setEditing(true)}>Modifier</Btn>
              </div>
            </>
          ) : (
            <div className="space-y-3">
              <div className="grid grid-cols-2 gap-3">
                <div><label className="block text-xs font-medium text-gray-600 mb-1">Entreprise</label><input className={inputCls} value={form.entreprise||''} onChange={e=>setForm(f=>({...f,entreprise:e.target.value}))}/></div>
                <div><label className="block text-xs font-medium text-gray-600 mb-1">Nom contact</label><input className={inputCls} value={form.nom||''} onChange={e=>setForm(f=>({...f,nom:e.target.value}))}/></div>
                <div><label className="block text-xs font-medium text-gray-600 mb-1">Email</label><input className={inputCls} type="email" value={form.email||''} onChange={e=>setForm(f=>({...f,email:e.target.value}))}/></div>
                <div><label className="block text-xs font-medium text-gray-600 mb-1">Téléphone</label><input className={inputCls} value={form.telephone||''} onChange={e=>setForm(f=>({...f,telephone:e.target.value}))}/></div>
                <div><label className="block text-xs font-medium text-gray-600 mb-1">Source</label><select className={selectCls} value={form.source||'Autre'} onChange={e=>setForm(f=>({...f,source:e.target.value}))}>{SOURCES.map(s=><option key={s}>{s}</option>)}</select></div>
                <div><label className="block text-xs font-medium text-gray-600 mb-1">Étape</label><select className={selectCls} value={form.etape||'Contact'} onChange={e=>setForm(f=>({...f,etape:e.target.value}))}>{CRM_STAGES.map(s=><option key={s}>{s}</option>)}</select></div>
                <div><label className="block text-xs font-medium text-gray-600 mb-1">Potentiel (€)</label><input className={inputCls} type="number" value={form.potentiel||''} onChange={e=>setForm(f=>({...f,potentiel:e.target.value}))}/></div>
              </div>
              <div><label className="block text-xs font-medium text-gray-600 mb-1">Notes</label><textarea className={textareaCls} rows={3} value={form.notes||''} onChange={e=>setForm(f=>({...f,notes:e.target.value}))}/></div>
              <div className="flex gap-2 justify-end">
                <Btn variant="secondary" size="sm" onClick={()=>setEditing(false)}>Annuler</Btn>
                <Btn variant="primary" size="sm" onClick={handleSave}>Enregistrer</Btn>
              </div>
            </div>
          )}
        </div>
      )}
      {tab==='contrats' && (
        <div className="space-y-3">
          {linkedContracts.length===0 ? <EmptyState message="Aucun contrat lié" icon="📄"/> : (
            linkedContracts.map(c => {
              const ps = calcPaymentStatus(c.montant, c.payments);
              return (
                <div key={c.id} className="flex items-center justify-between p-3 bg-gray-50 rounded-xl border border-gray-100">
                  <div>
                    <div className="text-sm font-medium text-gray-800">{c.prestation}</div>
                    <div className="text-xs text-gray-500 mt-0.5">{fmt(c.montant)}</div>
                  </div>
                  <div className="flex gap-1.5"><StatusBadge status={c.statut}/><StatusBadge status={ps}/></div>
                </div>
              );
            })
          )}
          <Btn size="sm" variant="outline" onClick={()=>{onClose();onNavigate('contracts',{clientId:client.id,client:client.entreprise});}}>
            + Créer un contrat
          </Btn>
        </div>
      )}
      {tab==='chrono' && (
        <div className="space-y-2">
          {timeline.length===0 ? <EmptyState message="Aucun événement" icon="📅"/> : (
            timeline.map((ev, i) => (
              <div key={i} className="flex items-center gap-3 p-3 bg-gray-50 rounded-xl border border-gray-100">
                <div className={`w-2 h-2 rounded-full flex-shrink-0 ${ev.type==='crm'?'bg-blue-400':'bg-green-400'}`}/>
                <div className="flex-1">
                  <div className="text-sm font-medium text-gray-800">{ev.label}</div>
                  <div className="text-xs text-gray-500">{formatDate(ev.date)}</div>
                </div>
              </div>
            ))
          )}
        </div>
      )}
      <ConfirmModal open={confirmDelete} onClose={()=>setConfirmDelete(false)} onConfirm={()=>{onDelete(client.id);onClose();}} title="Supprimer le client" message="Cette action est irréversible."/>
    </Modal>
  );
}

function CRMModule({data, setData, onNavigate}) {
  const addToast = useToast();
  const [view, setView] = React.useState('liste');
  const [search, setSearch] = React.useState('');
  const [selectedClient, setSelectedClient] = React.useState(null);
  const [modalOpen, setModalOpen] = React.useState(false);
  const [newClientModal, setNewClientModal] = React.useState(false);
  const [newForm, setNewForm] = React.useState({entreprise:'',nom:'',email:'',telephone:'',source:'Autre',etape:'Contact',potentiel:'',notes:'',dateEntree:todayStr()});

  const filtered = React.useMemo(() => {
    if(!search) return data.clients;
    const q = normalize(search);
    return data.clients.filter(c => normalize(c.entreprise).includes(q)||normalize(c.nom).includes(q));
  }, [data.clients, search]);

  const getCA = (cl) => {
    return data.contracts.filter(c=>(c.clientId===cl.id||normalize(c.client)===normalize(cl.entreprise))&&c.statut!=='Annulé').reduce((s,c)=>s+(Number(c.montant)||0),0);
  };

  const openClient = (cl) => { setSelectedClient(cl); setModalOpen(true); };

  const handleSave = (updated) => {
    setData(d => ({...d, clients:d.clients.map(c=>c.id===updated.id?updated:c)}));
  };

  const handleDelete = (id) => {
    setData(d => ({...d, clients:d.clients.filter(c=>c.id!==id)}));
    addToast('Client supprimé','success');
  };

  const handleCreate = () => {
    if(!newForm.entreprise.trim()||!newForm.nom.trim()) { addToast('Entreprise et nom requis','error'); return; }
    const nc = {...newForm, id:genId(), potentiel:Number(newForm.potentiel)||0, dateEntree:newForm.dateEntree||todayStr()};
    setData(d => ({...d, clients:[...d.clients, nc]}));
    setNewClientModal(false);
    setNewForm({entreprise:'',nom:'',email:'',telephone:'',source:'Autre',etape:'Contact',potentiel:'',notes:'',dateEntree:todayStr()});
    addToast('Client créé','success');
  };

  const pipelineStages = CRM_STAGES.filter(s=>s!=='Client');

  return (
    <div className="space-y-4">
      <div className="flex items-center justify-between">
        <h1 className="text-2xl font-bold text-gray-800">CRM</h1>
        <div className="flex gap-2">
          <div className="flex bg-gray-100 rounded-lg p-1">
            <button onClick={()=>setView('liste')} className={`px-3 py-1 text-xs font-medium rounded ${view==='liste'?'bg-white shadow text-gray-800':'text-gray-500'}`}>Liste</button>
            <button onClick={()=>setView('pipeline')} className={`px-3 py-1 text-xs font-medium rounded ${view==='pipeline'?'bg-white shadow text-gray-800':'text-gray-500'}`}>Pipeline</button>
          </div>
          <Btn variant="primary" onClick={()=>setNewClientModal(true)}>+ Nouveau client</Btn>
        </div>
      </div>

      {view==='liste' && (<>
        <input className={`${inputCls} max-w-sm`} value={search} onChange={e=>setSearch(e.target.value)} placeholder="Rechercher entreprise, nom..."/>
        {filtered.length===0 ? <EmptyState message="Aucun client trouvé" icon="👥"/> : (<>
          {/* Desktop */}
          <div className="hidden md:block bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
            <table className="w-full text-sm">
              <thead className="bg-gray-50 border-b border-gray-100">
                <tr>{['Entreprise','Nom','Source','Étape','Potentiel','CA généré','Entrée',''].map(h=>(
                  <th key={h} className="text-left text-xs font-semibold text-gray-500 px-4 py-3">{h}</th>
                ))}</tr>
              </thead>
              <tbody>
                {filtered.map(cl => (
                  <tr key={cl.id} onClick={()=>openClient(cl)} className="border-b border-gray-50 hover:bg-gray-50 cursor-pointer transition-colors">
                    <td className="px-4 py-3 font-medium text-gray-800">{cl.entreprise}</td>
                    <td className="px-4 py-3 text-gray-600">{cl.nom}</td>
                    <td className="px-4 py-3"><StatusBadge status={cl.source}/></td>
                    <td className="px-4 py-3"><StatusBadge status={cl.etape}/></td>
                    <td className="px-4 py-3 font-semibold">{fmt(cl.potentiel)}</td>
                    <td className="px-4 py-3 text-green-700 font-semibold">{fmt(getCA(cl))}</td>
                    <td className="px-4 py-3 text-gray-500 text-xs">{formatDate(cl.dateEntree)}</td>
                    <td className="px-4 py-3"><button className="text-blue-500 hover:text-blue-700 text-xs">Voir →</button></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          {/* Mobile */}
          <div className="md:hidden space-y-3">
            {filtered.map(cl => (
              <div key={cl.id} onClick={()=>openClient(cl)} className="bg-white rounded-xl p-4 shadow-sm border border-gray-100 cursor-pointer">
                <div className="flex justify-between mb-2">
                  <div>
                    <div className="font-semibold text-gray-800">{cl.entreprise}</div>
                    <div className="text-xs text-gray-500">{cl.nom}</div>
                  </div>
                  <div className="text-sm font-bold text-blue-700">{fmt(cl.potentiel)}</div>
                </div>
                <div className="flex gap-1.5 flex-wrap">
                  <StatusBadge status={cl.source}/><StatusBadge status={cl.etape}/>
                </div>
              </div>
            ))}
          </div>
        </>)}
      </>)}

      {view==='pipeline' && (
        <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
          {pipelineStages.map(stage => {
            const stageClients = data.clients.filter(c=>c.etape===stage);
            return (
              <div key={stage} className="bg-gray-50 rounded-2xl p-3">
                <div className="flex items-center justify-between mb-3">
                  <span className="text-xs font-semibold text-gray-600">{stage}</span>
                  <span className="text-xs bg-white px-1.5 py-0.5 rounded-full text-gray-500 shadow-sm">{stageClients.length}</span>
                </div>
                <div className="space-y-2">
                  {stageClients.map(cl => (
                    <div key={cl.id} onClick={()=>openClient(cl)} className="bg-white rounded-xl p-3 shadow-sm cursor-pointer hover:shadow-md transition-shadow border border-gray-100">
                      <div className="text-sm font-semibold text-gray-800 truncate">{cl.entreprise}</div>
                      <div className="text-xs text-gray-500 truncate mt-0.5">{cl.nom}</div>
                      <div className="text-xs font-semibold text-blue-700 mt-1">{fmt(cl.potentiel)}</div>
                    </div>
                  ))}
                  {stageClients.length===0 && <div className="text-center text-xs text-gray-300 py-4">Vide</div>}
                </div>
              </div>
            );
          })}
        </div>
      )}

      <ClientModal
        open={modalOpen}
        onClose={()=>{setModalOpen(false);setSelectedClient(null);}}
        client={selectedClient}
        contracts={data.contracts}
        onSave={handleSave}
        onDelete={handleDelete}
        onNavigate={onNavigate}
      />

      {/* New Client Modal */}
      <Modal open={newClientModal} onClose={()=>setNewClientModal(false)} title="Nouveau client" size="md">
        <div className="space-y-4">
          <div className="grid grid-cols-2 gap-3">
            <div><label className="block text-xs font-medium text-gray-600 mb-1">Entreprise *</label><input className={inputCls} value={newForm.entreprise} onChange={e=>setNewForm(f=>({...f,entreprise:e.target.value}))}/></div>
            <div><label className="block text-xs font-medium text-gray-600 mb-1">Nom contact *</label><input className={inputCls} value={newForm.nom} onChange={e=>setNewForm(f=>({...f,nom:e.target.value}))}/></div>
            <div><label className="block text-xs font-medium text-gray-600 mb-1">Email</label><input className={inputCls} type="email" value={newForm.email} onChange={e=>setNewForm(f=>({...f,email:e.target.value}))}/></div>
            <div><label className="block text-xs font-medium text-gray-600 mb-1">Téléphone</label><input className={inputCls} value={newForm.telephone} onChange={e=>setNewForm(f=>({...f,telephone:e.target.value}))}/></div>
            <div><label className="block text-xs font-medium text-gray-600 mb-1">Source</label><select className={selectCls} value={newForm.source} onChange={e=>setNewForm(f=>({...f,source:e.target.value}))}>{SOURCES.map(s=><option key={s}>{s}</option>)}</select></div>
            <div><label className="block text-xs font-medium text-gray-600 mb-1">Étape</label><select className={selectCls} value={newForm.etape} onChange={e=>setNewForm(f=>({...f,etape:e.target.value}))}>{CRM_STAGES.map(s=><option key={s}>{s}</option>)}</select></div>
            <div><label className="block text-xs font-medium text-gray-600 mb-1">Potentiel (€)</label><input className={inputCls} type="number" value={newForm.potentiel} onChange={e=>setNewForm(f=>({...f,potentiel:e.target.value}))}/></div>

function TaskCard({task, onMove, onEdit, onDelete}) {
  const isOverdue = task.echeance && task.statut !== 'Terminé' && new Date(task.echeance+'T23:59:59') < new Date();
  const statusOrder = ['À faire','En cours','Terminé'];
  const idx = statusOrder.indexOf(task.statut);
  const canLeft = idx > 0;
  const canRight = idx < statusOrder.length-1;

  return (
    <div className="bg-white rounded-xl p-3 shadow-sm border border-gray-100 space-y-2">
      <div className="text-sm font-medium text-gray-800 leading-snug">{task.titre}</div>
      {task.client && <div className="text-xs text-gray-400">{task.client}</div>}
      <div className="flex flex-wrap gap-1">
        <StatusBadge status={task.assignedTo}/>
        <StatusBadge status={task.priorite}/>
      </div>
      {task.echeance && (
        <div className={`text-xs font-medium ${isOverdue?'text-red-600':'text-gray-500'}`}>
          {isOverdue?'⚠ ':''}{formatDate(task.echeance)}
        </div>
      )}
      <div className="flex items-center justify-between pt-1 border-t border-gray-50">
        <div className="flex gap-1">
          {canLeft && <button onClick={()=>onMove(task,'left')} className="text-gray-300 hover:text-gray-600 text-sm px-1">←</button>}
          {canRight && <button onClick={()=>onMove(task,'right')} className="text-gray-300 hover:text-gray-600 text-sm px-1">→</button>}
        </div>
        <div className="flex gap-1">
          <button onClick={()=>onEdit(task)} className="text-gray-300 hover:text-blue-500 text-xs px-1">✏</button>
          <button onClick={()=>onDelete(task.id)} className="text-gray-300 hover:text-red-500 text-sm px-1">&times;</button>
        </div>
      </div>
    </div>
  );
}

function TasksModule({data, setData}) {
  const addToast = useToast();
  const [modalOpen, setModalOpen] = React.useState(false);
  const [selectedTask, setSelectedTask] = React.useState(null);
  const [confirmDelete, setConfirmDelete] = React.useState(null);

  const statusOrder = ['À faire','En cours','Terminé'];

  const moveTask = (task, dir) => {
    const idx = statusOrder.indexOf(task.statut);
    const newIdx = dir==='right' ? idx+1 : idx-1;
    if(newIdx<0||newIdx>=statusOrder.length) return;
    setData(d => ({...d, tasks:d.tasks.map(t=>t.id===task.id?{...t,statut:statusOrder[newIdx]}:t)}));
  };

  const handleSave = (form) => {
    if(form.id) {
      setData(d => ({...d, tasks:d.tasks.map(t=>t.id===form.id?form:t)}));
      addToast('Tâche mise à jour','success');
    } else {
      setData(d => ({...d, tasks:[...d.tasks, {...form, id:genId()}]}));
      addToast('Tâche créée','success');
    }
  };

  const handleDelete = (id) => {
    setData(d => ({...d, tasks:d.tasks.filter(t=>t.id!==id)}));
    addToast('Tâche supprimée','success');
  };

  const colColors = {'À faire':'bg-slate-50 border-slate-200','En cours':'bg-blue-50 border-blue-200','Terminé':'bg-green-50 border-green-200'};

  return (
    <div className="space-y-4">
      <div className="flex items-center justify-between">
        <h1 className="text-2xl font-bold text-gray-800">Tâches</h1>
        <Btn variant="primary" onClick={()=>{setSelectedTask(null);setModalOpen(true);}}>+ Nouvelle tâche</Btn>
      </div>

      <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
        {statusOrder.map(status => {
          const tasks = data.tasks.filter(t=>t.statut===status);
          return (
            <div key={status} className={`border rounded-2xl p-3 ${colColors[status]}`}>
              <div className="flex items-center justify-between mb-3 px-1">
                <span className="text-sm font-semibold text-gray-700">{status}</span>
                <span className="text-xs bg-white px-1.5 py-0.5 rounded-full shadow-sm text-gray-500">{tasks.length}</span>
              </div>
              <div className="space-y-2">
                {tasks.length===0 && <div className="text-center text-xs text-gray-300 py-6">Vide</div>}

                  <TaskCard key={t.id} task={t}
                    onMove={moveTask}
                    onEdit={(t)=>{setSelectedTask(t);setModalOpen(true);}}
                    onDelete={(id)=>setConfirmDelete(id)}
                  />
                ))}
              </div>
            </div>
          );
        })}
      </div>

      <TaskModal
        open={modalOpen}

  );

function BankModule({data, setData, deepLink, clearDeepLink}) {

  const [expenseModal, setExpenseModal] = React.useState(false);
  const [txModal, setTxModal] = React.useState(false);
  const [subModal, setSubModal] = React.useState(false);
  const [selectedExpense, setSelectedExpense] = React.useState(null);
  const [selectedTx, setSelectedTx] = React.useState(null);
  const [selectedSub, setSelectedSub] = React.useState(null);

  React.useEffect(() => {
    if(deepLink) {
      if(deepLink.type==='bankTx') {
        const tx = deepLink.id ? data.bank.transactions.find(t=>t.id===deepLink.id) : null;
        setSelectedTx(tx||null);
        setTxModal(true);
      } else if(deepLink.type==='expense') {
        const exp = deepLink.id ? data.expenses.find(e=>e.id===deepLink.id) : null;
        setSelectedExpense(exp||null);
        setExpenseModal(true);
      }
      clearDeepLink();
    }
  }, [deepLink]);

  const solde = React.useMemo(() => {
    const validTx = (data.bank.transactions||[]).filter(t=>t.statut!=='Annulé');
    return (data.bank.initialBalance||0) + validTx.reduce((s,t)=>s+(Number(t.montant)||0),0);
  }, [data.bank]);

  const saveBalance = () => {
    setData(d => ({...d, bank:{...d.bank, initialBalance:Number(tempBalance)||0}}));
    setEditBalance(false);
    addToast('Solde initial mis à jour','success');
  };

  const saveExpense = (form) => {
    if(form.id) {
      setData(d => ({...d, expenses:d.expenses.map(e=>e.id===form.id?form:e)}));
      addToast('Dépense mise à jour','success');
    } else {
      setData(d => ({...d, expenses:[...d.expenses, {...form,id:genId()}]}));
      addToast('Dépense ajoutée','success');
    }
  };

  const deleteExpense = (id) => {
    setData(d => ({...d, expenses:d.expenses.filter(e=>e.id!==id)}));
    addToast('Dépense supprimée','success');
  };

  const saveTx = (form) => {
    if(form.id) {
      setData(d => ({...d, bank:{...d.bank, transactions:d.bank.transactions.map(t=>t.id===form.id?form:t)}}));
      addToast('Transaction mise à jour','success');
    } else {
      setData(d => ({...d, bank:{...d.bank, transactions:[...d.bank.transactions, {...form,id:genId()}]}}));
      addToast('Transaction ajoutée','success');
    }
  };

  const deleteTx = (id) => {
    setData(d => ({...d, bank:{...d.bank, transactions:d.bank.transactions.filter(t=>t.id!==id)}}));
    addToast('Transaction supprimée','success');
  };

  const saveSub = (form) => {
    if(form.id) {
      setData(d => ({...d, bank:{...d.bank, subscriptions:d.bank.subscriptions.map(s=>s.id===form.id?form:s)}}));
    } else {
      setData(d => ({...d, bank:{...d.bank, subscriptions:[...d.bank.subscriptions, {...form,id:genId()}]}}));
    }
    addToast('Abonnement enregistré','success');
  };

  const deleteSub = (id) => {
    setData(d => ({...d, bank:{...d.bank, subscriptions:d.bank.subscriptions.filter(s=>s.id!==id)}}));
  };

  const toggleSubActive = (id) => {
    setData(d => ({...d, bank:{...d.bank, subscriptions:d.bank.subscriptions.map(s=>s.id===id?{...s,active:!s.active}:s)}}));
  };

  const generateSubscriptionTx = () => {
    const now = new Date();
    const year = now.getFullYear();
    const month = now.getMonth();
    const monthKey = currentMonthKey();
    const activeSubs = (data.bank.subscriptions||[]).filter(s=>s.active);
    const existingTx = data.bank.transactions||[];
    let added = 0;

    const newTxs = [];
    activeSubs.forEach(sub => {
      const alreadyExists = existingTx.some(t => {
        if(t.statut==='Annulé') return false;
        if(normalize(t.label)!==normalize(sub.name)) return false;
        const txDate = t.date ? t.date.substring(0,7) : '';
        return txDate === monthKey;
      });
      if(!alreadyExists) {
        const lastDay = new Date(year, month+1, 0).getDate();
        const day = Math.min(Number(sub.day)||1, lastDay);
        const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
        newTxs.push({id:genId(), label:sub.name, montant:-Math.abs(sub.amount), type:'Achat', date:dateStr, auteur:sub.paidBy||'Système', statut:'Validé'});
        added++;
      }
    });

    if(added > 0) {
      setData(d => ({...d, bank:{...d.bank, transactions:[...d.bank.transactions, ...newTxs]}}));
      addToast(`${added} transaction(s) générée(s)`, 'success');
    } else {
      addToast('Toutes les transactions du mois existent déjà', 'info');
    }

// ============================================================
function LedgerModule({data, onNavigate}) {
  const [periodeMode, setPeriodeMode] = React.useState('Mois');
  const [moisFilter, setMoisFilter] = React.useState(new Date().getMonth() + 1);
  const [anneeFilter, setAnneeFilter] = React.useState(new Date().getFullYear());
  const [typeFilter, setTypeFilter] = React.useState('Tous');
  const [sourceFilter, setSourceFilter] = React.useState('Toutes');
  const [auteurFilter, setAuteurFilter] = React.useState('Tous');
  const [search, setSearch] = React.useState('');
  const MOIS_LABELS = ['Jan','Fév','Mar','Avr','Mai','Juin','Juil','Août','Sep','Oct','Nov','Déc'];
  const ANNEES = [new Date().getFullYear()-1, new Date().getFullYear(), new Date().getFullYear()+1];

  const allEntries = React.useMemo(() => buildLedgerEntries(data), [data]);

  const filtered = React.useMemo(() => {
    const now = new Date();
    return allEntries.filter(e => {
      // Période
      if(periodeMode==='Mois') {
        if(!e.date) return false;
        const d = new Date(e.date+'T00:00:00');
        if(d.getMonth()+1 !== moisFilter || d.getFullYear() !== anneeFilter) return false;
      } else if(periodeMode==='30 jours') {
        if(!e.date) return false;
        const diff = (now-new Date(e.date+'T00:00:00'))/(1000*60*60*24);
        if(diff>30) return false;
      }
      // Type
      if(typeFilter==='Entrée' && e.montant<=0) return false;
      if(typeFilter==='Sortie' && e.montant>=0) return false;
      // Source
      if(sourceFilter!=='Toutes' && e.source!==sourceFilter) return false;
      // Auteur
      if(auteurFilter!=='Tous' && e.auteur!==auteurFilter) return false;
      // Search
      if(search) {
        const q = normalize(search);
        if(!normalize(e.label).includes(q)&&!normalize(e.category).includes(q)&&!normalize(e.payNote||'').includes(q)&&!normalize(e.auteur||'').includes(q)) return false;
      }
      return true;
    });
  }, [allEntries, periodeMode, moisFilter, anneeFilter, typeFilter, sourceFilter, auteurFilter, search]);

  const kpis = React.useMemo(() => {
    const entrees = filtered.filter(e=>e.montant>0).reduce((s,e)=>s+e.montant,0);
    const sorties = filtered.filter(e=>e.montant<0).reduce((s,e)=>s+Math.abs(e.montant),0);
    const balance = entrees - sorties;
    const avancesMicka = filtered.filter(e=>e.type==='expense'&&e.auteur==='Micka').reduce((s,e)=>s+Math.abs(e.montant),0);
    const avancesCesar = filtered.filter(e=>e.type==='expense'&&e.auteur==='César').reduce((s,e)=>s+Math.abs(e.montant),0);
    return {entrees, sorties, balance, avancesMicka, avancesCesar};
  }, [filtered]);

  const sourceBadge = {bank:'bg-indigo-100 text-indigo-700', expense:'bg-amber-100 text-amber-700', contract:'bg-green-100 text-green-700'};
  const sourceLabels = {bank:'Banque', expense:'Avances', contract:'Contrat'};

  const handleRowClick = (e) => {
    if(e.type==='bank') onNavigate('bank',{type:'bankTx',id:e.sourceId});
    else if(e.type==='expense') onNavigate('bank',{type:'expense',id:e.sourceId});
    else if(e.type==='contract') onNavigate('contracts',{id:e.contractId,tab:'paiements'});
  };

  return (
    <div className="space-y-4">
      <h1 className="text-2xl font-bold text-gray-800">Grand Livre Unifié</h1>

      {/* KPIs */}
      <div className="grid grid-cols-2 md:grid-cols-5 gap-3">
        <KPICard label="Entrées" value={fmt(kpis.entrees)} color="green"/>
        <KPICard label="Sorties" value={fmt(kpis.sorties)} color="red"/>
        <KPICard label="Balance" value={fmt(kpis.balance)} color={kpis.balance>=0?'blue':'red'}/>
        <KPICard label="Avances Micka" value={fmt(kpis.avancesMicka)} color="indigo"/>
        <KPICard label="Avances César" value={fmt(kpis.avancesCesar)} color="green"/>
      </div>

      {/* Filters */}
      <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-4">
        <div className="flex flex-wrap gap-3">
          <div>
            <label className="block text-xs font-medium text-gray-600 mb-1">Mode</label>
            <select className={`${selectCls} w-32`} value={periodeMode} onChange={e=>setPeriodeMode(e.target.value)}>
              {['Mois','30 jours','Toute durée'].map(p=><option key={p}>{p}</option>)}
            </select>
          </div>
          {periodeMode==='Mois' && (<>
            <div>
              <label className="block text-xs font-medium text-gray-600 mb-1">Mois</label>
              <select className={`${selectCls} w-24`} value={moisFilter} onChange={e=>setMoisFilter(Number(e.target.value))}>
                {MOIS_LABELS.map((m,i)=><option key={i+1} value={i+1}>{m}</option>)}
              </select>
            </div>
            <div>
              <label className="block text-xs font-medium text-gray-600 mb-1">Année</label>
              <select className={`${selectCls} w-24`} value={anneeFilter} onChange={e=>setAnneeFilter(Number(e.target.value))}>
                {ANNEES.map(a=><option key={a} value={a}>{a}</option>)}
              </select>
            </div>
          </>)}
          <div>
            <label className="block text-xs font-medium text-gray-600 mb-1">Type</label>
            <select className={`${selectCls} w-28`} value={typeFilter} onChange={e=>setTypeFilter(e.target.value)}>
              {['Tous','Entrée','Sortie'].map(t=><option key={t}>{t}</option>)}
            </select>
          </div>
          <div>
            <label className="block text-xs font-medium text-gray-600 mb-1">Source</label>
            <select className={`${selectCls} w-32`} value={sourceFilter} onChange={e=>setSourceFilter(e.target.value)}>
              {['Toutes','Banque','Contrats','Avances'].map(s=><option key={s}>{s}</option>)}
            </select>
          </div>
          <div>
            <label className="block text-xs font-medium text-gray-600 mb-1">Auteur</label>
            <select className={`${selectCls} w-28`} value={auteurFilter} onChange={e=>setAuteurFilter(e.target.value)}>
              {['Tous','Micka','César'].map(a=><option key={a}>{a}</option>)}
            </select>
          </div>
          <div>
            <label className="block text-xs font-medium text-gray-600 mb-1">Rechercher</label>
            <input className={`${inputCls} w-48`} value={search} onChange={e=>setSearch(e.target.value)} placeholder="Label, catégorie..."/>
          </div>
        </div>
      </div>

      {filtered.length===0 ? <EmptyState message="Aucune entrée" icon="📒"/> : (<>
        {/* Desktop */}
        <div className="hidden md:block bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
          <table className="w-full text-sm">
            <thead className="bg-gray-50 border-b border-gray-100">
              <tr>{['Date','Label','Source','Auteur','Montant'].map(h=><th key={h} className="text-left text-xs font-semibold text-gray-500 px-4 py-3">{h}</th>)}</tr>
            </thead>
            <tbody>
              {filtered.map(e=>(
                <tr key={e.id} onClick={()=>handleRowClick(e)} className="border-b border-gray-50 hover:bg-gray-50 cursor-pointer transition-colors">
                  <td className="px-4 py-3 text-gray-500 text-xs">{formatDate(e.date)}</td>
                  <td className="px-4 py-3 text-gray-800 max-w-[300px] truncate">
                    {e.label}
                    {e.category && <span className="text-xs text-gray-400 ml-1">({e.category})</span>}
                    {e.payNote && <span className="text-xs text-blue-500 ml-1">· {e.payNote}</span>}
                  </td>
                  <td className="px-4 py-3">
                    <span className={`inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium ${sourceBadge[e.type]||'bg-gray-100 text-gray-600'}`}>{sourceLabels[e.type]||e.source}</span>
                  </td>
                  <td className="px-4 py-3">
                    {e.auteur && <StatusBadge status={e.auteur}/>}
                  </td>
                  <td className={`px-4 py-3 font-bold text-right ${e.montant>=0?'text-green-600':'text-red-600'}`}>
                    {e.montant>=0?'+':''}{fmt(e.montant)}
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>

        {/* Mobile */}
        <div className="md:hidden space-y-2">
          {filtered.map(e=>(
            <div key={e.id} onClick={()=>handleRowClick(e)} className="bg-white rounded-xl p-3 shadow-sm border border-gray-100 cursor-pointer flex items-center justify-between">
              <div className="flex-1 min-w-0">
                <div className="text-sm font-medium text-gray-800 truncate">{e.label}</div>
                <div className="flex items-center gap-2 mt-1 flex-wrap">
                  <span className="text-xs text-gray-400">{formatDate(e.date)}</span>
                  <span className={`inline-flex items-center px-1.5 py-0.5 rounded-full text-xs font-medium ${sourceBadge[e.type]||'bg-gray-100'}`}>{sourceLabels[e.type]}</span>
                </div>
              </div>
              <div className={`font-bold text-base ml-3 ${e.montant>=0?'text-green-600':'text-red-600'}`}>
                {e.montant>=0?'+':''}{fmt(Math.abs(e.montant))}
              </div>
            </div>
          ))}
        </div>
      </>)}
    </div>
  );
}

// DRIVE & LIENS MODULE
// ============================================================
function DriveModule({data, setData}) {
  const addToast = useToast();
  const [editMode, setEditMode] = React.useState(false);
  const [newName, setNewName] = React.useState('');
  const [newUrl, setNewUrl] = React.useState('');

  const links = data.config?.driveLinks || {};

  const addLink = () => {
    if(!newName.trim()||!newUrl.trim()) { addToast('Nom et URL requis','error'); return; }
    setData(d => ({...d, config:{...d.config, driveLinks:{...(d.config?.driveLinks||{}), [newName.trim()]:newUrl.trim()}}}));
    setNewName('');
    setNewUrl('');
    addToast('Lien ajouté','success');
  };

  const removeLink = (name) => {
    setData(d => {
      const dl = {...(d.config?.driveLinks||{})};
      delete dl[name];
      return {...d, config:{...d.config, driveLinks:dl}};
    });
    addToast('Lien supprimé','success');
  };

  const linkIcons = {'Google Drive':'📁','Notion':'📝','Calendly':'📅','Linear':'📋'};

  return (
    <div className="space-y-4">
      <div className="flex items-center justify-between">
        <h1 className="text-2xl font-bold text-gray-800">Drive & Liens</h1>
        <Btn variant={editMode?'secondary':'outline'} onClick={()=>setEditMode(v=>!v)}>{editMode?'Terminer':'Modifier'}</Btn>
      </div>

      <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4">
        {Object.entries(links).map(([name, url]) => (
          <div key={name} className="bg-white rounded-2xl shadow-sm border border-gray-100 p-5 flex items-start justify-between group">
            <a href={url} target="_blank" rel="noopener noreferrer" className="flex items-center gap-3 flex-1 min-w-0 hover:text-blue-600 transition-colors">
              <span className="text-2xl">{linkIcons[name]||'🔗'}</span>
              <div className="min-w-0">
                <div className="font-semibold text-gray-800 text-sm">{name}</div>
                <div className="text-xs text-gray-400 truncate mt-0.5">{url}</div>
              </div>
            </a>
            {editMode && (
              <button onClick={()=>removeLink(name)} className="text-gray-200 hover:text-red-500 text-xl leading-none ml-2 flex-shrink-0">&times;</button>
            )}
          </div>
        ))}

        {editMode && (
          <div className="bg-gray-50 rounded-2xl border-2 border-dashed border-gray-200 p-5 space-y-3">
            <div className="text-xs font-semibold text-gray-500 mb-2">Ajouter un lien</div>
            <div><label className="block text-xs font-medium text-gray-600 mb-1">Nom</label><input className={inputCls} value={newName} onChange={e=>setNewName(e.target.value)} placeholder="Google Drive"/></div>
            <div><label className="block text-xs font-medium text-gray-600 mb-1">URL</label><input className={inputCls} value={newUrl} onChange={e=>setNewUrl(e.target.value)} placeholder="https://..."/></div>
            <Btn size="sm" variant="primary" onClick={addLink}>Ajouter</Btn>
          </div>
        )}
      </div>

      {Object.keys(links).length===0 && !editMode && <EmptyState message="Aucun lien configuré" icon="🔗"/>}
    </div>
  );
}
