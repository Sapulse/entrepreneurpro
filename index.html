const CHART_COLORS = ['#6366f1','#10b981','#f59e0b','#ef4444','#8b5cf6','#06b6d4','#ec4899','#84cc16','#f97316','#14b8a6'];
const MONTH_SHORT = ['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];

function ChartBlock({title, icon, children}) {
  return (
    <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-5">
      <h3 className="text-sm font-semibold text-gray-700 mb-4">{icon} {title}</h3>
      {children}
    </div>
  );
}

function ChartCanvas({type, data, options}) {
  const canvasRef = React.useRef(null);
  const chartRef = React.useRef(null);
  const depKey = JSON.stringify({type, labels: data.labels, vals: (data.datasets||[]).map(d=>d.data)});

  React.useEffect(() => {
    const canvas = canvasRef.current;
    if(!canvas || !window.Chart) return;
    if(chartRef.current) { chartRef.current.destroy(); chartRef.current = null; }
    chartRef.current = new window.Chart(canvas, {
      type,
      data,
      options: {
        responsive: true,
        maintainAspectRatio: true,
        plugins: {
          legend: {display: true, labels:{boxWidth:12,font:{size:11}}},
          tooltip: {callbacks:{label: ctx => ' ' + fmt(ctx.raw || 0)}}
        },
        ...( options || {})
      }
    });
    return () => { if(chartRef.current) { chartRef.current.destroy(); chartRef.current = null; } };
  }, [depKey]);

  return <canvas ref={canvasRef}/>;
}

function AnalyticsModule({data}) {
  const now = new Date();
  const [periodeId, setPeriodeId] = React.useState('tout');
  const [dateDebut, setDateDebut] = React.useState('');
  const [dateFin, setDateFin] = React.useState('');

  const entries = React.useMemo(() => buildLedgerEntries(data), [data]);
  const periodeRange = React.useMemo(() => buildPeriodeRange(periodeId, dateDebut, dateFin), [periodeId, dateDebut, dateFin]);

  const allYears = React.useMemo(() => {
    const years = new Set();
    entries.forEach(e => { if(e.date) years.add(+e.date.substring(0,4)); });
    (data.expenses||[]).forEach(e => { if(e.date) years.add(+e.date.substring(0,4)); });
    if(years.size === 0) years.add(now.getFullYear());
    return [...years].sort();
  }, [entries, data.expenses]);

  // Filtered sets (for charts 3-9)
  const filteredEntries = React.useMemo(() => entries.filter(e=>inPeriode(e.date,periodeRange)), [entries, periodeRange]);
  const filteredExpenses = React.useMemo(() => (data.expenses||[]).filter(e=>inPeriode(e.date,periodeRange)), [data.expenses, periodeRange]);
  const filteredContracts = React.useMemo(() => (data.contracts||[]).filter(c=>c.statut!=='Annulé'), [data.contracts]);

  // 1. CA mensuel par année (global – pas de filtre de période)
  const caMonthlyByYear = React.useMemo(() => {
    const map = {};
    entries.filter(e=>e.type==='contract').forEach(e => {
      const y = +e.date.substring(0,4); const m = +e.date.substring(5,7)-1;
      if(!map[y]) map[y] = Array(12).fill(0);
      map[y][m] += e.montant;
    });
    return map;
  }, [entries]);

  // 2. CA annuel comparatif (global)
  const caAnnuel = React.useMemo(() => {
    const map = {};
    entries.filter(e=>e.type==='contract').forEach(e => { const y=+e.date.substring(0,4); map[y]=(map[y]||0)+e.montant; });
    return map;
  }, [entries]);

  // Helper: group by YYYY-MM and sort
  const byMonth = (arr, getDate, getValue) => {
    const map = {};
    arr.forEach(item => { const k=(getDate(item)||'').substring(0,7); if(k.length===7) map[k]=(map[k]||0)+getValue(item); });
    const keys = Object.keys(map).sort();
    return {labels: keys.map(k=>{const[y,m]=k.split('-');return MONTH_SHORT[+m-1]+' '+y.slice(2);}), values:keys.map(k=>map[k])};
  };

  // 3. CA cumulé (période)
  const caCumule = React.useMemo(() => {
    const bm = byMonth(filteredEntries.filter(e=>e.type==='contract'), e=>e.date, e=>e.montant);
    let cum=0; return {labels:bm.labels, values:bm.values.map(v=>{cum+=v;return cum;})};
  }, [filteredEntries]);

  // 4. Dépenses par catégorie (période)
  const depensesCategorie = React.useMemo(() => {
    const map={};
    filteredExpenses.forEach(e=>{const cat=e.categorie||'Autre'; map[cat]=(map[cat]||0)+Math.abs(Number(e.montant)||0);});
    return map;
  }, [filteredExpenses]);

  // 5. Dépenses mensuelles (période)
  const depensesMensuelles = React.useMemo(() => byMonth(filteredExpenses, e=>e.date, e=>Math.abs(Number(e.montant)||0)), [filteredExpenses]);

  // 6. CA par client (période)
  const caClient = React.useMemo(() => {
    const map={};
    filteredContracts.forEach(c=>{
      (c.payments||[]).filter(p=>inPeriode(p.date,periodeRange)).forEach(p=>{map[c.client]=(map[c.client]||0)+Math.abs(Number(p.montant)||0);});
    });
    return map;
  }, [filteredContracts, periodeRange]);

  // 7. Encaissements par associé (période)
  const caAssocie = React.useMemo(() => {
    const map={Micka:0,César:0};
    filteredEntries.filter(e=>e.type==='contract').forEach(e=>{if(map[e.assignedTo]!==undefined)map[e.assignedTo]+=e.montant;});
    return map;
  }, [filteredEntries]);

  // 7b. Dépenses (avances perso) par associé (période)
  const depAssocie = React.useMemo(() => {
    const map={Micka:0,César:0};
    filteredExpenses.forEach(e=>{if(map[e.payePar]!==undefined)map[e.payePar]+=Math.abs(Number(e.montant)||0);});
    return map;
  }, [filteredExpenses]);

  // 8. CA signé par mois (période)
  const caSignature = React.useMemo(() => byMonth(
    filteredContracts.filter(c=>c.dateSignature&&inPeriode(c.dateSignature,periodeRange)),
    c=>c.dateSignature, c=>Number(c.montant)||0
  ), [filteredContracts, periodeRange]);

  // 9. CA par type de paiement (période)
  const caByPaymentType = React.useMemo(() => {
    const map={};
    filteredContracts.filter(c=>c.dateSignature&&inPeriode(c.dateSignature,periodeRange)).forEach(c=>{
      const t=c.typePaiement||'Virement'; map[t]=(map[t]||0)+(Number(c.montant)||0);
    });
    return map;
  }, [filteredContracts, periodeRange]);

  const noLegend = {plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>' '+fmt(ctx.raw||0)}}}};
  const withLegendRight = {plugins:{legend:{display:true,position:'right',labels:{boxWidth:12,font:{size:11}}},tooltip:{callbacks:{label:ctx=>' '+fmt(ctx.raw||0)}}}};

  const caMonthlyChartData = {labels:MONTH_SHORT, datasets:allYears.map((y,i)=>({label:String(y),data:caMonthlyByYear[y]||Array(12).fill(0),backgroundColor:CHART_COLORS[i%CHART_COLORS.length]+'aa',borderColor:CHART_COLORS[i%CHART_COLORS.length],borderWidth:1}))};
  const caAnnuelChartData = {labels:allYears.map(String), datasets:[{label:'CA Total',data:allYears.map(y=>caAnnuel[y]||0),backgroundColor:allYears.map((_,i)=>CHART_COLORS[i%CHART_COLORS.length]+'aa'),borderColor:allYears.map((_,i)=>CHART_COLORS[i%CHART_COLORS.length]),borderWidth:1}]};
  const caCumuleChartData = {labels:caCumule.labels, datasets:[{label:'CA cumulé',data:caCumule.values,fill:true,backgroundColor:'#6366f118',borderColor:'#6366f1',tension:0.4,pointBackgroundColor:'#6366f1',pointRadius:4}]};
  const depCatLabels = Object.keys(depensesCategorie).sort((a,b)=>depensesCategorie[b]-depensesCategorie[a]);
  const depCatChartData = {labels:depCatLabels, datasets:[{data:depCatLabels.map(k=>depensesCategorie[k]),backgroundColor:CHART_COLORS.slice(0,depCatLabels.length),borderWidth:1}]};
  const depMensuellesChartData = {labels:depensesMensuelles.labels, datasets:[{label:'Dépenses',data:depensesMensuelles.values,backgroundColor:'#ef444488',borderColor:'#ef4444',borderWidth:1}]};
  const clientLabels = Object.keys(caClient).sort((a,b)=>caClient[b]-caClient[a]);
  const caClientChartData = {labels:clientLabels, datasets:[{label:'CA',data:clientLabels.map(k=>caClient[k]),backgroundColor:CHART_COLORS.slice(0,clientLabels.length).map(c=>c+'bb'),borderColor:CHART_COLORS.slice(0,clientLabels.length),borderWidth:1}]};
  const associeChartData = {labels:['Micka','César'], datasets:[{label:'Encaissements',data:[caAssocie.Micka,caAssocie.César],backgroundColor:['#6366f1aa','#10b981aa'],borderColor:['#6366f1','#10b981'],borderWidth:1}]};
  const depAssocieChartData = {labels:['Micka','César'], datasets:[{label:'Dépenses perso',data:[depAssocie.Micka,depAssocie.César],backgroundColor:['#6366f188','#10b98188'],borderColor:['#6366f1','#10b981'],borderWidth:1}]};
  const caSignatureChartData = {labels:caSignature.labels, datasets:[{label:'CA signé',data:caSignature.values,backgroundColor:'#8b5cf6aa',borderColor:'#8b5cf6',borderWidth:1}]};
  const payTypeLabels = Object.keys(caByPaymentType).sort((a,b)=>caByPaymentType[b]-caByPaymentType[a]);
  const caByPaymentTypeChartData = {labels:payTypeLabels, datasets:[{data:payTypeLabels.map(k=>caByPaymentType[k]),backgroundColor:CHART_COLORS.slice(0,payTypeLabels.length),borderWidth:1}]};

  const totalCAperiod = filteredEntries.filter(e=>e.type==='contract').reduce((s,e)=>s+e.montant,0);
  const totalDepPeriod = filteredExpenses.reduce((s,e)=>s+Math.abs(Number(e.montant)||0),0);
  const totalCAGlobal = allYears.reduce((s,y)=>s+(caAnnuel[y]||0),0);
  const periodLabel = periodeId==='custom'&&(dateDebut||dateFin) ? `${dateDebut||'…'} → ${dateFin||'…'}` : (periodeId?.startsWith('y') ? periodeId.slice(1) : PERIOD_SHORTCUTS.find(s=>s.id===periodeId)?.label||periodeId);

  return (
    <div className="space-y-6">
      <div className="flex items-center gap-3 flex-wrap">
        <h1 className="text-2xl font-bold text-gray-800">Analytics / Pilotage</h1>
        <span className="text-xs text-gray-400 bg-gray-100 px-2 py-1 rounded-full">{APP_VERSION}</span>
      </div>

      <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-4 space-y-3">
        <div className="flex items-center gap-2 flex-wrap">
          <span className="text-xs font-semibold text-gray-500">Période :</span>
          <PeriodeFilter periodeId={periodeId} setPeriodeId={setPeriodeId} dateDebut={dateDebut} setDateDebut={setDateDebut} dateFin={dateFin} setDateFin={setDateFin}/>
        </div>
        <div className="flex gap-3 flex-wrap">
          <KPICard label={`CA encaissé (${periodLabel})`} value={fmt(totalCAperiod)} color="green" icon="💰"/>
          <KPICard label={`Dép. Micka (${periodLabel})`} value={fmt(depAssocie.Micka)} color="indigo" icon="💸"/>
          <KPICard label={`Dép. César (${periodLabel})`} value={fmt(depAssocie.César)} color="green" icon="💸"/>
          <KPICard label={`Total dépenses (${periodLabel})`} value={fmt(totalDepPeriod)} color="red" icon="📉"/>
          <KPICard label="CA global (all time)" value={fmt(totalCAGlobal)} color="blue" icon="📊"/>
        </div>
      </div>

      <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
        <div className="lg:col-span-2">
          <ChartBlock title="CA mensuel par année (comparaison globale)" icon="📈">
            <ChartCanvas type="bar" data={caMonthlyChartData}/>
          </ChartBlock>
        </div>
        <ChartBlock title="CA annuel comparatif (global)" icon="📊">
          <ChartCanvas type="bar" data={caAnnuelChartData} options={noLegend}/>
        </ChartBlock>
        <ChartBlock title={`CA cumulé – ${periodLabel}`} icon="📉">
          {caCumule.labels.length===0 ? <EmptyState message="Aucun encaissement" icon="📉"/> : <ChartCanvas type="line" data={caCumuleChartData} options={noLegend}/>}
        </ChartBlock>
        <ChartBlock title={`Dépenses par catégorie – ${periodLabel}`} icon="💸">
          {depCatLabels.length===0 ? <EmptyState message="Aucune dépense" icon="💸"/> : <ChartCanvas type="doughnut" data={depCatChartData} options={withLegendRight}/>}
        </ChartBlock>
        <ChartBlock title={`Dépenses mensuelles – ${periodLabel}`} icon="📅">
          {depensesMensuelles.labels.length===0 ? <EmptyState message="Aucune dépense" icon="📅"/> : <ChartCanvas type="bar" data={depMensuellesChartData} options={noLegend}/>}
        </ChartBlock>
        <ChartBlock title={`CA par client – ${periodLabel}`} icon="🏢">
          {clientLabels.length===0 ? <EmptyState message="Aucun encaissement" icon="🏢"/> : <ChartCanvas type="bar" data={caClientChartData} options={{...noLegend, indexAxis:'y'}}/>}
        </ChartBlock>
        <ChartBlock title={`Encaissements par associé – ${periodLabel}`} icon="👥">
          <ChartCanvas type="bar" data={associeChartData} options={noLegend}/>
        </ChartBlock>
        <ChartBlock title={`Avances perso par associé – ${periodLabel}`} icon="💸">
          {(depAssocie.Micka===0&&depAssocie.César===0) ? <EmptyState message="Aucune dépense" icon="💸"/> : <ChartCanvas type="bar" data={depAssocieChartData} options={noLegend}/>}
        </ChartBlock>
        <ChartBlock title={`CA signé – ${periodLabel}`} icon="✍️">
          {caSignature.labels.length===0 ? <EmptyState message="Aucun contrat signé" icon="✍️"/> : <ChartCanvas type="bar" data={caSignatureChartData} options={noLegend}/>}
        </ChartBlock>
        <ChartBlock title={`CA par type de paiement – ${periodLabel}`} icon="💳">
          {payTypeLabels.length===0 ? <EmptyState message="Aucun contrat signé" icon="💳"/> : <ChartCanvas type="doughnut" data={caByPaymentTypeChartData} options={withLegendRight}/>}
        </ChartBlock>
      </div>
    </div>
  );
}

function PilotageModule({data}) {
  const [periodeId, setPeriodeId] = React.useState('tout');
  const [dateDebut, setDateDebut] = React.useState('');
  const [dateFin, setDateFin] = React.useState('');

  const stats = React.useMemo(() => {
    const fE = (n) => new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR',maximumFractionDigits:0}).format(n||0);
    const range = buildPeriodeRange(periodeId, dateDebut, dateFin);
    const entries = buildLedgerEntries(data);
    const filtered = entries.filter(e => inPeriode(e.date, range));

    // Période précédente
    let prevRange = null;
    if(range) {
      const dur = range.end.getTime() - range.start.getTime();
      prevRange = {start: new Date(range.start.getTime() - dur - 1), end: new Date(range.start.getTime() - 1)};
    }
    const prevFiltered = prevRange ? entries.filter(e => inPeriode(e.date, prevRange)) : [];

    // === BLOC 1 – Activité ===
    const nonAnnule = data.contracts.filter(c => c.statut !== 'Annulé');
    const contratsSignesPeriode = nonAnnule.filter(c => inPeriode(c.dateDebut, range));
    const caSigne = contratsSignesPeriode.reduce((s, c) => s + (Number(c.montant)||0), 0);
    const caEncaisse = filtered.filter(e => e.type === 'contract').reduce((s, e) => s + e.montant, 0);
    const nbContrats = contratsSignesPeriode.length;
    const panierMoyen = nbContrats > 0 ? caSigne / nbContrats : 0;

    const resteList = nonAnnule.map(c => {
      const paid = (c.payments||[]).reduce((s, p) => s + (Number(p.montant)||0), 0);
      return {...c, reste: (Number(c.montant)||0) - paid};
    }).filter(c => c.reste > 0);
    const resteTotal = resteList.reduce((s, c) => s + c.reste, 0);
    const resteMicka = resteList.filter(c => c.assignedTo === 'Micka').reduce((s, c) => s + c.reste, 0);
    const resteCesar = resteList.filter(c => c.assignedTo === 'César').reduce((s, c) => s + c.reste, 0);

    const totalCRM = data.clients.length;
    const nbClients = data.clients.filter(cl => cl.etape === 'Client').length;
    const tauxTransfo = totalCRM > 0 ? Math.round((nbClients / totalCRM) * 100) : 0;

    const prevCaSigne = prevRange ? nonAnnule.filter(c => inPeriode(c.dateDebut, prevRange)).reduce((s,c)=>s+(Number(c.montant)||0),0) : null;
    const prevCaEncaisse = prevFiltered.filter(e => e.type === 'contract').reduce((s,e)=>s+e.montant,0);
    const prevNbContrats = prevRange ? nonAnnule.filter(c => inPeriode(c.dateDebut, prevRange)).length : null;
    const prevPanierMoyen = (prevNbContrats > 0 && prevCaSigne !== null) ? prevCaSigne / prevNbContrats : null;

    // === BLOC 2 – Rentabilité ===
    const totalDepenses = filtered.filter(e => e.montant < 0).reduce((s, e) => s + Math.abs(e.montant), 0);
    const margeBrute = caEncaisse - totalDepenses;
    const tauxMarge = caEncaisse > 0 ? Math.round((margeBrute / caEncaisse) * 100) : 0;
    const margeParContrat = nbContrats > 0 ? margeBrute / nbContrats : 0;

    const clientsCA = {};
    filtered.filter(e => e.type === 'contract').forEach(e => {
      const contract = data.contracts.find(c => c.id === e.sourceId || c.id === e.contractId);
      const nom = contract ? contract.client : (e.label || 'Inconnu');
      clientsCA[nom] = (clientsCA[nom] || 0) + e.montant;
    });
    const topClient = Object.entries(clientsCA).sort((a, b) => b[1] - a[1])[0] || null;
    const partTopClient = (topClient && caEncaisse > 0) ? Math.round((topClient[1] / caEncaisse) * 100) : 0;
    const top3 = Object.entries(clientsCA).sort((a,b) => b[1]-a[1]).slice(0, 3);

    const prevDepenses = prevFiltered.filter(e => e.montant < 0).reduce((s, e) => s + Math.abs(e.montant), 0);
    const prevMargeBrute = prevFiltered.filter(e => e.type === 'contract').reduce((s,e)=>s+e.montant,0) - prevDepenses;

    // === BLOC 3 – Trésorerie ===
    const totalEntrees = filtered.filter(e => e.montant > 0).reduce((s, e) => s + e.montant, 0);
    const totalSorties = filtered.filter(e => e.montant < 0).reduce((s, e) => s + Math.abs(e.montant), 0);
    const tresoReelle = totalEntrees - totalSorties;
    const tresoProjetee = tresoReelle + resteTotal;
    const apports = filtered.filter(e => e.type === 'apport').reduce((s, e) => s + e.montant, 0);

    const mickaPay = filtered.filter(e => e.type==='contract'&&e.assignedTo==='Micka').reduce((s,e)=>s+e.montant,0);
    const cesarPay = filtered.filter(e => e.type==='contract'&&e.assignedTo==='César').reduce((s,e)=>s+e.montant,0);
    const mickaAdv = filtered.filter(e => e.type==='expense'&&e.auteur==='Micka').reduce((s,e)=>s+Math.abs(e.montant),0);
    const cesarAdv = filtered.filter(e => e.type==='expense'&&e.auteur==='César').reduce((s,e)=>s+Math.abs(e.montant),0);
    const mickaApports = filtered.filter(e => e.type==='apport'&&e.imputéÀ==='Micka').reduce((s,e)=>s+e.montant,0);
    const cesarApports = filtered.filter(e => e.type==='apport'&&e.imputéÀ==='César').reduce((s,e)=>s+e.montant,0);
    const mickaBank = filtered.filter(e => e.type==='bank'&&e.imputéÀ==='Micka').reduce((s,e)=>s+e.montant,0);
    const cesarBank = filtered.filter(e => e.type==='bank'&&e.imputéÀ==='César').reduce((s,e)=>s+e.montant,0);
    const netMicka = mickaPay - mickaAdv - mickaApports + mickaBank;
    const netCesar = cesarPay - cesarAdv - cesarApports + cesarBank;
    const ecartDuo = Math.abs(netMicka - netCesar);
    const debiteur = netMicka > netCesar ? 'Micka' : netCesar > netMicka ? 'César' : null;
    const crediteur = netMicka > netCesar ? 'César' : netCesar > netMicka ? 'Micka' : null;
    const montantDu = ecartDuo / 2;
    const netMickaProj = netMicka + resteMicka;
    const netCesarProj = netCesar + resteCesar;
    const ecartDuoProj = Math.abs(netMickaProj - netCesarProj);
    const debiteurProj = netMickaProj > netCesarProj ? 'Micka' : netCesarProj > netMickaProj ? 'César' : null;
    const crediteurProj = netMickaProj > netCesarProj ? 'César' : netCesarProj > netMickaProj ? 'Micka' : null;
    const montantDuProj = ecartDuoProj / 2;

    const prevTresoReelle = prevFiltered.filter(e=>e.montant>0).reduce((s,e)=>s+e.montant,0) - prevFiltered.filter(e=>e.montant<0).reduce((s,e)=>s+Math.abs(e.montant),0);

    // === URSSAF / Net social ===
    const tauxURSSAFMicka = (data.config?.autoEntrepreneurMicka?.tauxURSSAF || data.config?.autoEntrepreneur?.tauxURSSAF || 22) / 100;
    const tauxURSSAFCesar = (data.config?.autoEntrepreneurCesar?.tauxURSSAF || data.config?.autoEntrepreneur?.tauxURSSAF || 22) / 100;
    const urssafMicka = mickaPay * tauxURSSAFMicka;
    const urssafCesar = cesarPay * tauxURSSAFCesar;
    const netMickaUrssaf = mickaPay - urssafMicka;
    const netCesarUrssaf = cesarPay - urssafCesar;
    const urssafTotal = urssafMicka + urssafCesar;
    const netUrssafTotal = caEncaisse - urssafTotal;

    // === BLOC 4 – Opérations ===
    const contratsEnCours = data.contracts.filter(c => c.statut === 'En cours').length;
    const today = new Date();
    const tachesEnRetard = data.tasks.filter(t => t.statut !== 'Terminé' && t.echeance && new Date(t.echeance + 'T23:59:59') < today).length;
    const dossiersUrgents = data.contracts.filter(c => {
      if(c.statut !== 'En cours' || !c.dateFin) return false;
      const diff = (new Date(c.dateFin + 'T00:00:00') - today) / (1000*60*60*24);
      return diff >= 0 && diff <= 30;
    }).length;
    const delais = nonAnnule.filter(c => c.payments && c.payments.length > 0 && c.dateDebut).map(c => {
      const d0 = new Date(c.dateDebut + 'T00:00:00');
      const sorted = [...c.payments].sort((a,b) => new Date(a.date) - new Date(b.date));
      return (new Date(sorted[0].date + 'T00:00:00') - d0) / (1000*60*60*24);
    }).filter(d => d >= 0 && d < 365);
    const delaiMoyen = delais.length > 0 ? Math.round(delais.reduce((s,d)=>s+d,0)/delais.length) : null;

    // === BLOC 5 – Croissance ===
    const nouveauxClients = data.clients.filter(cl => cl.etape === 'Client' && inPeriode(cl.dateEntree, range)).length;
    const pipeline = data.clients.filter(cl => cl.etape !== 'Client').length;
    const potentielPipeline = data.clients.filter(cl => cl.etape !== 'Client').reduce((s, cl) => s + (Number(cl.potentiel)||0), 0);
    const prevNouveauxClients = prevRange ? data.clients.filter(cl => cl.etape === 'Client' && inPeriode(cl.dateEntree, prevRange)).length : null;
    const evolutionCA = (prevRange && prevCaEncaisse > 0) ? Math.round(((caEncaisse - prevCaEncaisse) / prevCaEncaisse) * 100) : null;
    const evolutionContrats = (prevRange && prevNbContrats > 0) ? Math.round(((nbContrats - prevNbContrats) / prevNbContrats) * 100) : null;
    const evolutionPanier = (prevRange && prevPanierMoyen && prevPanierMoyen > 0) ? Math.round(((panierMoyen - prevPanierMoyen) / prevPanierMoyen) * 100) : null;

    // === Objectifs annuels ===
    const objMicka = Number(data.config?.objectives?.mickaCAAnnuel)||0;
    const objCesar = Number(data.config?.objectives?.cesarCAAnnuel)||0;
    const objTotal = objMicka + objCesar;
    const curY = new Date().getFullYear();
    const annRange = {start:new Date(curY,0,1), end:new Date(curY,11,31,23,59,59)};
    const mickaCaAnnuel = entries.filter(e=>e.type==='contract'&&e.assignedTo==='Micka'&&inPeriode(e.date,annRange)).reduce((s,e)=>s+e.montant,0);
    const cesarCaAnnuel = entries.filter(e=>e.type==='contract'&&e.assignedTo==='César'&&inPeriode(e.date,annRange)).reduce((s,e)=>s+e.montant,0);
    const caAnnuel = mickaCaAnnuel + cesarCaAnnuel;
    const tauxObjMicka = objMicka > 0 ? Math.min(999, Math.round((mickaCaAnnuel/objMicka)*100)) : null;
    const tauxObjCesar = objCesar > 0 ? Math.min(999, Math.round((cesarCaAnnuel/objCesar)*100)) : null;
    const tauxObjTotal = objTotal > 0 ? Math.min(999, Math.round((caAnnuel/objTotal)*100)) : null;

    // === Seuils AE ===
    const seuilMicka = data.config?.autoEntrepreneurMicka?.seuil || data.config?.autoEntrepreneur?.seuil || AUTO_ENTREPRENEUR_SEUIL;
    const seuilCesar = data.config?.autoEntrepreneurCesar?.seuil || data.config?.autoEntrepreneur?.seuil || AUTO_ENTREPRENEUR_SEUIL;
    const ratioSeuilMicka = seuilMicka > 0 ? mickaCaAnnuel / seuilMicka : 0;
    const ratioSeuilCesar = seuilCesar > 0 ? cesarCaAnnuel / seuilCesar : 0;

    // === Alertes dirigeant (max 5, triées par gravité) ===
    const alertes = [];
    if(ratioSeuilMicka >= 1) alertes.push({level:'danger', icon:'🚨', msg:`Seuil AE Micka dépassé : ${fE(mickaCaAnnuel)} / ${fE(seuilMicka)}`});
    else if(ratioSeuilMicka >= 0.9) alertes.push({level:'danger', icon:'⚡', msg:`Seuil AE Micka critique : ${Math.round(ratioSeuilMicka*100)}% atteint`});
    else if(ratioSeuilMicka >= 0.8) alertes.push({level:'warning', icon:'📊', msg:`Seuil AE Micka : ${Math.round(ratioSeuilMicka*100)}% atteint`});
    if(ratioSeuilCesar >= 1) alertes.push({level:'danger', icon:'🚨', msg:`Seuil AE César dépassé : ${fE(cesarCaAnnuel)} / ${fE(seuilCesar)}`});
    else if(ratioSeuilCesar >= 0.9) alertes.push({level:'danger', icon:'⚡', msg:`Seuil AE César critique : ${Math.round(ratioSeuilCesar*100)}% atteint`});
    else if(ratioSeuilCesar >= 0.8) alertes.push({level:'warning', icon:'📊', msg:`Seuil AE César : ${Math.round(ratioSeuilCesar*100)}% atteint`});
    if(evolutionCA !== null && evolutionCA < -15) alertes.push({level:'danger', icon:'📉', msg:`CA en baisse de ${Math.abs(evolutionCA)}% vs période précédente`});
    if(resteTotal > 10000) alertes.push({level:'warning', icon:'💰', msg:`Reste à encaisser élevé : ${fE(resteTotal)}`});
    if(caEncaisse > 0 && tauxMarge < 20) alertes.push({level:'warning', icon:'📉', msg:`Taux de marge faible : ${tauxMarge}% (cible > 40%)`});
    if(ecartDuo > 3000) alertes.push({level:'warning', icon:'⚖️', msg:`Écart duo élevé à rééquilibrer : ${fE(ecartDuo)}`});
    if(tachesEnRetard > 3) alertes.push({level:'warning', icon:'⏰', msg:`${tachesEnRetard} tâches en retard`});
    else if(tachesEnRetard > 0) alertes.push({level:'info', icon:'⏰', msg:`${tachesEnRetard} tâche${tachesEnRetard > 1 ? 's' : ''} en retard`});
    if(dossiersUrgents > 0) alertes.push({level:'warning', icon:'📄', msg:`${dossiersUrgents} dossier${dossiersUrgents > 1 ? 's urgents' : ' urgent'} (fin ≤ 30j)`});
    if(pipeline < 3) alertes.push({level:'info', icon:'👥', msg:`Pipeline faible : ${pipeline} prospect${pipeline !== 1 ? 's' : ''} en cours`});
    const alertesSorted = [...alertes].sort((a,b) => ({danger:0,warning:1,info:2}[a.level] - {danger:0,warning:1,info:2}[b.level])).slice(0, 5);

    // === Résumé narratif automatique ===
    const parts = [];
    if(evolutionCA !== null) {
      if(evolutionCA >= 20) parts.push("L'activité est en forte progression");
      else if(evolutionCA >= 5) parts.push("L'activité progresse sur la période");
      else if(evolutionCA >= -5) parts.push("le CA est stable");
      else if(evolutionCA >= -20) parts.push("le CA marque un léger recul");
      else parts.push("le CA est en baisse significative");
    } else if(caEncaisse > 0) {
      parts.push("l'activité génère du CA sur cette période");
    } else {
      parts.push("aucun encaissement enregistré sur la période");
    }
    if(caEncaisse > 0) {
      if(tauxMarge >= 60) parts.push("la marge est excellente");
      else if(tauxMarge >= 40) parts.push("la marge est bonne");
      else if(tauxMarge >= 20) parts.push("la marge est correcte");
      else parts.push("la marge est faible");
    }
    if(ecartDuo > 2000) parts.push(`un écart duo de ${fE(montantDu)} à rééquilibrer`);
    else if(ecartDuo < 200 && (mickaPay + cesarPay) > 0) parts.push("la balance duo est équilibrée");
    if(resteTotal > 5000) parts.push(`${fE(resteTotal)} restant à encaisser`);
    if(pipeline < 3 && nouveauxClients === 0) parts.push("le pipeline est fragile");
    else if(nouveauxClients > 0) parts.push(`${nouveauxClients} nouveau${nouveauxClients > 1 ? 'x' : ''} client${nouveauxClients > 1 ? 's' : ''} sur la période`);
    const first = parts[0] ? parts[0].charAt(0).toUpperCase() + parts[0].slice(1) : '';
    const narrative = parts.length === 0 ? "Pas encore assez de données pour générer une synthèse."
      : parts.length === 1 ? first + "."
      : first + ", " + parts.slice(1).join(", ") + ".";

    return {
      caSigne, caEncaisse, resteTotal, nbContrats, panierMoyen, tauxTransfo, nbClients, totalCRM,
      prevCaSigne, prevCaEncaisse, prevNbContrats, prevPanierMoyen,
      totalDepenses, margeBrute, tauxMarge, margeParContrat, topClient, partTopClient, top3,
      prevDepenses, prevMargeBrute,
      tresoReelle, tresoProjetee, apports, ecartDuo, netMicka, netCesar,
      debiteur, crediteur, montantDu, netMickaProj, netCesarProj,
      ecartDuoProj, debiteurProj, crediteurProj, montantDuProj, prevTresoReelle,
      mickaPay, cesarPay, urssafMicka, urssafCesar, netMickaUrssaf, netCesarUrssaf,
      urssafTotal, netUrssafTotal, tauxURSSAFMicka, tauxURSSAFCesar,
      contratsEnCours, tachesEnRetard, dossiersUrgents, delaiMoyen,
      nouveauxClients, pipeline, potentielPipeline, prevNouveauxClients,
      evolutionCA, evolutionContrats, evolutionPanier,
      objMicka, objCesar, objTotal, mickaCaAnnuel, cesarCaAnnuel, caAnnuel,
      tauxObjMicka, tauxObjCesar, tauxObjTotal,
      alertes: alertesSorted, narrative,
    };
  }, [data, periodeId, dateDebut, dateFin]);

  const fmtE = (n) => new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR',maximumFractionDigits:0}).format(n||0);

  // Badge de variation vs période précédente
  const Delta = ({curr, prev, lowerIsBetter}) => {
    if(prev === null || prev === undefined || prev === 0 || curr === null || curr === undefined) return null;
    const pct = Math.round(((curr - prev) / Math.abs(prev)) * 100);
    const improved = lowerIsBetter ? pct < 0 : pct > 0;
    const neutral = pct === 0;
    return (
      <span className={`inline-flex items-center gap-0.5 text-xs font-semibold px-1.5 py-0.5 rounded-md flex-shrink-0 ${neutral ? 'bg-gray-100 text-gray-500' : improved ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-600'}`}>
        {pct > 0 ? '↑' : pct < 0 ? '↓' : '→'} {Math.abs(pct)}%
      </span>
    );
  };

  // Carte KPI avec delta optionnel
  const KpiBox = ({label, value, curr, prev, lowerIsBetter, sub, color='gray'}) => {
    const cls = {
      blue:'bg-blue-50 text-blue-700 border-blue-100',
      green:'bg-green-50 text-green-700 border-green-100',
      amber:'bg-amber-50 text-amber-700 border-amber-100',
      red:'bg-red-50 text-red-700 border-red-100',
      purple:'bg-purple-50 text-purple-700 border-purple-100',
      indigo:'bg-indigo-50 text-indigo-700 border-indigo-100',
      emerald:'bg-emerald-50 text-emerald-700 border-emerald-100',
      gray:'bg-gray-50 text-gray-700 border-gray-100',
    };
    return (
      <div className={`rounded-xl border p-4 ${cls[color]||cls.gray}`}>
        <div className="text-xs font-medium opacity-60 mb-1 leading-tight">{label}</div>
        <div className="flex items-baseline flex-wrap gap-1.5">
          <span className="text-xl font-bold leading-tight">{value}</span>
          {curr !== undefined && <Delta curr={curr} prev={prev} lowerIsBetter={lowerIsBetter}/>}
        </div>
        {sub && <div className="text-xs opacity-50 mt-1 leading-tight">{sub}</div>}
      </div>
    );
  };

  const Section = ({icon, title, subtitle, children}) => (
    <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
      <div className="flex items-center gap-3 mb-5">
        <span className="text-2xl">{icon}</span>
        <div>
          <h2 className="text-base font-semibold text-gray-800">{title}</h2>
          {subtitle && <p className="text-xs text-gray-400 mt-0.5">{subtitle}</p>}
        </div>
      </div>
      {children}
    </div>
  );

  const ProgressBar = ({value, max, color='blue'}) => {
    const pct = max > 0 ? Math.min(100, Math.round((value/max)*100)) : 0;
    const barCls = {blue:'bg-blue-500', green:'bg-green-500', indigo:'bg-indigo-500', amber:'bg-amber-400', red:'bg-red-500'}[color] || 'bg-blue-500';
    return (
      <div className="w-full bg-gray-100 rounded-full h-1.5 mt-1.5">
        <div className={`h-1.5 rounded-full transition-all ${barCls}`} style={{width:`${pct}%`}}></div>
      </div>
    );
  };

  return (
    <div className="space-y-6">

      {/* En-tête */}
      <div className="flex flex-wrap items-center justify-between gap-3">
        <div>
          <h1 className="text-xl font-bold text-gray-800">Vue Dirigeant</h1>
          <p className="text-xs text-gray-400 mt-0.5">Indicateurs stratégiques de pilotage</p>
        </div>
        <PeriodeFilter periodeId={periodeId} setPeriodeId={setPeriodeId} dateDebut={dateDebut} setDateDebut={setDateDebut} dateFin={dateFin} setDateFin={setDateFin}/>
      </div>

      {/* Résumé narratif automatique */}
      <div className="bg-gradient-to-r from-slate-50 to-blue-50 border border-blue-100 rounded-2xl p-4 flex items-start gap-3">
        <span className="text-xl mt-0.5 flex-shrink-0">💡</span>
        <p className="text-sm text-slate-700 leading-relaxed font-medium">{stats.narrative}</p>
      </div>

      {/* Points d'attention */}
      {stats.alertes.length > 0 && (
        <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-5">
          <div className="flex items-center gap-2 mb-3">
            <span className="text-base">🔔</span>
            <h2 className="text-sm font-semibold text-gray-700">Points d'attention</h2>
            <span className="ml-auto text-xs bg-gray-100 text-gray-500 rounded-full px-2 py-0.5 font-medium">{stats.alertes.length}</span>
          </div>
          <div className="space-y-2">
            {stats.alertes.map((a, i) => {
              const bg = a.level === 'danger' ? 'bg-red-50 border-red-200 text-red-700' : a.level === 'warning' ? 'bg-amber-50 border-amber-200 text-amber-700' : 'bg-sky-50 border-sky-200 text-sky-700';
              return (
                <div key={i} className={`flex items-center gap-2.5 px-3 py-2 rounded-lg border text-sm font-medium ${bg}`}>
                  <span className="flex-shrink-0">{a.icon}</span>
                  <span>{a.msg}</span>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* BLOC 1 – Activité commerciale */}
      <Section icon="📦" title="Activité commerciale" subtitle="Business généré sur la période">
        <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-3">
          <KpiBox label="CA signé" value={fmtE(stats.caSigne)} curr={stats.caSigne} prev={stats.prevCaSigne} color="blue"/>
          <KpiBox label="CA encaissé" value={fmtE(stats.caEncaisse)} curr={stats.caEncaisse} prev={stats.prevCaEncaisse} color="green"/>
          <KpiBox label="Reste à encaisser" value={fmtE(stats.resteTotal)} color="amber"/>
          <KpiBox label="Contrats signés" value={String(stats.nbContrats)} curr={stats.nbContrats} prev={stats.prevNbContrats} color="indigo"/>
        </div>
        <div className="grid grid-cols-2 gap-3">
          <KpiBox label="Panier moyen" value={fmtE(stats.panierMoyen)} curr={stats.panierMoyen} prev={stats.prevPanierMoyen} sub={`sur ${stats.nbContrats} contrat${stats.nbContrats !== 1 ? 's' : ''}`} color="purple"/>
          <KpiBox label="Taux de transformation CRM" value={`${stats.tauxTransfo}%`} sub={`${stats.nbClients} clients / ${stats.totalCRM} contacts CRM`} color="blue"/>
        </div>
      </Section>

      {/* BLOC 2 – Rentabilité */}
      <Section icon="📈" title="Rentabilité" subtitle="Valeur réelle générée par l'activité">
        <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">
          <KpiBox label="Dépenses totales" value={fmtE(stats.totalDepenses)} curr={stats.totalDepenses} prev={stats.prevDepenses} lowerIsBetter={true} color="red"/>
          <KpiBox label="Marge brute" value={fmtE(stats.margeBrute)} curr={stats.margeBrute} prev={stats.prevMargeBrute} color={stats.margeBrute >= 0 ? 'green' : 'red'}/>
          <KpiBox label="Taux de marge" value={`${stats.tauxMarge}%`} color={stats.tauxMarge >= 50 ? 'green' : stats.tauxMarge >= 20 ? 'amber' : 'red'}/>
          <KpiBox label="Marge / contrat" value={fmtE(stats.margeParContrat)} sub={`${stats.nbContrats} contrat${stats.nbContrats !== 1 ? 's' : ''} sur la période`} color="indigo"/>
        </div>
        {stats.topClient && (
          <div className="flex flex-wrap items-center gap-2 mb-4 p-3 bg-indigo-50 rounded-xl border border-indigo-100">
            <span className="text-sm text-indigo-400">🏆</span>
            <span className="text-sm font-semibold text-indigo-700">Top client :</span>
            <span className="text-sm font-bold text-indigo-800">{stats.topClient[0]}</span>
            <span className="text-sm font-bold text-green-600 ml-1">{fmtE(stats.topClient[1])}</span>

function SnapshotModal({onClose, onRollback}) {
  const [snapshots, setSnapshots] = React.useState(null); // null = loading
  const [creating, setCreating] = React.useState(false);
  const [rolling, setRolling] = React.useState(null); // id en cours
  const addToast = useToast();

  React.useEffect(() => {
    listSnapshots().then(setSnapshots);
  }, []);

  const handleCreate = async () => {
    setCreating(true);
    await createSnapshot('manual');
    const updated = await listSnapshots();
    setSnapshots(updated);
    setCreating(false);
    addToast('Snapshot créé ☁️', 'success');
  };

  const handleRollback = async (snap) => {
    const label = new Date(snap.ts).toLocaleString('fr-FR');
    if(!window.confirm(`Restaurer l'état du ${label} ?\n\nL'état actuel sera snapshotté automatiquement avant restauration.`)) return;
    setRolling(snap.id);
    rollbackToSnapshot(snap.id,
      (d) => { addToast('Restauration réussie ☁️', 'success'); onRollback(d); onClose(); },
      (err) => { addToast('Erreur restauration : ' + err, 'error'); setRolling(null); }
    );
  };

  const fmtSize = (b) => b >= 1024 ? (b/1024).toFixed(1)+'KB' : b+'B';
  const triggerLabel = (t) => ({startup:'Démarrage', 'pre-import':'Avant import', 'pre-rollback':'Avant restauration', manual:'Manuel'}[t] || t);

  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/40" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="bg-white rounded-2xl shadow-2xl w-full max-w-lg mx-4 flex flex-col max-h-[80vh]">
        <div className="flex items-center justify-between px-5 py-4 border-b border-gray-100">
          <div>
            <div className="font-semibold text-gray-800">Snapshots cloud ☁️</div>
            <div className="text-xs text-gray-400 mt-0.5">Historique des sauvegardes distantes (max 20)</div>
          </div>
          <button onClick={onClose} className="text-gray-400 hover:text-gray-600 text-xl leading-none">✕</button>
        </div>
        <div className="px-5 py-3 border-b border-gray-50">
          <button onClick={handleCreate} disabled={creating} className="flex items-center gap-2 px-4 py-2 bg-blue-50 hover:bg-blue-100 text-blue-700 text-sm font-medium rounded-xl transition-colors disabled:opacity-50">
            {creating ? '⏳ Création...' : '📸 Créer un snapshot maintenant'}
          </button>
        </div>
        <div className="overflow-y-auto flex-1 px-5 py-3 space-y-2">
          {snapshots === null && <div className="text-sm text-gray-400 py-4 text-center">Chargement...</div>}
          {snapshots && snapshots.length === 0 && <div className="text-sm text-gray-400 py-4 text-center">Aucun snapshot disponible</div>}
          {(snapshots||[]).map(snap => (
            <div key={snap.id} className="flex items-center gap-3 p-3 bg-gray-50 rounded-xl">
              <div className="flex-1 min-w-0">
                <div className="text-sm font-medium text-gray-700 truncate">
                  {new Date(snap.ts).toLocaleString('fr-FR')}
                </div>
                <div className="text-xs text-gray-400 mt-0.5">
                  {triggerLabel(snap.triggered_by)} · v{snap.version||'?'} · {fmtSize(snap.size_bytes||0)}
                </div>
              </div>
              <button
                onClick={() => handleRollback(snap)}
                disabled={rolling !== null}
                className="shrink-0 px-3 py-1.5 bg-amber-50 hover:bg-amber-100 text-amber-700 text-xs font-medium rounded-lg transition-colors disabled:opacity-50"
              >
                {rolling === snap.id ? '⏳' : '↩ Restaurer'}
              </button>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function Sidebar({active, onChange, onExport, onImport, onSnapshots, version, sidebarOpen, setSidebarOpen, syncStatus, onSearch, onAlerts, alertCount}) {
  const fileRef = React.useRef();
  const dragNavItem = React.useRef(null);

  const [navOrder, setNavOrder] = React.useState(() => {
    const p = loadUIPrefs();
    return p.navOrder || NAV_ITEMS.map(i=>i.id);
  });
  const [hiddenNav, setHiddenNav] = React.useState(() => {
    const p = loadUIPrefs();
    return new Set(p.hiddenNav||[]);
  });
  const [customizing, setCustomizing] = React.useState(false);
  const [dragOver, setDragOver] = React.useState(null);

  const saveNavPrefs = (order, hidden) => {
    saveUIPrefs({...loadUIPrefs(), navOrder:order, hiddenNav:[...hidden]});
  };

  const orderedItems = React.useMemo(() => {
    const byId = Object.fromEntries(NAV_ITEMS.map(i=>[i.id,i]));
    const ordered = navOrder.map(id=>byId[id]).filter(Boolean);
    NAV_ITEMS.forEach(i => { if(!navOrder.includes(i.id)) ordered.push(i); });
    return ordered;
  }, [navOrder]);

  const handleDragStart = (id) => { dragNavItem.current = id; };
  const handleDrop = (id) => {
    if(!dragNavItem.current || dragNavItem.current === id) return;
    const o = [...navOrder];
    const from = o.indexOf(dragNavItem.current); const to = o.indexOf(id);
    if(from<0||to<0) { dragNavItem.current=null; setDragOver(null); return; }
    o.splice(from,1); o.splice(to,0,dragNavItem.current);
    setNavOrder(o); saveNavPrefs(o, hiddenNav);
    dragNavItem.current=null; setDragOver(null);
  };
  const toggleNav = (id) => {
    const nh = new Set(hiddenNav);
    if(nh.has(id)) nh.delete(id); else nh.add(id);
    setHiddenNav(nh); saveNavPrefs(navOrder, nh);
  };

  const handleImportFile = (e) => {
    const file = e.target.files[0];
    if(!file) return;
    onImport(file);
    e.target.value = '';
  };

  const content = (
    <div className="flex flex-col h-full">
      <div className="px-5 pt-5 pb-3 border-b border-gray-100">
        <div className="text-lg font-bold text-gray-800 leading-tight">EntrepreneurPRO</div>
        <div className="text-xs text-gray-400 mt-0.5 mb-3">{version}</div>
        <div className="flex gap-2">
          <button onClick={onSearch} className="flex-1 flex items-center gap-1.5 px-3 py-2 bg-gray-50 hover:bg-gray-100 rounded-xl text-xs text-gray-500 transition-colors">
            🔍 <span>Rechercher</span><span className="ml-auto text-gray-300 font-mono">⌘K</span>
          </button>
          <button onClick={onAlerts} className="relative px-3 py-2 bg-gray-50 hover:bg-gray-100 rounded-xl text-sm transition-colors">
            🔔{alertCount>0&&<span className="absolute -top-1 -right-1 bg-red-500 text-white text-xs rounded-full w-4 h-4 flex items-center justify-center font-bold leading-none">{alertCount}</span>}
          </button>
        </div>
      </div>
      <nav className="flex-1 px-3 py-4 overflow-y-auto space-y-0.5">
        {orderedItems.map(item => {
          const isHidden = hiddenNav.has(item.id);
          if(!customizing && isHidden) return null;
          return (
            <div key={item.id}
              draggable={customizing}
              onDragStart={customizing ? () => handleDragStart(item.id) : undefined}
              onDragOver={customizing ? (e) => { e.preventDefault(); setDragOver(item.id); } : undefined}
              onDragLeave={customizing ? () => setDragOver(v=>v===item.id?null:v) : undefined}
              onDrop={customizing ? (e) => { e.preventDefault(); handleDrop(item.id); } : undefined}
              className={`flex items-center gap-1 rounded-xl transition-all ${dragOver===item.id&&customizing?'ring-2 ring-blue-300 bg-blue-50':''} ${isHidden&&customizing?'opacity-40':''}`}
            >
              {customizing && (
                <span className="text-gray-300 pl-1 text-sm select-none cursor-grab shrink-0">⠿</span>
              )}
              <button
                onClick={() => { if(!customizing) { onChange(item.id); setSidebarOpen(false); } }}
                className={`flex-1 flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-colors ${active===item.id&&!customizing?'bg-blue-50 text-blue-700':isHidden?'text-gray-300':'text-gray-600 hover:bg-gray-50 hover:text-gray-800'} ${customizing?'cursor-default':''}`}>
                <span className="text-base">{item.icon}</span>
                {item.label}
              </button>
              {customizing && (
                <button onClick={() => toggleNav(item.id)} className={`shrink-0 text-xs px-1.5 py-1 rounded mr-1 transition-colors ${isHidden?'text-gray-400 hover:text-blue-500':'text-gray-300 hover:text-red-400'}`} title={isHidden?'Afficher':'Masquer'}>
                  {isHidden ? '👁' : '✕'}
                </button>
              )}
            </div>
          );
        })}
      </nav>
      <div className="px-3 py-4 border-t border-gray-100 space-y-1">
        <button onClick={() => setCustomizing(v=>!v)} className={`w-full flex items-center gap-2 px-3 py-2 rounded-xl text-xs transition-colors ${customizing?'bg-blue-50 text-blue-600 font-semibold':'text-gray-500 hover:bg-gray-50'}`}>
          <span>⚙️</span> {customizing ? 'Terminer personnalisation' : 'Personnaliser le menu'}
        </button>
        <button onClick={onExport} className="w-full flex items-center gap-2 px-3 py-2 rounded-xl text-xs text-gray-500 hover:bg-gray-50 transition-colors">
          <span>⬇️</span> Exporter JSON
        </button>
        <button onClick={()=>fileRef.current?.click()} className="w-full flex items-center gap-2 px-3 py-2 rounded-xl text-xs text-gray-500 hover:bg-gray-50 transition-colors">
          <span>⬆️</span> Importer JSON
        </button>
        <button onClick={onSnapshots} className="w-full flex items-center gap-2 px-3 py-2 rounded-xl text-xs text-gray-500 hover:bg-gray-50 transition-colors">
          <span>📸</span> Snapshots cloud
        </button>
        <input type="file" ref={fileRef} accept=".json" className="hidden" onChange={handleImportFile}/>
        <div className={`flex items-center gap-2 px-3 py-2 rounded-xl text-xs font-medium ${
          syncStatus==='ok' ? 'text-green-600' :
          syncStatus==='empty' ? 'text-amber-600' :
          syncStatus==='loading' ? 'text-gray-400' :
          syncStatus==='conflict' ? 'text-orange-600' :
          'text-red-500'
        }`}>
          <span>{syncStatus==='ok'?'☁️':syncStatus==='empty'?'🟡':syncStatus==='loading'?'⏳':syncStatus==='conflict'?'⚡':'⚠️'}</span>
          {syncStatus==='ok' ? 'Supabase connecté' :
           syncStatus==='empty' ? 'Base distante vide' :
           syncStatus==='loading' ? 'Connexion...' :
           syncStatus==='conflict' ? 'Conflit détecté' :
           'Erreur sync – mode local'}
        </div>
      </div>
    </div>
  );

  return (<>
    <aside className="hidden md:flex flex-col fixed left-0 top-0 h-screen w-60 bg-white border-r border-gray-100 shadow-sm z-30">
      {content}
    </aside>
    {sidebarOpen && (
      <div className="md:hidden fixed inset-0 z-40 flex">
        <div className="fixed inset-0 bg-black/40" onClick={()=>setSidebarOpen(false)}/>
        <div className="relative w-60 bg-white h-full shadow-xl z-50">
          {content}
        </div>
      </div>
    )}
  </>);
}

    const handler = (e) => {
      if((e.metaKey||e.ctrlKey)&&e.key==='k') { e.preventDefault(); setShowSearch(v=>!v); }
      if(e.key==='Escape') { setShowSearch(false); setShowAlerts(false); }
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, []);

  // V21 – Initialisation manuelle : uniquement si la ligne Supabase est réellement absente
  // R3/R8 : enregistrement du callback syncStatus dès le montage
  React.useEffect(() => {
    _onSyncStatusChange = (status) => setSyncStatus(status);
    return () => { _onSyncStatusChange = null; };
  }, []);

  // V23 : rappel export automatique si dernier export > 7 jours
  React.useEffect(() => {
    if(typeof shouldAutoExport === 'function' && shouldAutoExport()) setAutoExportBanner(true);
  }, []);

  const handleManualInit = React.useCallback(async (sourceLabel, dataToWrite) => {
    // Garde : jamais de données de démo
    if(isDemoData(dataToWrite)) {
      addToast('Initialisation bloquée : données de démo détectées', 'error');
      return;
    }
    // R7 : validateBeforeWrite sauf SIZE_REGRESSION (non pertinent pour init explicite)
    if(isDemoData(dataToWrite)) { // redondant mais défensif
      addToast('Initialisation bloquée : données de démo détectées', 'error');
      return;
    }
    const ok = window.confirm(
      `Initialiser la base Supabase avec les données ${sourceLabel} ?\n\n` +
      `Contenu : ${(dataToWrite.contracts||[]).length} contrats, ${(dataToWrite.clients||[]).length} clients, ${(dataToWrite.tasks||[]).length} tâches.\n\n` +
      `Cette action est irréversible. Confirmer ?`
    );
    if(!ok) return;
    setManualInitBusy(true);
    try {
      const {error} = await sb.from('app_data').upsert({id:1, data:dataToWrite, updated_at:new Date().toISOString()});
      if(error) throw error;
      persistRemoteSize(JSON.stringify(dataToWrite).length); // R4 : persistance taille
      isRemoteUpdate.current = true;
      setData(dataToWrite);
      try { localStorage.setItem(LS_KEY, JSON.stringify(dataToWrite)); } catch(e) {}
      saveLocalBackup(dataToWrite);
      addSyncLog('MANUAL_INIT_OK', `size=${lastRemoteDataSize}B`);
      setSyncStatus('ok');
      addToast('Base initialisée avec succès ☁️', 'success');
    } catch(e) {
      console.error('[SAFE-SYNC] Initialisation manuelle échouée:', e);
      addSyncLog('MANUAL_INIT_ERROR', e.message);
      addToast('Erreur d\'initialisation : ' + e.message, 'error');
    }
    setManualInitBusy(false);
  }, [addToast]);

  // On mount: fetch from Supabase + subscribe realtime
  React.useEffect(() => {
    let channel;
    (async () => {
      try {
        const { data: rows, error } = await sb.from('app_data').select('data').eq('id', 1).single();

        if (!error && rows && rows.data) {
          // CAS OK : données distantes chargées avec succès
          const remote = securizeData(rows.data);
          persistRemoteSize(JSON.stringify(remote).length); // R4 : persistance taille distante
          isRemoteUpdate.current = true;
          setData(remote);
          try { localStorage.setItem(LS_KEY, JSON.stringify(remote)); } catch(e) {}
          saveLocalBackup(remote);
          // V23 : récupère la version distante séparément (optionnel — silencieux si colonne absente)
          sb.from('app_data').select('version').eq('id', 1).single().then(({data: vrow}) => {
            if(vrow && typeof vrow.version === 'number' && typeof setLocalVersion === 'function') setLocalVersion(vrow.version);
          }).catch(() => {});
          addSyncLog('LOAD_OK', `size=${lastRemoteDataSize}B`);
          // V23 : snapshot de démarrage (une fois par session, silencieux si table absente)
          if(typeof shouldCreateStartupSnapshot === 'function' && shouldCreateStartupSnapshot()) {
            if(typeof createSnapshot === 'function') createSnapshot('startup').catch(() => {});
          }
          setSyncStatus('ok');
        } else if(error && (error.code === 'PGRST116' || error.details?.includes('0 rows'))) {
          // CAS VIDE : la ligne n'existe pas encore — JAMAIS d'upsert automatique
          console.warn('[SAFE-SYNC] Ligne distante absente (PGRST116). Aucune écriture automatique.');
          addSyncLog('LOAD_EMPTY', 'Row id=1 absent de Supabase');
          setSyncStatus('empty');
        } else {
          // CAS ERREUR : lecture distante échouée — on ne touche PAS à la base
          console.error('[SAFE-SYNC] Lecture Supabase échouée:', error);
          addSyncLog('LOAD_ERROR', error?.message || 'unknown');
          setSyncStatus('error');
        }
      } catch(e) {
        // Exception réseau ou autre — on ne touche PAS à la base
        console.error('[SAFE-SYNC] Exception au chargement:', e);
        addSyncLog('LOAD_EXCEPTION', e.message);
        setSyncStatus('error');
      }
      setSynced(true);
    })();

    // Realtime — avec garde anti-démo, anti-régression taille (R5), et persistance (R4)
    channel = sb.channel('app_data_realtime')
      .on('postgres_changes', {event:'UPDATE', schema:'public', table:'app_data'}, (payload) => {
        if(!payload.new?.data) return;
        const incoming = securizeData(payload.new.data);
        // Blocage démo
        if(isDemoData(incoming)) {
          console.error('[SAFE-SYNC] Realtime bloqué : données de démo détectées');
          addSyncLog('REALTIME_BLOCKED', 'demo data detected');
          return;
        }
        // R5 : SIZE_REGRESSION sur les mises à jour entrantes realtime
        const incomingSize = JSON.stringify(incoming).length;
        if(lastRemoteDataSize > 5000 && incomingSize < lastRemoteDataSize * 0.4) {
          console.error(`[SAFE-SYNC] Realtime bloqué : régression taille (${incomingSize}B << ${lastRemoteDataSize}B connus)`);
          addSyncLog('REALTIME_SIZE_REGRESSION', `incoming=${incomingSize}B vs known=${lastRemoteDataSize}B`);
          return;
        }
        persistRemoteSize(incomingSize); // R4 : mise à jour de la taille distante connue
        isRemoteUpdate.current = true;
        setData(incoming);
        try { localStorage.setItem(LS_KEY, JSON.stringify(incoming)); } catch(e) {}
        saveLocalBackup(incoming);
        addSyncLog('REALTIME_UPDATE', `size=${lastRemoteDataSize}B`);
        addToast('Synchronisé ☁️', 'info');
      })
      .subscribe();

    return () => { if(channel) sb.removeChannel(channel); };
  }, []);

  // Sauvegarde Supabase à chaque changement (sauf mises à jour reçues du realtime)
  React.useEffect(() => {
    if(!synced) return;
    // R1 : aucune écriture Supabase si la connexion distante n'est pas confirmée comme saine
    // — 'empty' : ligne distante absente, l'utilisateur doit initier manuellement
    // — 'error' : connexion échouée, pas d'écriture silencieuse
    // — 'loading' : chargement en cours, attente
    if(syncStatus !== 'ok') return;
    if(isRemoteUpdate.current) { isRemoteUpdate.current = false; return; }
    saveData(data);
  }, [data, synced, syncStatus]);

  const onNavigate = (module, deepLinkData) => {
    setActiveModule(module);
    if(module==='contracts') setContractDeepLink(deepLinkData||null);
    if(module==='bank') setBankDeepLink(deepLinkData||null);
    setSidebarOpen(false);
  };

  const handleImport = (file) => {
    doImport(file,
      async (imported) => {
        await createSnapshot('pre-import'); // V23 : snapshot de sécurité avant tout import
        setData(imported);
        addToast('Import réussi','success');
      },
      (err) => addToast(err,'error')
    );
  };

  const renderModule = () => {
    const wrap = (component) => <ErrorBoundary key={activeModule}>{component}</ErrorBoundary>;
    switch(activeModule) {
      case 'dashboard': return wrap(<Dashboard data={data} onNavigate={onNavigate}/>);
      case 'pilotage': return wrap(<PilotageModule data={data}/>);
      case 'analytics': return wrap(<AnalyticsModule data={data}/>);
      case 'quotes': return wrap(<QuotesModule data={data} setData={setData} onNavigate={onNavigate}/>);
      case 'invoices': return wrap(<InvoicesModule data={data} setData={setData}/>);
      case 'contracts': return wrap(<ContractsModule data={data} setData={setData} deepLink={contractDeepLink} clearDeepLink={()=>setContractDeepLink(null)}/>);
      case 'crm': return wrap(<CRMModule data={data} setData={setData} onNavigate={onNavigate}/>);
      case 'tasks': return wrap(<TasksModule data={data} setData={setData}/>);
      case 'bank': return wrap(<BankModule data={data} setData={setData} deepLink={bankDeepLink} clearDeepLink={()=>setBankDeepLink(null)}/>);
      case 'ledger': return wrap(<LedgerModule data={data} onNavigate={onNavigate}/>);
      case 'tresorerie': return wrap(<TresorerieModule data={data}/>);
      case 'resources': return wrap(<DriveModule data={data} setData={setData}/>);
      default: return wrap(<Dashboard data={data} onNavigate={onNavigate}/>);
    }
  };

  if(!synced) {
    return (
      <div className="min-h-screen bg-gray-50 flex items-center justify-center">
        <div className="text-center">
          <div className="text-4xl mb-4 animate-pulse">☁️</div>
          <div className="text-sm text-gray-500">Connexion à Supabase...</div>
        </div>
      </div>
    );
  }

  return (
    <div className="min-h-screen bg-gray-50">
      <Sidebar
        active={activeModule}
        onChange={setActiveModule}
        onExport={() => { doExport(data); markExportDone(); setAutoExportBanner(false); }}
        onImport={handleImport}
        onSnapshots={() => setShowSnapshots(true)}
        version={APP_VERSION}
        sidebarOpen={sidebarOpen}
        setSidebarOpen={setSidebarOpen}
        syncStatus={syncStatus}
        onSearch={()=>setShowSearch(v=>!v)}
        onAlerts={()=>setShowAlerts(v=>!v)}
        alertCount={alerts.length}
      />
      {/* Mobile top bar */}
      <div className="md:hidden fixed top-0 left-0 right-0 z-20 bg-white border-b border-gray-100 px-4 py-3 flex items-center gap-3 shadow-sm">
        <button onClick={()=>setSidebarOpen(true)} className="text-gray-600 hover:text-gray-800 text-xl">☰</button>
        <div className="font-semibold text-gray-800 text-sm">EntrepreneurPRO</div>
        <div className="ml-auto flex items-center gap-2">
          <button onClick={()=>setShowSearch(v=>!v)} className="text-gray-400 hover:text-gray-700 text-base px-1">🔍</button>
          <button onClick={()=>setShowAlerts(v=>!v)} className="relative text-gray-400 hover:text-gray-700 text-base px-1">
            🔔{alerts.length>0&&<span className="absolute -top-1 -right-1 bg-red-500 text-white text-xs rounded-full w-4 h-4 flex items-center justify-center font-bold">{alerts.length}</span>}
          </button>
        </div>
      </div>
      {/* V21 – Bannière base distante vide : initialisation manuelle requise */}
      {syncStatus === 'empty' && (
        <div className="md:ml-60 fixed top-0 left-0 right-0 z-10 pt-0 md:pt-0">
          <div className="bg-amber-50 border-b-2 border-amber-300 px-4 py-3 flex flex-col sm:flex-row items-start sm:items-center gap-3">
            <div className="flex items-center gap-2 flex-1">
              <span className="text-amber-500 text-lg">🟡</span>
              <div>
                <div className="font-semibold text-amber-800 text-sm">Base distante vide — aucune écriture automatique effectuée</div>
                <div className="text-amber-700 text-xs mt-0.5">La ligne Supabase est absente. Initialisez manuellement avec vos données locales ou démarrez avec une base vide.</div>
              </div>
            </div>
            <div className="flex gap-2 shrink-0">
              <button
                disabled={manualInitBusy}
                onClick={() => handleManualInit('locales (localStorage)', data)}
                className="px-3 py-1.5 bg-amber-600 text-white text-xs font-semibold rounded-lg hover:bg-amber-700 disabled:opacity-50 transition-colors"
              >
                {manualInitBusy ? 'Initialisation...' : 'Initialiser avec données locales'}
              </button>
              <button
                disabled={manualInitBusy}
                onClick={() => handleManualInit('vides', securizeData({}))}
                className="px-3 py-1.5 bg-white border border-amber-400 text-amber-700 text-xs font-semibold rounded-lg hover:bg-amber-50 disabled:opacity-50 transition-colors"
              >
                Démarrer vide
              </button>
            </div>
          </div>
        </div>
      )}

      {/* V21 – Bannière erreur de synchronisation */}
      {syncStatus === 'error' && (
        <div className="md:ml-60 fixed top-0 left-0 right-0 z-10">
          <div className="bg-red-50 border-b-2 border-red-300 px-4 py-2 flex items-center gap-2">
            <span className="text-red-500">⚠️</span>
            <div className="flex-1">
              <span className="font-semibold text-red-700 text-xs">Erreur de connexion Supabase</span>
              <span className="text-red-600 text-xs ml-2">— Mode local actif. Vos modifications sont sauvegardées localement mais pas synchronisées.</span>
            </div>
            <button onClick={()=>doExport(data)} className="px-2 py-1 bg-red-100 border border-red-300 text-red-700 text-xs rounded hover:bg-red-200 transition-colors">
              Exporter JSON
            </button>
          </div>
        </div>
      )}

      {/* V23 – Bannière conflit multi-utilisateur */}
      {syncStatus === 'conflict' && (
        <div className="md:ml-60 fixed top-0 left-0 right-0 z-10">
          <div className="bg-orange-50 border-b-2 border-orange-300 px-4 py-2 flex items-center gap-2">
            <span className="text-orange-500">⚡</span>
            <div className="flex-1">
              <span className="font-semibold text-orange-700 text-xs">Conflit détecté</span>
              <span className="text-orange-600 text-xs ml-2">— Les données ont été modifiées depuis un autre appareil. Rechargez pour récupérer la version distante.</span>
            </div>
            <button
              onClick={async () => {
                const { data: rows, error } = await sb.from('app_data').select('data, version').eq('id', 1).single();
                if(!error && rows?.data) {
                  const remote = securizeData(rows.data);
                  setLocalVersion(rows.version || 1);
                  isRemoteUpdate.current = true;
                  setData(remote);
                  try { localStorage.setItem(LS_KEY, JSON.stringify(remote)); } catch(e) {}
                  setSyncStatus('ok');
                  addToast('Données distantes rechargées ☁️', 'success');
                } else {
                  addToast('Rechargement échoué : ' + (error?.message||'inconnu'), 'error');
                }
              }}
              className="px-3 py-1 bg-orange-600 text-white text-xs font-semibold rounded hover:bg-orange-700 transition-colors"
            >
              Recharger depuis Supabase
            </button>
          </div>
        </div>
      )}

      {/* V23 – Rappel export automatique */}
      {autoExportBanner && syncStatus === 'ok' && (
        <div className="md:ml-60 fixed top-0 left-0 right-0 z-10">
          <div className="bg-blue-50 border-b border-blue-200 px-4 py-2 flex items-center gap-2">
            <span className="text-blue-500">💾</span>
            <div className="flex-1 text-xs text-blue-700">
              Vous n'avez pas exporté vos données depuis plus de 7 jours. Un export JSON local est recommandé comme filet de sécurité.
            </div>
            <button
              onClick={() => { doExport(data); markExportDone(); setAutoExportBanner(false); }}
              className="px-3 py-1 bg-blue-600 text-white text-xs font-semibold rounded hover:bg-blue-700 transition-colors"
            >Exporter maintenant</button>
            <button onClick={() => setAutoExportBanner(false)} className="text-blue-400 hover:text-blue-600 text-sm px-1">✕</button>
          </div>
        </div>
      )}

      {/* V23 – Modal snapshots */}
      {showSnapshots && (
        <SnapshotModal
          onClose={() => setShowSnapshots(false)}
          onRollback={(d) => { isRemoteUpdate.current = true; setData(d); }}
        />
      )}

      {/* Main content */}
      <main className={`md:ml-60 pt-0 md:pt-0 ${syncStatus==='empty'||syncStatus==='error'||syncStatus==='conflict'||autoExportBanner ? 'mt-10 sm:mt-10' : ''}`}>
        <div className="pt-14 md:pt-0 min-h-screen">
          <div className="max-w-6xl mx-auto px-4 py-6">
            {renderModule()}
          </div>
        </div>
      </main>
      {showSearch && <GlobalSearch data={data} onNavigate={(mod, dl)=>{onNavigate(mod, dl);}} onClose={()=>setShowSearch(false)}/>}
      {showAlerts && <AlertCenter alerts={alerts} onNavigate={onNavigate} onClose={()=>setShowAlerts(false)}/>}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(
  <ToastProvider>
    <App/>
  </ToastProvider>
);
</script>
</body>
</html>
